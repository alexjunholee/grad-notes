<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grad Notes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg-alt: #f5f5f7;
  --bg-sidebar: #f5f5f7;
  --bg-code: #f5f5f7;
  --bg-surface: #f5f5f7;

  --text: #1d1d1f;
  --text-body: rgba(0, 0, 0, 0.8);
  --text-muted: rgba(0, 0, 0, 0.56);
  --text-tertiary: rgba(0, 0, 0, 0.48);
  --text-heading: #1d1d1f;

  --accent: #0071e3;
  --link: #0066cc;

  --border: rgba(0, 0, 0, 0.08);
  --border-strong: rgba(0, 0, 0, 0.16);

  --sidebar-width: 300px;
  --topbar-height: 52px;
  --progress-height: 3px;

  --shadow-elev: rgba(0, 0, 0, 0.22) 3px 5px 30px 0px;
}

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  font-size: 17px;
  line-height: 1.47;
  letter-spacing: -0.022em;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
  font-feature-settings: "kern", "liga", "calt";
  word-break: keep-all;
  overflow-wrap: break-word;
}

#progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: var(--progress-height);
  background: linear-gradient(90deg, #0071e3, #2997ff);
  z-index: 10000;
  transition: width 0.1s linear;
  width: 0%;
}

#topbar {
  position: fixed;
  top: var(--progress-height);
  left: 0;
  right: 0;
  height: var(--topbar-height);
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 1000;
}

#topbar .menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  margin-right: 12px;
  padding: 6px 10px;
  border-radius: 8px;
}

#topbar .menu-toggle:hover { background: rgba(0,0,0,0.04); }

#topbar .title {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text-heading);
  letter-spacing: -0.022em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#topbar .back-link {
  margin-left: 16px;
  color: var(--link);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  white-space: nowrap;
  padding: 7px 14px;
  border-radius: 980px;
  border: 1px solid var(--border);
  letter-spacing: -0.014em;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}

#topbar .back-link:hover {
  background: rgba(0, 113, 227, 0.06);
  border-color: var(--accent);
  color: var(--accent);
}

/* Language toggle — inline link style (no box) */
#topbar .lang-toggle {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  letter-spacing: -0.010em;
}
#topbar .lang-toggle a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 4px 2px;
  transition: color 0.15s;
  cursor: pointer;
}
#topbar .lang-toggle a:hover { color: var(--text); }
#topbar .lang-toggle a.active {
  color: var(--text-heading);
  font-weight: 600;
}
#topbar .lang-toggle .sep { color: var(--border-strong); }

#sidebar {
  position: fixed;
  top: calc(var(--progress-height) + var(--topbar-height));
  left: 0;
  width: var(--sidebar-width);
  height: calc(100vh - var(--topbar-height) - var(--progress-height));
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 999;
  display: flex;
  flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.16) transparent;
}

#sidebar::-webkit-scrollbar { width: 6px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.16); border-radius: 3px; }

#search-box {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.6);
  flex-shrink: 0;
}

#search-input {
  width: 100%;
  padding: 9px 12px;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13.5px;
  outline: none;
  font-family: inherit;
  letter-spacing: -0.016em;
  transition: border-color 0.15s, box-shadow 0.15s;
}

#search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15); }
#search-input::placeholder { color: var(--text-muted); }

#toc-container {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 32px;
}

#toc-container::-webkit-scrollbar { width: 4px; }
#toc-container::-webkit-scrollbar-track { background: transparent; }
#toc-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

/* Chapter level (h1) */
.toc-item {
  display: block;
  padding: 8px 16px 8px 20px;
  color: var(--text);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  letter-spacing: -0.014em;
  border-left: 3px solid transparent;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  cursor: pointer;
}

/* Section (h2) */
.toc-item.toc-h2 {
  padding: 5px 16px 5px 36px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: -0.012em;
}

.toc-item.toc-h2 + .toc-item:not(.toc-h2) { margin-top: 6px; }

.toc-item:hover {
  color: var(--text);
  background: rgba(0, 0, 0, 0.04);
}

.toc-item.toc-h2:hover { color: var(--text); }

.toc-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: rgba(0, 113, 227, 0.08);
  font-weight: 700;
}

.toc-item.toc-h2.active {
  font-weight: 500;
  color: var(--accent);
}

.toc-item.toc-part {
  padding: 14px 16px 8px 20px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-heading);
  letter-spacing: 0;
}

.toc-item.toc-part:not(:first-child) { margin-top: 16px; }

.toc-item.toc-chapter {
  padding: 6px 16px 6px 31px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0;
}

.toc-item.toc-section {
  padding: 4px 16px 4px 46px;
  font-size: 12.5px;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: 0;
}

.toc-item.toc-section:hover { color: var(--text); }

.toc-item.toc-section.active {
  font-weight: 500;
  color: var(--accent);
}

.toc-item.toc-hidden { display: none; }

.toc-no-results {
  padding: 20px 16px;
  color: var(--text-muted);
  font-size: 13.5px;
  text-align: center;
  display: none;
  letter-spacing: -0.014em;
}

#main-content {
  margin-left: var(--sidebar-width);
  margin-top: calc(var(--progress-height) + var(--topbar-height));
  min-height: calc(100vh - var(--topbar-height) - var(--progress-height));
  padding: 56px 56px 96px;
}

#content {
  max-width: 820px;
  margin: 0 auto;
}

#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  color: var(--text-muted);
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

#content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
  color: var(--text-heading);
  font-feature-settings: "ss01", "kern";
  scroll-margin-top: 72px;
}

#content h1 {
  font-size: 48px;
  font-weight: 600;
  line-height: 1.08;
  letter-spacing: -0.018em;
  margin: 0 0 28px 0;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

#content h1:not(:first-of-type) {
  margin-top: 96px;
}

#content h1 + blockquote {
  border-left: none;
  background: transparent;
  text-align: center;
  font-size: 18px;
  color: var(--text-muted);
  padding: 8px 0 24px;
  letter-spacing: -0.018em;
}

#content h2 {
  font-size: 30px;
  font-weight: 600;
  line-height: 1.10;
  letter-spacing: -0.014em;
  margin: 56px 0 18px 0;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

#content h3 {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.16;
  letter-spacing: -0.012em;
  margin: 40px 0 12px 0;
}

#content h4 {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.22;
  letter-spacing: -0.010em;
  margin: 28px 0 10px 0;
}

#content h5, #content h6 {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.3;
  margin: 24px 0 8px 0;
}

#content p { margin: 0 0 16px 0; color: var(--text-body); }

#content a {
  color: var(--link);
  text-decoration: none;
  transition: color 0.15s;
}

#content a:hover { text-decoration: underline; text-underline-offset: 2px; }

#content ul, #content ol {
  margin: 0 0 16px 0;
  padding-left: 28px;
}

#content li { margin-bottom: 6px; color: var(--text-body); }
#content li > ul, #content li > ol { margin-top: 6px; margin-bottom: 6px; }

#content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 56px 0;
}

#content strong { color: var(--text); font-weight: 600; }

#content img {
  max-width: 100%;
  height: auto;
  border-radius: 12px;
  margin: 12px 0;
}

#content code {
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;
  font-size: 0.82em;
  letter-spacing: 0;
}

#content :not(pre) > code {
  background: var(--bg-code);
  padding: 2px 6px;
  border-radius: 5px;
  color: var(--text);
}

#content pre {
  background: var(--bg-code);
  border: none;
  border-radius: 12px;
  padding: 18px 20px;
  overflow-x: auto;
  margin: 0 0 20px 0;
  font-size: 13px;
  line-height: 1.55;
}

#content pre code {
  background: none;
  padding: 0;
  color: inherit;
  font-size: inherit;
}

#content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 20px 0;
  font-size: 15px;
  display: block;
  overflow-x: auto;
}

#content thead { background: var(--bg-surface); }

#content th {
  padding: 12px 16px;
  text-align: left;
  color: var(--text-heading);
  font-weight: 600;
  font-size: 14px;
  border-bottom: 1px solid var(--border-strong);
  letter-spacing: -0.012em;
}

#content td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text-body);
  letter-spacing: -0.016em;
}

#content tbody tr:hover { background: rgba(0, 113, 227, 0.04); }

#content blockquote {
  border-left: 3px solid var(--accent);
  background: var(--bg-surface);
  padding: 14px 22px;
  margin: 0 0 20px 0;
  border-radius: 0 8px 8px 0;
  color: var(--text-body);
}

#content blockquote p { margin-bottom: 8px; }
#content blockquote p:last-child { margin-bottom: 0; }

#content blockquote strong { color: var(--accent); }

.katex { font-size: 1.05em; }
.katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; margin: 20px 0; }

::selection { background: rgba(0, 113, 227, 0.20); color: var(--text); }

mark.search-highlight {
  background: rgba(0, 113, 227, 0.18);
  color: inherit;
  padding: 1px 3px;
  border-radius: 3px;
}

/* About This Document (university-math style) */
.about-document {
  margin: 0 0 56px 0;
  padding: 24px 28px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.about-document h2 {
  border-bottom: none !important;
  margin: 0 0 14px 0 !important;
  padding-bottom: 0 !important;
  font-size: 24px !important;
  line-height: 1.18 !important;
}
.about-document h4 {
  color: var(--link) !important;
  margin-top: 22px !important;
}
.about-document table { margin-top: 10px !important; }
.about-document p:last-child,
.about-document ul:last-child { margin-bottom: 0 !important; }
.about-document .source-tag {
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 18px;
}

/* Guide Overview (at top of content) */
.guide-overview {
  margin: 0 0 80px 0;
  padding: 0 0 48px 0;
  border-bottom: 1px solid var(--border);
}
.guide-overview .overview-header { margin-bottom: 44px; }
.guide-overview .overview-title {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
  font-size: 48px;
  font-weight: 600;
  line-height: 1.08;
  letter-spacing: -0.018em;
  color: var(--text-heading);
  margin: 0 0 10px 0;
}
.overview-group {
  margin-top: 44px;
  padding-left: 22px;
  border-left: 2px solid var(--border);
}
.overview-group:first-child { margin-top: 0; }
.overview-group-label {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
  font-size: 24px;
  font-weight: 650;
  line-height: 1.22;
  color: var(--text-heading);
  letter-spacing: 0;
  margin: 0 0 8px 0;
}
.overview-group-intro {
  max-width: 760px;
  color: var(--text-muted);
  font-size: 16px;
  line-height: 1.62;
  margin: 0 0 22px 0;
}
.overview-chapter { margin: 0 0 16px 14px; }
.overview-chapter:last-child { margin-bottom: 0; }
.overview-chapter-link {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text-heading);
  text-decoration: none;
  letter-spacing: 0;
  display: inline-block;
}
.overview-chapter-link:hover { color: var(--accent); }
.overview-chapter-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  margin-right: 10px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

#content .part-intro {
  margin: 92px 0 34px;
  padding: 42px 0 30px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.guide-overview + .part-intro { margin-top: 70px; }

#content .part-kicker {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

#content h1.part-title {
  font-size: 52px;
  font-weight: 650;
  line-height: 1.07;
  letter-spacing: 0;
  margin: 0;
  padding: 0;
  border: 0;
}

#content .part-intro p {
  max-width: 760px;
  color: var(--text-muted);
  font-size: 18px;
  line-height: 1.68;
  margin: 18px 0 0 0;
}

#content h1.chapter-heading,
#content h1.excerpt-heading {
  font-size: 34px;
  font-weight: 600;
  line-height: 1.15;
  letter-spacing: 0;
  margin-top: 56px;
  padding-bottom: 10px;
}

#content .part-intro + h1.chapter-heading,
#content .part-intro + h1.excerpt-heading {
  margin-top: 36px;
}

@media (max-width: 900px) {
  #content h1.part-title { font-size: 40px; }
  #content h1.chapter-heading,
  #content h1.excerpt-heading { font-size: 30px; }
}

@media (max-width: 600px) {
  .overview-group { padding-left: 16px; }
  .overview-group-label { font-size: 21px; }
  #content .part-intro { margin-top: 72px; padding: 34px 0 26px; }
  #content h1.part-title { font-size: 32px; }
  #content .part-intro p { font-size: 16px; }
  #content h1.chapter-heading,
  #content h1.excerpt-heading { font-size: 28px; }
}
@media (max-width: 1024px) {
  #main-content { padding-left: 40px; padding-right: 40px; }
}

@media (max-width: 900px) {
  #topbar .menu-toggle { display: block; }

  #sidebar {
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    box-shadow: none;
  }

  #sidebar.open {
    transform: translateX(0);
    box-shadow: var(--shadow-elev);
  }

  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 998;
  }

  #sidebar-overlay.visible { display: block; }

  #main-content { margin-left: 0; padding: 24px 24px 56px; }

  #content h1 { font-size: 36px; }
  #content h2 { font-size: 26px; margin-top: 44px; }
  #content h3 { font-size: 20px; }
  #content h4 { font-size: 17px; }
}

@media (max-width: 600px) {
  body { font-size: 16px; }
  #content h1 { font-size: 30px; }
  #content h2 { font-size: 22px; }
  #content h3 { font-size: 18px; }
  #main-content { padding: 20px 20px 48px; }
}

@media print {
  #progress-bar, #topbar, #sidebar, #sidebar-overlay, #search-box, .menu-toggle { display: none !important; }
  #main-content { margin: 0 !important; padding: 0 !important; }
  #content { max-width: 100%; color: #000; }
  #content h1, #content h2, #content h3, #content h4, #content strong { color: #000; }
  #content a { color: #1a0dab; text-decoration: underline; }
  #content pre, #content code { background: #f5f5f7; color: #000; border: none; }
  #content blockquote { background: #f5f5f7; border-left-color: #999; }
  #content table { border: 1px solid #ccc; }
  #content th, #content td { border: 1px solid #ccc; }
  body { background: #fff; }
}
</style>
</head>
<body>

<div id="progress-bar"></div>

<div id="topbar">
  <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation">&#9776;</button>
  <span class="title" id="topbar-title">Grad Notes</span>
  <div class="lang-toggle" id="lang-toggle" aria-hidden="true"></div>
  <a href="../" class="back-link">← repos</a>
</div>

<div id="sidebar-overlay"></div>

<nav id="sidebar">
  <div id="search-box">
    <input type="text" id="search-input" placeholder="챕터/섹션 검색... (Ctrl+K)">
  </div>
  <div id="toc-container"></div>
  <div class="toc-no-results" id="toc-no-results">검색 결과 없음</div>
</nav>

<main id="main-content">
  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-text">가이드 렌더링 중...</span>
  </div>
  <div id="content" style="display:none;"></div>
</main>

<textarea id="md-source-ko" style="display:none;">
<div class="about-document">
<h2>About This Document</h2>

<h4>출처 자료</h4>
<p>『대학원생 때 알았더라면 좋았을 것들』 1·2권을 중심에 두고, 해외 박사과정 기록과 연구 글쓰기 자료, 자매 연구노트의 관점을 함께 참고했다.</p>

<table>
<tr><th>출처</th><th>주요 자료</th><th>쓰임</th></tr>
<tr><td>한국어 대학원 회고 — 1권</td><td><em>대학원생 때 알았더라면 좋았을 것들</em> 1권 (엄태웅 대표, 최윤섭 박사, 권창현 교수)</td><td>진학 결정, 지도교수 관계, 시간 운영, 실패와 불안의 실제 언어</td></tr>
<tr><td>한국어 대학원 회고 — 2권</td><td><em>대학원생 때 알았더라면 좋았을 것들</em> 2권 (김세정 교수, 윤은정 교수, 유두희 박사)</td><td>비이공계 박사, 여성 박사, 산업계 전환, 해외 임용의 구체 사례</td></tr>

<h4>범위</h4>
<p>본문은 박사를 결정하는 순간에서 시작해, 지도교수와 연구실, 시간과 협업, 비교와 실패, 정신건강, 후배 멘토링, 학계와 산업계 진로, 졸업 후 첫 1년까지 이어진다. 박사과정을 한 사람이 통과하는 긴 운영으로 읽는 것이 이 문서의 목적이다.</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<script>
(function() {
  'use strict';

  var DOC_TITLE = "Grad Notes";
  var TOPBAR_TITLE = "Grad Notes";
  var OVERVIEW_TITLE = "Grad Notes";
  var SEARCH_PLACEHOLDER = "챕터/섹션 검색... (Ctrl+K)";
  var STORAGE_KEY = "grad-notes-lang";
  var CHAPTER_GROUPS = [
    {
      label: "Part 1 · 박사는 조건보다 5년의 운영 방식을 고르는 일이다",
      intro: "박사과정의 첫 결정은 학교 이름보다 5년의 운영 방식을 고르는 일에 가깝다. 이 Part는 진학 이유, 환경 선택, 다른 분야의 시간 단위까지 결정의 바닥을 먼저 정리한다.",
      items: [{"kind":"chapter","num":1},{"kind":"chapter","num":2},{"kind":"chapter","num":3}]
    },
    {
      label: "Part 2 · 지도교수 관계는 주어지는 환경이 아니라 함께 만드는 시스템이다",
      intro: "지도교수 관계는 주어지는 환경이 아니라 함께 만드는 시스템이다. 이 Part는 좋은 관계의 신호, 나쁜 신호의 읽기, 갈등이 커지기 전의 정비 단위를 다룬다.",
      items: [{"kind":"chapter","num":4},{"kind":"chapter","num":5},{"kind":"chapter","num":6}]
    },
    {
      label: "Part 3 · 자율성은 시간·협업·도구의 구조에서 생긴다",
      intro: "자율성은 자유 시간이 많아서 생기지 않는다. 내 연구를 자기 손으로 만들고, 시간을 덩어리로 지키고, 협업과 도구를 문제 뒤에 세우는 구조에서 생긴다.",
      items: [{"kind":"chapter","num":7},{"kind":"chapter","num":8},{"kind":"chapter","num":9},{"kind":"chapter","num":10},{"kind":"chapter","num":11},{"kind":"chapter","num":12},{"kind":"chapter","num":13}]
    },
    {
      label: "Part 4 · 감정과 삶의 흔들림도 운영의 일부다",
      intro: "감정과 삶의 흔들림은 연구의 바깥일이 아니다. 비교, 멘붕, 통합, 정신건강, 임포스터 감각을 운영의 일부로 읽어야 5년의 페이스가 무너지지 않는다.",
      items: [{"kind":"chapter","num":14},{"kind":"chapter","num":15},{"kind":"chapter","num":16},{"kind":"chapter","num":17},{"kind":"chapter","num":18},{"kind":"chapter","num":19},{"kind":"chapter","num":20}]
    },
    {
      label: "Part 5 · 졸업은 안정이 아니라 다음 역할의 시작이다",
      intro: "졸업은 안정의 도착점이 아니라 다음 역할의 시작이다. 후배를 키우고, 교수와 산업계의 일상을 읽고, 해외 임용과 졸업 후 첫 1년을 다음 운영으로 넘긴다.",
      items: [{"kind":"chapter","num":21},{"kind":"chapter","num":22},{"kind":"chapter","num":23},{"kind":"chapter","num":24},{"kind":"chapter","num":25},{"kind":"chapter","num":26}]
    }
  ];

  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
      }
      try { return hljs.highlightAuto(code).value; } catch(e) {}
      return code;
    },
    breaks: false,
    gfm: true
  });
  marked.use({ renderer: { del: function(token) { return '~' + (token.text || token) + '~'; } } });

  if (window.mermaid) {
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
  }

  function protectMath(src) {
    var placeholders = [];
    var idx = 0;
    var codeBlocks = [];
    src = src.replace(new RegExp('\\x60\\x60\\x60[\\s\\S]*?\\x60\\x60\\x60', 'g'), function(m) {
      codeBlocks.push(m);
      return '%%CODEBLOCK' + (codeBlocks.length - 1) + '%%';
    });
    var inlineCodes = [];
    src = src.replace(new RegExp('\\x60[^\\x60\\n]+\\x60', 'g'), function(m) {
      inlineCodes.push(m);
      return '%%INLINECODE' + (inlineCodes.length - 1) + '%%';
    });
    src = src.replace(/\$\$([\s\S]*?)\$\$/g, function(m, math) {
      placeholders.push({ display: true, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/\$([^\s$](?:[^$]*[^\s$])?)\$/g, function(m, math) {
      placeholders.push({ display: false, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/%%CODEBLOCK(\d+)%%/g, function(m, i) { return codeBlocks[parseInt(i, 10)]; });
    src = src.replace(/%%INLINECODE(\d+)%%/g, function(m, i) { return inlineCodes[parseInt(i, 10)]; });
    return { src: src, placeholders: placeholders };
  }

  function restoreAndRenderMath(html, placeholders) {
    return html.replace(/%%MATH(\d+)%%/g, function(m, i) {
      var p = placeholders[parseInt(i, 10)];
      try {
        return katex.renderToString(p.math, { displayMode: p.display, throwOnError: false, trust: true });
      } catch(e) {
        return p.display ? '$$' + p.math + '$$' : '$' + p.math + '$';
      }
    });
  }

  var state = { observer: null, scrollHandler: null };
  var contentEl = document.getElementById('content');
  var loadingEl = document.getElementById('loading');
  var tocContainer = document.getElementById('toc-container');

  function applyChrome() {
    document.documentElement.lang = 'ko';
    document.title = DOC_TITLE;
    document.getElementById('topbar-title').textContent = TOPBAR_TITLE;
    document.getElementById('search-input').placeholder = SEARCH_PLACEHOLDER;
    document.getElementById('toc-no-results').textContent = '검색 결과 없음';
    document.getElementById('loading-text').textContent = '가이드 렌더링 중...';
    document.querySelectorAll('#lang-toggle a').forEach(function(a) { a.classList.add('active'); });
    try { localStorage.setItem(STORAGE_KEY, 'ko'); } catch(e) {}
  }

  function parseHeading(text) {
    var ch = text.trim().match(/^Ch\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ch) return { kind: 'chapter', num: parseInt(ch[1], 10), title: ch[2].trim(), label: 'Ch.' + parseInt(ch[1], 10) };
    var ex = text.trim().match(/^E\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ex) return { kind: 'excerpt', num: parseInt(ex[1], 10), title: ex[2].trim(), label: 'E.' + parseInt(ex[1], 10) };
    return null;
  }

  function parseGroupLabel(label) {
    var parts = label.split('·');
    if (parts.length < 2) return { kicker: '', title: label.trim() };
    return { kicker: parts[0].trim(), title: parts.slice(1).join('·').trim() };
  }

  function findEntryHeading(item) {
    var h1s = contentEl.querySelectorAll('h1');
    for (var i = 0; i < h1s.length; i++) {
      var parsed = parseHeading(h1s[i].textContent);
      if (parsed && parsed.kind === item.kind && parsed.num === item.num) return h1s[i];
    }
    return null;
  }

  function annotateEntryHeadings() {
    contentEl.querySelectorAll('h1').forEach(function(h1) {
      var parsed = parseHeading(h1.textContent);
      if (!parsed) return;
      if (!h1.id) h1.id = parsed.kind + '-' + parsed.num;
      h1.classList.add(parsed.kind === 'excerpt' ? 'excerpt-heading' : 'chapter-heading');
    });
  }

  function buildPartIntros() {
    annotateEntryHeadings();
    CHAPTER_GROUPS.forEach(function(group, index) {
      var first = null;
      for (var i = 0; i < group.items.length; i++) {
        first = findEntryHeading(group.items[i]);
        if (first) break;
      }
      if (!first) return;

      var meta = parseGroupLabel(group.label);
      var partId = 'part-' + index + '-' + slugify(meta.title);
      if (document.getElementById(partId)) return;

      var section = document.createElement('section');
      section.className = 'part-intro';

      var kicker = document.createElement('div');
      kicker.className = 'part-kicker';
      kicker.textContent = meta.kicker || 'Part';
      section.appendChild(kicker);

      var title = document.createElement('h1');
      title.className = 'part-title';
      title.id = partId;
      title.textContent = meta.title;
      section.appendChild(title);

      if (group.intro) {
        var intro = document.createElement('p');
        intro.textContent = group.intro;
        section.appendChild(intro);
      }

      first.parentNode.insertBefore(section, first);
    });
  }

  function render() {
    applyChrome();
    contentEl.style.display = 'none';
    loadingEl.style.display = 'flex';

    requestAnimationFrame(function() {
      var src = document.getElementById('md-source-ko').value;
      src = src.replace(/\*\*([^*\n]+)\*\*(?=[가-힣])/g, '<strong>$1</strong>');
      var mathData = protectMath(src);
      var html = marked.parse(mathData.src);
      html = restoreAndRenderMath(html, mathData.placeholders);
      contentEl.innerHTML = html;

      if (window.mermaid) {
        var mermaidBlocks = contentEl.querySelectorAll('pre > code.language-mermaid');
        mermaidBlocks.forEach(function(code, i) {
          var pre = code.parentElement;
          var container = document.createElement('div');
          container.className = 'mermaid';
          container.id = 'mermaid-ko-' + i;
          container.textContent = code.textContent;
          pre.replaceWith(container);
        });
        try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}
      }

      tocContainer.innerHTML = '';
      buildPartIntros();
      buildOverview();
      buildTOC();
      contentEl.style.display = 'block';
      loadingEl.style.display = 'none';
      setupScrollTracking();

      if (window.location.hash) {
        var initId = window.location.hash.slice(1);
        var initTarget = document.getElementById(initId);
        if (initTarget) window.scrollTo(0, initTarget.getBoundingClientRect().top + window.scrollY - 60);
      }
    });
  }

  render();
  setupSearch();
  setupProgressBar();
  setupMobileMenu();
  setupKeyboard();
  setupTocDelegation();

  function setupTocDelegation() {
    tocContainer.addEventListener('click', function(e) {
      if (e.target.closest('.toc-item')) closeMobileSidebar();
    });
  }

  function buildOverview() {
    var h1s = contentEl.querySelectorAll('h1');
    var entries = {};

    h1s.forEach(function(h1) {
      var parsed = parseHeading(h1.textContent);
      if (!parsed) return;
      if (!h1.id) h1.id = parsed.kind + '-' + parsed.num;
      var sections = [];
      var node = h1.nextElementSibling;
      while (node && node.tagName !== 'H1') {
        if (node.tagName === 'H2') {
          if (!node.id) node.id = slugify(node.textContent);
          sections.push({ text: node.textContent.trim(), id: node.id });
        }
        node = node.nextElementSibling;
      }
      entries[parsed.kind + '-' + parsed.num] = {
        kind: parsed.kind,
        num: parsed.num,
        label: parsed.label,
        title: parsed.title,
        id: h1.id,
        sections: sections
      };
    });

    if (Object.keys(entries).length === 0) return;

    var overview = document.createElement('section');
    overview.className = 'guide-overview';
    var header = document.createElement('div');
    header.className = 'overview-header';
    var oTitle = document.createElement('h1');
    oTitle.className = 'overview-title';
    oTitle.textContent = OVERVIEW_TITLE;
    header.appendChild(oTitle);
    overview.appendChild(header);

    CHAPTER_GROUPS.forEach(function(group) {
      var valid = group.items.map(function(item) { return entries[item.kind + '-' + item.num]; }).filter(Boolean);
      if (!valid.length) return;
      var groupEl = document.createElement('div');
      groupEl.className = 'overview-group';
      var label = document.createElement('div');
      label.className = 'overview-group-label';
      label.textContent = group.label;
      groupEl.appendChild(label);
      if (group.intro) {
        var intro = document.createElement('p');
        intro.className = 'overview-group-intro';
        intro.textContent = group.intro;
        groupEl.appendChild(intro);
      }

      valid.forEach(function(entry) {
        var wrap = document.createElement('div');
        wrap.className = 'overview-chapter';
        var link = document.createElement('a');
        link.className = 'overview-chapter-link';
        link.href = '#' + entry.id;
        var num = document.createElement('span');
        num.className = 'overview-chapter-num';
        num.textContent = entry.label;
        link.appendChild(num);
        link.appendChild(document.createTextNode(entry.title));
        wrap.appendChild(link);
        groupEl.appendChild(wrap);
      });
      overview.appendChild(groupEl);
    });

    var about = contentEl.querySelector('.about-document');
    if (about) contentEl.insertBefore(overview, about.nextSibling);
    else contentEl.insertBefore(overview, contentEl.firstChild);
  }

  function buildTOC() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var fragment = document.createDocumentFragment();
    headings.forEach(function(heading) {
      if (!heading.id) heading.id = slugify(heading.textContent);
      if (heading.classList.contains('overview-title')) return;

      var link = document.createElement('a');
      var parsed = parseHeading(heading.textContent);
      var tocClass = 'toc-section';
      if (heading.classList.contains('part-title')) tocClass = 'toc-part';
      else if (parsed) tocClass = 'toc-chapter' + (parsed.kind === 'excerpt' ? ' toc-excerpt' : '');
      link.className = 'toc-item ' + tocClass;
      link.href = '#' + heading.id;
      if (heading.classList.contains('part-title')) {
        var kicker = heading.parentElement ? heading.parentElement.querySelector('.part-kicker') : null;
        link.textContent = (kicker ? kicker.textContent + ' · ' : '') + heading.textContent;
      } else {
        link.textContent = heading.textContent;
      }
      link.dataset.headingId = heading.id;
      fragment.appendChild(link);
    });
    tocContainer.appendChild(fragment);
  }

  function slugify(text) {
    return text.toLowerCase().trim()
      .replace(/<[^>]+>/g, '')
      .replace(/[^\w\s가-힣-]/g, '')
      .replace(/\s+/g, '-')
      .substring(0, 80) || 'section';
  }

  function setupScrollTracking() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var tocItems = tocContainer.querySelectorAll('.toc-item');
    if (headings.length === 0) return;
    if (state.observer) state.observer.disconnect();

    var tocMap = {};
    tocItems.forEach(function(item) { tocMap[item.dataset.headingId] = item; });
    var currentActive = null;
    var observer = new IntersectionObserver(function(entries) {
      var topHeading = null;
      var topOffset = Infinity;
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var rect = entry.target.getBoundingClientRect();
          if (rect.top < topOffset) { topOffset = rect.top; topHeading = entry.target; }
        }
      });
      if (topHeading) {
        if (currentActive) currentActive.classList.remove('active');
        var item = tocMap[topHeading.id];
        if (item) {
          item.classList.add('active');
          currentActive = item;
          var itemRect = item.getBoundingClientRect();
          var containerRect = tocContainer.getBoundingClientRect();
          if (itemRect.top < containerRect.top || itemRect.bottom > containerRect.bottom) item.scrollIntoView({ block: 'center', behavior: 'auto' });
        }
      }
    }, { rootMargin: '-60px 0px -70% 0px', threshold: 0 });
    headings.forEach(function(h) { observer.observe(h); });
    state.observer = observer;

    if (!state.scrollHandler) {
      var ticking = false;
      state.scrollHandler = function() {
        if (!ticking) {
          requestAnimationFrame(function() {
            var curHeadings = contentEl.querySelectorAll('h1, h2');
            var curTocItems = tocContainer.querySelectorAll('.toc-item');
            var curMap = {};
            curTocItems.forEach(function(item) { curMap[item.dataset.headingId] = item; });
            var found = null;
            var scrollTop = window.scrollY + 80;
            for (var i = curHeadings.length - 1; i >= 0; i--) {
              if (curHeadings[i].offsetTop <= scrollTop) { found = curHeadings[i]; break; }
            }
            if (found) {
              var active = tocContainer.querySelector('.toc-item.active');
              if (active) active.classList.remove('active');
              var item = curMap[found.id];
              if (item) item.classList.add('active');
            }
            ticking = false;
          });
          ticking = true;
        }
      };
      window.addEventListener('scroll', state.scrollHandler);
    }
  }

  function setupSearch() {
    var searchInput = document.getElementById('search-input');
    var noResults = document.getElementById('toc-no-results');
    searchInput.addEventListener('input', function() {
      var query = this.value.trim().toLowerCase();
      var tocItems = tocContainer.querySelectorAll('.toc-item');
      if (!query) {
        tocItems.forEach(function(item) { item.classList.remove('toc-hidden'); });
        noResults.style.display = 'none';
        return;
      }
      var matchCount = 0;
      tocItems.forEach(function(item) {
        var text = item.textContent.toLowerCase();
        if (text.includes(query)) { item.classList.remove('toc-hidden'); matchCount++; }
        else item.classList.add('toc-hidden');
      });
      noResults.style.display = matchCount === 0 ? 'block' : 'none';
    });
  }

  function setupProgressBar() {
    var progressBar = document.getElementById('progress-bar');
    var ticking = false;
    function updateProgress() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = Math.min(progress, 100) + '%';
    }
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() { updateProgress(); ticking = false; });
        ticking = true;
      }
    });
    updateProgress();
  }

  function setupMobileMenu() {
    var toggle = document.getElementById('menu-toggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.querySelector('#sidebar-overlay');
    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
    });
    overlay.addEventListener('click', closeMobileSidebar);
  }

  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.querySelector('#sidebar-overlay').classList.remove('visible');
  }

  function setupKeyboard() {
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        document.getElementById('search-input').focus();
      }
    });
  }
})();
</script>
