body {

#topbar {

  right: 0;

#topbar .menu-toggle {

<h1 id="chapter-1">Ch.1 — 박사를 결정한다는 일</h1>

「대학원노트」는 박사과정을 *어떻게 살아남는가*를 본다. 「연구노트」가 책상 위의 작업 — 읽기·쓰기·연구의 진단 — 을 다룬다면, 이 책은 그 책상에 앉기까지의 결정과 책상에서 일어선 뒤의 시간 — 진학·환경·관계·자율성·진로 — 을 본다. 같은 5년을 다른 단면에서 잘라보았다.

첫 챕터는 책상에 앉기 *전*의 가장 큰 결정에서 시작한다. 박사를 결정한다는 일은 정답이 있는 시험이라기보다 자기 정합성 검사에 가깝다. 학점·스펙은 자격을 만들어 주지 않는다. 풀고 싶은 *구체적 문제*의 유무가 만든다. "왜 박사가 필요한가"는 진학 직전 단 한 번이 아니라 5년 동안 매년 다시 던져야 할 질문이다. 이 장은 그 결정 앞에 가져다 댈 도구 몇 개를 정리해 둔다 — 자격의 재정의, 박사가 무엇인지의 재정의, 9가지 어려움의 사전 직시, 회사와의 프레임 전환, 매년 답을 갱신하는 습관.

---

## 1.1 진학의 진짜 자격

학점·논문 편수·인턴 이력은 진학의 *조건*은 되어도 *자격*은 아니다. 조건은 학과가 합격증을 내주기 위해 보는 종이 위의 숫자고, 자격은 5년 동안 그 숫자가 다 흐려진 뒤에도 책상 앞에 앉아 있을 이유다. 둘은 다르다. 두 가지를 같은 것으로 두고 진학을 결정하면 5년차에 그 차이의 비용이 한꺼번에 청구된다.

자격이 무엇인지 최윤섭 박사의 한 줄이 직접 짚는다.

> "박사 학위는 그 자체로 숭고한 목적이라기보다는, 하나의 수단으로써의 성격이 강하다." (최윤섭 박사)

수단의 자격은 *그 수단으로 무엇을 하려는가*가 정의한다. 박사라는 도구로 풀고 싶은 *구체적 문제*가 한 줄로 적히면 자격이 있다. 적히지 않으면 아직 아니다. 엄태웅 작가의 진학 결정이 그 한 줄의 사례여서 한 번 들여다볼 만하다. 엄태웅 작가 본인은 "로봇은 왜 바보 같을 수밖에 없는가"라는 한 문장의 문제의식으로 진학을 결정했다고 적는다. 로봇 분야의 GPA·SCI 논문 편수가 아니라, 로봇이 바보 같은 *이유*를 끝까지 따라가 보고 싶다는 한 줄이 자격이었다.

공부와 연구는 다른 능력이다. 학점이 좋다고 연구가 잘 풀리지는 않는다. 학점은 *남이 만든 문제*를 빠르게 푸는 능력을 측정하는 한편, 연구는 *아직 적히지 않은 문제*를 짚어내는 능력에서 출발한다. 두 능력의 상관은 0이 아니지만 1도 아니다. 학점만으로 진학을 결정한 학생이 1년차에 가장 자주 부딪히는 벽이 바로 그 차이다.

도피로서의 진학이 가장 비싼 비용을 만든다. 취업 회피·또래 압력·병역의 시간 벌기는 *진학의 동기*가 아니라 *다른 결정의 회피*다. 회피로 시작한 5년은 5년차에 같은 회피를 한 번 더 요구한다 — 이번에는 *졸업의 회피*로. 회피가 누적되면 진로가 좁아지고, 졸업 후 첫 결정 앞에서 학사 졸업 직후의 자기 자신을 다시 만난다.

> **자격은 학점·스펙이 아니라 풀고 싶은 *구체적 문제*의 유무다.** 한 문장으로 적히지 않으면 진학을 미룬다.

> **도피로서의 진학은 5년의 가장 비싼 비용으로 돌아온다.** 또래 압력·취업 회피·병역의 시간 벌기는 진학 동기에서 분리한다.

## 1.2 박사가 무엇인지의 재정의

진학을 *결정*하기 전에 박사가 *무엇인가*를 한 번 다시 적어 두는 게 좋다. 결정 시점의 학생이 들고 있는 박사의 이미지는 보통 둘 중 하나다 — 모든 것을 아는 사람, 또는 최고 전문가·CNS 게재자. 두 이미지 모두 정확하지 않다. 부정확한 이미지로 결정하면 1년차에 그 이미지가 부서지면서 결정 그 자체가 흔들린다.

최윤섭 박사의 정의가 그 윤곽을 다시 잡아준다.

> "박사는 인류가 가진 지식의 경계를 넓혀갈 수 있는 능력을 갖춘 사람이다." (최윤섭 박사)

핵심은 *모든 것을 아는 사람*이 아니라 *경계를 한 발짝 넓힐 능력자*에 있다. 한 발짝의 크기는 작아도 된다. 지도에 안 적힌 곳이라야 한다는 조건만 만족하면 그만이다. 박사는 모든 것을 아는 사람도, 최고의 실험가도, CNS 게재자도 아니다. *독립된 연구자로서 스스로 연구할 준비가 된 사람*이다.

같은 명제를 직관 한 줄로 압축한 비유가 있다. 최윤섭 박사의 정글 탐험가 비유다. (같은 비유가 「연구노트」 [Part 0 ch04](../research-notes/guide.html#chapter-4)에서는 *현재 작업이 task인지 research인지*를 진단하는 단서로 쓰인다. 이 장은 같은 비유를 *진학할 것인가*의 단서로 가져온다.)

> 교과서는 이미 탐사된 영역의 지도. 박사는 그 끝을 넘어 자기 손으로 지도를 새로 그리는 과정. (최윤섭 박사)

비유의 핵심은 *지도의 끝*에 있다. 끝 안쪽은 누군가 이미 그렸고 누구나 들여다볼 수 있다. 박사 진학을 결정한다는 것은 그 끝을 넘어 자기 손으로 지도를 한 발짝 그릴 *의지*가 있는지를 묻는 일이다. 의지의 단서는 두 갈래다. 끝 바깥을 *궁금해해 본 적*이 있는가. 끝 바깥의 한 발짝이 답이 안 나오는 채로 한 학기쯤 *버텨 본 적*이 있는가. 둘 다에 답이 *없음*이라면 진학은 아직 이르다.

박사과정의 자기 인식도 이 재정의 위에서 변한다. 학사는 모든 것을 안다고 생각하고, 석사는 아무것도 모른다고 느끼며, 박사는 *나만 모르는 게 아니었음*을 알게 된다 — 최윤섭 박사의 한 줄이다. 박사과정은 *모르는 것*을 줄이러 가는 과정이라기보다, 모른다는 사실 위에서 한 발짝을 디뎌 보는 시간에 가깝다.

## 1.3 9가지 어려움을 미리 직시하기

박사의 재정의가 끝나도 5년의 일상은 여전히 별개의 문제다. 결정 시점에 그 5년의 어려움을 *미리 직시*해 두지 않으면, 1년차의 첫 멘붕 때 결정 그 자체가 흔들린다. 최윤섭 박사가 「대학원에 가야 하는가」에서 정리한 9가지 어려움이 그 사전 직시의 목록이 된다.

- 끝없는 터널 — 답이 안 나오는 채로 6개월·1년이 흐르는 구간이 정상.
- 불확실한 미래 — 졸업 시점의 진로가 입학 시점에 그려지지 않는다.
- 시간 부족 — 5년이 길어 보여도 한 분야의 한 발짝에는 짧다.
- 디폴트 실패 — 잘 되는 실험이 예외이고, 안 되는 실험이 정상이다.
- 지도교수 의존 — 학생의 1일 자유도가 지도교수의 한 마디에 좌우되는 구간이 길다.
- 박봉 — 동기 직장인의 절반·1/3 수준의 생활비가 5년간 지속된다.
- 기회비용 — 그 5년 동안 다른 자리에서 쌓일 수 있었던 경력·자산·관계가 같이 사라진다.
- 법적 사각지대 — 학생도 직장인도 아닌 제도적 림보 상태다.
- 심리적 우울 — 비교·고립·정체감의 흔들림이 누적된다.

목록의 핵심은 항목 하나하나의 무게가 아니라 *9가지가 동시에 진행된다*는 사실에 있다. 한 항목이 진정되면 다음 항목이 올라오는 식이다. 9가지 중 8가지를 견뎌도 1가지가 결정타가 된다. 결정 시점에 목록을 한 번 정독해 두면, 어느 항목이 자기 결정타가 될지의 *후보 분포*가 미리 보인다.

목록 위에 최윤섭 박사의 한 줄이 더 얹힌다.

> "실험은 원래 디폴트가 꽝이다." (최윤섭 박사)

뜻은 단순하다. 실험이 안 되는 것이 오히려 *정상*이고, 잘 되는 실험이 예외다. 같은 사전 보정이 1년차에 첫 멘붕을 만났을 때의 자기 진단을 결정한다 — *내가 못해서*인가, 아니면 *원래 그런 일*인가. 후자라는 사전 보정이 있어야 좌절이 결정의 흔들림으로 번지지 않는다.

대학원생의 림보 상태도 같은 결로 본다. 학생도 직장인도 아닌 제도적 림보는 9가지 중 한 항목이지만, 다른 8가지를 증폭시키는 *공명 항목*에 가깝다. 학생 신분이 주는 보호가 끝나는 동시에 직장인 신분이 주는 권리는 시작되지 않는 5년이다.

목록의 마지막 함의는 *외부 인정의 부재*에 있다. 9가지가 동시에 작동하는 5년 동안 외부 인정 — 논문 게재·동기 비교·SNS 가시성 — 의 빈도는 보통 *0에 가깝다*. 외부 인정이 자기 동기의 주재료라면 그 5년은 견디기 어렵다. 외부 인정 없이도 흔들리지 않을 자기만의 한 줄이 있어야 살아남는다.

> 9가지 어려움 목록을 진학 결정 *전*에 한 번 정독한다 — 진학 후의 첫 멘붕 때 다시 정독한다. 두 번째 정독에서 어느 항목이 자기 결정타였는지 짚이는 것이 자연스럽다.

## 1.4 회사 vs 대학원의 프레임 전환

회사와 대학원 사이의 결정에서 가장 자주 만나는 막힘은 그 결정을 *평생 한 번의 선택*으로 두는 데서 온다. 그렇게 두면 결정이 무거워서 결정 그 자체가 미뤄진다. 엄태웅 작가의 한 줄이 그 무게를 옆으로 비틀어 준다.

> "둘 중 무엇을 할 것인가가 아니라, 둘 중 무엇을 먼저 할 것인가." (엄태웅 작가)

프레임의 전환은 두 단계로 진행된다. 첫 단계는 *평생 한 번*이라는 환상을 깬다. 회사를 먼저 가도 대학원은 닫히지 않고, 대학원을 먼저 가도 회사는 닫히지 않는다. 두 길의 *순서*는 갈아탈 수 있고, 갈아탄 사람의 사례는 양쪽 다 흔하다. 평생 한 번의 선택이라는 무게가 빠지면 결정의 자유도가 한 단계 더 늘어난다.

두 번째 단계는 더 단단하다. *어떤 선택이든 결과가 보장되지 않는다*. 엄태웅 작가의 한 줄이 같은 곳에 한 번 더 박힌다 — "당신의 선택 그 자체가 성공을 결정하지 못합니다." 회사가 5년 후의 안정을 보장하지 않고, 대학원이 5년 후의 진로를 보장하지 않는다. 보장이 없는 둘 중 하나를 고른다는 것은, *선택 자체*가 아니라 *선택한 뒤의 행동*이 결정의 본체라는 뜻이다.

결정에 끝까지 막힐 때의 보조 기준이 하나 있다. 엄태웅 작가의 한 줄을 변형하면 *엉덩이가 더 불편한 쪽을 골라라*가 된다. 관성을 이긴 선택이 대체로 더 공정하다. 회사가 익숙하면 대학원이 더 불편하고, 학교가 익숙하면 회사가 더 불편하다. 익숙함은 결정의 무게를 한쪽으로 미리 기울여 두는 만큼, 그 기울기를 한 번 보정해 보는 도구로 *불편한 쪽*을 골라보는 작업이 작동한다.

> 회사 vs 대학원의 결정에 막힐 때는 "둘 중 무엇을 먼저"의 프레임으로 바꾼다. 그래도 막히면 *엉덩이가 더 불편한 쪽*을 한 번 가져다 댄다.

같은 명제가 해외 학계 진로에서 한 번 더 변주된다. 김세정 교수의 한 줄은 *맞고 틀림*의 관점을 *내가 선택한 길과 그렇지 않은 길*로 옮긴다.

> "어떤 선택이 맞고 틀리고는 없다. 그저 '내가 선택한 길'과 '내가 선택하지 않은 길'일 뿐이다." (김세정 교수)
>
> "중요한 것은 어느 길을 선택해도 행복한 삶을 만들어나갈 수 있다는 확신이다." (김세정 교수)

이 두 줄은 *결정의 무게가 결과의 보장이 아닌 결정 이후의 행동에 있다*는 엄태웅 작가의 명제와 같은 결의 두 표현이다. 진로 결정의 무게를 *맞고 틀림*에서 *어느 길에서 어떻게 살아갈지*로 옮기면 결정이 가벼워지고 갈림길의 시간 그 자체가 짧아진다.

같은 결정의 또 한 변주가 미국 박사 코호트의 한 일기에 나온다. Philip Guo는 Stanford CS 박사 진학을 *부모의 두 직업 풍경*과 비교해서 결정했다고 적는다 — 종신 교수 자리(어머니, UCLA)의 *lifetime job security*와 정리해고를 겪은 회사원 자리(아버지)의 차이. 진학을 결정한 관점이 *연구를 향한 흥미*만이 아니라 *어느 자리의 일상이 자기에게 더 안전해 보이는가*라는 비교에서 자라났다.

> **Philip Guo (Stanford CS PhD, 2012):** 진학 결정의 한 축에 *부모 두 직업의 일상을 직접 본 자료*가 깔려 있었다. 종신 교수의 안정과 회사원의 정리해고가 같은 식탁에서 비교되었고, 학부 인턴 경험에서 받은 회사 자리의 거리감이 박사 진학 쪽으로 무게를 옮겼다. 결정의 무게는 *연구의 매력*만이 아니라 *어느 일상이 자기에게 가까워 보이는가*의 비교에서 자랐다. — *The PhD Grind* Prologue

## 1.5 매년 다시 묻는 질문

진학 직전의 한 번의 답으로 5년이 굴러가지 않는다. 1년차의 "왜 박사가 필요한가"의 답과 3년차의 같은 질문의 답은 다르고, 졸업 직전의 답은 또 다르다. 같은 질문의 답이 매년 달라지는 것은 결함이라기보다 *분야 안에서 자란 흔적*에 가깝다.

답이 달라지는 모양은 대체로 다음과 같다. 1년차의 답은 진학 직전의 답과 거의 같다 — 학부 시점의 자기 이미지가 아직 살아 있다. 2~3년차의 답은 흔들린다 — 9가지 어려움 중 자기 결정타 항목이 짚이는 시점이고, 박사가 무엇인지의 재정의가 처음으로 *자기 답*으로 다시 적힌다. 졸업 직전의 답은 한 번 더 다르다 — 끝의 한 발짝을 디뎌 본 사람의 답으로 다시 쓰인다.

매년 같은 질문에 답이 다르게 나온다는 사실을 *결정의 한 부분*으로 받아들이면, 그제서야 매년의 답을 갱신할 시간을 미리 만들어 두게 된다. 매년 한 번 — 학기 시작 전이든 한 해 마지막이든 — 자기에게 같은 질문을 던지는 시점이 그 갱신의 시간이다. 답이 달라지지 않은 해가 있다면 그 해의 진행이 흐릿하게 보일 수도 있고, 답이 너무 크게 달라진 해가 있다면 결정의 *재검토 시점*이 가까이 와 있다는 신호일 수도 있다.

엄태웅 작가의 한 줄이 마지막 매듭을 한 번 더 잡아준다 — "연구의 본질은 제대로 된 문제를 제대로 된 접근으로 푸는 것." 매년의 갱신도 같은 결에 있다. 제대로 된 *질문*을 매년 다시 던지면서 5년이 굴러간다. 진학의 결정은 그 첫 질문이지 마지막 질문이 아니다.

> "왜 박사가 필요한가"의 답은 1년차·3년차·졸업 직전에 같은 질문으로 다시 갱신한다. 답이 달라지는 것이 정상의 모양이다.

---

<h1 id="chapter-2">Ch.2 — 환경을 고르는 일</h1>

ch01에서 *왜* 박사를 할 것인가가 한 줄로 적혔다고 하자. 다음 질문은 *어디서 할 것인가*다. 답을 잘못 정렬하면 5년의 일상이 흔들린다.

환경 선택은 한 번의 의사결정처럼 보이지만 실제로는 우선순위 정렬의 문제다. 무엇을 1순위에 두고 무엇을 마지막으로 미루는가 — 그 순서가 5년의 결과를 결정한다. 이 장은 정렬을 다섯 갈래로 본다 — 우선순위의 재정렬, 첫 도전 실패의 진짜 이유, 직접 부딪침, WHAT이 아닌 HOW, 진학 후 환경을 다시 고르는 일.

## 2.1 우선순위의 재정렬

한국의 학생이 진학 환경을 고를 때 흔히 정렬하는 순서는 학교 > 장학금 > 연구분야 > 지도교수다. 학부 4년 동안 학교 간판으로 평가받아 온 관성이 그대로 박사 선택에 옮겨 붙는다. 입시·취업의 1차 정렬 기준이 학교였으니 박사도 같은 정렬을 따르는 것은 자연스럽다. 다만 박사 5년의 일상을 만드는 것은 학교 간판이 아니라 매일 마주할 지도교수와 매일 들여다볼 연구분야다. 엄태웅 작가의 정렬은 오히려 정반대다.

> "지도교수 = 연구분야 > 장학금 > 학교."
> — 엄태웅 작가

지도교수와 연구분야는 동률 1위다. 둘 중 하나라도 어긋나면 다른 둘로 메우기 어렵다. 장학금은 그 다음, 학교는 마지막이다.

학교 간판은 5년 후 졸업장에 한 번 찍히고 끝나지만 지도교수와의 관계는 5년 내내 매일 작동한다. 매주의 미팅, 매달의 진척 점검, 매년의 연구 방향 조정 — 어디에도 학교 간판은 등장하지 않는다. 등장하는 것은 지도교수의 한마디와 분야의 다음 문제뿐이다.

엄태웅 작가는 이 우선순위가 뒤집힌 상태로 진학을 선택하는 행위를 **학교 쇼핑**이라 부른다. 진학을 마트의 상품 비교로 바꿔 놓는 표현이다. 쇼핑의 결과는 5년 후의 본인이 받는다 — 잘못 산 물건은 환불이 어렵다.

> **우선순위는 지도교수 = 연구분야 > 장학금 > 학교다.** 한국식 정렬을 그대로 따르면 5년의 일상이 흔들린다.

같은 명제가 해외 학계에서도 반복된다. 김세정 교수는 QS 세계 대학 랭킹의 6 지표(학계 평판 40%·교수-학생 비율 20%·논문 인용 수 20%·졸업생 평판 10%·외국인 교수 5%·외국인 학생 5%)를 들여다본 뒤 같은 결론에 도달한다.

> "대학원 선택시에는 어느 '학교'인지보다 어느 '연구실'인지가 상대적으로 훨씬 더 중요하다." (김세정 교수)

랭킹 지표가 외국인 비율에 영향을 받으니 *영어권 대학에 유리한 가중치*가 들어가 있다는 분석도 함께 따라온다. 국내 대학을 *논문 인용 수* 단일 지표로 재정렬하면 광주과학기술원·유니스트·포항공대가 세계 20위 안에 들어간다. *학교 간판*은 실제 연구 성과보다 외국인 비율의 함수에 가깝다는 뜻이다. 박사 5년의 실제 결과를 결정하는 곳은 학교가 아니라 연구실이다.

## 2.2 첫 도전 실패의 진짜 이유

엄태웅 작가는 첫 유학 도전에서 8개교에 지원해 전패했다. 영어시험 점수가 모자라서도, 추천서가 약해서도 아니었다. 본인의 회고에 따르면 원인은 한 단어로 정리된다.

> "대학랭킹이나 대학이름이 주는 뽀대에 더 관심이 있었던 것이었다."
> — 엄태웅 작가

그 시기 엄태웅 작가의 일화 한 토막. 추천서를 부탁한 교수가 봉투를 들어 보며 *"봉투가 얇아?"* 한마디를 건넸다고 한다. 그 한마디로 본인은 불합격을 직감했다. 봉투의 두께는 추천서 분량의 은유이자, 그 추천서를 채울 만큼의 관계가 누적되지 않았음을 가리키는 표지다. 지원 직전에 부탁한 추천서는 얇을 수밖에 없다.

박사생 선발은 교수에게도 가벼운 결정이 아니다.

> "박사생을 선발한다는 것은 교수로서도 매우 신중해야 하는 선택."
> — 엄태웅 작가

5년 동안 자기 연구비를 쓰고 자기 시간을 들여 함께 일할 사람을 뽑는 일이다. *"왜 당신을 뽑아야 하는가"*에 답할 한 줄이 지원서에 없으면 합격은 어렵다.

그 한 줄은 영어시험 점수나 SOP 문장의 우아함에서 나오지 않는다. 자기 탐구의 시간에서 나온다.

엄태웅 작가가 6개월의 자기 탐구 후 다음 해 다시 도전했을 때 6개교 중 4개에 합격했다. 그 사이에 영어 점수가 극적으로 오른 것도, 새 논문이 더 나온 것도 아니었다. 변한 것은 한 줄이었다.

> "나는 4~5년을 투자해 도대체 무얼 알고 싶은거지?"
> — 엄태웅 작가

이 한 줄이 적혔는가가 합격 여부를 갈랐다. 본인은 본인의 지원서를 두고 *"내 지원서는 그 어느 것도 뛰어난 점이 없었다"*고 적었다. 시험 점수가 아니라 그 한 줄이 본질이라는 뜻이다.

> **"내가 무엇을 연구하고 싶은가"가 한 줄로 적히지 않으면 지원서를 보내지 않는다.** 영어시험·SOP는 그 한 줄 위에 얹는다.

## 2.3 직접 부딪침

지원서 스펙이 평범해도 *직접 부딪침*은 강력한 무기다. 학회장에서 관심 있는 교수를 직접 만나 한 번 대화한 경험은 온라인 지원서 백 통보다 합격에 가깝다. 교수 쪽에서 보면, 얼굴을 본 학생과 이름만 본 학생은 같은 지원서가 아니다. 얼굴을 본 학생의 SOP는 그 얼굴 위에 얹혀 읽히고, 이름만 본 학생의 SOP는 백 통의 SOP 사이에 묻힌다.

엄태웅 작가의 두 번째 도전에서 인상적인 일화가 하나 더 나온다. 관심 있는 교수에게 메일을 보냈는데 답이 오지 않았다. 스팸 필터에 걸린 것인지 단순히 무시당한 것인지 알 길이 없었다. 그러자 본인은 메일 본문을 다시 쓰는 대신 형식을 바꿨다 — 자기소개 슬라이드 한 장을 만들어 첨부했다. 이 일화의 핵심은 슬라이드라는 도구의 새로움이 아니라, 차단된 채널을 *다른 형식으로 다시 두드린* 행위 자체에 있다. 진심을 가시화한 것이고, 한 번에 끝내지 않은 것이다. 한 번 차단당했을 때 포기하는 학생과 형식을 바꿔 다시 두드리는 학생의 합격률은 같지 않다.

추천서도 같은 원리로 움직인다. 추천서를 부탁할 교수에게 부탁 직전에 인사하면 봉투는 얇다. 학기 단위로 가벼운 인사를 누적해 두면 봉투는 두꺼워진다. 휴가 때마다 한 번씩 들러 근황을 전하는 식이다. 추천서의 두께는 부탁의 기술이 아니라 관계의 누적이다 — §2의 봉투 일화가 말하는 것이 정확히 이 누적의 부재다.

> 학회·인터뷰의 *직접 부딪침*은 온라인 지원서보다 압도적이다 — 시간 분배의 우선순위를 그쪽에 둔다.
>
> 추천서 받을 교수에게는 추천서 부탁 직전이 아니라 *학기 단위로* 가벼운 인사를 누적한다.

## 2.4 WHAT이 아닌 HOW

분야 선택의 시점에 학생이 가장 매달리는 단어가 *"유망함"*이다. 어떤 분야가 5년 후 떠오를 것인가, 어떤 주제가 졸업할 즈음 hot할 것인가. 다만 분야 전망은 학생이 통제할 수 없는 변수에 가깝다. 5년 후의 분야 지형은 5년 후가 되어야 보인다.

엄태웅 작가의 정리는 단정적이다.

> "나를 성공으로 이끌 키워드는 HOW이지 WHAT이 아니다."
> — 엄태웅 작가

같은 분야 안에서 결과가 갈리는 이유는 분야 자체라기보다 그 분야 안에서의 *방식*에 있다. 어떤 학생은 같은 주제로 의미 있는 결과를 내고, 다른 학생은 같은 주제로 5년을 흘려 보낸다. 차이는 분야의 유망함이 아니라 그 안에서 작동한 HOW에 있다.

분야의 유망함은 5년 동안 오르내린다. 한때 hot했던 분야는 식고, 한때 식었던 분야는 다시 뜬다. 그 진폭에 학생의 결과가 걸려 있다면 5년의 끝은 운에 맡겨진다. HOW에 걸려 있다면 분야의 진폭과 무관하게 5년의 끝이 본인의 것이 된다.

환경 선택은 결국 HOW를 만들 환경을 고르는 일이다. 지도교수는 HOW를 가르치는 사람이고, 연구분야는 그 HOW가 작동할 무대다. 학교 간판과 장학금은 HOW를 만들지 못한다 — 만들 곳을 빌려 줄 뿐이다. §1의 우선순위가 *지도교수 = 연구분야 > 장학금 > 학교*인 이유가 여기서 한 번 더 드러난다. 위쪽 두 항은 HOW를 만들고, 아래쪽 두 항은 HOW를 빌려 줄 뿐이다. HOW의 무게가 5년의 결과를 결정한다면 정렬은 자연스럽게 그 순서가 된다.

## 2.5 전공 변경의 진짜 비용

진학 후 환경을 다시 고르는 학생도 있다. 전공을 바꾸겠다는 결정이다. 이 결정 앞에서 엄태웅 작가의 정리는 단호하다.

> "전공을 바꾼다는 것은 본인의 몇 년의 시간을 재투자해야 하는 매우 비싼 선택."
> — 엄태웅 작가

비싼 이유는 분명하다. 전공의 기초·문헌·인맥·도구를 처음부터 다시 쌓아야 한다. 30대 초반에 다시 신입생이 된다. 학부 4년 + 석사 2년의 누적이 0으로 환산되지는 않지만, 새 분야의 화폐로 환전될 때 환율은 높지 않다.

새 전공이 좋아 보이는 감각은 흔히 *현 상태 불만*의 투영이다. 지금의 지도교수가 답답해서, 지금의 주제가 진척이 없어서, 지금의 연구실 분위기가 무거워서 — 이 불만들이 새 전공의 환상으로 옮겨 붙는다.

새 전공으로 옮긴다고 같은 불만이 사라지지 않는다. 다른 형태로 돌아올 뿐이다. 새 지도교수도 답답할 수 있고, 새 주제도 진척이 없을 수 있다. 환상의 대상이 바뀌었을 뿐 불만의 구조는 같다.

전공 변경 결정의 보조 기준은 엄태웅 작가의 한 줄과 같다 — 새 전공으로 *어떤 구체적 문제*를 풀고 싶은가가 한 줄로 적히지 않으면 변경을 미룬다. 그 한 줄이 지금 분야의 불만 표현이라면, 변경의 사유가 아니라 도피의 사유에 가깝다.

> 전공 변경은 *어떤 구체적 문제를 풀고 싶은가*가 한 줄로 적힐 때만 진행한다 — "유망함"·"분위기"는 변경 사유가 아니다.

한 가지 보정이 필요하다. 버린 전공은 사라지지 않는다. 예상치 못한 방식으로 다시 돌아온다. 엄태웅 작가가 즐겨 드는 비유가 스티브 잡스의 캘리그래피 일화다. 잡스가 학부 시절 우연히 들은 캘리그래피 수업이, 십수 년 뒤 매킨토시의 글꼴 시스템으로 돌아왔다. 그 사이에 캘리그래피는 잡스의 전공이 아니었고, 잡스 본인도 그것이 어디에 쓰일지 몰랐다. 전공 변경의 시점에 버린 분야가 졸업 후 어디서 어떻게 작동할지는 미리 알 수 없다 — 버렸다고 잃은 것은 아니다.

---

환경을 고르는 일의 핵심은 결국 *매칭*이다. 학교 간판이 5년을 결정하지 않고, 결정하는 것은 지도교수와 연구분야의 매칭이다. 그 매칭은 한 번의 지원서로 만들어지지 않는다 — 학회·인터뷰·메일·추천서의 누적된 관계가 만들어 준다. *직접 부딪침*은 진학 후의 학회 networking에서도 같은 모양으로 다시 나타난다 (「연구노트」 [Part 3 ch03 — 첫 마디의 기술](../research-notes/guide.html#chapter-35)에서 재학 중 학회 networking 차원으로 이어진다).

환경이 *바깥 조건*을 정했다면, 그 환경 안에서 5년의 *일상*을 정하는 한 변수가 따로 있다. 지도교수와의 관계다. 다음 part가 그 이야기다.

**출처.** [엄태웅 작가 「유학 실패」 「유학 성공」 「전공 변경」](https://gradschoolstory.chkwon.net), 김세정 교수 (2022) 「대학원생 때 알았더라면 좋았을 것들 2」 §4 「대학원은 국내와 해외 중」 + §5 「세계 대학 랭킹이」. 환경 우선순위 분석은 이 장에서 보강했다.

<h1 id="chapter-3">Ch.3 — 비이공계 박사의 운영 단위</h1>

「대학원노트」의 기본 시야가 *이공계*에 가깝다 보니, Part 1의 앞 두 챕터 — ch01 (박사 결정)·ch02 (환경 선택) — 도 *연구실 단위의 일상*과 *지도교수·연구분야 우선*의 관점 위에서 굴러갔다. 이 장은 그 기본 옆에 한 층위를 더한다 — *비이공계 박사*의 운영 단위. 이공계 관점을 그대로 옮겨 쓰면 어디서 어그러지는지, 관점 자체가 어디까지 같고 어디서부터 갈라지는지 정렬해 둔다.

1차 출처는 윤은정 교수 글이다. 학부 → 미국 마케팅 PhD → 메리워싱턴 조교수의 경로가 이 장의 사례로 자주 등장한다. 이 장은 그 사례와 김세정 교수 §3의 자기 정당화 논점을 대조해, 비이공계 박사 과정의 운영 단위를 정리한다.

비이공계 박사를 *하라/하지 마라*는 이 장에서 다루지 않는다. 이 장의 시야는 *이공계 기본이 비이공계에서 어디까지 작동하고 어디서부터 다른 운영이 필요한가*까지다 — *처방*은 각자의 몫에 있다.

---

## 3.1 *연구실 = 한 단위*가 아니다

이공계의 기본 운영 단위는 *연구실 (lab)*이다. 지도교수 + 박사·석사 학생 + 포닥 + 기자재가 한 단위로 묶이고, 학생의 책상도 그 lab 안에 놓인다. 매일 lab 미팅이 돌아가고, 실험이 lab의 공간 안에 누적된다.

비이공계 (인문사회·마케팅·경영·법학·인류학) 기본은 단위가 다르다. 운영 단위가 *지도교수 1인 vs 학과 전체*에 가깝다. 학생 본인의 책상이 *학과 office*에 흩어져 있고, 지도교수와의 미팅은 *주 1회 1:1* 정도로 굴러간다. 매일 lab 미팅이 있는 구조가 아니다.

> **비이공계 박사의 운영 단위는 *연구실*이 아니다.** 지도교수와의 1:1 + 학과 전체와의 distance, 두 축이 운영의 골격이다. 이공계 관점 *연구실 = 가족*을 그대로 옮기면 1년차에 어그러진다.

이 차이가 박사 5년의 시간 분배를 통째로 다른 모양으로 만든다. 매일 lab의 기본 가시성이 없는 만큼, 본인이 *스스로 가시성을 만들어내는 운영*이 비이공계 기본으로 자리 잡는다. 학과 office에서의 인사·세미나 참석·학과 행사·collaboration 제안이 lab 가시성을 *대신한다*.

---

## 3.2 윤은정 교수 글 — 미국 마케팅 PhD

윤은정 교수 사례는 *비이공계 + 한국인 + 미국 임용*의 세 층위가 동시에 누적된 경로다. 학부 졸업 후 미국 마케팅 PhD에 진학했고, 졸업 후 메리워싱턴대 조교수로 임용되었다. 한국 박사 기본이 이공계이다 보니 *분야 자체*가 본인 외에 한국인 박사가 적었고, *언어·문화·tenure track 평가*가 한꺼번에 누적되는 운영이었다.

> 윤은정 교수 글의 사례 — 마케팅·인문사회 박사의 *연구실 = 지도교수 1*.

이 사례가 이 장의 골격이 된다. 박사 운영의 *단위 자체*가 이공계와 다른 만큼, 이공계 관점을 그대로 옮겨 쓰면 1년차에 어그러진다. *매일 lab*의 기본이 없는 곳에서 본인의 일상을 어떻게 운영할 것인가 — 그 운영의 첫 단서로 윤은정 교수 사례가 한 자료가 된다.

---

## 3.3 미국 비이공계 박사의 층위 차이

미국 비이공계 박사 기본이 미국 이공계 박사 기본과 *다른* 층위는 적어도 세 갈래다.

(a) **TA 부담** — 이공계 기본 *RA (research assistant, 지도교수 grant)*가 비이공계에서는 기본이 아니다. 비이공계 기본은 *TA (teaching assistant, 학과 강의)*에 가깝고, TA가 5년 내내 누적된다. 본인 연구 시간이 학기 단위로 줄어드는 운영이다. RA에 있던 학생이 TA 5년의 시간 분배를 본인 운영에 *추가*하다 보니, 박사 결과의 누적 속도가 이공계 기본보다 천천히 굴러간다.

(b) **publish-or-perish 층위** — 학회 (conference) 중심의 이공계 publishing이 *학기 단위*라면, 비이공계 기본은 *저널 중심*에 가깝다. 한 편의 paper가 *2-3년의 review·revise·publish* 사이클로 굴러간다. 박사 5년 안에 1-2편이 기본 비율인 분야가 많고, 그 1-2편의 무게가 이공계 *연 2-4편*보다 훨씬 더 무겁다.

(c) **분야 senior와의 distance** — 학회 규모가 더 작고 분야 외부 collab이 적다 보니, 분야 senior와의 거리 단축이 학회에서 일어난다. 이공계 기본 *학회 = 분야 인지도*보다 비이공계 기본 *학회 = senior와의 직접 만남*에 가깝다. 본인 발표보다 *분야 senior 발표를 듣고 30분 후에 한 번 더 대화하는 일*이 학회의 기본 운영이 된다.

> 비이공계 박사 기본 시간 분배: TA 30-40% + 본인 연구 40-50% + 학과 행정·세미나 10-20%. 이공계 기본 (RA 60-80% + 학과 10-20%)와 다르다.

---

## 3.4 학부 인문사회 → 박사 진학 결정의 단위

학부 4년 인문사회 전공자가 박사 진학을 결정하는 결의 단면은 이공계와 다르다. 결과의 단위가 *논문 N편*이 아니라 *book 1권·dissertation 1권*에 가까운 분야가 많은 만큼, 박사 5년 동안 *한 권의 책*을 쓴다는 관점이 기본이다.

[Part 1 ch01 § 3 (9가지 어려움)](#chapter-1)의 목록이 비이공계에서도 작동한다. 다만 항목별 무게가 다른 모양으로 누적된다.

- **시간 부족·박봉** — 같다. 5년이 짧고 생활비가 빡빡한 사정은 분야 일반
- **디폴트 실패** — 모양이 다르다. 이공계 기본 *실험이 안 된다*가 비이공계에서는 *책의 한 챕터가 안 풀린다*·*archive 자료가 없다*·*인터뷰 대상자가 닫혔다*로 옮겨 앉는다. 실패의 형식이 다르다
- **지도교수 의존** — 더 크다. lab 기본 가시성이 없는 만큼 지도교수 1인의 한 마디가 박사 5년 운영의 *유일한 가시성*에 가깝게 작동한다
- **법적 사각지대·심리적 우울** — 같다. 비이공계 박사라고 해서 이 무게가 작아지지 않는다

엄태웅 작가의 「전공을 바꿔 대학원에 가고 싶어요」 (changemajor)가 연결된다. 학부 전공과 박사 전공이 *서로 다른* 학생의 운영을 다룬 글이다. 비이공계 기본 *전공 일관성*과 충돌하는 연결로 보일 수도 있겠지만, 이 장에서는 두 관점이 함께 작동한다 — 학부에서 대학원으로 *옮겨 앉을 때* 본인의 정합성을 어디서 끌어오는가의 층위가 두 글에 같이 깔려 있다.

> 비이공계 박사 진학 결정 시 [Part 1 ch01 § 3 (9가지 어려움)](#chapter-1) 목록을 한 번 정독한다 — 본인 분야의 운영에서 어떤 항목이 *더 크고* 어떤 항목이 *다른 모양*인가를 정렬한다.

윤은정 교수 본인이 윤은정 교수 글 §2 ("남들이 말하는 카더라 통신을 무시했다")에서 미국 마케팅 박사 결정의 자료를 한 줄로 적었다 — "카더라 통신을 무시할 수 있었던 것은 미국에서 박사를 간절히 하고 싶었기 때문이다" (윤은정 교수 글 §2). 결정의 근거가 *주위의 관점*이 아니라 *본인의 간절함*에 놓였다. 비이공계 박사 결정 층위에서 분야 senior가 적은 가운데에서 본인이 가장 자주 의지하게 되는 자료다.

---

## 3.5 김세정 교수 관점과의 대조

[Part 4 ch02 (비교의 함정)](#chapter-15)에서 김세정 교수의 자기 정당화 논점, 즉 천재 관점이 흡수됐다. 이공계 정량 평가 — 논문 편수·인용 수·학회 ranking — 위에서 작동하는 관점이다. 이 장에서는 그 관점이 *비이공계에서 어떻게 다른 모양으로 작동하는가*의 한 층위를 더한다.

비이공계의 자기 정당화는 관점이 다르다. 평가 단위가 *어떤 책·논문·이론을 본인의 것으로 흡수했는가*에 가까운 만큼, 정량적 ranking보다 *서지학적 위치*가 평가에 가깝다. 본인이 분야의 어떤 *대화 (conversation)*에 한 발을 들이고 있는가가 *2-3년의 누적*으로 평가된다.

> 김세정 교수 §3의 자기 정당화 논점 — 비이공계의 자기 정당화는 *서지학적 위치*의 관점으로 옮겨 앉는다.

두 관점의 대조가 이 장에 한 층위를 더한다. 이공계 정량 관점을 그대로 옮겨 쓰면 비이공계에서 어그러진다. 한편 관점 자체 — *내가 다른 사람들 위에 있는 사람이라는 정당화* — 는 두 분야에 같이 작동한다. 본인을 *천재의 자리*에 두지 않는 관점이 두 분야 모두에서 운영의 도구가 된다.

---

## 3.6 *비이공계 박사 = 이공계 박사와 다른 운영 단위*

이 장의 thesis 한 줄이다. 이공계 기본 위에 *추가 항목*이 아니라 *다른 운영 단위*로 관점을 옮긴다. 두 관점을 한 자리에 합치려고 하면 본인의 일상이 어느 쪽에서도 단단해지지 않는다.

비이공계 박사의 운영 도구는 적어도 네 갈래다.

- **(a) 학과 office에서의 가시성** — lab의 기본 가시성을 대신한다. 학과 행사·세미나·collaboration 제안에 본인이 등록되는 운영
- **(b) TA의 운영 시간 분배** — RA 자리가 없는 만큼 TA 시간 분배가 본인 연구 시간에 직접 영향을 준다. TA 운영을 *학기 단위로* 미리 짜 두는 것이 기본
- **(c) 저널 중심 publishing의 시간 단위** — 학회 기본이 다른 만큼 *2-3년 사이클*에 본인 페이스를 맞춘다. 짧은 사이클의 *학기 단위 결과* 압박을 본인 관점에서 제거
- **(d) book·dissertation 단위의 결과** — 5년 안에 *한 권*이 기본 비율이라는 관점. 그 한 권의 chapter를 *학기 단위로* 분할해 누적한다

자원 안내도 분야 따라 갈라진다. **분야 학회** — American Marketing Association, American Sociological Association, MLA, AAA 등. **한국인 비이공계 박사 네트워크** — 분야 senior와의 비공식 자료. **분야 외부 자료** — 윤은정 교수 글 관점이 한 갈래다. *답*이 아니라 *관점 비교*로 운영하는 도구다.

> 분야 senior 한 명에게 박사 4-5년차에 한 시간을 받으면 책 한 권보다 정확한 자료가 잡힌다. 분야의 디테일·기관의 디테일·시점의 디테일이 그 한 시간 안에 들어온다.

---

## 3.7 이 장의 결론

「대학원노트」가 *이공계 일반*의 시야에서 출발했지만, 이 장에서 비이공계 박사의 운영 단위가 한 층위로 들어왔다. 운영 단위가 *연구실*이 아니라는 인식, TA·저널·학회·책 단위의 시간 분배가 다르다는 인식, 자기 정당화의 관점이 *서지학적 위치*로 옮겨 앉는다는 인식 — 세 갈래가 이 장의 운영 도구다.

이 장의 운영은 *관점 비교*까지다. 비이공계 박사를 *어떻게 살아남는가*의 디테일은 분야 senior 자료와 분야 학회 자료가 한 발짝 더 가까이 있다.

다음 챕터는 Part 2로 넘어가 *지도교수와의 관계*를 다룬다. 비이공계든 이공계든 *지도교수와의 관계 단위*는 같은 층위에 놓인다 — 다만 이 장에서 짚은 *연구실 = 1인*이라는 차이가 그 관계의 *밀도*에 한 층위 더 누적된다.

**주의.** 이 장은 *처방*이 아니다. *비이공계 박사를 하라/하지 마라*, *어느 분야가 좋다/나쁘다* 같은 명제는 이 장에 들어가지 않는다. 이 장의 시야는 *이공계 기본 옆의 한 층위* — 운영 단위가 다르다는 사실까지다. 결정은 각자의 몫에 있다.

**출처.** 윤은정 교수 글이 1차. 김세정 교수의 자기 정당화 논점, 엄태웅 작가 「전공을 바꿔 대학원에 가고 싶어요」가 2차 연결. 운영 단위와 분야 일반 정리는 본문에서 정리.

<h1 id="chapter-4">Ch.4 — 관계는 양방향</h1>

Part 1에서 환경을 골랐다. 지원·합격·진학의 흐름 안에서 학교·분야·재정이 한 번에 결정되는 시기였다. Part 2는 그 환경 안의 한 변수, *지도교수와의 관계*를 다룬다. 환경 선택이 5년의 *바깥 조건*을 정했다면, 지도교수와의 관계는 5년의 *일상*을 정한다.

이 첫 챕터의 시각은 한 가지다. 지도교수는 받는 사람이 아니라 학생이 *운영하는 시스템*이다. 좋은 지도교수를 "만나는" 것이 아니라 좋은 관계를 "만든다". 매칭의 큰 부분은 첫 학기에 결정되고, 그 매칭을 만드는 것은 학생 측 행동의 누적이다.

---

## 4.1 지도교수라는 가장 큰 변수

같은 학교, 같은 분야, 같은 해 입학한 두 학생이 5년 뒤 전혀 다른 곳에 가 있는 일이 흔하다. 그 차이의 가장 큰 부분은 분야·학교·장학금이 아니라 누구의 랩에 들어갔는가에 있다.

> "단연코 장담하건대, 대학원 생활의 성패를 좌우하는 가장 큰 요소 중의 하나가 지도교수다."
>
> — 최윤섭 박사, 「지도교수 고르기」

> "'어떤 지도교수를 만나느냐'에 따라 학계가 푸르른 바다처럼 보일 수도, 또는 더러운 시궁창처럼 보일 수도 있기 때문이다."
>
> — 엄태웅 작가, 「mysupervisor」 (사이트 원문 인용)

같은 학계가 두 모습으로 보이는 갈림이다. 푸른 바다와 시궁창 사이의 거리가 지도교수 한 사람에 의해 만들어진다는 진단이다. 진학 단계에서의 우선순위 정렬에 이 인식이 깔려야 한다 — 엄태웅 작가는 *지도교수 = 연구분야 > 장학금 > 학교* 순서를 본인 정렬로 내놓는다. 한국에서 자주 보이는 학교·장학금 우선의 정렬과 정반대다.

선택의 자유가 있다는 사실 그 자체가 이 결정의 무게를 만든다.

> "우리는 부모님을 선택할 수 없다. 하지만 지도교수를 선택할 수는 있다."
>
> — 최윤섭 박사, 「지도교수 고르기」

부모는 못 고르지만 지도교수는 고른다. 5년의 의존 관계를 학생이 *고른다*는 사실이 이 장 전체의 출발점이다.

5년이라는 단위 자체에서 따라오는 함의가 하나 더 있다. 한 사람과 매주 1회 이상 만나며 본인의 작업을 점검받고 다음 주의 우선순위를 함께 결정하는 5년이다. 같은 분야·같은 학교라는 외부 조건이 같아도, 그 일상의 결은 매주의 미팅에서 누구와 마주 앉는가에 따라 갈라진다. 외부 조건은 *프레임*이고 지도교수는 *그 프레임 안의 일상 운영자*다.

---

## 4.2 인성 > 실력

선택의 우선순위는 (1) 본인의 열정, (2) 지도교수의 실력·인성, (3) 분야 전망 순으로 정리된다 (최윤섭 박사). 두 번째 항목 안에서 *인성이 실력보다 앞선다*가 최윤섭 박사의 핵심 진단이다.

> "절대 권력은 절대 부패한다."
>
> — 최윤섭 박사, 「지도교수 고르기」

박사 5년 동안 학생은 지도교수의 평가·재정·추천에 의존한다. 이 구조 그 자체가 곧 권력 비대칭이다. 인성이 떨어지는 지도교수 아래에서 그 비대칭은 학생의 5년 일상을 직접 침식한다. 외부에서 보이는 명성·논문 실적·수상 경력은 *5년 일상의 안전*과 다른 차원의 변수에 가깝다.

강의 잘하는 교수와 지도 잘하는 교수가 같은 사람일 가능성도 낮다. 강의는 학생 청중을 향한 *쇼*에 가깝다 — 한 학기 단위로 평가되고, 학생은 청중 위치에 머문다. 지도는 학생 한 명을 5년간 끌고 가는 *운영*에 가깝다 — 평가 단위가 다르고, 학생은 청중이 아니라 운영의 한쪽 당사자다. 두 활동을 같은 사람이 동시에 잘할 이유가 없다.

> **인성이 실력보다 앞선다.** 외부 명성은 5년 일상의 안전을 보장하지 않는다. 강의가 좋은 교수와 지도가 좋은 교수는 같은 사람이 아니다.

## 4.3 진학 전 검증법

최윤섭 박사와 엄태웅 작가가 공통으로 강조하는 검증 단위는 네 가지다. 진학 전에 이 네 가지를 비워둔 채 5년을 결정하지 않는다.

- **1~2학기 미리 일해보기.** 학부 후반·휴학·인턴 어떤 형태든, 진학 후보 랩에서 한두 학기 실제 작업을 해보는 것이 가장 직접적인 신호다. 최윤섭 박사는 본인이 학부 3학년부터 매 학기 다른 연구실에서 연구참여를 했다고 적었다.
- **랩미팅 1회 참관.** 한 번의 미팅이 분위기·발표 압박·지도교수의 피드백 스타일을 모두 노출시킨다. 학생들의 발화 빈도, 지도교수의 말 길이, 질문의 톤이 한 시간 안에 드러난다.
- **재학생 인터뷰의 핵심 질문.** "다시 진학하겠는가?" 만족도의 가장 직접적 지표다. 다른 질문(연구 분야가 어떤가, 논문이 잘 나오는가)보다 신호가 강하다.
- **자대생 비율과 최근 3-5년 논문 실적.** 자대생 비율이 낮으면 의심한다 — 같은 학교 학생이 같은 랩으로 안 가는 이유가 있다. 최근 3-5년 논문 실적은 학생 일정의 회복력과 랩의 운영 안정성을 동시에 비추는 변수다.

해외 임용까지 시야가 넓은 자리에서는 논문 실적을 *총량*이 아니라 *분포*로 한 번 더 본다. 김세정 교수는 같은 검증을 멜버른대 임용 경험에서 다시 보고 한 줄로 정리했다.

> "어쩔 수 없이 그런 연구실에 들어가게 돼 박사과정 동안 논문을 한 편도 내지 못한다면 MIT나 하버드대학교일지라도 아무 소용이 없다."
>
> — 김세정 교수 (2022) 「대학원생 때 알았더라면 좋았을 것들 2」 §6

학교 간판이 5년 결과를 만들어 주지 않는다는 명제가 *결과 차원*에서 한 번 더 박힌다. 검증의 단위가 한 단계 더 쪼개진다 — 그룹 멤버당 1저자 논문 수, 공동저자 논문이 그룹 내·외 어디로 분포하는가, 박사 말년 차나 포닥에게 *교신저자* 기회가 열리는가, 지도교수가 1저자인 패턴이 잦은가. 마지막 항목은 학생에게 일이 충분히 위임되지 않았다는 신호로 자주 읽힌다. 해외 임용을 노린다면 *교신저자 한 편*이 졸업 직전 1-2년의 단단한 한 줄이 된다.

> **진학 전 검증 없이 진학하지 않는다.** 랩미팅 참관 0회·재학생 인터뷰 0명으로 5년을 결정하지 않는다.
>
> 재학생 인터뷰의 핵심 질문은 "다시 진학하겠는가?"다 — 다른 질문보다 신호가 강하다.
>
> 논문 실적은 *총량*이 아니라 *분포*로 본다 — 그룹 멤버당 1저자 / 공동저자 그룹 내·외 / 박사 말년 차 교신저자 기회 / 지도교수 1저자 패턴 빈도.

## 4.4 9가지 지도교수 유형 순위

엄태웅 작가는 「mysupervisor」에서 9가지 지도교수 유형을 평균적 선호 순위로 정렬했다. 이 장은 그중 본문에서 다루는 6개 유형만 옮긴다 — 1·2·4·5·6·9위.

| 순위 | 유형 |
|---|---|
| 1위 | 떠오르는 별 |
| 2위 | 통제광 / 과학 오타쿠 |
| 4위 | 반쯤 신 |
| 5위 | 달변가 |
| 6위 | 노예주인 / 구멍가게 / 느긋한 교수 |
| 9위 | 사이코 |

이 순위는 *평균값*이고 본인의 적성과 같지 않다. 통제광 2위는 자율성을 견디기 어려운 학생에게 오히려 1위가 될 수 있다 — 매주 빈도 높은 점검과 명시적 지시 안에서 더 빨리 자라는 학생도 있다. 반쯤 신 4위는 외부 명성·논문 실적이 압도적이지만 학생 한 명에게 들어오는 시간이 거의 없는 형태다 — 자기 운영이 이미 가능한 학생에게는 가장 좋고, 좌표 부여가 더 필요한 1-2년차 학생에게는 가장 위험하다. 달변가 5위는 비전과 동기 부여 능력이 강하지만 디테일 검증이 약한 형태로, 본인의 디테일 감각이 자라 있는 학생에게 잘 맞는다. 노예주인·구멍가게·느긋한 교수가 묶인 6위는 *작업량의 양극단*이다 — 노예주인은 과부하, 느긋한 교수는 좌표 결핍, 구멍가게는 자원 부족. 어느 쪽도 본인의 적성과 무관하게 일률적으로 맞다 나쁘다고 말하기 어렵다.

9위 사이코만이 적성·취향과 무관하게 회피한다. 인성의 하한선 — 외부 명성·실적이 어떻든 이 한 항만은 다른 변수로 보정되지 않는다.

> 9가지 유형 순위는 *평균값*으로 읽는다 — 본인의 자율성 견디는 정도와 합쳐 다시 정렬한다. 단, 9위 사이코는 적성·취향과 무관하게 회피한다.

## 4.5 매칭은 학생이 운영하는 시스템

지도교수의 지도 스타일이 마이크로매니지에 가까운지 방임에 가까운지는 *좋고 나쁨*의 문제라기보다 *적합성*의 문제다. 같은 스타일이 한 학생에게는 안전한 발판이 되고, 다른 학생에게는 질식하는 환경이 된다. 같은 마이크로매니지가 1년차에는 좌표 부여로 작동하다가 4년차에는 자율성 침해로 바뀌기도 한다.

이 적합성의 큰 부분은 첫 학기에 결정된다. 첫 미팅의 빈도, outline 양식, 연락 응답 시간, 회의 문서 형식 — 이 디테일이 5년의 디폴트로 굳는 경우가 많다. 그래서 *학생 측에서 먼저 제안*하는 것이 매칭 운영의 핵심이다. 받는 디폴트가 아니라 *제안하는 디폴트*가 학생이 운영하는 시스템의 기본 단위다.

> 매칭의 큰 부분이 첫 학기에 결정된다 — 첫 미팅의 빈도·outline 양식·연락 응답 시간을 *학생 측에서* 제안해 디폴트를 만든다.

이 *학생 측 행동*의 가장 단단한 작업 단위가 outline 한 장이다. Whitesides는 §5 collaboration model에서 어드바이저-학생 협업의 단위가 논문 한 편이 아니라 outline 한 장이고, 그 outline의 4-5회 반복이 한 단위라고 못 박았다 ([Whitesides 2004 §5](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767)). 매칭 운영의 기술적 단위가 따로 있다는 뜻이다 — 막연한 "관계 만들기"가 아니라 outline 한 장의 갱신·교환. 학생이 outline의 형태·빈도를 먼저 제시하고, 지도교수가 의견을 더해 돌려보내는 구조가 첫 학기에 자리 잡으면, 그 뒤 5년의 디폴트가 된다.

「연구노트」 [Part 0 ch03 (주도권의 이동)](../research-notes/guide.html#chapter-3)이 같은 outline 4-5회 반복을 *연구 주도권 차원*에서 다룬다. 이 장은 그 반복의 *관계 차원*만 본다 — 매칭이 학생 측 행동의 누적이라는 사실, 그 행동의 단위가 outline 한 장이라는 사실까지. 같은 반복을 두 차원에서 바라본 셈이다.

outline 4-5회 반복의 *시작*은 첫 학기보다 더 앞당겨진다. 첫 미팅의 작업 단위는 추상적 인사가 아니라 *지도교수에게 핵심 논문 3편을 추천받는 것*이다. 임형태 박사가 정리한 도착 첫 주의 운영표 한 토막을 옆에 둔다.

> Day 5 — 논문 읽기 시작
>
> [ ] 지도교수/선배에게 "먼저 읽어야 할 논문 3편" 추천받기
> [ ] 논문 packet 환경 세팅 (URL·PDF·code·AI 질의·근거 확인)
> [ ] 추천받은 논문 3편의 Abstract와 Conclusion 읽기
> [ ] 모르는 용어 정리
>
> *처음 읽는 논문은 이해가 안 되는 게 정상이다. "이 논문이 무슨 문제를 풀려고 하는가?"만 파악해도 첫 주로서는 충분하다.*
>
> — 임형태 박사, 「Robotics & Spatial AI 신입생 첫 주 7-day plan」

추천 3편이 outline 4-5회 반복의 *0번째 outline*이다. 첫 미팅에서 학생이 들고 들어가는 단위는 자기 outline이 아니라 *지도교수의 추천 목록*이고, 그 목록의 abstract·conclusion 두 항목만 한 주 안에 한 번 읽혀 돌아오면 첫 미팅의 디폴트가 *추천 → 회수*의 작은 운영 단위로 굳는다. 분야 도구의 셋업·연구실 환경 적응 같은 첫 주 다른 항목은 「robotics-practice」 ch21 § E의 7-day plan에 위임한다 — 이 장의 시야는 *그 목록이 매칭 운영의 첫 outline*이라는 관점까지다.

매칭이 학생이 운영하는 시스템이라면, 그 운영의 *신호*가 어디에서 드러나는가가 다음 질문이다. 면담의 5분, 랩미팅의 한 슬라이드, 이메일 한 통이 그 신호의 표면이다. 다음 챕터가 그 표면을 *교수 입장에서* 다시 읽는 차원으로 들어간다.

<h1 id="chapter-5">Ch.5 — 신호 읽기 — 면담·랩미팅·이메일에 드러나는 것</h1>

[Ch.1 (관계는 양방향)](#chapter-4)이 *지도교수의 9가지 유형*을 학생 적성과 합쳐 읽는 차원이었다면, 이 장은 같은 양방향 관계의 거울 면을 본다. 학생이 자기 행동을 *교수 입장에서* 어떻게 읽을 수 있는가. 면담 직전 5분, 랩미팅의 한 슬라이드, 이메일 한 통이 학생의 우선순위·집중도·의사소통 단가를 한 번에 드러낸다. 매칭은 양방향이지만, 한쪽 면을 본인이 운영한다는 사실이 이 장의 출발점이다.

---

## 5.1 분기는 사소한 행동에 있다

좋은·나쁜·이상한 학생의 분기는 능력이나 성적의 차원에 있지 않다. 첫 학기의 *사소한 행동* — 미팅을 기다리는가, 미리 정리한 질문 목록을 가져오는가, 마감 직전의 시간을 어떻게 쓰는가 — 이 분기의 출발점이다. 같은 분야·같은 lab의 두 학생이 5년 후 전혀 다른 곳에 가 있는 차이는 결국 첫 학기에 굳은 *행동의 디폴트*에서 누적된다.

> "좋은 학생은 정기 미팅을 기다리지 않는다." *(요지 정리)*
>
> — 권창현 교수, 「좋은·나쁜·이상한 학생 1편」

이 한 줄은 능력 진단이 아니라 *주도권 진단*이다. 박사과정의 본질은 지도교수의 경험을 빌려 자신의 연구를 진행하는 과정이고, 빌리는 사람은 능동이다. 정기 미팅을 *기다리는* 자세는 빌릴 시점·빌릴 내용을 모두 어드바이저가 결정해 주기를 기다리는 자세와 같다. 그 자세가 한 번 굳으면 5년의 디폴트가 된다.

첫 학기의 사소한 행동이 *왜* 5년의 디폴트를 만드는가. 한쪽은 어드바이저의 시간 단가가 떨어지고(같은 학생을 매번 새로 끌어줘야 함), 다른 한쪽은 학생 본인의 의사결정 근육이 자라지 않는다. 두 효과가 함께 누적되어 3년차에는 교정 비용이 첫 학기의 몇 배로 불어난다.

> **박사과정은 지도교수의 경험을 빌려 자신의 연구를 진행하는 과정이다 — 빌리는 사람은 능동이다.** 정기 미팅을 *기다리는* 자세는 5년의 디폴트가 된다.

---

## 5.2 학생 A~F 6개 사례 — 자기 거울로 쓰기

권창현 교수가 두 편에 걸쳐 정리한 6개 사례는 가십이 아니라 *행동 패턴의 카탈로그*다. 한 학기에 한 번 자기 카테고리를 점검하는 거울로 쓴다. 사례마다 행동 자체보다 *그 행동이 드러내는 패턴*에 주목한다.

| 유형 | 사례 묘사 | 드러나는 패턴 |
|---|---|---|
| **A 주도형** | 미팅 전 미리 정리된 질문 목록을 들고 들어옴 / 두 달간 데이터 노가다를 자청 / 1년에 천 편 논문 검토 | 입력의 흐름이 *학생 손에서 어드바이저 쪽으로* 향한다. 미팅이 학생의 질문 목록 위에서 굴러간다. |
| **B 시키는 일만** | 시키는 일은 안전하게 한다. 그러나 *내 연구*가 시작되지 않는다 | 안전 = 결정 회피. 어드바이저가 다음 행동을 매번 새로 만들어 줘야 한다. 곡선이 평평하게 눕는다. |
| **C 마감 중 봉사활동** | 마감 직전에 봉사활동을 떠난다 | 행동 그 자체가 나쁜 게 아니라 *시점*이 신호다. 같은 봉사활동도 마감 후라면 다른 신호로 읽힌다. 우선순위가 노출된다. |
| **D 성적 최상위·연구 부진** | 강의 성적은 최상위지만 연구실에서 진척이 안 난다 | 강의실 능력과 연구실 능력의 분리. 강의실은 정해진 답이 있고, 연구실은 답이 없다. 답 없는 곳에서 본인의 가설을 세우는 능력이 따로 자라야 한다. |
| **E 회복형** | 한 번 어긋났지만 자세를 다시 잡았다 | 분기는 한 번에 결정되지 않는다. 첫 학기의 디폴트가 강해도 *재설정 가능*한 구간이 있다 — 어디서 어긋났는지 본인이 진단하면 거기서부터 라운드가 다시 시작된다. |
| **F 동료형** | 예상 밖 결과로 어드바이저의 가설을 데이터로 뒤집을 수 있는 위치 | **신뢰받는 협력자(trusted collaborator)** 위치에 가장 가깝다. 어드바이저가 학생의 데이터를 *받아 쓰는* 라운드가 등장한다. |

A부터 F까지 6개 카테고리는 좋고 나쁨의 sequence가 아니라 행동 패턴의 *축*이다. 같은 학생이 한 학기는 B에 가까웠다가 다음 학기는 E를 거쳐 A로 옮겨 가는 일이 오히려 정상이다. 카테고리 그 자체가 운명이 아니라 *지난 한 학기 행동의 사후 진단*이라는 관점이 본 사례를 거울로 만든다.

C의 *시점* 항목은 별도로 강조할 가치가 있다. 봉사활동·여행·다른 프로젝트 착수는 그 자체로 평가 대상이 아니다. 같은 행동이 마감 직전에 일어나면 우선순위가 노출되고, 마감 후에 일어나면 회복 사이클로 읽힌다. 본인의 행동을 카드 한 장으로 보지 말고 *시점이 박힌 카드*로 본다.

---

## 5.3 좋은 성적이 좋은 연구자를 만들지 않는다

> "좋은 성적이 좋은 연구자를 만들지 않는다." *(요지 정리)*
>
> — 권창현 교수, 「좋은·나쁜·이상한 학생 2편」

D 사례가 가리키는 분리는 학생 단계에서 가장 흔하게 잘못 읽힌다. 강의실에서는 정해진 답이 있고, 답에 빠르게·정확히 도달하는 능력이 평가된다. 연구실에는 답이 없다. 본인이 가설을 세우고, 그 가설이 틀렸을 가능성을 데이터로 검증하고, 틀렸다면 가설을 다시 쓴다. 두 능력은 같은 *지능* 차원에서 측정되지 않는다.

가장 중요한 자질은 성적·순종이 아니라 *호기심·책임감*이다. 호기심이 있으면 어드바이저가 시키지 않은 천 편 논문을 1년에 검토하게 되고(A 사례), 책임감이 있으면 두 달간 데이터 노가다를 자청하게 된다. 두 자질은 시키는 일을 잘하는 능력과 직교한다.

한 번도 반박하지 않는 학생은 위험하다. 반박이 곧 갈등을 의미하지는 않는다. 어드바이저의 가설이 데이터에 맞지 않을 때 *데이터를 들고 가서* 그 불일치를 보고하는 행위가 곧 반박이고, 그 반박이 신뢰받는 협력자(F 사례)의 입장권이다. 한 번도 반박하지 않는다는 것은 데이터를 안 보고 있다는 신호이거나, 보고도 결정을 회피한다는 신호다.

> "지나친 존중은 종종 무책임의 다른 이름이다." *(요지 정리)*
>
> — 권창현 교수, 「좋은·나쁜·이상한 학생 2편」

존중처럼 보이는 침묵의 비용은 어드바이저가 아니라 학생이 진다. 어드바이저는 5년 후 다음 학생을 받지만, 학생의 5년은 한 번 흘러가면 돌아오지 않는다. 침묵으로 결정을 어드바이저에게 떠넘기는 패턴이 누적되면 본인의 연구 감각이 자라지 않은 채로 졸업이 늦어진다.

> **한 번도 반박하지 않는 학생은 위험하다.** 동의처럼 보이는 침묵은 결정 회피일 가능성이 높고, 그 비용은 전적으로 학생이 진다.

---

## 5.4 자기 행동을 교수 입장에서 읽기

A~F 사례를 거울로 쓰려면 자기 행동을 *교수 입장에서* 읽는 작은 훈련이 필요하다. 면담·랩미팅·이메일은 신호의 표면이고, 같은 시간 안에 학생의 우선순위·집중도·의사소통 단가가 모두 노출된다.

> "학생이 작성하는 논문에서 문제 될 부분은 학생이 이미 안다." *(요지 정리)*
>
> — 권창현 교수 관점 압축

이 한 줄은 자기 진단 능력이 *이미 있다*는 명제다. 본인이 어색하다고 느낀 대목, 어드바이저가 물어볼 가능성을 본인이 미리 떠올린 대목, 데이터가 가설과 약하게 어긋나는 대목은 학생이 이미 안다. 모르는 게 아니라 *덮은* 것이다. 덮인 데를 본인의 손으로 다시 들어 올리는 게 자기 진단의 시작이다.

실무용 훈련 두 개를 둔다.

- **자기 메일은 24시간 후 다시 읽는다.** 보낸 직후의 메일은 본인 의도가 글자에 덧입혀져 보인다. 24시간 후의 본인이 그 메일을 처음 읽는 어드바이저에 가깝다. 그 시점에 어색한 대목, 의도가 안 잡히는 대목이 어드바이저가 *처음 읽었을 때* 어색했던 곳이다.
- **미팅 직후 *어드바이저가 무엇을 가져갔는지*를 한 줄로 적는다.** 본인이 무엇을 보고했는가가 아니라 어드바이저가 무엇을 *가져갔는가*. 이 한 줄을 적기 어려우면 그 미팅의 단위가 없었다는 뜻이다. 다음 미팅의 첫머리에 그 한 줄이 들어간다.

지나친 존중이 무책임의 다른 이름이라는 진단(§3)은 이 자기 진단 위에서만 작동한다. 본인이 알고 있는 곳을 침묵으로 덮는 행위와, 모르는 것을 어드바이저에게 묻는 행위는 다르다. 전자는 결정 회피이고 후자는 협업의 입력 품질을 끌어올린다.

> 자기 메일은 24시간 후 다시 읽고, 미팅 직후 어드바이저가 무엇을 가져갔는지 한 줄로 적는다 — 자기 행동을 어드바이저 입장에서 읽는 훈련.

> 마감 중 우선순위 신호(봉사활동·여행·다른 프로젝트 착수)는 행동 그 자체가 아니라 *시점*이 신호다. 시점을 의식한다.

---

## 5.5 신뢰받는 협력자라는 위치

> "박사과정 학생은 교수에게 '신뢰받는 협력자'가 되어야 한다." *(요지 정리)*
>
> — 권창현 교수, 「좋은·나쁜·이상한 학생 2편」

F 사례가 가리키는 위치다. 어드바이저의 가설이 데이터에 맞지 않을 때, 학생이 데이터를 들고 가서 그 불일치를 짚을 수 있는 위치. 큰 결정도 학생이 주도하면 어드바이저는 단점만 말하고 결정을 존중하는 위치. 능력의 결과가 아니라 *행동의 누적*에 가깝다.

[Whitesides 2004 §5 collaboration model](https://onlinelibrary.wiley.com/doi/10.1002/adma.200400767)이 같은 위치를 작업 단위 차원에서 본다. 어드바이저-학생 협업의 단위는 논문 한 편이 아니라 outline 한 장이고, 4-5회 반복이 한 단위다. 1-2회차에는 어드바이저의 의견이 outline의 거의 모든 곳을 다시 쓰고, 3-4회차에 들어가면 학생이 한두 군데의 변경을 *먼저 제안*하기 시작한다. 마지막 한 라운드에서 학생이 outline의 형태를 거의 결정하면 그제서야 신뢰받는 협력자에 가깝다. 회수 그 자체가 아니라 *delta가 누구 손에서 나오는가*가 진짜 지표다.

협력자 위치는 5년의 *결과*가 아니라 첫 학기의 *자세*에서 출발한다. A 사례의 미리 정리된 질문 목록, 두 달 데이터 노가다, 1년 천 편 논문 검토가 신뢰받는 협력자의 단순한 첫 단계다. 이 첫 단계가 한 학기·한 학기 누적되어 3-4년차에 *delta가 학생 손에서 먼저 나오는* 라운드를 만든다.

---

같은 협력자 위치를 「연구노트」 [Part 0 ch03 (주도권의 이동)](../research-notes/guide.html#chapter-3)이 *연구 주도권 이동* 차원으로 다룬다 — 이 장이 면담·랩미팅·이메일이라는 *신호 표면*에서 본다면, 「연구노트」 쪽은 outline 4-5회 반복 사이에서 delta의 출처가 어떻게 옮겨가는지를 본다. 두 챕터를 함께 보면 같은 이동의 두 면이 보인다.

Part 1이 진학을 결정했고, Part 2가 그 진학 안의 한 변수 — 지도교수 — 를 다뤘다. 다음 part는 그 변수 위에서 굴러가는 *5년의 일상* 그 자체로 들어간다. 자율성의 무게를 견디는 시간 운영, 협업의 단위, 도구·소통의 기법이 거기 있다.

<h1 id="chapter-6">Ch.6 — 갈등 해결 — 균열의 단계와 정비 단위</h1>

[Ch.1 (양방향 관계)](#chapter-4)에서 매칭이 학생이 운영하는 시스템으로 굳었고, [Ch.2 (신호 읽기)](#chapter-5)에서 그 운영의 표면 — 면담·랩미팅·이메일 — 이 학생 측 신호의 단위로 자리 잡았다면, 이 장은 그 운영의 *균열* 차원에 들어선다. 균열은 한 번에 큰 사건으로 도착하지 않는다. *작은 신호 → 누적 균열 → 명시적 충돌 → 결정*의 4단계로 천천히 쌓이는 흐름이 기본에 가깝다.

각 단계마다 학생 측이 운영할 수 있는 정비 단위가 따로 있다. 정비 단위가 비어 있으면 4단계가 그대로 직진하고, 어느 한 단계에서 정비가 들어가면 다음 단계로 넘어가지 않는 일도 잦다. 9위 사이코 지도교수의 경우는 정비 단위가 *작동하지 않는* 예외다. 거기서는 회피가 기본 — 조용한 처리가 5년의 안전을 보장하지 않는다.

이 장의 시야는 *관점과 운영 단위 안내*까지다. 분쟁의 결정·committee 진입·연구진실성위 신고는 학생 본인과 학과·기관의 결정에 위임된다. 이 장은 그 결정에 도착하기 *전*의 정비 단위와, 그 결정의 *입구*를 다룬다.

---

## 6.1 갈등의 4단계

균열은 *작은 신호 → 누적 균열 → 명시적 충돌 → 결정*의 4단계로 누적된다. 이름이 중요한 게 아니라 *지금이 몇 단계인가*가 보이는 것이 중요하다. 단계가 보이지 않으면 정비 단위도 들어가지 않는다.

**작은 신호 단계.** 미팅 분위기가 한두 번 무거워진다. 이메일 회신이 평소보다 며칠 더 늦는다. 피드백이 본문이 아니라 표면 — 표 양식·figure 폰트 — 에 머무른다. 본인이 *과한 해석을 의심하는* 결이 기본이다. *내가 너무 예민한가*라는 self-talk가 따라붙는다. 이 단계의 신호 한 개는 신호가 아닐 가능성이 크다. 두 개·세 개가 1-2주 안에 같이 들어오면 그제서야 단계가 한 번 켜진 것으로 본다.

**누적 균열 단계.** 같은 신호가 1-2개월에 걸쳐 반복된다. *왜 또 그런가*의 관점이 자기 안에서 굳기 시작한다. 미팅이 끝난 뒤 *덜 풀리는 매듭*이 매번 같은 곳에 남는다. 다른 학생들과의 대화에서 본인이 *조용한 사람*으로 자주 묘사되고, 본인의 자기 점검이 1-2주 단위로 같은 결론에 도달한다 — *지금 환경이 작동하지 않는다*. 이 단계의 신호는 본인 안에서 자료가 누적되지만 외부에서는 *보이지 않는다*. 학생 측 정비 단위의 핵심이 이 단계에 놓인다.

**명시적 충돌 단계.** 미팅 중의 직접 충돌, 메일에서의 충돌, 랩미팅 자리에서의 공개 비판. 한쪽이 *말로* 균열을 표면에 올리는 시점이다. 이 단계에서 학생 측이 가장 자주 빠지는 함정이 *방어 모드* — 받자마자 응답하고, 받자마자 반박하고, 받자마자 수정한다. 받자마자의 응답은 [Ch.3 멘붕의 사이클](#chapter-16) 1단계의 한복판에서 나오는 응답과 같은 결에 놓이고, 그 응답은 균열의 진단 가치를 거의 모두 무효화한다.

**결정 단계.** *어떻게 운영할 것인가*. 네 갈래가 등장한다 — 조용한 처리·공식 채널·실험실 이동·졸업 가속. 결정의 자료가 누적 균열 단계의 *기록*에 있는 만큼, 결정 단계에 도착했을 때 자료가 비어 있으면 결정의 정확도가 낮아진다.

---

## 6.2 학생 측 정비 단위

각 단계에 들어갈 정비 단위가 따로 있다. 같은 단위를 다른 단계에 적용하면 작동하지 않거나 단계가 거꾸로 굳는다.

**작은 신호 단계 — 기록.** 미팅 메모·메일 보존이 정비 단위다. 한 줄짜리 메모로 충분하다. *오늘 미팅 분위기가 평소와 다름*, *이메일 회신 6일 지연*, *피드백 표면에 머무름* — 1-2주 누적된 메모가 누적 균열 단계의 자료가 된다. 자료가 없으면 본인 관점이 *과한 해석인지 정확한 해석인지* 본인 안에서 답해지지 않는다.

**누적 균열 단계 — 제3자에게 한 번 이야기하기.** 본인 관점의 왜곡 가능성을 한 번 점검한다. 같은 lab의 선배 1명, 다른 lab의 같은 분야 동료 1명, committee 위원 중 1명. 셋 중 한 명이 가장 안전하다. 본인 관점을 *처음 외부에* 옮겼을 때 들어오는 답이 *본인이 보지 못한 면*을 한 번 비춘다. 그 답이 *너만 그런 게 아니다*나 *원래 그런 분이다*로 묶이면 한 단계 더 나아갈 길도 같이 보인다.

이 단계에서 *부모·연인·박사 외부 친구*에게 옮기는 일은 정비 단위가 아니라 정서 회복에 가깝다. 둘이 분리되지 않으면 정서 회복이 정비 단위를 대체하고, 정비 단위는 비어 둔 채 시간이 흐른다.

> 누적 균열 단계의 정비 단위는 *분야 안*의 제3자 1명. 분야 외부는 정서 회복의 자리이지 정비 자료가 들어오는 곳이 아니다.

**명시적 충돌 단계 — 24-48시간 응답 회피.** 충돌 직후의 응답은 [Ch.3 멘붕의 사이클](#chapter-16) 1단계의 한복판이다. 1단계의 응답은 *반박 모드*에 잡혀 있고, 반박 모드의 응답은 갈등을 한 단계 더 끌어올린다. 24-48시간 응답을 미루는 일이 같은 사이클의 1단계 결재와 같은 결에 놓인다. 그 시간 동안 본인이 받은 메일·메시지·기록을 *세 번* 다시 읽는다. 첫 번째 재독은 반박 모드, 두 번째는 한숨, 세 번째에서야 *코멘트의 진단 가치*가 비로소 보이기 시작한다.

**결정 단계 — 자료와 5년 좌표 정합.** 결정 자료는 1-2단계의 기록과 3단계의 *세 번째 재독* 결과에 있다. 자료가 충분하면 네 갈래(조용한 처리·공식 채널·이동·졸업 가속) 중 하나가 본인의 5년 좌표 위에서 답해진다. 자료가 비어 있으면 결정이 정서로 흐르고, 정서로 결정된 결론은 6개월 후 같은 관점으로 다시 도착한다.

## 6.3 저자권 분쟁 — 시작 시점에 명시한다

갈등이 자주 등장하는 한 곳이 저자권 분쟁이다. [Part 5 Ch.1 (mentor_juniors)](#chapter-21) §5의 *저자권은 시작 시점에 명시한다*가 이 장의 *분쟁 차원*에서 다시 등장한다. 같은 명제, 다른 적용이다.

분쟁이 일어나는 곳이 셋 있다. 후배가 진행하던 일에 본인이 들어간 경우 — *어디까지가 후배의 일이고 어디까지가 본인의 일인가*가 시작 시점에 글로 적혀 있지 않으면 6개월 후 양쪽 기억이 갈라진다. 지도교수가 1저자로 들어간 경우 — 학생이 본문의 90%를 적었는데 1저자가 지도교수로 발표되는 일은 분야의 합의 안에서도 분쟁의 자료가 된다. 다른 lab과의 공동 연구에서 credit 분배 갈등 — 두 lab 사이에서 *어느 쪽이 1저자를 가져갈 것인가*가 결과 직전에 협상된다.

세 경우 모두 *시작 시점의 글*이 가장 단단한 정비 단위다. 협업 시작 시점에 1저자·교신·기여 분량을 글로 한 번 적어 두는 일이 6개월 후의 분쟁을 *합의의 정리*가 아니라 *합의의 확인*으로 옮긴다.

> **저자권은 시작 시점에 명시한다.** 분쟁의 정리가 아니라 분쟁의 예방이 글의 몫이다. 구두 합의는 6개월 후 양쪽 기억이 다르다.

분쟁이 시작 시점의 글 없이 누적된 곳에서는 *분쟁 자료를 글로 정리하는 일*이 본인의 운영이 된다. 메일 보존·commit log·draft history. 본인이 *언제 어떤 분량을 누구와 같이 진행했는가*의 자료가 본인 안에 글로 남아 있어야 한다. 이 자료가 결정 층위(committee·연구진실성위)의 입구에서 *답할 자료*가 된다.

결정 층위는 학과마다 다르다. 학과 ombuds, 연구진실성위, committee 의장이 기본 입구에 가깝다. 본인 학과의 입구·연락처를 분쟁이 들어오기 *전*에 한 번 확인해 두는 일이 [Ch.6 (정신건강)](#chapter-19) §4의 자원 안내와 같은 운영 관점 위에 놓인다. 분쟁이 시작된 뒤에 검색을 시작하면 자료가 늦다.

---

## 6.4 조용한 처리 vs 공식 채널

결정 단계의 갈래 중 두 갈래 — *조용한 처리*와 *공식 채널* — 가 가장 자주 혼동된다. 두 갈래의 구분 기준이 이 절의 관점이다.

**조용한 처리.** 본인 측 정비 단위와 교수와의 직접 대화. 1-2년차의 작은 신호·누적 균열 단계에서 기본. 학생이 본인의 관점과 자료를 정리해서 미팅에 가져가고, 그 자리에서 *어디서부터 어긋났는가*를 한 번 같이 점검한다. 두 사람 모두 회복 기점에 들어와 있다는 가정 위에서 굴러간다.

**공식 채널.** 학과장 면담·committee 면담·연구진실성위. 명시적 충돌 단계 이후, 또는 사이코 지도교수의 경우. 학생이 본인 안전을 보호받기 위해 또는 분쟁의 결정을 외부에 위임하기 위해 들어가는 길에 가깝다.

두 갈래의 구분 기준은 단순하다. *본인 안전·연구 진척의 누적 침식이 지속되는가*. 조용한 처리가 1-2개월에 한 단계 풀리지 않으면 공식 채널 진입 단계로 잡힌다. 한 단계 풀린다는 신호는 분명하다 — 미팅의 분위기 회복, 이메일 회신 시간 정상화, 피드백 본문 회복. 한 단계도 풀리지 않으면 같은 관점으로 6개월·1년이 흐른다.

> 조용한 처리가 1-2개월에 한 단계 풀리지 않으면 공식 채널 진입 단계로 옮겨간다. 같은 관점으로 6개월·1년 흐르는 운영은 누적 침식이다.

**사이코 지도교수의 예외.** [Ch.1](#chapter-4) §4에서 9위 사이코는 적성·취향과 무관하게 회피한다는 관점이 굳었다. 이 장에서 같은 관점이 *조용한 처리는 작동하지 않는다*로 다시 등장한다. 사이코 지도교수 아래에서 학생이 시도하는 조용한 처리는 정비가 아니라 *침식의 연장*에 가깝다. 본인의 정비 단위가 들어가도 다음 단계가 풀리지 않고, 오히려 학생의 자료가 *본인을 향한 자료*로 역이용되는 일도 기본이다. 회피가 기본 — 실험실 이동·전공 변경·졸업 가속·휴학.

> **사이코 지도교수와 5년을 공존하지 않는다.** 회피가 기본. 조용한 처리가 5년의 안전을 보장하지 않는다.

최윤섭 박사의 *절대 권력은 절대 부패한다*([Ch.1](#chapter-4) §2)의 관점이 여기서 다시 작동한다. 권력 비대칭이 기본인 시스템에서 *인성의 하한선* 아래의 지도교수와 5년을 공존하는 운영은 학생 측의 어떤 정비 단위도 작동하지 않는 자리에 가깝다.

## 6.5 외부 자원

결정 단계와 그 *입구*에서 학생이 쓸 자원이 따로 있다. 멀리 있어서가 아니라 *몰라서 안 쓰는 일*이 기본에 가깝다. 목록을 한 번 정리해 둔다.

(a) **학생 상담센터** (학교 기본) — 박사 운영의 정신건강 층위. [Ch.6 (정신건강)](#chapter-19) §4와 같은 결. 갈등이 누적된 가운데 *반응 모드*로 들어가지 않는 회복의 길.

(b) **학과 ombuds·연구진실성위** — 공식 채널의 입구. 학과마다 명칭이 다르지만 *연구 윤리·갈등 중재*는 기본으로 학과 안에 있다. 본인 학과의 입구·연락처·접수 절차를 *오늘* 한 번 확인.

(c) **committee 위원 (다른 위원)** — 비공식 멘토. 지도교수와의 갈등이 진행되는 동안, committee의 *다른* 위원 1명이 본인 관점 점검의 통로가 된다. 공식 채널 진입 전의 *2차 의견*을 받는 길이기도 하다.

(d) **전공 변경·실험실 이동** — 1년 단위의 결정 층위. 사이코 지도교수의 경우, 또는 분야 그 자체가 본인과 어긋난 경우 본인 5년 좌표의 재설정. 같은 학교 안의 다른 lab으로의 이동은 1년 단위, 다른 학교로의 이동은 1-2년 단위.

(e) **휴학·졸업 가속** — 사건 단위 결정. 휴학은 누적 침식 가운데 *반년-1년 단위*의 회복. 졸업 가속은 균열이 본인의 졸업 가능성을 위협하지 않을 때 1-2년 단위의 운영. 둘 다 본인의 5년 좌표 위에서 결정.

> 외부 자원 목록을 *오늘* 한 번 정리해 둔다 — 위급한 순간에 검색을 시작하면 자료가 늦다 ([Ch.6](#chapter-19) §4와 같은 운영 관점).

## 6.6 갈등 후 운영

갈등이 명시적 충돌·결정 단계까지 도착해도 운영은 닫히지 않는다. 본인의 다음 5년이 갈등의 *기록* 위에서 굴러가니, 갈등 후 운영의 단위가 따로 있다.

**추천서 보존.** 갈등이 명시적 충돌까지 가도 추천서는 남길 수 있다. 갈등이 진행된 시점에 추천서를 *글로* 받아 두면 1-2년 후 본인의 다음 자리에서 자료가 된다. 갈등이 길어질수록 추천서의 *시점*이 미뤄지고, 미뤄진 추천서는 종종 받지 못한 채 끝난다.

**추후 협업 가능성.** 갈등이 5년 후의 협업·심사·committee로 돌아온다. 분야가 좁을수록 *완전 단절*의 결정은 본인의 다음 5년에 한 자리 비용을 만든다. 다리 끊기는 *결정 단계*에서 한 번이고, 그 후의 운영은 *최소 한 줄*의 연결이 기본에 가깝다 — 분기에 한 번의 짧은 메일·학회에서의 한 마디.

**갈등의 기록.** 본인 5년의 한 자료가 된다. 갈등이 어떤 단계에서 어떤 정비 단위로 어떻게 풀렸거나 풀리지 않았는가의 기록은 본인의 다음 협업에서 같은 단계의 정비 단위가 자라는 자료가 된다. 같은 관점이 [Part 4 Ch.3 (멘붕 사이클)](#chapter-16)의 *두 번째 멘붕이 첫 번째보다 짧아지는 메커니즘*과 같은 회로 위에 놓인다 — 기록이 다음 사이클의 단축 도구다.

---

갈등의 4단계가 보일 때 정비 단위가 들어간다. 정비 단위가 들어가면 다음 단계로 넘어가지 않는 일이 잦고, 작은 신호 단계에서 정비가 들어가면 명시적 충돌 단계까지 가는 일이 기본이 아닌 일로 굳는다. 사이코 지도교수의 경우는 정비 단위가 작동하지 않는 예외 — 회피가 기본. 이 장의 시야는 *관점과 운영 단위 안내*까지이고, 결정·committee·연구진실성위는 학생과 학과의 결정에 위임된다.

[Part 4 Ch.6 (정신건강)](#chapter-19)이 갈등의 *임상 층위*를 다루고, 이 장은 갈등의 *운영 층위*를 다룬다. 두 층위가 분리되지 않으면 어느 한쪽도 작동하지 않으니, 본인 안에서 두 층위를 분리하는 일이 첫 정비 단위에 가깝다.

---

**출처.** 1차 이 장에서는 갈등 4단계 관점, 단계별 정비 단위, 외부 자원 목록 5종, 조용한 처리 vs 공식 채널 구분 기준, 갈등 후 운영 3 단위. 2차 [엄태웅 작가 「mysupervisor」 9위 사이코](https://gradschoolstory.chkwon.net) 연결 — *회피가 기본* 명제는 [Part 2 Ch.1](#chapter-4) §4에서 가져왔다. [최윤섭 박사 「지도교수 고르기」](https://gradschoolstory.chkwon.net) *절대 권력은 절대 부패한다* 연결 — [Part 2 Ch.1](#chapter-4) §2와 같은 자리. 저자권 시작 시점 명시 명제는 [Part 5 Ch.1](#chapter-21) §5와 같은 명제의 *분쟁 차원* 적용. 멘붕 사이클의 24-48시간 관점은 [Part 4 Ch.3](#chapter-16)에서. 외부 자원 목록 운영 관점은 [Part 4 Ch.6](#chapter-19) §4에서.

<h1 id="chapter-7">Ch.7 — 내 연구를 갖기 — 0년차 학생에서 5년차 연구자로</h1>

[Part 2 Ch.2 (신호 읽기)](#chapter-5)가 면담·랩미팅·이메일이라는 *신호 표면*에서 학생 행동의 누적을 봤다면, 이 장은 그 누적이 5년에 걸쳐 *내 연구*를 만들어 가는 과정을 본다. "내 연구"라는 말은 1년차에는 거의 거짓말에 가깝다. 수업·조교·잡무가 시간을 먹는 한편, 연구 주제는 여전히 지도교수 손 가까이에 있다. 5년차에 이 말이 더 이상 거짓말이 아니어야 한다 — 이 장의 전제는 거기 있다. 그 사이의 이동은 한 번의 결심이 아니라 *하루 일정의 모양*이 매년 조금씩 바뀌면서 일어난다.

같은 주도권 이동을 「연구노트」 Part 0 ch03은 *outline 교환*이라는 작업 차원에서, Part 0 ch05는 *생각의 시간*이라는 사용 차원에서 본다. 이 장은 그 두 각도와 떨어져 *시간 운영* — 연속 블록의 확보, 방학의 관점, 잡무의 의미 — 차원에서 같은 5년을 본다.

## 7.0 도착의 첫 주

5년의 시간 운영이 6개월·1년·5년 단위로 잘린다면, 그 첫 단위는 *첫 주*다. 입학식·계정 발급·서류 사이를 흘러가는 7일의 모양이 1년차 첫 학기의 디폴트로 굳고, 그 디폴트가 5년 운영의 첫 층위에 깔린다. 최윤섭 박사 「첫 해」의 *연속 몰입 시간 보호* 관점이 5년치 곡선이라면, 첫 주의 운영은 그 곡선이 *어디에서 시작되는가*에 놓인다.

분야 도구의 셋업·기존 코드 파악·연구 방향 탐색 같은 *내용물*은 「robotics-practice」 ch21 § E의 *7-day plan*에 위임한다. 이 장이 보는 것은 그 7일의 *시퀀스 관점* 이 장에서는 곧, *환경 → 코드 → 논문 → 방향*의 단계적 운영이다. 이 시퀀스가 1년차 6개월 단위 (도구 6개월 → 시스템 부수기 6개월)의 압축판이라는 관점은 § 3에서 다시 등장한다.

| Day | 단계 | 단위 |
|---|---|---|
| 1-2 | 환경 구축 | 서버·SSH·conda·PyTorch 셋업 (분야 도구는 연결로 위임) |
| 3-4 | 기존 코드 파악 | clone·README·빌드·데모 굴리기 (분야 도구) |
| 5 | 논문 읽기 시작 | 추천받은 핵심 논문 3편 — 자세한 운영은 [Part 2 Ch.1 § 5](#chapter-4)의 *0번째 outline* |
| 6-7 | 연구 방향 파악 | 연구실 최근 논문·선배 주제·관심 방향 2-3개 정리·자기소개 |

Day 5는 이 장에 풀어 두지 않는다 — *지도교수에게 핵심 논문 3편 추천받기*의 단위가 매칭 운영의 첫 outline에 가까운 까닭이다. Part 2 Ch.1의 § 5 참조로 연결 한다.

분야 쪽 논의 위에서 *코드가 안 도는 것 정상*은 robotics-practice 본체의 관점이다. 이 장의 층위에서는 *처음 읽는 논문 이해 안 되는 것 정상*만 가져온다.

> *처음 읽는 논문은 이해가 안 되는 게 정상이다. "이 논문이 무슨 문제를 풀려고 하는가?"만 파악해도 첫 주로서는 충분하다.*
>
> — 임형태 박사, 「Robotics & Spatial AI 신입생 첫 주 7-day plan」

이 한 줄은 *사전 보정*인 셈이다. § 1의 1년차 정상 풍경 관점이 한 학기 단위라면, 같은 관점을 7일 단위로 압축한 모습이 여기다. *왜 읽는가*의 분야 쪽 논의는 「연구노트」 [Part 1 ch01](../research-notes/guide.html#chapter-6)이 본다. 이 장은 *첫 주에 읽기가 굴러가지 않는 것이 결함이 아니다*까지만 짚는다.

> 첫 주의 운영은 *환경 → 코드 → 논문 → 방향* 시퀀스로 잘라 본다. 분야 도구의 셋업 목록은 robotics-practice ch21 § E에 위임하고, 이 장에서는 시퀀스 관점만 본다.

## 7.1 1년차의 정상 풍경

박사 1년차의 하루를 시간 단위로 쪼개 보면 *연구*라고 부를 수 있는 시간이 거의 안 잡힌다. 수업이 시간을 먹고, 조교 활동이 시간을 먹는 한편, 학회 등록·서류·랩 잡무가 남은 시간을 잘게 부순다. 본인이 게으르거나 능력이 부족해서가 아니라 그 일들이 거절하기 어려운 위치에 있고, 1년차의 시간이 원래 그 모양으로 잘려 들어오는 까닭이다.

> "1년차 때는 연구하기 어려울 것이다."
>
> — 최윤섭 박사, 「첫 해」

최윤섭 박사가 글의 첫머리에 박은 이 한 줄은 *사전 보정*이다. 1년차에 연구가 안 굴러가는 풍경이 결함이 아니라 *정상*이라는 진단. 이 사전 보정 없이 들어온 학생은 첫 학기에 자기 진단을 잘못 내리기 쉽다. "나는 박사 자질이 없는가" — 1년차에 이 질문이 떠오르면 답은 거의 항상 *아직 시기가 아니다*에 가깝다.

다만 이 사전 보정이 *5년차에도 같은 풍경이라면* 그것은 보정이 아닌 알리바이로 굳는다. "원래 그렇다"는 말의 유효 기간은 1~2년 정도. 그래서 3년차의 일정이 1년차와 같은 모양으로 잘려 있다면, 그 사이에 *어떤 결정이 자기 손에 들어왔어야 하는데 들어오지 않았다*는 신호로 읽힌다. 정상 풍경의 관점은 면죄부가 아니라 *지금이 정상 구간인지 아닌지*를 매년 점검하기 위한 도구다.

---

## 7.2 연속 몰입 시간이라는 자원

1년차에 연구가 안 굴러가는 진짜 원인은 시간의 *총량*이 아니라 *모양*에 있다. 수업 사이의 30분, 조교 업무 사이의 1시간, 점심 후의 40분 — 합산하면 하루에 3~4시간이 남는다. 다만 그 시간은 연구 시간이 아니다.

> "30분씩 여섯 번 일하는 것은 3시간을 연속해서 일하는 것을 결코 따라가지 못한다."
>
> — 최윤섭 박사, 「첫 해」

같은 3시간이라도 토막 6개와 블록 1개의 결과물이 다르다. 지식 노동에는 진입 비용이 따라붙는다 — 어디까지 했는지 다시 잡고, 변수의 상태를 다시 떠올리고, 가설의 어느 지점에서 끊겼는지 복원하는 비용. 30분짜리 토막에서는 진입 비용을 치르고 나면 작업할 시간이 거의 안 남는다. 그 비용을 6번 치르는 하루가 *3시간 연구한 하루*가 아닌 이유가 여기 있다.

피터 드러커가 1960년대 *지식근로자* 개념을 정식화하면서 짚은 관점이 같은 곳을 가리킨다. 손으로 부품을 조립하는 노동은 30분 단위로 쪼개도 결과물이 비례한다. 머리로 가설을 세우고 데이터를 해석하는 노동은 그렇지 않다. 지식 노동의 시간 단위는 *분*이 아니라 *블록*이고, 블록 길이가 일정 임계 아래로 떨어지면 결과물은 0에 가까워지는 식이다.

이 관점을 받아들이면 1년차의 운영 목표가 바뀐다. *총 연구 시간을 늘리는* 것이 아니라 *연속 블록 한 개를 만드는* 것이 1차 목표로 들어온다. 수업을 같은 요일에 몰아 듣고, 조교 업무를 한 블록으로 묶어 처리하고, 미팅을 오전이나 오후 한쪽으로 모은다 — 같은 일정을 *블록 보호 관점*으로 다시 짜는 작업이다. 의도적으로 보호하지 않으면 일정은 자동으로 토막 난다.

> **연속 몰입 시간 블록을 의도적으로 보호한다.** 30분 토막 6개를 3시간 1개라고 부르지 않는다. 토막은 진입 비용 6회의 비용이 따로 든다.

---

## 7.3 방학이라는 절호의 찬스

학기 중에 연속 블록을 만드는 일이 어렵다면, 학기와 학기 사이의 8~12주는 *통째로 한 블록*이다. 수업이 빠지고, 조교 업무가 빠지는 한편, 정기 행사도 빠진다. 박사 5년 중에 연속 블록을 가장 크게 가질 수 있는 시기가 방학이다.

> "방학은 연구를 위한 절호의 찬스다."
>
> — 최윤섭 박사, 「첫 해」

이 관점은 한국 박사 환경에서 잘 작동하지 않는 구간이 있다. *방학 = 휴식*이라는 학부 시절의 관점이 그대로 따라 들어오기 때문이다. 학부 4년 동안 방학은 시험에서 멀어지는 시간이었다. 같은 방학이 박사에서는 시험이 빠진 빈자리에 연구가 들어오는 시간으로 바뀐다. 두 관점이 충돌하면 거의 항상 학부 관점이 이긴다 — 본인의 디폴트 운영 체계가 그쪽으로 굳어 있는 까닭이다.

방학을 절호의 찬스로 쓰려면 *학기 중부터* 진입을 준비해야 한다. 그러자면 방학 도착 후에 계획을 세우는 패턴은 곤란하다 — 첫 2~3주가 진입에 흘러가고, 8주짜리 방학이 5주짜리로 줄어든다 *(8주 → 5주 수치 추정은 이 글에서 덧붙인 것이다. 최윤섭 박사 원문엔 수치 없음)*. 학기 종료 4~5주 전부터 *방학 진입 outline* — 어느 주제를 다룰 것인가, 어디까지가 목표인가, 첫 주에 무엇을 손댈 것인가 — 을 미리 짜 두면 방학 첫 날부터 작업이 굴러간다.

1년차의 첫 여름은 비대칭적 가치를 갖는다. 박사 5년에서 *처음으로 큰 블록을 가져 보는 경험*이고, 그 경험에서 만들어진 운영 습관이 5년 내내 따라간다. 첫 여름을 토막 시간으로 흘려보낸 학생과 한 주제에 8주를 쏟아본 학생의 3년차 운영 능력이 같지 않다. 한쪽은 큰 블록을 *어떻게 굴리는지*를 몸으로 안다. 다른 한쪽은 큰 블록이 와도 토막으로 다시 쪼개 쓴다.

> **방학 진입 outline을 학기 중 4~5주 전부터 짠다.** 방학 도착 후 계획은 늦은 계획이고, 8주가 5주가 된다.

최윤섭 박사의 *연속 블록* 관점이 *주 단위*에서 일어난다면, 같은 관점을 *6개월 단위*로 확장한 정리가 분야 쪽 논의에 있다.

> "첫 6개월은 도구를 익히는 시간이다. ROS·PyTorch·Git·논문 읽기·MATLAB·CAD 중 몇 개는 손이 익어야 한다. 다음 6개월은 기존 시스템을 돌리고 부수는 시간이다. 남의 코드를 읽고, 실패하고, 수정하는 경험이 쌓인다. 1년 반이 지날 때쯤 비로소 내 문제가 생긴다. 그때부터가 연구다."
>
> — robotics-practice ch22 § 22.4

이 6개월 단위가 §1의 *1년차 정상 풍경* 관점과 정확히 정합한다. 1년차에 *내 연구*가 안 잡히는 풍경은 결함이 아니라 6개월 도구 + 6개월 시스템 부수기 = 1년이 지나야 *내 문제*에 처음 닿는다는 분야의 곡선이다. 한 주의 연속 블록과 6개월 단위가 같은 관점의 두 층위 적용이라는 사실이 여기서 드러난다 — 짧게는 한 주, 길게는 6개월. 두 층위 모두에서 *진입 비용*이 *블록 길이*와 비대칭 관계에 놓인다.

---

## 7.4 잡무를 미래 자료로 읽기

1년차의 시간을 가장 많이 먹는 잡무 — 학회 등록, 예산 정산, 신입생 면담, 장비 구매, 서류 — 는 거절하기도 어렵고 줄이기도 어렵다. 1차 목표는 분량을 줄이는 쪽이지만, 줄일 수 없는 잡무가 더 많다. 그러자면 2차 목표가 따로 필요하다 — *남은 잡무에서 무엇을 배울 것인가*.

> "연구실 운영은 스타트업 경영과 같다."
>
> — 엄태웅 작가, 「의외의 덕목」

엄태웅 작가가 박사 후 자기 연구실을 시작하면서 돌아본 관점이다. 학회 등록은 *행사 운영의 축소판*이고, 예산 정산은 *재무 관리의 첫 단계*이며, 신입생 면담은 *인력 운영의 시작*이고, 장비 구매는 *조달 의사결정*에 가깝다. 이 모든 일이 5년 뒤 자기 연구실을 시작하는 학생에게 *축소판 경영 경험*으로 쌓인다. 그때 한 번도 해 보지 않은 일을 PI가 되어서 처음 시도하는 것과, 박사 시절에 한 번씩 거쳐 본 것은 운영 단가가 다른 법이다.

이 관점은 잡무 그 자체를 *연구 시간*으로 둔갑시키는 자기기만이 아니다. 잡무는 여전히 잡무이고, 줄이는 것이 1차 목표다. 다만 줄일 수 없을 때 *이건 연구가 아니다*의 입장과 *이건 미래 운영의 자료다*의 입장이 같은 1시간을 두 다른 시간으로 만든다는 관찰이다. 한쪽은 시간만 빼앗긴다. 다른 한쪽은 5년 뒤에 쓸 자료를 따로 모은다.

> 잡무를 *미래 운영의 자료*로 적어 두는 별도 노트를 둔다 — 학회 등록의 process, 예산 정산의 함정, 신입생 면담의 질문 목록. "의외의 덕목"의 자기 버전.

> 1년차 첫 학기에 *어느 잡무가 내 시간을 가장 많이 먹는가*의 목록을 한 번 적는다 — 다음 학기에 같은 목록으로 비교하면 *어떤 잡무가 줄었고 어떤 잡무가 늘었는지*가 자기 운영의 변화량이 된다.

---

## 7.5 주도권의 점진적 이동

1년차에서 5년차로 가는 이동은 *시간 모양*의 변화이기도 하지만 *결정 위치*의 변화이기도 하다. 1년차에는 큰 결정 — 어느 주제를 잡는가, 어느 학회에 보내는가, 어느 baseline을 쓰는가 — 이 거의 다 지도교수 손에 있다. 3년차쯤이면 outline 교환의 절반 정도가 학생 손에서 시작된다 *(3년차 = outline 교환의 절반 시점 관점은 그 자체다. Whitesides §2.2의 4-5회 outline 반복을 박사 5년 곡선에 매핑한 추정)*. 5년차에는 큰 결정 대부분이 학생 쪽이고, 지도교수는 단점만 짚고 결정을 존중하는 쪽으로 옮겨간다.

「연구노트」 Part 0 ch03은 같은 이동을 *outline 교환의 작업 단위* 차원에서 본다. delta가 누구 손에서 먼저 나오는가, 4~5회 반복 중 어느 회차에서 학생이 *먼저 제안*을 들고 들어오기 시작하는가. 이 장은 그 이동을 *시간 운영* 차원에서 본다 — 연속 블록을 누가 결정하는가, 방학을 누가 설계하는가, 잡무를 어느 지점에서 거절하는가. 두 챕터를 같이 읽으면 한 사람의 같은 5년이 두 각도로 보인다.

이 이동은 자동이 아니다. 1년차의 디폴트가 강한 만큼, 의식적으로 점검하지 않으면 3년차에도 같은 디폴트가 굴러간다. 매 학기 끝에 *어느 결정이 내 손에 들어왔는가*를 한 줄로 적어 두면 5년치 누적이 주도권 이동의 증거가 된다. 한 줄도 적기 어려운 학기가 있다면 그 학기의 결정이 거의 다 어드바이저 쪽에 있었다는 뜻이고, 그제서야 다음 학기 첫머리에 *어느 결정 한 개를 내 손으로 가져올 것인가*가 운영 목표로 들어온다.

5년차 연구자가 1년차에게 가장 자주 하는 말은 *나도 1년차에 똑같았다*이다. 곧 1년차의 정상 풍경은 5년차에게도 정상 풍경이었다는 뜻이다. 차이는 그 풍경 안에서 *어느 지점을 의도적으로 다르게 운영했는가*에 있다. 연속 블록을 보호한 결정, 첫 여름을 통째로 쓴 결정, 잡무를 자료로 읽은 결정 — 이 작은 결정들이 5년 누적되어 *내 연구*라는 말이 거짓말에서 빠져나오는 시점을 만든다.

같은 1·2년차 풍경의 한 일기가 미국 코호트에서 한 번 더 변주된다. Philip Guo의 첫해는 지도교수 Klee 프로젝트의 인프라 작업으로 4개월이 흘러갔고, 937개 Linux 드라이버에서 55개 버그를 찾아내고 마감 72시간 전에 급조해 제출한 논문은 *blatantly too sloppy*라는 한 줄로 거절되었다. 2년차에 들어서야 본인 이름의 연구가 시작되었는데, 그 시작점은 분야 신규 주제의 발견이 아니라 *MIT 멘토의 한 줄 조언* — 교수들에게 먼저 cold email로 운을 떼라는 — 의 실행이었다.

> **Philip Guo (Stanford CS PhD, 2012):** 1년차 4개월은 Klee 그 자체의 버그를 잡는 *지적 내용 없는* 노동에 흘러갔고, 마감 직전 72시간에 급조된 논문은 PC가 *너무 sloppy해서 채택할 수 없다*고 답했다. *내 연구*가 시작된 지점은 2년차에 비로소, 그것도 새 주제가 아니라 *먼저 메일을 보내라*는 멘토의 한 줄을 실행에 옮기면서였다. — *The PhD Grind* Year 1 (Downfall) · Year 2 (Inception)

---

<h1 id="chapter-8">Ch.8 — 시간 쓰는 법 — 박사 과정의 진짜 자원</h1>

[Ch.1 (내 연구를 갖기)](#chapter-7)이 *연속 블록을 어떻게 확보하는가*의 차원이었다면, 이 장은 *그 블록을 어떻게 쓰는가*의 차원이다. 같은 8시간이라도 어느 일을 먼저 놓는가, 몇 개의 일을 동시에 굴리는가, 내일의 자기에게 무엇을 남기는가에 따라 결과물이 갈라진다. 연속 블록의 확보가 운영의 전제라면, 분배는 운영의 본문이다.

박사 과정에서 가장 자주 듣는 자기 진단은 *시간이 부족하다*이고, 그 진단은 거의 항상 정확하다. 이 장의 전제는 그 부족이 *해결할 수 있는 문제가 아니라 운영해야 할 조건*이라는 데 있다. 시간이 늘어나기를 기다릴 일이 아니라, 같은 시간을 어떻게 분배하는가가 운영의 단위로 들어온다.

---

## 8.1 두 명제 — 부족과 가속

> "대학원생에게 시간은 항상 부족하다."
>
> "연차가 올라갈수록 시간은 더 빠르게 흐른다."
>
> — 최윤섭 박사, 「대학원생의 시간 관리」

최윤섭 박사가 글을 두 문장으로 압축해 둔 대목이다. 첫 명제는 *총량*에 관한 것이고, 둘째 명제는 *체감 속도*에 관한 것. 두 명제를 합치면 박사 과정의 시간은 *부족한 채로 점점 빨라진다*는 모양이 된다.

이 두 명제를 *해결할 변수*로 읽으면 운영 전체가 어긋난다. "시간이 늘어나는 학기가 오면 그때부터 제대로 한다", "이번 학기만 넘기면 다음 학기는 여유가 있을 것이다" — 이 기다림은 5년 동안 한 번도 도착하지 않는다. 1년차의 1년과 4년차의 1년은 같은 365일이지만 체감 길이가 다르고, 4년차의 1년은 1년차보다 더 빨리 흐른다. 부족과 가속은 *변수*가 아니라 *상수*에 가깝다.

상수를 받아들이면 운영의 관점이 바뀐다. 시간을 *늘리는* 운영이 아니라 *분배하는* 운영으로. 어느 일을 먼저 놓는가, 몇 개를 동시에 굴리는가, 내일의 자기에게 무엇을 남기는가 — 이 세 분배 단위가 이 장의 본문이다.

---

## 8.2 아침의 한 자문

분배의 첫 단위는 매일 아침의 한 자문이다.

> "매일 아침 자문한다 — 오늘 가장 중요한 일은 무엇인가."
>
> — 최윤섭 박사, 「대학원생의 시간 관리」

답은 한 줄이면 충분하다. *오늘은 §3 결과 분석을 끝낸다*, *오늘은 reviewer 답변 초안을 마무리한다*. 한 줄이 하루의 일정에 *축*을 만든다. 그 축이 일정 위에 박혀 있으면 메일·잡무·갑작스러운 요청이 들어와도 그 축을 먼저 보호하게 된다.

자문이 빠진 날의 풍경은 정반대다. 메일함을 열고 답장하다가, 떠오르는 작은 일을 처리하다가, 미팅에 들어갔다가 나오면 저녁이 와 있다. 시간은 분명히 다 썼는데 *오늘 무엇이 끝났는가*의 답이 흐릿해진다. 시간을 많이 썼지만 *축이 없는 시간*이라서 결과물이 누적되지 않는다.

자문은 거창한 의식이 아니다. 노트 한 줄, 포스트잇 한 장, 메모 앱의 한 줄로도 족하다. 중요한 것은 *답을 적는 일*에 있다. 머릿속에서만 굴린 답은 점심 무렵이면 흐려지고, 저녁에는 아침에 뭘 생각했는지조차 안 잡힌다. 같은 한 줄을 적어 두면 하루를 끝까지 끌고 가는 닻이 된다.

> 매일 아침 한 자문 — "오늘 가장 중요한 일은 무엇인가"의 답을 한 줄로 적는다. 머릿속에서만 굴리지 않는다.

---

## 8.3 4사분면 매트릭스 — 중요와 긴급

매일의 자문이 하루의 축을 만든다면, 한 주·한 달의 분배는 *중요-긴급* 두 축으로 본다. 같은 일이라도 두 축의 위치에 따라 우선순위가 갈라진다. 중요-긴급 4사분면은 Eisenhower / Stephen Covey의 맥락에서 널리 알려진 관점이고, 최윤섭 박사는 이를 박사 과정의 시간 관리에 적용해 설명한다.

|              | **긴급**                                | **비긴급**                                  |
|--------------|----------------------------------------|--------------------------------------------|
| **중요**     | 1사분면 — deadline 가까운 paper, 리뷰 답변 | 2사분면 — 논문 outline, 문헌 정독, 새 분야 학습 |
| **비중요**   | 3사분면 — 즉답 요청 메일, 대부분의 잡무      | 4사분면 — 시간 때우기, 의미 없는 회의            |

박사 과정의 *진짜 일*은 거의 다 2사분면(중요·비긴급)에 들어 있다. 논문 outline을 다듬는 일, 문헌을 깊게 읽는 일, 새 분야를 학습하는 일, 협업 관계를 운영하는 일 — 이 일들은 deadline이 명시적으로 박혀 있지 않은 한편, 미루어도 오늘 안에 누가 항의하지 않는다. 그 점이 곧 함정이다.

2사분면을 너무 늦게까지 미뤄두면 어느 시점에 그 일이 1사분면(중요·긴급)으로 강제 이동한다. paper deadline이 한 달 앞이고 outline이 안 잡혀 있다, 자격시험이 다음 주이고 문헌 정독이 안 끝났다 — 이 풍경이 1사분면이 매일 들이닥치는 풍경이다. 1사분면이 일과를 점령하고 있다면 그것은 2사분면 운영의 *지연 영수증*이다.

3사분면(비중요·긴급)이 점령하는 풍경도 같은 진단을 부른다. 즉답이 필요한 메일, 잡무, 작은 행정 요청이 매일 일과의 절반을 먹고 있다면 *2사분면을 의도적으로 막아 두지 않은 상태*다. 2사분면은 명시적 deadline이 없는 만큼 *지키지 않으면 자동으로 사라지고*, 막아 두지 않으면 3사분면이 그 시간을 가져간다.

> 1주일에 한 번 4사분면 매트릭스에 *지난 7일 시간 분배*를 회고한다 — 2사분면이 비어 있으면 신호. 다음 주 일정 첫머리에 2사분면 블록을 먼저 박는다.

---

## 8.4 멀티태스킹의 상한 — 3개 프로젝트

박사 과정에서 한 번에 한 프로젝트만 굴리는 일은 거의 없다. 본인 주도 논문 한 편, 어드바이저와의 다른 프로젝트, 협업 프로젝트, 자격시험 준비 — 이 중 두세 개가 동시에 굴러가는 것이 디폴트다. 다만 그 *동시*에는 상한이 따라붙는다.

최윤섭 박사가 명시적으로 박은 규칙은 *최대 3개 프로젝트*. 4개째부터는 모든 프로젝트가 동시에 늦어진다. 4번째 프로젝트는 *추가되는 일*이 아니라 *기존 3개의 진척을 깎는 비용*에 가깝다. 시간 분배가 25%씩 4분할되는 것이 아니라, 맥락 전환 비용이 4×3 = 12쌍의 페어로 늘어나면서 모든 프로젝트의 진입 비용이 동시에 올라간다.

3개 프로젝트의 순서는 *총량*만으로 정하지 않는다. 두 변수를 같이 본다.

- **일의 속성** — 사고 집약 vs 절차. 사고 집약 프로젝트(논문 outline, 가설 설계, 알고리즘 설계)는 큰 블록이 필요하고, 절차 프로젝트(실험 돌리기, 데이터 정리, 행정)는 토막 시간으로도 굴러간다. 큰 블록에는 사고 집약 프로젝트를, 토막에는 절차 프로젝트를.
- **수행 주체** — 혼자 vs 협업. 혼자 굴리는 프로젝트는 *내가 멈추면 나만 멈춘다*가 비용이지만, 협업 프로젝트는 *내가 멈추면 남도 멈춘다*가 비용이다. 협업 프로젝트는 같은 1개라도 가중치를 더해 둔다 — 내 손에서 막혀 있는 시간이 협업자 N명의 시간을 동시에 깎는다.

4번째 프로젝트가 들어오면 의사결정의 첫 단위는 *어느 프로젝트를 끝내거나 미룰 것인지*다. 4개를 동시에 굴리는 자기위안은, 결과물이 4개 다 늦어진다는 것을 데이터가 반복적으로 보여 준다.

> **멀티태스킹은 최대 3개 프로젝트.** 4개째 프로젝트가 들어오면 *어느 프로젝트를 끝내거나 미룰 것인지*를 먼저 결정한다. 4개째는 추가가 아니라 기존 3개의 진척을 깎는 비용이다.

> 협업 프로젝트는 같은 1개라도 *내가 멈추면 남도 멈춘다*는 변수로 가중치를 더해 둔다.

## 8.5 내일의 나에게 메시지 — 퇴근 전 포스트잇

하루의 마지막 분배는 *내일의 자기에게 무엇을 남기는가*에 있다. 퇴근 전 5분이 다음 날 아침의 진입 비용을 결정한다.

> 퇴근 전 5분에 *내일의 나*에게 포스트잇을 한 장 남긴다.
>
> — 최윤섭 박사, 「대학원생의 시간 관리」

포스트잇 한 장에 적는 것은 *일과 목록*가 아니다. 다음 날 *가장 먼저 손댈 일* 한 가지 + 그 일의 *진입점*. 진입점은 구체적이어야 한다 — 열어둘 파일명, 이어쓸 문장의 끝 단어, 다음 실험의 명령어, 검토할 reviewer comment 번호. 추상적 항목("§3 마무리")이 아니라 손이 바로 닿는 한 줄("§3.2 마지막 문단의 'however' 다음에 ablation 결과 한 줄 추가")이 진입점다운 진입점이다.

목표는 다음 날 아침 진입 비용이 *0에 가까운 상태로 시작*되는 데 있다. 박사 과정의 진짜 비용은 작업 시간이 아니라 작업 *재진입* 시간이다. 어제 어디까지 했는지 다시 잡고, 변수 상태를 다시 떠올리고, 가설 어느 지점에서 끊겼는지 복원하는 작업이 매일 30분~1시간을 먹는다. 이 비용을 어제 5분으로 압축해 두면 오늘 아침 30분~1시간이 그대로 작업 시간으로 들어온다.

이 관점은 [Part 3 Ch.4 (한 메일 한 질문)](#chapter-10)의 메일 단위에서 다시 변주된다. 메일 한 통의 *진입 비용 0*이 포스트잇과 같은 원리로 작동하는 한편, 받는 사람이 바로 답할 수 있는 지점에서 멈추는 것이 답장 속도를 결정한다. 자기에게도, 협업자에게도 *진입 비용*이 시간 운영의 단위라는 관점이 이 장의 끝을 차지한다.

> **퇴근 전 5분의 포스트잇 한 장을 빠뜨리지 않는다.** 다음 날 아침의 진입 비용을 0에 가깝게 두는 유일한 도구다. 일과 목록이 아니라 *가장 먼저 손댈 일 + 진입점* 한 줄.

`예시 포스트잇:`
```
내일 첫 일: §4 ablation table 마지막 행 채우기
진입점: results/ablation_v3.json 의 mean_iou 4번째 값을
        manuscript/sec4_results.tex 의 \multirow 마지막 칸에 붙이기
```

분야 쪽 논의에서 같은 관점이 *과거의 내가 미래의 나를 도와주는* 자리로 확장된다.

> "오늘 뭘 했는지, 뭘 모르겠는지, 어떤 에러가 났는지 기록해두자. 나중에 같은 문제를 만났을 때 과거의 내가 도와준다."
>
> — robotics-practice ch21 § 생존 마인드셋

포스트잇이 *내일 아침의 진입 비용 0*에 닿는다면, 이 권고는 *몇 달 후의 같은 함정을 만났을 때 회상 비용 0*에 닿는다. 두 관점이 같은 메커니즘의 시간 단위 두 층위 적용이다 — 짧게는 하루, 길게는 한 분기. 두 층위 모두에서 *기록의 즉각적 부담*이 *재진입 비용의 누적*보다 작다는 비대칭이 작동한다. 분야 일상에서는 에러 메시지·디버깅 시도·실패한 hyperparameter가 그 기록 항목으로 들어오고, 같은 항목이 6개월 후 같은 에러 앞에서 회상의 닻이 된다.

연속 블록의 *사용 방식*을 「연구노트」 Part 0 ch05가 *생각의 시간* 차원에서 본다. 이 장은 같은 블록의 *분배 방식*을 본다 — 어느 일을 먼저 놓는가(2사분면), 몇 개를 동시에 굴리는가(상한 3), 내일의 자기에게 무엇을 남기는가(포스트잇). 분배의 단위가 매일 굴러가야 5년의 누적이 잡힌다.

---

**출처.** [최윤섭 박사 「대학원생의 시간 관리」](https://gradschoolstory.chkwon.net). 4사분면 매트릭스는 일반 관점을 박사 과정 시간 운영에 적용한 변주. robotics-practice ch21 § 생존 마인드셋 — *과거의 내가 미래의 나를 도와준다* 분야 쪽 논의. 진입 비용 0의 관점, 4번째 프로젝트의 *비용* 표현은 이 장에서 정리했다.

<h1 id="chapter-9">Ch.9 — 먼저 베푸는 협업 — 결과보다 평판이 먼저 쌓인다</h1>

박사 5년이 지난 시점에 한 사람이 가진 가장 큰 자산은 논문 목록이 아니라 *같이 일했을 때 어떤 사람이었는가*의 평판이다. 그리고 평판은 결과가 나온 후 쌓이지 않는다. 오히려 결과 *전에* 쌓이고, 그 평판이 다음 협업의 입구를 결정한다.

[Ch.2 (시간 쓰는 법)](#chapter-8)이 박사과정 시간을 *진입 비용 0*으로 운영하는 차원이었다면, 이 장은 그 시간을 누구와 어떻게 쓰는가의 차원이다. 협업의 1원칙을 *먼저 베풀고 결과를 기대하지 않기*로 못 박은 [최윤섭 박사 G6 「절대로 혼자 일하지 마라」](https://gradschoolstory.chkwon.net)의 관점을 따른다. 동시에 그 관점이 *자기 특기 없는 베풂*으로 misread되지 않도록 — 협업에 초대받기 위해 필요한 것은 "이 주제는 국내 최고"라고 한 줄로 적힐 자기 영역 — 이라는 전제를 같이 본다.

---

## 9.1 협업이 선택이 아닌 이유

> "10명이 넘는 저자가 다른 분야 소속인 논문이 흔하다."
>
> — 최윤섭 박사, 「절대로 혼자 일하지 마라」

한 논문에 10명 넘는 저자, 서로 다른 분야 소속이 자연스러운 시대다. 로보틱스 한 편에 컴퓨터비전·기계공학·수학·심리학 소속 저자가 같이 박혀 있는 사례가 더 이상 드물지 않다. 혼자 끝낼 수 있는 분야의 영역이 줄어드는 한편, 분야 사이의 *교차점*에서 새 결과가 자주 나오는 흐름이 5년 단위로 굳었다.

이 흐름이 학생 입장에서 의미하는 바가 관점을 바꾼다. 협업은 *해도 그만 안 해도 그만*의 선택지가 아니라 *어느 협업을 어떻게 할 것인가*의 조건이 된다. 처음부터 관점을 그렇게 잡지 않으면 협업이 들어왔을 때 도구·자원·평판이 모두 한 박자 늦는다.

분야 안쪽으로 좁혀도 사정은 같다. 같은 lab 안의 박사과정 학생끼리, 같은 학회에서 만난 다른 lab 박사과정끼리 — 분야가 좁을수록 협업이 *우연히* 들어오는 비율이 줄고, *이미 같이 일했던 기억*에 기반해 들어오는 비율이 늘어난다. 결국 첫 협업의 단가가 다음 협업의 입력값이 되는 구조다. 협업 관점을 *조건*으로 잡지 않은 학생은 첫 협업에서 *결과는 받았지만 같이 일하기 피곤한 사람*이라는 기억을 남기고, 그 기억이 다음 협업의 입구를 좁힌다.

---

## 9.2 협업의 1원칙 — 먼저 베풀고 결과를 기대하지 않는다

> "상대방에게 먼저 도움 줄 방법을 고민하고, 결과를 기대하지 않는다."
>
> — 최윤섭 박사, 「절대로 혼자 일하지 마라」

이 장의 한 문장이다. 한 줄을 두 토막으로 본다. *먼저 도움 줄 방법을 고민한다*가 앞 토막, *결과를 기대하지 않는다*가 뒤 토막. 두 토막을 분리해서 본다.

앞 토막은 베풂의 시점에 관한 명제다. 협업의 입구에서 학생이 얻으려는 것을 먼저 챙기는 자세는 — 그것이 합리적이라 해도 — 상대 입장에서 단가가 높은 거래처럼 읽힌다. 같은 베풂도 *얻기 전에* 들어가면 거래가 아니라 협업의 시작으로 읽힌다.

뒤 토막이 더 어렵다. 결과를 기대한 베풂은 대가가 안 돌아왔을 때 *원망*으로 굳고, 그 원망이 평판을 깎는다. 베풀고도 평판을 잃는 가장 흔한 길이 여기다. 베풂의 회수는 즉각적이지 않고 다른 사람·다른 시점·다른 형태로 돌아오는 일이 잦다 — *이 사람*에게 베풀고 *저 사람* 협업의 초대로 돌아오는 식이다. 회수의 경로가 비대칭이라는 사실을 감안하지 않으면 1년 안에 원망이 쌓인다.

> **협업의 1원칙은 먼저 베풀고 결과를 기대하지 않는 것이다.** 결과를 기대한 베풂은 대가가 안 돌아왔을 때의 원망으로 굳고, 그 원망이 평판을 깎는다.

"give-first가 손해 아닌가"라는 흔한 오해가 있다. 단기에는 손해처럼 보이고, 1년 단위에서는 베푼 시간이 회수되지 않는 사례가 더 많다. 다만 5년 누적에서 *초대받는 사람*과 *초대받지 못하는 사람*의 격차로 회수된다. 좋은 학생들이 다음 협업을 누구와 할지 선택하는 시점에 *같이 일했던 기억*이 결정하고, 그 기억이 give-first 위에 쌓인다.

베풂의 단위도 거창하지 않다. 후배의 figure 한 장 review, 같은 학회 발표 전 1시간 dry run 들어주기, baseline 코드의 환경 설정 한 토막 공유 — 이런 단위가 5년 누적의 입력값이다. 한 번에 큰 베풂을 노리는 자세는 오히려 *결과를 기대한 베풂*과 같은 회로를 탄다. 작은 단위가 자주 일어나는 패턴이 give-first의 운영 형태에 가깝다.

---

## 9.3 자기 특기라는 전제

> "이 주제는 국내 최고라고 적힐 한 줄이 있어야 한다."
>
> — 최윤섭 박사, 「절대로 혼자 일하지 마라」

베풂이 의미를 가지려면 *베풀 무엇*이 있어야 한다. 자기 특기 없이 베푸는 시간은 협업이 아니라 심부름이 된다. 같은 일이 다른 관점으로 굴러가는 한편, 심부름은 다음 협업의 초대로 이어지지 않는다.

특기의 형태는 거창하지 않다. *이 주제는 국내 최고*라고 한 줄로 적힐 자기 영역이면 그만이다. 한 줄이 적힐 정도의 깊이가 있어야 다른 분야 사람이 협업을 떠올렸을 때 그 사람의 머리 안에서 학생의 이름이 그 한 줄과 함께 떠오르고, 떠오르지 않으면 초대 명단에 들지 않는다.

> 자기 특기를 *한 줄로 적어 두는 노트*를 만들고 매년 갱신한다. "이 주제는 국내 최고"의 한 줄이 5년치 갱신된 흔적이 박사 과정의 핵심 결과다.

특기를 한 줄로 적는 일은 매년 갱신할 때 의미가 있다. 1년차의 한 줄과 5년차의 한 줄이 같으면 그 사이 4년이 흐른 흔적이 없다는 뜻이다. 매년 한 줄을 다시 적되, 작년의 한 줄을 지우지 않고 옆에 둔다. 같은 5년치 갱신 흔적 그 자체가 박사 과정의 핵심 결과 중 하나다.

---

## 9.4 운영의 사소한 기술

협업의 1원칙 위에서 굴러가는 운영 단위가 있다. 사소한 기술 4 목록으로 묶는다.

| 항목 | 발생 지점 | 사소한 표준 |
|---|---|---|
| **감사 표현 명시화** | 발표·논문 acknowledgment | 협력자 기여를 *구체적으로* 한 줄 credit. "도움 주신 분들"의 막연한 감사는 감사가 아니다. |
| **명확 의사소통** | 메일·파일·일정 | 메일 제목과 파일명에 정보, 답변은 신속, 모호한 약속 회피. |
| **사전 합의** | 협업 시작 시점 | 의도·범위·보상을 *글로* 사전 명시. 사후 충돌의 가장 큰 예방. |
| **뒷담화 0** | 모든 곳 | 박사 5년의 평판은 학생 사이에서 먼저 쌓이고, 한 번 새는 평판은 회복이 어렵다. |

감사 표현부터 본다. 발표 자리에서 "도움 주신 분들께 감사드립니다"라는 막연한 한 줄은 감사가 아니라 의례에 가깝다. 협력자 A가 어떤 figure의 구조를 잡아 줬는지, B가 어떤 baseline 비교를 제안했는지를 한 줄로 짚는 credit이 진짜 감사고, 같은 자리에서 듣는 사람이 *이 학생은 협력자 기여를 정확히 인지한다*는 신호를 받는다.

명확 의사소통은 ch04에서 한 메일 한 질문 차원으로 따로 본다. 이 장에서는 협업의 1원칙이 메일·파일·일정의 사소한 단위에서 운영된다는 관점만 둔다. 메일 제목이 "Figure"인 메일과 "Figure 2 caption — A vs B 중 어느 쪽이 자연스러운가"인 메일은 같은 학생의 같은 분당 비용을 다르게 옮긴다.

사전 합의는 협업의 입구에서 가장 사소해 보이고 사후에 가장 큰 비용으로 돌아오는 항목이다. 의도(이 협업으로 무엇을 얻으려는가) — 범위(어디까지가 본인 분량인가) — 보상(저자 순서·credit·후속 협업 옵션)을 *글로* 한 번 적어 둔다. 구두로만 합의된 항목은 6개월 후 양쪽이 다른 기억을 갖고, 그 시점의 다툼이 협업의 결과를 깎는다.

> 협업 시작 시점에 의도·범위·보상을 *글로* 사전 명시한다. 사후 충돌의 가장 큰 예방.

뒷담화 0은 가장 단정적인 항목이다. 박사 과정의 평판은 *학생 사이에서 먼저* 쌓이고 교수에게 늦게 전달되는 까닭이다. 같은 lab의 옆 책상, 같은 학회에서 만나는 다른 lab 동료, 같은 분야의 후배·선배 — 이 좁은 망 안에서 한 사람의 *같이 일했을 때 어떤 사람이었는가*가 1~2년에 걸쳐 굳는다. 한 번 새는 평판은 본인이 들어가지 못하는 자리에 먼저 도착해 있는 한편, 본인은 그 자리에 자기 평판이 도착했다는 사실 그 자체를 모른다.

> **뒷담화 0.** 박사 5년의 평판은 학생 사이에서 먼저 쌓이고, 한 번 새는 평판은 회복이 어렵다.

## 9.5 위대한 문제와 협업

최윤섭 박사가 같은 글에 박은 일화 한 토막이 이 장의 두 관점을 합친다.

> 노벨상 수상자 로드릭 맥키넌(Roderick MacKinnon)은 과학에서의 성공의 핵심을 *"위대한 문제를 찾는 것"*으로 꼽았다.
>
> — 최윤섭 박사가 인용한 일화, 「절대로 혼자 일하지 마라」

좋은 문제는 사람을 모은다. 도구·방법·자원이 한 사람의 손에 다 있을 수 없으니 협업이 따라오고, 협업의 단위가 클수록 좋은 문제일 가능성이 높다. 좋은 문제를 찾는 일과 협업을 잘 운영하는 일은 분리된 두 능력이 아니라 같은 면의 두 측면이다.

give-first로 평판을 쌓은 사람이 *그 좋은 문제*의 초대 명단에 든다. 이 장의 두 관점이 여기서 합쳐진다. 자기 특기를 한 줄로 적어 두고 매년 갱신하는 작업(§3)과 결과를 기대하지 않는 베풂(§2)이 합쳐져서 *좋은 문제가 등장하는 시점에 떠오르는 이름*이 된다. 결국 5년 누적의 회수 지점이 거기 있다.

이 관점의 거울도 본다. 좋은 문제의 초대 명단에 들지 못한 학생들의 5년에는 흔히 두 빈 칸이 보인다 — 자기 특기를 한 줄로 적을 영역이 없거나, 베풂이 결과를 기대한 거래로 굳었거나. 둘 중 하나만 빠져도 *좋은 문제*의 망 안쪽에서 이름이 떠오르지 않는다. 이 장의 두 관점이 동시에 충족될 때 회수가 일어난다는 사실이 그래서 중요하다.

---

협업은 박사 과정의 *외부 변수*가 아니라 *내부 운영 단위*에 가깝다. 좋은 문제·좋은 협업·좋은 평판이 같은 회로 안에서 굴러간다. 이 장이 그 회로의 1원칙(give-first)과 전제(자기 특기)와 운영(4 목록)을 한 자리에 묶었다면, 다음 챕터는 그 운영의 가장 사소한 단위 — 메일 한 통 — 에서 같은 관점이 어떻게 적용되는지를 본다.

**출처.** [최윤섭 박사 G6 「절대로 혼자 일하지 마라」](https://gradschoolstory.chkwon.net)가 1차. 1원칙·자기 특기·운영 기술 4 목록·맥키넌 일화 모두 여기서 가져왔다. *좋은 문제*의 5년 누적 관점 일부, "특기 없는 베풂 = 심부름" 표현, 평판이 학생 사이에서 먼저 쌓인다는 관찰은 이 장에서 정리했다.

다음: [Ch.4 — 한 메일 한 질문](#chapter-10)

<h1 id="chapter-10">Ch.10 — 한 메일 한 질문 — 교수 시간을 아끼는 학생</h1>

교수가 학생 메일에 답이 늦은 이유는 거의 항상 *교수가 게으르기 때문*이 아니라 *학생이 효율적으로 묻지 못했기 때문*이다. [권창현 교수 「대학원생의 이메일 커뮤니케이션」](https://gradschoolstory.chkwon.net)이 못 박은 이 관점이 이 장의 출발점이다.

[Ch.3 (먼저 베푸는 협업)](#chapter-9)이 협업의 1원칙을 *먼저 베풀고 결과를 기대하지 않기*로 못 박았다면, 이 장은 그 운영의 가장 사소한 단위인 메일 한 통을 본다. 메일은 박사 5년에 걸쳐 *수백 통* 누적되고, 그 누적이 학생 평가의 가장 자주 보이는 표면이 된다. 좋은 학생은 *교수의 시간을 아껴주는 학생*이고, 그 차이는 메일 한 통의 *질문 단위 분리*에서 거의 다 결정된다.

---

## 10.1 좋은 학생의 한 줄 정의

> "교수의 시간을 아껴주는 학생이 좋은 학생이다."
>
> — 권창현 교수, 「대학원생의 이메일 커뮤니케이션」

이 장의 한 문장이다. *능력 있는 학생*이 아니라 *시간을 아껴주는 학생*이라는 정의가 관점을 바꾼다. 능력은 측정에 시간이 걸리고 표면에 잘 드러나지 않는 한편, 시간을 아껴주는가는 메일 한 통에서 즉시 드러난다.

메일이 학생 평가의 *가시 지표*가 되는 이유가 여기 있다. 미팅·세미나보다 빈도가 높고, 누적이 평판으로 굳는다. 한 학기 30~50통의 메일이 누적되는 동안 교수는 *이 학생의 메일은 답하기 쉽다 / 어렵다*의 감각을 굳히고, 그 감각이 다음 학기의 협업·추천서·자리 추천의 입력값으로 들어간다.

답이 늦는 메일에는 공통 특징이 있다. 거의 항상 *질문이 모호하거나*, *맥락이 빠졌거나*, *답변자가 하루 안에 처리할 수 없는 단위*다. 셋 다 학생 쪽 변수인 한편, 교수가 게으른 게 아니라 학생이 답하기 어려운 단위로 보낸 결과다.

이 관점이 학생에게 주는 위안 한 토막이 있다. 답이 늦는 메일은 *내가 미운 게 아니라 내가 답하기 어렵게 보낸 것*이라는 진단이 가능해진다는 것. 진단이 가능하면 다음 메일의 단위를 다시 잡을 여지가 생긴다. 같은 상황을 *내 메일은 왜 답이 안 오는가*의 위화감으로만 두면 다음 메일도 같은 단위로 나간다.

---

## 10.2 한 메일 한 질문

> "질문의 단위를 쪼개면, 그 질문에 대한 대답은 쉽게 얻을 수 있다."
>
> — 권창현 교수, 「대학원생의 이메일 커뮤니케이션」

핵심 메커니즘이다. 한 메일에 *한 질문*, 최대 세 개. 다섯 질문이 섞인 메일은 다섯 질문 모두 답이 늦는다. 받는 사람이 첫 질문에서 막히면 나머지 네 질문은 *답할 차례*가 영영 오지 않는다.

> **한 메일에 한 질문 (최대 세 개).** 다섯 질문이 섞인 메일은 다섯 질문 모두 답이 늦는다.

질문의 *형태*도 같은 단위로 쪼갠다. "어떻게 할까요?"는 답할 수 없는 질문이다. *어떻게*의 가능한 옵션을 받는 사람이 본인 머리에서 다 만들어 줘야 답이 시작되는 까닭이다. 같은 질문을 "A 방향과 B 방향 중 어느 쪽을 먼저 시도할까요?"로 쪼개면 받는 사람의 답이 *one of two*로 줄어들고, 답하는 시간이 분 단위에서 초 단위로 떨어진다.

> **모호한 "어떻게 할까요"를 보내지 않는다.** "A vs B" 같은 *답할 수 있는 단위*로 쪼갠다.

받는 사람의 *인지 부하*를 줄이는 일이 곧 답을 빨리 받는 길이다. 같은 관점을 「연구노트」가 다른 각도에서 본다 — Mensh & Kording 2017 R2의 "loose threads minimization"은 글의 모든 단위에서 받는 사람의 작업 기억을 존중하라는 명제이고, 메일 한 통도 같은 작업 기억 위에서 굴러간다 (자세한 R2 관점은 「연구노트」 측 정독에 있다).

질문을 *답할 수 있는 단위*로 쪼개는 작은 훈련법이 한 줄 있다. 질문을 적은 직후에 본인이 받는 사람의 자리에서 그 질문에 *yes / no* 또는 *one of N* 으로 답할 수 있는지 시뮬레이션한다. 답이 *상황에 따라 다르다* 또는 *생각해 봐야 한다*로 시작되면 그 질문은 아직 쪼개지지 않은 단위다. *어떤 상황에서*, *어떤 옵션 사이에서*를 학생이 본인 손으로 한 번 더 좁혀야 한다.

---

## 10.3 형식의 사소한 표준

질문의 단위를 쪼갠 다음은 형식이다. 형식의 사소한 표준이 *답하기 쉬운 인지 구조*를 만든다.

| 항목 | 표준 | 자주 보이는 미스 |
|---|---|---|
| 인사말 | `Dear Dr. [Last]` | `Hi Prof.` / `Hello` (분야·문화 미스매치) |
| 본문 1단위 | 배경 1-2문장 | 배경 없이 바로 질문 |
| 본문 2단위 | 시도한 것 1-2문장 | "안 됩니다"의 모호한 한 줄 |
| 본문 3단위 | 질문 1문장 (최대 3) | 다섯 질문이 섞인 단락 |
| 마무리 | `Best Regards,` + 서명 블록 | 서명 없음 / 매 메일마다 다른 형식 |
| 제목 | 본문 주제와 일치 | `Figure` / `Question` 같은 1-단어 제목 |

본문의 *3 단위*가 핵심이다. 배경 → 시도 → 질문의 순서가 답하기 쉬운 인지 구조에 가깝다. 받는 사람이 첫 1~2문장에서 *어느 figure의 어느 부분*인지 잡고, 다음 1~2문장에서 *학생이 이미 무엇을 시도했는지* 잡고, 마지막 1문장에서 *무엇을 결정해 주면 되는지* 잡는다. 이 순서가 깨지면 받는 사람은 1단위와 2단위를 본인이 다시 짜 맞춰야 하고, 그 짜 맞추는 시간이 답을 늦춘다.

서명 블록은 매 메일마다 같은 형식으로 둔다. 본인 이름·소속·연구실의 한 블록이 모든 메일의 끝에 붙는다. 매 메일마다 다른 형식이 들어가면 검색·재방문 시 학생을 식별하는 비용이 양수로 점프한다.

> 본문 3 단위 표준: *배경 → 시도 → 질문*. 이 순서가 답하기 쉬운 인지 구조다.

> 메일 제목과 본문 주제를 일치시킨다. 검색·재방문 비용을 0으로 둔다.

분야 쪽 논의에서 같은 *시도 단위*가 한 줄로 잘려 들어온다.

> *"안 돼요"는 보고가 아니다. "무엇을 예측해서, 무엇을 어떻게 했는데, 예상과 달리 어떤 결과가 나왔다"라고 말해야 한다.*
>
> — robotics-practice ch21 § 생존 마인드셋

이 한 줄이 *시도 1~2문장*의 관점을 학생 측 발화 단위로 옮긴 변주다. 메일이든 미팅이든, *안 됩니다*의 한 줄은 받는 사람 머리에서 *무엇이 어디서 어떻게* 안 됐는지를 다시 짜 맞추게 만드는 입력이다. 짜 맞추는 비용이 답하는 비용보다 크면 답이 늦거나 빠진다. 같은 관점이 교수에게도 선배에게도 똑같이 적용된다 — *예측 → 시도 → 결과의 어긋남*의 3 단위가 보고의 최소 단위가 된다.

---

## 10.4 좋은 메일 vs 나쁜 메일

권창현 교수가 같은 글에 박은 두 사례를 표 한 장으로 본다. 좋은 예의 제목·나쁜 예의 제목과 본문은 권창현 교수 글의 영어 원문을 따른다. 좋은 예의 본문은 *배경 → 시도 → 질문* 구조가 보이도록 조금 더 풀어 쓴 예시다.

| | 좋은 메일 | 나쁜 메일 |
|---|---|---|
| **제목** | `quick question for XXXXX case study` | `Figure` |
| **본문** | `Dear Dr. Lastname,` <br><br> `I'm working on the XXXXX case study and reached the section on the boundary condition. I tried two approaches: (a) fixing the upstream pressure to the measured value, (b) fixing the mass flow rate.` <br><br> `Approach (a) gives a stable solution but the downstream profile mismatches Fig. 3 of [paper]. Approach (b) reproduces Fig. 3 but the solver oscillates.` <br><br> `Quick question — is it acceptable to start with (a) for the draft and add (b) as a sensitivity check, or do you want (b) first?` <br><br> `Best Regards,` <br> `[Name, lab, affiliation]` | `Hi,` <br><br> `Please check the diagram. It's not the same as we expected.` <br><br> `Thanks.` |

좋은 메일에는 세 단위가 다 있다. 배경(*XXXXX case study의 boundary condition 섹션*) — 시도(*approach a, approach b 두 시도와 각각의 결과*) — 질문(*draft에는 a로 가고 b는 sensitivity check로, 아니면 b 먼저?*). 받는 사람이 본문을 한 번 읽고 *one of two*로 답할 수 있는 모양이다.

나쁜 메일에는 셋 다 없다. *어느 figure*인지 — *어느 diagram*인지 — *무엇이 expected가 아닌지* — 셋 다 빠져 있다. 받는 사람이 답하려면 본인이 그 셋을 다시 추적해야 하고, 추적 비용이 답할 시간보다 크면 메일은 답이 안 돌아온다.

두 메일의 차이는 *학생 능력*이 아니라 *수신자 인지 부하*에 대한 자각에 있다. 자각은 학습 가능하다. 본인의 메일을 보내기 직전에 *받는 사람이 이 메일만 보고 답할 수 있는가*를 한 번 묻는 습관이 두 사례의 분기점을 만든다.

자각의 보조 도구로 *24시간 후 다시 읽기*가 있다 — [Part 2 Ch.2](#chapter-5)에서 이미 쓴 단위다. 보낸 직후의 메일은 본인 의도가 글자에 덧입혀져 보이는 한편, 24시간 후의 본인은 그 메일을 처음 읽는 교수에 가깝다. 그 시점에 *어느 figure*인지 안 잡히면 교수도 안 잡혔다는 뜻이고, 그 메일은 *이미 보낸 메일*에 대한 후회 자료로 굳는다 — 다음 메일의 단위를 잡을 입력값이 된다.

---

## 10.5 메일 너머 — 직접 만남이라는 관점

메일은 *짧고 답하기 쉬운 단위*만 담는 도구다. 길게 설명할 내용은 메일이 아니라 *직접 만남*으로 옮긴다 — 권창현 교수의 명시 권고다. 메일에서 길게 설명하면 받는 사람의 인지 부하가 다시 커지고, 결국 답이 늦거나 빠진다.

서로 다른 주제는 *별도 메일*로 보낸다. 한 메일에 두 주제가 섞이면 한 주제는 답이 안 돌아온다. 첫 주제에서 답이 끝났다고 받는 사람이 *send*를 누르는 한편, 두 번째 주제는 머리에서 휘발된다. 메일을 다시 보내면 *방금 보냈는데 또 보내네*의 인상이 남는 한편, 별도 메일로 처음부터 보낸 경우와는 다른 인상이 남는다.

> 길게 설명할 내용은 메일이 아닌 만남으로 옮긴다. 서로 다른 주제는 별도 메일로 보낸다.

메일 한 통이 *같이 일하는 단위*다. 박사 5년 동안 교수와의 협업은 수백 통의 메일 위에 굴러가고, 한 통의 단가를 줄이는 일은 5년 누적에서 *교수가 같이 일하기 편한 학생*이라는 평판으로 돌아온다. 이 장의 한 줄 정의(§1)가 거기서 회수된다.

---

이메일은 도구다. 도구의 단가가 학생 평가에 직접 옮겨 적힌다 — 이 장의 관점이다. 도구의 단가를 줄이는 학습이 박사 5년의 평판을 한 단위씩 끌어올린다. 다음 챕터는 도구의 단가가 *반대 방향*으로 어떻게 커지는가를 본다 — 도구를 늘리는 일이 그 자체로 진척처럼 느껴지는 함정.

**출처.** [권창현 교수 「대학원생의 이메일 커뮤니케이션」](https://gradschoolstory.chkwon.net)이 1차. 좋은 학생 정의·한 메일 한 질문·형식 표준·좋은 메일 제목과 나쁜 메일 제목·본문 원문 인용, 모두 여기서 가져왔다. 좋은 메일의 본문 sample은 같은 *배경 → 시도 → 질문* 관점에 맞춰 재구성. R2 cognitive load 1-sentence cite는 [Mensh & Kording 2017 rule 2](https://doi.org/10.1371/journal.pcbi.1005619), 자세한 관점은 「연구노트」 측 정독. robotics-practice ch21 § 생존 마인드셋 — *"안 돼요"는 보고가 아니다*의 분야 쪽 논의. "메일이 학생 평가의 가시 지표"라는 관점과 "메일 한 통 = 같이 일하는 단위" 표현은 이 장에서 정리했다.

다음: [Ch.5 — 도구의 함정](#chapter-11)

---

<h1 id="chapter-11">Ch.11 — 도구의 함정 — 장비병과 가짜 진척</h1>

[Ch.4 (한 메일 한 질문)](#chapter-10)에서 *교수 시간을 아끼는 학생*의 관점을 본 흐름이 이 장의 출발점이다. 메일 한 통의 단위가 교수 시간을 아낀다면, 이 장의 단위는 *본인의 5년*에 있다. 같은 학생이 본인의 시간을 어떻게 쓰는가 — 더 정확히는, 본인이 *연구 시간을 쓰고 있다고 믿는 시간*이 정말로 연구 시간인가. 새 GPU가 들어왔다. 새 라이브러리를 셋업했고, 새 센서를 테이블에 올렸다. 그 한 주는 *진척이 있는 것 같은 감각*으로 가득 찬다. 다만 그 감각의 대부분은 연구 진척이 아니라 *셋업 진척*이다. 이 장은 그 분기를 본다.

권창현 교수가 「연구와 장비병」에서 묶은 함정의 이름이 *장비병*이다. 사진 취미생의 비싼 렌즈 컬렉션과 박사 연구실의 새 GPU·라이브러리·센서 컬렉션이 같은 메커니즘 위에서 굴러간다는 진단이다. 좋은 사진이 비싼 렌즈에서 나오지 않듯, 좋은 연구도 새 도구에서 나오지 않는다. *좋은 방법은 좋은 문제 뒤에 따라온다*는 한 줄이 장의 관점이다.

---

## 11.1 셋업 시간은 연구 시간이 아니다

새 도구가 손에 들어오면 *진척의 감각*이 강하게 든다. 화면이 바뀌고, 결과 폴더가 늘어나고, 명령어 history가 쌓인다. commit log의 줄 수가 한 주 만에 두 자리에서 세 자리로 넘어간다. 이 감각이 강한 이유는 *결과의 가시성*에 있다. 셋업은 한 줄 명령어로 진행 상태를 본인이 즉시 확인할 수 있는 작업인 한편, 연구의 진척 — 가설이 맞았는가, 문제 정의가 더 좁혀졌는가, baseline과의 거리가 줄어들었는가 — 은 한 주 안에 가시화되는 일이 거의 없다.

이 비대칭이 함정을 만든다. 가시성이 높은 작업은 *진척의 감각*을 즉시 돌려주는 한편, 가시성이 낮은 작업은 한 주 동안 아무 신호도 돌려주지 않는다. 본인이 어느 작업에 시간을 쓰고 있는지를 의식하지 않으면, 손은 자연히 가시성이 높은 쪽으로 흘러간다. 그 결과는 한 학기가 셋업으로 끝난 채 *문제 정의는 첫날과 같은 한 줄*인 풍경이다.

> **셋업 진척**과 **연구 진척**은 분리해 적는다. 한 주의 마지막에 두 칸을 따로 채운다 — *이번 주 셋업으로 진척한 것*과 *이번 주 연구로 진척한 것*. 후자가 한 글자도 안 적힌 주가 한 달 안에 두 번이면 신호다.

가짜 진척의 신호 세 가지를 둔다. 첫째, 한 주 동안 *문제 정의*가 한 글자도 바뀌지 않은 채 commit log만 세 자리로 늘었다. 둘째, 결과 폴더는 늘어났는데 *figure 목록*는 첫 주의 그대로다. 셋째, 발표 자리에서 *셋업 이야기*가 본문의 70%를 넘는다. 셋이 한 학기에 두 번 이상 겹치면 그 학기는 셋업 학기였지 연구 학기는 아니었다.

> **셋업 시간은 연구 시간이 아니다.** 일정표·진도 점검에서 두 시간을 분리해서 적는다. 같은 칸에 합쳐 적으면 셋업이 연구를 가리는 풍경이 학기 단위로 굳는다.

> 매주 1회 *지난 7일의 시간 분배*를 점검한다 — 셋업·문제 정의·실험·해석의 4 칸. 셋업이 50%를 넘으면 신호고, 두 주 연속이면 다음 주의 첫 항목은 셋업 중단이다.

청진기 비유가 *문제 정의가 도구를 정한다*의 관점이라면, 분야 쪽 논의에서는 같은 함정이 *셋업 완성주의*의 모양으로 굳는다.

> "좋은 환경을 미리 완성하려 한다. 도커가 완벽해야, GPU가 세팅돼야, 데이터셋이 다운로드돼야 시작할 수 있다는 마음은 2~3주를 잡아먹는다. 선배의 환경을 복사하고 돌아가는 코드를 먼저 한 줄 바꿔 보는 것이 빠르다. 세팅은 문제가 생길 때 배우면 된다."
>
> — robotics-practice ch22 § 22.3

청진기 한 개의 관점이 분야 쪽 논의에서 *돌아가는 선배 환경 + 한 줄 수정*으로 적용 사례된 모양이다. 도구는 깊이 익히되, 도구 세팅이 작업의 시작을 지연시키지 않는다. 셋업이 *완성된 다음에야* 연구가 시작된다는 관점은 거꾸로다 — 작업이 굴러가는 동안 셋업의 부족분이 드러나고, 그 부족분이 셋업의 다음 단계를 정한다.

같은 분야 쪽 논의에서 한 줄로 잘려 들어오는 권고가 있다.

> "거대한 시스템을 이해하려 하지 말고, 작은 코드 조각부터 돌려보자. '이 함수가 뭘 하는지' 하나만 이해해도 진전이다."
>
> — robotics-practice ch21 § 생존 마인드셋

이 한 줄이 *셋업 완성주의*의 다른 얼굴인 *이해 완성주의*를 자른다. 1년차에 ORB-SLAM3 전체 구조를 한 번에 이해하려는 시도는 셋업이 완성된 후에 연구를 시작하려는 패턴과 같은 메커니즘이다 — 둘 다 *완성된 입력*을 작업의 전제 조건으로 둔다. *작은 한 함수*에서 시작해 거기서부터 부족분을 채우는 순서가 같은 관점의 다른 단위 적용이다.

---

## 11.2 좋은 방법은 좋은 문제 뒤에 따라온다

> *"좋은 방법은 좋은 문제 뒤에 따라온다."*
>
> — 권창현 교수, 「연구와 장비병」

이 한 줄이 이 장의 한 문장이다. 함의는 *순서*에 있다. 문제 → 방법의 순서가 정상이고, 방법 → 문제의 순서는 거꾸로 된 추론이다. 거꾸로 된 추론의 가장 흔한 형태는 새 도구를 손에 든 학생의 한 질문 — *"이 기법을 어디 적용할까?"* 다.

이 질문이 왜 거꾸로인가. 작업의 출발점이 *풀어야 할 문제*가 아니라 *손에 든 도구*에 있는 까닭이다. 도구가 출발점이면 문제는 그 도구가 닿을 수 있는 범위 안에서 골라진다. 결과는 *도구의 한계가 곧 문제의 한계*가 되는 작업이다. 그래서 좋은 문제는 도구의 한계와 무관하게 정의돼야 하고, 그 문제 정의를 만족시키는 도구가 그 다음 단계에서 골라진다. 순서가 뒤집힌 작업은 처음에는 부드럽게 굴러가지만 1~2년이 지나면 *문제의 모양 자체*가 도구에 맞춰 깎인 흔적을 드러낸다.

문제가 없을 때 도구만 늘어나는 풍경이 학기 단위로 보인다. 새 라이브러리 다섯 개, 새 데이터셋 두 개, 새 GPU 한 대. 그리고 *해결 중인 문제 목록 0개*. 도구의 목록은 본인의 GitHub stars와 lab 위키에 명확하게 적히는 한편, 문제의 목록은 어디에도 적히지 않은 채로 한 학기가 끝난다. 이 비대칭이 가짜 진척의 가장 깨끗한 신호다.

「연구노트」 Part 0 ch02가 같은 관점을 *작업 차원*에서 본다. 파인만 3-step의 첫 줄 *"Write down the problem"*이 이 장의 관점을 뒷받침한다 — 문제가 한 줄로 적히지 않은 상태에서 도구가 먼저 손에 들어오면, 그 도구는 첫 줄이 비어 있는 알고리즘의 두 번째·세 번째 줄에 닿지 못한 채로 굴러간다. 두 책의 관점이 다른 깊이에서 같은 것을 가리킨다.

> **문제 → 도구의 순서를 뒤집지 않는다.** *"이 기법을 어디 적용할까"*의 사고는 시작 단계부터 빨간 신호다.

> 새 도구가 손에 들어왔을 때 *어느 문제를 풀려고 들였는지*를 한 줄로 적는다. 한 줄이 적히지 않으면 도구를 보류한다. 한 줄을 적기 위해 도구를 먼저 들이는 추론이 거꾸로다.

분야 쪽 논의에서는 *직접 짜기*와 *자동화 도구에 맡기기*의 두 극단이 같은 함정의 다른 얼굴이다.

> "전부 직접 짜려 한다. 2026년 기준으로 ORB-SLAM3도 Colmap도 Gaussian Splatting도 전부 공개돼 있다. 직접 짠다는 결정은 교육 목적이거나 정말 새로운 기여가 있을 때만 의미가 있다."
>
> — robotics-practice ch22 § 22.3

> "코드 작성 도구는 설계된 방향으로 빠르게 가 주지만, 방향이 틀리면 틀린 방향으로 빠르게 간다. 수식과 알고리즘의 뼈대를 모르면 자동화 도구의 제안이 맞는지 판단할 수 없다."
>
> — robotics-practice ch22 § 22.3

두 박스가 같은 관점을 두 극단에서 가리킨다. 모든 줄을 직접 짜는 학생은 *문제*에 도달하기 전에 1년을 셋업으로 쓰고, 모든 줄을 자동화 도구에 맡기는 학생은 *방향이 틀린 채로 빠르게 가는* 작업을 한 학기 동안 굴린다. 이 장의 *문제 → 도구* 순서가 두 극단 모두에 적용된다 — 직접 짜는 코드도, 자동화 도구가 짜 주는 코드도, *어느 문제를 풀려고 짜는가*의 한 줄 위에서 비로소 의미를 갖는다.

---

## 11.3 학문적 리더와 기술적 리더

> *"당신은 학문적 리더가 되고자 하는 것이지 기술적 리더가 되려는 것이 아니다."*
>
> — 권창현 교수, 「연구와 장비병」

이 한 줄이 박사 과정의 *목표 좌표*를 정한다. 학문적 리더와 기술적 리더는 시간 사용이 다르다. 학문적 리더는 *문제 정의·해석*에 시간을 쓰는 한편, 기술적 리더는 *도구 운용·최적화*에 시간을 쓴다. 두 리더가 어느 쪽이 더 가치 있는가의 비교가 아니라 — 박사 과정 5년의 *결과물이 어느 쪽인가*의 분기다.

박사 학위는 새 *문제*를 정의하고 그 문제에 새 *해석*을 단 사람에게 주어진다. 새 *도구*를 만들고 그 도구의 성능을 *최적화*한 사람에게 주어지는 것이 아니다. 도구 제작과 최적화는 박사 과정 안에서 *수단*으로는 등장하지만 *결과물*은 되지 않는다. 결과물의 좌표가 학문적 쪽에 있는데 시간 사용이 기술적 좌표에 묶여 있다면, 그 학생은 5년 끝에 *졸업 가능성과 시간 사용이 어긋난* 풍경에 마주친다.

분기는 일상의 작은 결정에서 굳는다. 한 주의 시간 분배가 *논문 한 편을 더 읽는 데*가 아니라 *새 라이브러리 의존성 충돌을 푸는 데* 쓰이고, 발표의 첫 슬라이드가 *문제 정의*가 아니라 *셋업 환경*에서 시작하고, 미팅에서 가장 오래 이야기한 항목이 *해석의 한 후보*가 아니라 *베이스라인 코드의 한 버그*다. 한두 번이라면 정상이지만, *디폴트*가 그쪽이라면 본인이 어느 리더 좌표에 가까워지고 있는지가 그 자리에서 정해진다.

박사 과정의 목표 좌표는 명시한다. 둘 다라는 답은 관점을 흐릴 뿐이다. 학문적 리더가 1차 목표라면 도구 운용은 *최소한의 수단*에서 멈추고, 그 시간이 문제 정의·해석으로 옮겨간다. 기술적 리더가 1차 목표라면 박사 과정이 그 목표에 맞는 길인지 그 자체가 한 번 점검돼야 한다 — 산업 현장의 5년이 그 좌표에 더 가까운 경우가 흔하다.

> 박사 과정의 *목표 좌표*를 본인의 노트 첫 페이지에 한 줄로 적는다 — 학문적 리더 / 기술적 리더 / 모르겠음. 셋 중 모르겠음이 한 학기를 넘어가지 않게 둔다.

---

## 11.4 청진기 일화 — 도구의 비대칭

권창현 교수가 같은 글에서 든 일화 한 편이 관점을 압축한다. 일본의 한 공장이 원인 모를 소음에 시달렸다. 첨단 음향분석 장비를 동원해 주파수 스펙트럼을 측정하고, 진동 센서를 여러 곳에 붙이고, 데이터를 컴퓨터로 분석했지만, 원인은 잡히지 않았다. 외부에서 부른 일본인 전문가는 첨단 장비를 들고 오지 않았다. 대신 *청진기 한 개*를 들고 와서 공장 이곳저곳을 짚어보았고, 한 시간 안에 원인이 나왔다.

이 일화가 가리키는 것은 *작은 도구가 좋다*가 아니다. 관점을 그쪽으로 옮기면 일화 그 자체가 자기모순이 된다 — 청진기보다 더 작은 도구는 무수히 많고, 어느 작은 도구든 첨단 장비를 이긴다는 결론은 성립하지 않는 까닭이다. 일화의 진짜 관점은 오히려 *문제 정의가 도구를 정한다*에 있다. 첨단 음향분석 장비는 *주파수 스펙트럼이 문제다*라는 정의 위에서 작동했고, 청진기는 *어느 부위에서 어느 종류의 소리가 나는가가 문제다*라는 다른 정의 위에서 작동했다. 후자가 정확한 정의였고, 그 정의에 맞는 도구가 청진기였을 뿐이다.

연구실에서 같은 메커니즘이 굴러간다. *베이스라인 정확도가 떨어진다*는 정의 위에서 새 GPU와 더 큰 모델이 도구로 골라지는 한편, *어느 시퀀스의 어느 프레임이 어떤 식으로 깨지는가*라는 정의 위에서는 시각화 한 장과 frame-by-frame 디버깅이 도구로 골라진다. 두 정의 모두 가능하지만, 후자에서 새 GPU는 처음부터 등장하지 않는다. 도구가 답을 정한다는 관점이 거꾸로다 — 정의가 도구를 정하고, 도구는 정의의 결과다.

> 본인의 작업이 막혔을 때 *문제 정의가 정확한가*를 먼저 의심한다. 도구의 우열을 의심하는 것은 그 다음이다. 도구를 바꿨는데 같은 막힘이 반복된다면, 막힘은 도구가 아니라 정의에 있다.

## 11.5 사진 취미 비유 — 장비와 결과물의 분리

> *"장비병은 사진 취미만의 병이 아니다."*
>
> — 권창현 교수, 「연구와 장비병」

이 한 줄이 관점을 일반화한다. 사진 취미생의 풍경을 한 번 본다. 비싼 렌즈를 갖췄고, 풀프레임 바디를 두 대 갖췄고, 카본 삼각대와 ND 필터 세트도 갖췄다. 그리고 *좋은 사진*이 나오지 않는다. 좋은 사진은 장비에서 나오지 않고 *피사체와 빛*에서 나온다는 사실이 이 풍경을 정리한다. 장비는 좋은 피사체를 *찾는 일*도, 좋은 빛이 드는 곳에 *서는 일*도 대신해 주지 않는 까닭이다.

연구도 같은 곳에 선다. 새 GPU는 좋은 문제를 *찾는 일*을 대신해 주지 않고, 새 라이브러리는 좋은 가설을 *세우는 일*을 대신해 주지 않고, 새 센서는 좋은 실험 설계를 *짜는 일*을 대신해 주지 않는다. 결과물의 품질을 정하는 입력은 *문제와 가설*이고, 도구는 그 입력 위에서 골라진 수단이다. 장비병이 사진 취미만의 병이 아닌 이유는 메커니즘이 같은 까닭이다 — 결과물에서 *결과물을 만드는 입력*으로 시선이 가야 할 때, 가시성 높은 *수단*에 시선이 묶이는 함정.

사진 취미의 자기 진단법을 그대로 옮길 수 있다. 지난 한 달의 *좋은 사진* 다섯 장을 추려 본다. 추려지지 않으면 한 달을 장비 구매와 셋업에 썼다는 뜻이다. 연구도 같다. 지난 한 학기의 *좋은 결과* 다섯 개를 추려 본다 — 새 가설 하나, 좁혀진 문제 정의 하나, 깨진 가설 하나, 베이스라인보다 명확히 좋은 결과 하나, 메커니즘 한 줄. 다섯 개가 추려지지 않으면 그 학기는 장비 학기였지 연구 학기는 아니었다. 비싼 렌즈 컬렉션 옆에 좋은 사진 한 장이 걸려 있어야 하듯, GPU·라이브러리·센서 목록 옆에 결과의 목록이 같은 길이로 자라야 한다.

> 한 학기 끝에 *지난 학기의 좋은 결과 5개* 목록을 본인이 직접 적는다. 적히지 않으면 다음 학기의 첫 항목은 *셋업 추가가 아닌 결과 추가*다.

---

가짜 진척의 가시성이 진짜 진척의 가시성보다 높다는 사실이 이 장의 함정을 만든다. 셋업은 한 시간 안에 결과를 보여주는 한편, 연구는 한 학기 안에도 결과를 보여주지 않는 일이 흔하다. 이 비대칭은 본인의 의식적 분리 없이는 사라지지 않는다.

다섯 가지를 둔다 — 셋업 칸과 연구 칸을 나눠 적고, 문제 → 도구의 순서를 지키고, 학문적 리더의 좌표를 명시하고, 청진기 일화의 관점을 *문제 정의가 도구를 정한다*로 잡고, 한 학기의 결과 5개를 직접 적는다. 다섯 모두 일상의 작은 결정이지만, 5년 누적이 학문적 리더와 기술적 리더의 분기를 만드는 입력값이다.

같은 관점을 「연구노트」 Part 0 ch02가 *문제 → 알고리즘 → 검증*의 3-step 차원에서 본다. 이 장이 *일상의 시간 분배*에서 함정을 본다면, 「연구노트」 쪽은 *작업 한 단위*에서 같은 함정을 본다. 두 챕터를 함께 보면 같은 관점이 일상과 작업의 두 층위에서 반복된다.

<h1 id="chapter-12">Ch.12 — 연구자의 다층 역량 — 실험만으로는 부족하다</h1>

[Ch.5 (도구의 함정)](#chapter-11)이 *문제 → 도구*의 순서를 봤다면, 이 장은 그 한 단계 위에서 시간 분배를 본다. 박사 과정에서 가장 흔한 자기 정의는 *나는 실험을 잘하는 사람*이다. 이 정의로 5년을 살면 졸업 즈음의 *천장*이 빠르게 온다. 천장은 능력의 한계가 아니라 *자질 분포의 비대칭*이 만든 운영의 한계다. 실험은 좋은데 글쓰기가 평균 이하면 그 실험은 publish되지 않고, 발표가 평균 이하면 사람이 모이지 않는다.

최윤섭 박사는 「좋은 연구자란 무엇인가」에서 연구자를 *한 사람의 종합 예술가*로 부르고, 엄태웅 작가는 「대학원생의 4가지 덕목」에서 *연구실 운영 = 스타트업 경영*이라는 한 줄로 같은 결론에 닿는다. 두 글의 시야가 다르지만 관점이 같다 — 실험만으로는 부족하다. 이 장은 최윤섭 박사의 5 자질과 엄태웅 작가의 4 덕목을 같은 평면에 놓고, 박사 과정 5년을 *어느 자질·덕목에 어느 정도 시간을 분배할 것인가*의 운영 문제로 본다. *연구는 절대 혼자 하지 않는다*는 관점이 모든 자질을 관통한다.

## 12.1 종합 예술가라는 관점

> *"연구자는 한 사람의 종합 예술가다."*
>
> — 최윤섭 박사, 「좋은 연구자란 무엇인가」

이 한 줄이 이 장의 한 문장이다. 종합 예술가의 함의는 *결합 출력*에 있다. 5 자질·4 덕목은 각자 독립이 아니라 한 사람의 결과물 안에서 결합된다. 실험 결과는 그 자체로 외부에 닿지 않고 *글쓰기를 통과해야* publish되며, 글이 publish되어도 *발표를 통과해야* 사람이 모인다. 실험이 90점이고 글쓰기가 50점이면 결합 출력은 90점이 아니라 — 50점에 가까워진다. 결국 가장 약한 자질이 결과물의 천장을 정한다.

*실험만 잘하는 박사*가 졸업 직전 마주치는 천장이 이 메커니즘에서 나온다. 한 학생이 5년 동안 실험·코드·디버깅에만 시간을 쓰면 그 자질은 95점이 될 수 있다. 다만 글쓰기·발표·협업이 50점에 머문다면 그 95점이 외부에 전달될 통로가 없다. 같은 결과의 두 학생 중 *전달 채널*을 운영한 학생이 임용·collaboration·초청에서 다른 5년을 만든다. 천장이 정해지는 곳은 *실험의 한계*가 아니라 *전달의 한계*다.

> **자기 정의를 *실험만*에 묶지 않는다.** 박사 5년의 결과는 5 자질·4 덕목의 결합 출력이고, 가장 약한 자질이 결과의 천장을 정한다.

## 12.2 최윤섭 박사의 5 자질

최윤섭 박사는 연구자의 자질을 다섯 칸으로 정리한다. 다섯 자질이 모두 평균 이상이어야 한다는 명제가 아니라, *어느 칸이 본인의 약점인지*를 본인이 알아야 한다는 명제다. 약점을 모르면 강점만 더 키우는 시간 분배가 되고, 결합 출력의 천장은 약점에서 정해지는데 시간은 강점에서 쓰이는 어긋남이 누적된다.

| 자질 | 일상의 단위 | 평균 이하의 신호 | 작업 차원의 풀 깊이 |
|---|---|---|---|
| **실험 설계·데이터 분석** | 가설 → 실험 → 측정 → 해석 한 사이클 | 결과는 있는데 *왜 그렇게 나왔는지*가 한 줄로 안 적힘 | 분야 핵심 자질 — 여기서 결과 그 자체가 만들어진다 |
| **학술 글쓰기 (영문)** | abstract·intro·method·result 한 단락 | 한 문단을 쓰는 데 한 시간 이상 / 첫 문장이 항상 비슷한 형태 | 「연구노트」 Part 2 전체 |
| **시각적 표현** | figure·diagram·일러스트 한 장 | figure 1이 *한 눈에* message를 전달하지 못함 / 색·축·legend가 매번 새로 결정 | 「연구노트」 Part 2 reader expectations 챕터 |
| **학회 발표** | 5분 lightning·15분 oral·1시간 invited | 첫 마디·마지막 마디가 매번 새로 만들어짐 / 슬라이드 수·시간 매번 어긋남 | 「연구노트」 Part 3 (학회 ROI·사전 준비·첫 마디) |
| **협업·리더십** | outline 한 장, 미팅 한 시간, 메일 한 통 | 본인 손에서 delta가 안 나옴 / 후배가 본인에게 안 묻는다 | 「연구노트」 Part 0 ch03 (주도권 이동) |

5 자질은 박사 과정 5년이라는 시간 위에서 *고르게* 자라지 않는다. 첫 1~2년은 실험·데이터에 시간이 몰리고, 3년차에 학술 글쓰기가 처음으로 본격 자리를 잡고, 4~5년차에 발표와 협업·리더십이 비중을 키운다. 시각적 표현은 1~2년차의 figure 한 장에서 시작해 5년차까지 매년 자란다. 이 곡선이 *자연스럽게* 굴러가는 학생은 드물다. 본인이 의식하지 않으면 1년차의 시간 분배(실험 90 / 나머지 10)가 5년차까지 그대로 굳어, 졸업 즈음 글쓰기와 발표에서 천장이 노출된다.

학술 글쓰기 자질의 *작업 차원* 풀 깊이는 「연구노트」 Part 2 전체에 있다. 이 장에서는 *왜 이 자질이 분리되지 않는가*의 관점만 본다 — 글쓰기는 실험 결과를 외부에 전달하는 *유일한* 채널이고, 이 채널이 평균 이하면 다른 네 자질의 결과가 외부에 도달하지 않는다. 채널 그 자체가 막혀 있는 풍경이다.

> **출판이 충분조건이 아니다.** 출판된 결과를 *외부에 전달하지 않는 일*은 결과의 절반을 버리는 일이다. 출판은 채널 한 개고, 채널 한 개로 결과의 절반만 외부에 도달한다.

---

## 12.3 엄태웅 작가의 4 덕목

엄태웅 작가는 같은 풍경을 다른 시야에서 본다. 최윤섭 박사가 *연구자의 자질*을 봤다면, 엄태웅 작가는 *연구실 운영의 덕목*을 본다. 두 시야의 결론이 한 곳에 닿는다 — 실험만으로는 부족하다.

| 덕목 | 일상의 단위 | 평균 이하의 신호 | 5년 누적의 결과 |
|---|---|---|---|
| **커뮤니케이션** | 메일 한 통, 미팅 한 시간, 랩 안 일상 대화 | 같은 질문이 두 번 반복 / 메일 답변이 24시간 넘는 일이 잦음 | 평판·신뢰의 누적 — 다음 학기 collaboration 제안 수에 직결 |
| **비즈니스·정치 감각** | 연구비 신청서 한 장, project ownership 한 줄, 랩 운영의 의사결정 | 본인이 *모르는 사이에* project가 결정됨 / 누가 누구의 line인지가 안 보임 | 임용·산업 자리에서 운영 가능성을 결정 |
| **마케팅·퍼스널 브랜딩** | SNS 한 글, 블로그 한 편, 코드 공개 한 repo | publish는 했는데 *그 결과를 본 사람*이 lab 안 5명 / 본인 이름으로 검색되는 항목이 없음 | 같은 결과의 두 학생 중 다른 5년을 만든다 |
| **관계 관리** | 가족·연애·동기·주변 사람과의 일상 | 한 주 동안 lab 밖 누구와도 안 만남 / 주말 일정이 매번 *결과로* 비어 있음 | 박사 5~7년이 인생 중대 시기와 겹친다 — 관계 안정이 생산성에 직결 |

4 덕목은 *연구를 위한 부속품*이 아니다. 엄태웅 작가의 관점은 4 덕목 그 자체가 *연구실 운영의 단위*라는 점에 있다. 연구실은 한 학생이 실험만 잘 굴리는 곳이 아니라, *팀·자원·외부 인지도·후속 채용*이 함께 굴러가는 작은 운영 단위다. 그 운영의 시간 분배가 본인의 5년에 그대로 반영된다.

> *"연구실 운영은 스타트업 경영과 같다."*
>
> — 엄태웅 작가, 「대학원생의 4가지 덕목」

이 한 줄의 함의가 강하다. 스타트업이 제품 개발만으로 굴러가지 않듯, 연구실도 실험만으로 굴러가지 않는다. 제품의 가치(실험 결과)만큼 *제품을 외부에 전달하는 채널*(글·발표·SNS·코드 공개), *팀의 운영*(커뮤니케이션·관계 관리), *외부 인지도*(마케팅·퍼스널 브랜딩), *자원 운영*(연구비·정치 감각)이 함께 굴러간다. 5년 끝에 *제품만 있는 학생*과 *제품·채널·팀·인지도·자원이 함께 자란 학생*은 같은 자리에 서지 않는다.

---

## 12.4 *연구는 절대 혼자 하지 않는다*

> *"연구는 혼자 하는가? 답은 '절대 아니다'."*
>
> — 엄태웅 작가, 「대학원생의 4가지 덕목」

5 자질·4 덕목의 모든 항목이 이 한 줄 위에서 굴러간다. 실험은 함께 굴리는 단위가 있고, 글쓰기는 공동 저자의 손이 들어오고, 발표는 청중과의 한 시간이며, 협업·리더십·커뮤니케이션·관계 관리는 정의 그 자체가 *혼자가 아닌 단위*다. 마케팅·퍼스널 브랜딩과 비즈니스·정치 감각도 *외부의 다른 사람들*이 본인의 결과를 보는 곳에서 작동한다.

이 관점이 *출판 이후*의 운영을 정한다. 출판이 끝난 결과를 SNS·블로그·코드 공개로 *외부에 한 번 더 옮기는 일*이 있고, 같은 결과의 두 학생 중 옮긴 학생만 다음 5년의 *초청·collaboration·임용 인터뷰*에서 다른 자리에 선다. 출판이 채널 한 개라면 SNS·블로그·코드 공개가 채널 두~네 개를 더 만든다. 채널이 한 개일 때 외부 도달은 publish 학회 청중의 일부에 그치는 한편, 채널이 네 개일 때 도달은 한 학기 동안 누적된다.

「대학원노트」 [Part 3 ch03 (먼저 베푸는 협업)](#chapter-9)의 give-first 1원칙이 4 덕목 *관계 관리*의 핵심 관점이다. 같은 협업 관점이 이 장의 *연구는 혼자 하지 않는다*와 만난다. 한쪽에서는 협업의 1원칙으로, 다른 쪽에서는 운영의 1원칙으로 같은 관점이 두 번 등장한다. [Ch.4 (한 메일 한 질문)](#chapter-10)의 메일 한 통 단위는 *커뮤니케이션* 덕목의 가장 사소한 단위고, 그 사소한 단위의 5년 누적이 평판을 정한다.

> SNS·블로그·코드 공개 중 *최소 한 채널*은 박사 과정 안에 정기 운영한다. 출판만의 채널 한 개는 결과의 절반을 외부에 도달시키지 못한다.

---

## 12.5 5년 시간 분배의 자기 진단

5 자질·4 덕목을 *현재 점수표*로 만든다. 1~5점, 매년 1회 갱신. 점수의 절대값이 중요한 게 아니라 *가장 낮은 한 칸이 어디인가*가 중요하다. 가장 낮은 한 칸이 곧 *다음 1년의 작업 우선순위*다. 가장 높은 칸을 더 높이는 시간 분배는 오히려 결합 출력의 천장을 더 빨리 부른다 — 이미 95점인 칸을 96점으로 올리는 시간을, 50점인 칸을 60점으로 올리는 데 쓰는 쪽이 결합 출력에 더 크게 작용한다.

진단의 한 양식을 둔다. 9칸(5 자질 + 4 덕목)의 표 한 장을 본인의 노트 첫 페이지에 두고, 매년 학기 시작에 점수를 갱신한다. 그러자면 작년 점수와 올해 점수의 *delta*를 같이 본다. delta가 가장 큰 한 칸이 지난 1년의 *주된 시간 분배가 흘러간 곳*이라는 뜻이고, delta가 0인 칸은 지난 1년 동안 *시간이 닿지 않은 칸*이다. 가장 낮은 칸이 5년 내내 0 delta로 굳어 있다면 그 칸은 본인이 의식적으로 시간을 옮기지 않으면 5년 끝까지 같은 점수에 머문다.

부가 운영의 사소한 관점 두 개를 둔다. 최윤섭 박사가 같은 글에서 적은 일상의 운영이다.

- **월요병 — 일요일 저녁 다음 주 짧은 계획.** 일요일 저녁 30분 안에 다음 주 5일의 *우선 항목 3개*를 적는다. 월요일 아침의 시간 손실(어떤 일부터 할지를 결정하는 데 드는 시간)이 *결정해 둔 채로 시작하는 월요일*에서는 사라진다. 30분의 비용으로 5일이 정렬되는 관점이다.
- **랩미팅 — 발표 전 교수와 사전 협의.** 랩미팅 발표 슬라이드의 첫 버전을 미팅 전날 교수에게 한 번 미리 본다. *갈굼 가능성*이 줄어드는 것은 부수 효과고, 본질은 *미팅 시간의 단가*다. 사전 협의를 거친 슬라이드는 미팅 시간을 *해석·다음 단계*에 쓸 수 있고, 거치지 않은 슬라이드는 *기본 사실의 재확인*에 시간이 묻힌다.

두 운영은 각각 30분·1시간의 단위지만 5년 누적이 크다. 5 자질의 점수표를 매년 갱신하는 일도 한 시간이면 족하다. *사소한 운영의 5년 누적*이 결합 출력의 한 단을 만든다는 관점이 이 장의 마지막에 놓인다.

> 5 자질·4 덕목 점수표를 매년 1회 갱신한다 — 가장 낮은 한 칸이 다음 1년의 우선순위. delta가 0인 칸이 5년 연속이면 그 칸은 의식적 시간 분배 없이는 같은 점수에 머문다.

> 일요일 저녁 다음 주 짧은 계획·랩미팅 사전 협의 같은 *사소한 운영*은 30분~1시간 단위지만 5년 누적이 크다.

---

5 자질·4 덕목·*혼자 하지 않는다*·점수표·사소한 운영의 다섯 단위가 이 장의 운영 관점이다. 이 관점이 박사 5년의 끝에서 *천장이 어디서 정해지는가*를 결정한다. 「연구노트」 [Ch.16 — 마음가짐](../research-notes/guide.html#chapter-16)이 학술 글쓰기 자질의 작업 차원 풀 깊이를 보고, 「연구노트」 [Ch.33 — 학회는 왜 가는가](../research-notes/guide.html#chapter-33)가 학회 발표의 작업 차원을 본다. 「연구노트」 [Ch.3 — 주도권 이동](../research-notes/guide.html#chapter-3)은 협업·리더십 자질이 *outline 교환*에서 어떻게 굴러가는지를 보는 챕터다. 이 장이 *왜 이 자질들이 분리되지 않는가*의 관점을 잡았다면, 「연구노트」 쪽이 각 자질의 작업 단위 안으로 들어간다 — 두 책의 층위가 다른 두 단계지만 관점이 일관된다.

박사 과정의 5 자질·4 덕목이 5년 누적으로 굳는다는 관점은 *시간 분배가 곧 결과*라는 관점과 같다. 그 시간 분배의 가장 안쪽에 *본인의 만족 기준*이 있다 — 외부의 점수표가 아니라 본인이 채점하는 한 줄. 다음 part에서 그쪽을 본다.

<h1 id="chapter-13">Ch.13 — 산업계 진로 분할 — 학계 외 자리의 정합성</h1>

Part 3의 앞 6개 챕터가 박사 5년 안의 *연구 운영*을 다뤘다. 내 연구·시간·give-first·이메일·도구·다재다능 — 여섯 챕터가 모두 *연구 그 자체의 일상 운영*에 묶여 있었다. 이 장은 그 운영이 *학계 외 진로*로 이어지는 분기를 본다. 박사 졸업이 *교수직의 입구*라는 기본 관점이 아닌, *산업계 데이터 사이언스의 한 입구*이기도 하다는 인식.

1차 출처는 유두희 박사 글이다. UC버클리 보건역학 박사 → UN/WHO → 실리콘밸리 데이터 사이언티스트 경로가 이 장의 한 사례로 자주 등장한다. 이 경로를 *예외*가 아닌 *현재의 흔한 입구 중 하나*로 자리매김하는 것이 이 장의 출발점이다.

---

## 13.1 *박사 = 교수* 관점은 기본값이 아니다

박사 졸업 후의 기본 진로가 교수직이라는 관점은 1990년대까지의 관점에 가깝다. 2010년대 이후 박사 졸업자의 *산업계 비중*이 학계 비중보다 큰 분야가 다수다 — CS·통계·biostatistics·물리·화학·재료. 분야에 따라 7:3 / 8:2 비율로 산업계 쪽이 더 큰 경우도 흔하다. 지도교수 본인이 학계에 남은 사람일 가능성이 높은 만큼 lab 안에서 학계 기본 관점을 자주 듣는 한편, 분야 평균은 그 관점과 다르다.

> **박사 졸업 후 학계로 가지 않는 일은 *실패*가 아니다.** 분야에 따라 그쪽이 *기본값*이다. 본인 분야의 *5~10년 졸업생 진로 통계*를 직접 확인해 두는 일이 첫 운영이다.

본인 분야의 통계는 학과 행정실 또는 alumni 자료로 받을 수 있다. 학과 측이 *교수직 진학률*만 강조하는 경우가 자주 있는데, 그 통계 옆의 *산업계 진학률*까지 같이 받아야 관점이 정렬된다. 통계가 6:4·7:3으로 산업계 쪽이 큰 분야라면 본인의 운영도 그 비율에 가깝게 분배된다.

---

## 13.2 유두희 박사 글의 경로

유두희 박사 사례는 *학계 → 국제기구 → 산업계*의 3-step 경로다. UC버클리 보건역학 PhD를 마치고 UN/WHO 단계의 정책·데이터 자리에 합류했고, 그 다음 단계에서 실리콘밸리 데이터 사이언티스트로 옮겼다. 박사의 *통계·인과추론·데이터 운영* 능력이 보건역학이라는 분야 라벨을 떼어내고도 그대로 산업계 데이터 사이언스 자리에 매핑된 사례다.

> 유두희 박사 글의 사례 — *분야 라벨이 아니라 능력의 set*이 산업계 진로와 매핑된다.

유두희 박사가 글의 프롤로그에서 학계 → 학계 외 전환의 결정을 한 줄로 적은 대목이 이 관점의 자료다 — "온 신경과 정열을 다해 사랑한 나의 연구 주제를 접기로 했다" (유두희 박사 글 프롤로그). 박사 분야 그 자체를 *접는* 결정이 학계 외로 옮겨 앉을 때의 첫 단계에 있다는 관점이다. 분야 라벨을 떼어내는 일이 *손실*이 아니라 *능력 set의 재정렬*이라는 관점이 그 뒤에 누적된다.

이 사례 한 편이 이 장의 골격이다. 박사를 *분야 학위*로 보면 학계 외 진로가 *분야 이탈*로 보이는 한편, 박사를 *능력 set*으로 보면 같은 학위가 *여러 진로의 입구*가 된다. 두 관점이 사실은 같은 박사 학위의 두 측면이지만, 어느 관점을 기본으로 두는가가 졸업 시점의 결정을 바꾼다.

---

## 13.3 산업계 진로의 세 갈래

산업계 진로가 *한 가지*가 아니다. 적어도 세 갈래로 나뉘고, 각 갈래의 일상이 갈라진다.

(a) **분야 직접** — 박사 분야가 곧 산업 진로. CV → autonomous driving / 로보틱스 회사, biostat → 제약·헬스케어 회사, NLP → LLM 회사. 박사의 결과·논문·collab 네트워크가 *그대로* 자산이 된다. 일상이 학계 lab과 가장 가까운 갈래.

(b) **분야 간접** — *분석 능력*만 가져가서 다른 분야로 옮김. 보건역학 → 일반 데이터 사이언스 (유두희 박사 글), 물리 → 퀀트, 화학 → 제약 영업·기획. 박사의 *결과 논문*은 자산이 되지 않는 한편, *데이터 운영·통계·문제 정의* 능력은 그대로 작동.

(c) **분야 무관** — PhD가 *학습 능력의 증명서*로 쓰이는 갈래. 컨설팅(McKinsey·BCG·Bain), VC, 정책. 박사 분야와 일의 분야가 거의 무관하지만 *복잡한 문제를 6개월~2년 단위로 운영해 본 경험*이 자산이 된다.

세 갈래의 페이·자율성·분야 친밀도가 비대칭이다. (a)가 분야 친밀도 높지만 페이는 분야에 따라 변동 큼. (c)가 페이 가장 높은 한편, 분야 친밀도는 0에 가까움. (b)가 그 사이의 기본. 본인이 *어느 갈래*를 기본으로 둘 것인가는 박사 3~4년차에 한 번 정렬해 둘 일이다.

---

## 13.4 산업계 *준비*의 시점은 박사 3~4년차

박사 마지막 학기에 산업계 진로 준비를 시작하면 늦다. 업계의 인터뷰·인턴십·LinkedIn 운영은 *졸업 1년 이상 전*부터 누적된다. 박사 3~4년차에 *산업계의 일상*을 알기 시작하는 흐름이 기본 운영이다.

기존 [Part 5 ch02 (교수의 일상을 알기)](#chapter-22)가 *교수직*의 일상 시뮬레이션을 봤다면, 이 장은 그것의 *산업계 층위*에 놓인다. 같은 관점을 그대로 옮겨 쓴다 — 산업계 데이터 사이언티스트 / 엔지니어 / 컨설턴트의 일상이 *어떻게 굴러가는가*를 박사 3~4년차에 알기 시작한다.

운영 도구는 네 가지다.

- **인턴십** — 박사 3~4년차 여름 1~3개월. 분야 직접/간접 모두에서 가장 강한 신호. 본인의 일상이 *그 환경에서 작동하는가*를 직접 점검
- **기업 collab** — 지도교수의 industry collab에 본인이 들어감. 박사 결과를 산업 맥락으로 *번역*해 보는 경험
- **해커톤·데이터 챌린지** — 분야 무관 갈래. *짧은 시간 단위에서의 운영*을 학습. 박사 기본(1~2년 단위)와 산업 기본(분기 단위) 사이의 거리가 좁아짐
- **LinkedIn 운영** — 학계 기본이 *Google Scholar*라면 산업계 기본은 *LinkedIn*. 박사 3~4년차에 시작해 결과·collab·발표를 누적

> 산업계 진로의 *준비*가 박사 4~5년차에 시작되면 *졸업과 입사의 1년 공백*이 기본이 된다. 박사 3~4년차에 시작하면 졸업 시점에 1~2개의 입구가 잡혀 있다.

---

## 13.5 박사 학위가 *덜 쓰이는* 자리

박사가 모든 산업 자리에서 자산이 되지는 않는다. *오버스펙*이 되는 갈래도 있다 — 신입 SWE 자리, 분야 무관 영업 자리, junior 분석가 자리. 여기서 박사 학위는 *비싼 후보*라는 신호로 읽히는 한편, 회사 측이 *3년 안에 떠날 사람*이라는 가정을 기본으로 둔다.

이 환경의 운영 함정은 박사가 *기존 박사 운영*을 산업계에서 *그대로* 가져가려 할 때 자주 등장한다 — 의사결정의 속도, 회의의 빈도, 결과의 단위(논문 → 분기 지표), 글의 분량(15페이지 paper → 1페이지 memo). 박사의 기본 운영을 *잠시 내려놓는* 학습이 산업계 첫 1~2년의 핵심이다. 박사가 산업계에서 무너지는 가장 흔한 지점이 이 *내려놓기 실패*다.

기존 [Part 4 ch04 (통합된 삶)](#chapter-17)이 *방향·엔진·도구*의 세 층위를 봤다. 학계 → 산업계 전환에서는 *방향*은 같은데 *엔진과 도구*가 바뀐다. 방향이 같다는 사실이 전환을 가능하게 만들고, 엔진과 도구가 다르다는 사실이 첫 1~2년의 학습을 만든다.

## 13.6 한 사람이 두 자리를 옮기는 일이 흔해진다

학계와 산업계가 *대칭이 아니라 경로*에 가깝다. 한 사람이 둘 사이를 *한 번 이상 옮기는 일*이 점점 더 흔해지고 있다. 유두희 박사 글의 *학계 → UN → 실리콘밸리* 경로가 그 한 사례. 분야 senior 중에서도 산업계 5~10년 후 학계로 다시 들어온 사람이 늘었고, 학계 5~10년 후 산업계로 옮긴 사람도 늘었다.

이 흐름이 박사 졸업 시점의 *결정의 무게*를 줄인다. 한 직장이 *5년 후의 본인을 묶지 않는다*는 관점이 가능해진다. *지금 이 환경이 작동하는가*에 집중하고, 5년 뒤 다음 결정을 한 번 더 하면 된다.

> **첫 직장이 평생을 결정하지 않는다.** 박사 직후의 결정을 *평생의 결정*으로 보면 결정이 무거워져 운영이 마비된다. 5년 단위의 첫 결정으로 보면 결정이 가벼워져 자리가 잡힌다.

다음 챕터에서는 Part 4로 넘어가 감정과 페이스를 본다. 산업계로 가든 학계로 가든 *5년의 누적 페이스*가 결정의 한 변수로 작동한다.
