## 26.2 진로 갈래 4의 첫 1년

진로 갈래에 따라 첫 1년의 운영 단위가 다르다. 갈래마다 작업의 호흡·평가의 단위·결과 출력의 시점이 다르고, 같은 운영 관점을 네 갈래에 동시에 적용하면 어느 갈래도 작동하지 않는다.

**포닥.** 첫 6개월 — 새 lab의 작업 단위 적응 + 본인 박사 후속 연구 1편. 박사 5년의 hierarchy가 무너지지 않은 단계이고, 새 PI와의 매칭 운영이 [Ch.1 (양방향 관계)](#chapter-4)의 관점과 같은 회로 위에서 다시 작동한다. 차이가 하나 있다 — 학생은 *받는 디폴트*에서 시작하고, 포닥은 *제안하는 디폴트*에서 시작한다. 박사 5년의 운영 자료가 본인 안에 누적된 만큼, 첫 미팅에서 outline의 형태·빈도를 본인이 제안하면서 매칭이 시작된다.

1년차 끝에 다음 단계(faculty job market·산업계) 결정 자료가 있어야 한다. 자료가 비어 있으면 2년차의 운영이 *결정 미루기*로 굳고, 결정 미루기는 3년차의 선택지를 좁힌다. 포닥 1년차에 *2년차 끝의 결정*을 위한 자료 누적이 기본 운영에 가깝다.

**산업계.** 첫 3개월 — onboarding·sprint 호흡 학습. 박사 5년의 *5년 호흡*과 산업계의 *2주 sprint 호흡*의 차이가 가장 큰 마찰 지점이다. 박사가 한 자리 깊이를 5년에 걸쳐 풀어 가는 운영이라면, 산업계 sprint는 결과 한 건을 2주 안에 풀어 *다음 단계*로 옮기는 운영이다. 두 운영이 다른 관점 위에 있어서, 박사 5년 호흡을 산업계 sprint에 그대로 적용하면 한 sprint도 끝나지 않는다.

첫 1년 안에 한 product cycle 1회 도는 일이 기본이다. 1회 돌고 나면 본인의 운영이 sprint 호흡에 한 단계 적응한다. 이 단계에서 본인이 박사 5년에 누적한 *깊이의 자료*가 sprint의 작은 단위에서 어떻게 운영되는가를 익히는 일이 첫 1년의 핵심에 가깝다. [Ch.25 — 산업계 일상](#chapter-25)과 연결.

**교수.** 첫 학기 — 강의 준비·첫 학생 1-2명 선발·첫 grant 제안서. [Ch.2 (professor_daily)](#chapter-22)의 *교수의 일상* 관점이 1년차에 가장 강하게 작동한다. 박사 5년의 *학생*에서 *지도교수*로의 정체성 전환이 가장 큰 굽이라, 1년차에 *학생처럼 행동*하면 본인이 새 학생들에게 본인을 *학생으로* 인식시킨다.

첫 grant rejection이 기본이다. 거절이 노력의 증거(김세정 교수)라는 관점이 여기서 다시 작동한다 — 첫 grant rejection은 *교수의 일을 시작했다*는 신호에 가깝다. 권창현 교수의 *교수처럼 행동*([Ch.2](#chapter-22))이 1년차의 기본 운영이다.

**창업.** 첫 6개월 — 공동창업자·초기 자본·MVP. 박사 시절 *결과 outcome*과 창업의 *현금 흐름*이 다른 축이라는 사실이 가장 큰 마찰 지점이다. 박사 결과는 1-2년 후의 평가를 받는 일이고, 창업의 현금 흐름은 *오늘 잔고*가 답한다. 두 축이 본인 안에서 분리되지 않으면 박사 운영이 창업 운영을 깎는다.

1년차 안에 1차 fundraise 또는 종료 결정. 둘 중 하나가 1년차 끝의 기본에 가깝다. 어느 쪽도 *실패*가 아닌 운영 단위라, 결정의 자료가 본인 안에 누적되어 있어야 한다.

## 26.3 정체성 전환

호칭이 바뀐다. Mr./Ms.에서 Dr.로. 본인이 *박사*로 호칭되는 데 적응하는 1-2개월이 기본이다. 한국에서 *박사님*이라는 호칭이 본인 쪽으로 들어오는 어색함이 1-2개월에 걸쳐 한 단계씩 풀린다. 이 어색함은 작은 신호이지만, 본인 안의 정체성 전환이 *시작된 신호*에 가깝다.

서명·이메일 footer·발표의 affiliation이 바뀐다. *대학원생*에서 *박사·연구자·엔지니어/조교수/CEO*로. 이 표면의 변화가 본인 안의 관점에 한 단계씩 스며들고, 6개월 정도의 시간이 기본이다.

본인의 자기 관점 변화가 가장 큰 굽이다. *학생*이 기본였던 데서 *동료·co-PI·제품 책임자·교수*로의 관점 전환. 박사 5년의 *학생 관점*이 본인 안에 굳어 있어, 그 관점이 1-2년에 걸쳐 한 단계씩 풀린다. 풀리는 동안 본인이 새 동료들과 *대등한 동료*로 운영되기 시작한다.

> 정체성 전환을 1년 안에 — *나는 아직 학생*의 self-talk이 1년차의 기본이 되면 다음 5년이 박사 운영의 답습으로 굳는다.

정체성 전환이 1년 안에 일어나지 않으면 다음 5년이 박사 운영의 답습으로 굳는다. *나는 아직 학생*의 관점이 1년차의 기본이 되면, 그 관점이 본인의 새 운영을 깎는다. 본인이 *학생*으로 운영하면 새 동료들이 본인을 *학생*으로 처리하기 시작 — 본인 관점이 외부의 관점을 만든다. [Ch.2 (professor_daily)](#chapter-22)의 *교수처럼 행동* 명제가 여기서 *졸업 후 1년차의 기본 운영*으로 옮겨진다.

[Part 4 Ch.7 (임포스터 증후군)](#chapter-20)의 관점이 한 변형으로 등장한다 — *내가 박사라고 불릴 자격이 있는가*의 관점. 임포스터 관점이 정체성 전환에서 한 단계 강하게 작동해, 본인의 *작은 자격 자료*([Ch.7](#chapter-20) §5)가 같이 작동한다.

## 26.4 박사 시절 자산의 운영

박사 5년의 누적이 졸업 후 1년 안에 어떻게 운영되는가가 다음 5년의 좌표를 결정한다. 자산은 네 — 논문·코드·관계·평판이다.

**논문.** 박사 5년의 1저자 논문 목록이 다음 단계의 입력값이다. 졸업 후 1년 안에 박사 후속 1-2편이 자주 들어간다. 후속 논문이 1년 안에 비어 있으면 5년 후 본인 영역의 *맥*이 끊기는 일이 잦다. 박사 시절 마지막 1-2년의 작업 자료가 본인 안에 살아 있을 때 후속 논문이 가장 자연스럽게 들어가니, 졸업 6개월-1년 안에 한 편이 기본에 가깝다.

박사 학위 논문 그 자체의 *외부 출판*도 같은 층위에 있다. 학위 논문의 한 챕터가 학회·저널 한 편으로 옮겨지는 일이 1년 안의 기본 운영이다.

**코드.** 졸업 시점에 본인 GitHub repo가 *후배가 1주 안에 읽을 수 있는* 형태([Ch.1](#chapter-21) §5)인지가 첫 점검 단위. 1년 안에 본인이 본인 코드를 다시 펴는 일이 자주 온다 — 다음 단계의 baseline·재현·인용. 코드가 *후배도, 본인도, 1년 후의 자기*도 1주 안에 읽을 수 있는 형태가 아니면, 1년 후 본인이 본인 코드를 *처음 보는* 상황에 놓인다.

박사 시절 코드의 license·README·설치 이 책이 졸업 시점에 정리되어 있으면, 다음 단계의 baseline·인용·후속 협업이 본인 코드 위에서 자란다. 정리되지 않으면 코드가 *접근 불가능한 영역*으로 옮겨지고, 거기서 코드의 가치가 한 단계씩 깎인다.

**관계.** 박사 시절 동료·지도교수·committee 위원과의 관계가 *졸업 후 가장 빨리 식는* 영역이다. 1년 안에 한 번도 연락하지 않으면 5년 후 *연락 가능성 0*에 가까워진다. 한쪽이 *먼저* 연락해야 관계가 살아 있어서, 본인이 *먼저*의 자리에 들어가야 한다.

[Part 3 Ch.3 (give-first)](#chapter-9)의 관점이 여기서 다시 작동한다. *베풂의 단위도 거창하지 않다*가 *연락의 단위도 거창하지 않다*로 옮겨진다. 메일 1통, 짧은 안부 한 줄, 학회에서의 한 마디. 분기에 한 번이면 5년 후의 관계가 살아 있다.

**평판.** 박사 5년의 평판([Part 3 Ch.3](#chapter-9) §4)이 다음 단계의 *입구*다. 첫 직장의 추천인 목록, 첫 논문의 acknowledgment, 첫 grant의 collaborator — 박사 5년의 평판이 그대로 입력된다. 평판은 본인이 *지금 새로 만드는* 것이 아니라 *이미 만들어진* 데서 운영되니, 첫 1년의 운영은 그 평판을 *깎지 않는* 일에 가깝다.

## 26.5 흔한 함정 3

졸업 후 첫 1년에 자주 등장하는 함정이 셋 있다.

**박사 운영의 답습.** 산업계 sprint와 학생 5년 호흡의 차이가 가장 큰 마찰 지점이다. 박사가 *깊이 한 단위*를 5년에 걸쳐 풀어 가는 운영이라면, 산업계는 *결과 한 건*을 2주 안에 풀어 다음 단계로 옮기는 운영이다. 박사 운영을 그대로 산업계 sprint에 적용하면 한 건의 결과를 만들기 전에 sprint가 끝나니, 갈래를 갈아탔으면 운영 관점도 갈아타는 일이 첫 3개월의 기본이다.

같은 함정이 교수 갈래에서도 등장한다 — 박사 5년의 *연구 단일 축* 운영을 교수 1년차의 *강의·연구·grant·service 4축* 운영에 그대로 적용하는 함정. 교수 1년차는 박사 운영을 *4축*으로 분배하는 운영이지, 박사 운영을 *연구 축에만* 적용하는 운영이 아니다.

> **갈래 갈아탔으면 운영 관점도 갈아탄다.** 산업계 sprint에 박사 5년 호흡을 그대로 적용하면 한 sprint도 끝나지 않는다.

**정체성 전환 늦춤.** 1년차에 박사학위 자리에 떠 있는 관점. *나는 아직 학생*의 self-talk이 1년차의 기본이 되면, 새 동료들이 본인을 *학생*으로 처리하기 시작한다. 본인 관점이 외부의 관점을 만든다. §3에서 본 관점.

**관계 단절.** 박사 시절 동료·지도교수와의 관계는 첫 1년에 가장 빨리 식는다. *각자 새로 바쁘다*가 기본이고, 둘 다 바쁜 상황에서 한쪽이 먼저 연락하지 않으면 1년 후 *연락 가능성 0*에 가까워진다. give-first의 관점이 가장 단단한 도구에 가깝다 — 한쪽이 *먼저* 연락하는 흐름에서 관계가 살아 있다.

본인이 *먼저*의 자리에 들어가지 않으면 1년 후의 운영은 *연락 못 한 채로 또 1년*이 기본이 된다. 같은 관점이 2년·3년 누적되면 5년 후 *연락 가능성 0*이 기본으로 굳는다.

---

## 26.6 처방 층위

세 처방 단위가 이 장의 운영 도구다.

**첫 3개월 운영 단위.** 새 환경의 *작업 단위·호흡·하루 운영*을 학습. 박사 5년의 운영을 *비교 데이터*로 두고, 새 관점을 한 번에 흡수하지 않고 매주 한 단계씩. 첫 3개월의 관점이 새 환경의 기본이 되고, 그 관점이 1년 후의 운영을 결정한다.

이 단계의 운영 신호는 단순하다 — *오늘 한 일이 새 작업 단위였는가, 박사 5년 작업 단위였는가.* 박사 작업 단위로 한 일이 새 환경의 평가에서 한 단계 비어 있는 지점에 도달하면, 거기서 새 작업 단위의 관점이 한 번 들어간다. 한 번 들어가면 다음 주의 운영이 한 단계 옮겨진다.

**관계 보호 단위.** 박사 시절 동료·지도교수·committee와 *3-6개월 단위* 짧은 연락. 메일 1통, 짧은 안부 한 줄. 한쪽이 *먼저*. 분기에 한 번이면 5년 후의 관계가 살아 있다.

이 단위는 거창한 형태가 아니다. *논문 한 편 봤어요*, *학회 어떻게 갔어요*, *최근 어떻게 지내세요* 같은 한 줄. 한 줄이 1년 안에 4번 들어가면 관계가 살아 있고, 0번 들어가면 1년 후의 통로가 닫힌다. 단위가 거창해서 못 들어가는 게 기본라, 한 줄의 단위로 잘게 쪼개는 일이 운영의 시작이다.

> 박사 시절 동료·지도교수·committee와 *3-6개월 단위* 짧은 연락. 메일 1통의 단위로 잘게 쪼갠다. 한쪽이 *먼저*.

**다음 5년 좌표 갱신.** 졸업 직후 1년 안에 *다음 5년의 좌표*를 한 번 그어 본다. 박사 5년의 좌표가 *학교 안*에 묶여 있었다면, 다음 5년은 *분야·기관·지리* 좌표가 같이 들어온다. [Ch.3 (no_stability)](#chapter-23)의 *5년간 누적한 결정·관계·자율성·감정의 합* 관점이 다음 5년에 다시 적용되니, 졸업 후 첫 1년이 그 누적의 시작이다.

좌표를 *외부 표*로 채우는 운영이 아니라 *본인의 결정·관계·자율성·감정의 누적을 정합*하는 운영이 여기의 관점이다. [Ch.3](#chapter-23)에서 진로 비교표가 *외부 좌표의 비교*고, 본인의 누적이 *내부 좌표의 합*이라는 관점이 굳었다. 졸업 후 1년의 좌표 갱신은 그 *내부 좌표의 합*에서 시작한다.

---

졸업식이 한 사건이고, 그 사건 *이후*의 1년이 본인의 운영이다. 1년의 운영이 다음 5년의 좌표를 결정하는 만큼, 이 장의 관점은 그 결정의 *입구*에 있다. 박사 운영의 답습·정체성 전환의 늦춤·관계 단절이 첫 1년의 흔한 세 함정이고, 첫 3개월의 운영 단위·관계 보호의 한 줄 단위·5년 좌표의 갱신이 세 처방이다.

「대학원노트」 다섯 part가 같이 가리킨 thesis — *외부의 답이 학생에게 발급되지 않는다* — 가 졸업에서도 같은 관점으로 작동한다. 졸업이 *외부의 답*이 아닌 만큼, 졸업 후 1년의 운영도 본인의 결정·관계·자율성·감정의 누적 위에서 굴러간다. [Ch.3 (no_stability)](#chapter-23)이 5년의 마지막 단계였다면, 이 장은 그 마지막 *바로 다음*의 첫 단계다 — 같은 운영의 다음 층위.

---

**출처.** 1차 이 장에서는 졸업 = 다음 단계 시작 관점, 진로 갈래 4의 첫 1년 운영 단위, 정체성 전환 3 층위 (호칭·affiliation·자기 관점), 박사 시절 자산 4축 (논문·코드·관계·평판), 흔한 함정 3, 처방 층위 3 (첫 3개월·관계 보호·5년 좌표 갱신). 2차 [엄태웅 작가 「에필로그 — 안정적인 삶」](https://gradschoolstory.chkwon.net) 연결 — *불안정이 기본 mode* 관점이 졸업 시점에 다시 적용 ([Ch.3](#chapter-23)). [권창현 교수 「에필로그 — 뭘 해도 불안하다」](https://gradschoolstory.chkwon.net) 연결 — *알아도 걱정, 몰라도 걱정* 관점 ([Ch.3](#chapter-23)). [권창현 교수 「교수처럼 행동」](https://gradschoolstory.chkwon.net) 연결 — 교수 갈래의 *교수처럼 행동* 관점이 1년차의 기본 운영으로 옮겨짐 ([Ch.2](#chapter-22)). give-first 한 줄 단위 관점은 [Part 3 Ch.3](#chapter-9)에서. 후배 인수인계 *지도* 관점은 [Ch.1](#chapter-21) §5에서. 임포스터 관점의 정체성 전환 변형은 [Part 4 Ch.7](#chapter-20)에서.

다음: 「대학원노트」 끝.
</textarea>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<script>
(function() {
  'use strict';

  var DOC_TITLE = "대학원노트";
  var TOPBAR_TITLE = "대학원노트";
  var OVERVIEW_TITLE = "대학원노트";
  var OVERVIEW_SUBTITLE = "박사과정의 결정, 관계, 자율성, 감정, 그리고 다음 진로를 차례로 다룬다.";
  var SEARCH_PLACEHOLDER = "챕터/섹션 검색... (Ctrl+K)";
  var STORAGE_KEY = "grad-notes-lang";
  var CHAPTER_GROUPS = [{"label":"Part 1 · 결정과 진입","items":[{"kind":"chapter","num":1},{"kind":"chapter","num":2},{"kind":"chapter","num":3}]},{"label":"Part 2 · 지도교수 시스템","items":[{"kind":"chapter","num":4},{"kind":"chapter","num":5},{"kind":"chapter","num":6}]},{"label":"Part 3 · 자율성 운영","items":[{"kind":"chapter","num":7},{"kind":"chapter","num":8},{"kind":"chapter","num":9},{"kind":"chapter","num":10},{"kind":"chapter","num":11},{"kind":"chapter","num":12},{"kind":"chapter","num":13}]},{"label":"Part 4 · 감정과 페이스","items":[{"kind":"chapter","num":14},{"kind":"chapter","num":15},{"kind":"chapter","num":16},{"kind":"chapter","num":17},{"kind":"chapter","num":18},{"kind":"chapter","num":19},{"kind":"chapter","num":20}]},{"label":"Part 5 · 다음 단계로","items":[{"kind":"chapter","num":21},{"kind":"chapter","num":22},{"kind":"chapter","num":23},{"kind":"chapter","num":24},{"kind":"chapter","num":25},{"kind":"chapter","num":26}]}];
  var GROUP_FIRST = {};
  CHAPTER_GROUPS.forEach(function(group) {
    if (group.items.length) GROUP_FIRST[group.items[0].kind + '-' + group.items[0].num] = group.label;
  });

  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
      }
      try { return hljs.highlightAuto(code).value; } catch(e) {}
      return code;
    },
    breaks: false,
    gfm: true
  });
  marked.use({ renderer: { del: function(token) { return '~' + (token.text || token) + '~'; } } });

  if (window.mermaid) {
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
  }

  function protectMath(src) {
    var placeholders = [];
    var idx = 0;
    var codeBlocks = [];
    src = src.replace(new RegExp('\\x60\\x60\\x60[\\s\\S]*?\\x60\\x60\\x60', 'g'), function(m) {
      codeBlocks.push(m);
      return '%%CODEBLOCK' + (codeBlocks.length - 1) + '%%';
    });
    var inlineCodes = [];
    src = src.replace(new RegExp('\\x60[^\\x60\\n]+\\x60', 'g'), function(m) {
      inlineCodes.push(m);
      return '%%INLINECODE' + (inlineCodes.length - 1) + '%%';
    });
    src = src.replace(/\$\$([\s\S]*?)\$\$/g, function(m, math) {
      placeholders.push({ display: true, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/\$([^\s$](?:[^$]*[^\s$])?)\$/g, function(m, math) {
      placeholders.push({ display: false, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/%%CODEBLOCK(\d+)%%/g, function(m, i) { return codeBlocks[parseInt(i, 10)]; });
    src = src.replace(/%%INLINECODE(\d+)%%/g, function(m, i) { return inlineCodes[parseInt(i, 10)]; });
    return { src: src, placeholders: placeholders };
  }

  function restoreAndRenderMath(html, placeholders) {
    return html.replace(/%%MATH(\d+)%%/g, function(m, i) {
      var p = placeholders[parseInt(i, 10)];
      try {
        return katex.renderToString(p.math, { displayMode: p.display, throwOnError: false, trust: true });
      } catch(e) {
        return p.display ? '$$' + p.math + '$$' : '$' + p.math + '$';
      }
    });
  }

  var state = { observer: null, scrollHandler: null };
  var contentEl = document.getElementById('content');
  var loadingEl = document.getElementById('loading');
  var tocContainer = document.getElementById('toc-container');

  function applyChrome() {
    document.documentElement.lang = 'ko';
    document.title = DOC_TITLE;
    document.getElementById('topbar-title').textContent = TOPBAR_TITLE;
    document.getElementById('search-input').placeholder = SEARCH_PLACEHOLDER;
    document.getElementById('toc-no-results').textContent = '검색 결과 없음';
    document.getElementById('loading-text').textContent = '가이드 렌더링 중...';
    document.querySelectorAll('#lang-toggle a').forEach(function(a) { a.classList.add('active'); });
    try { localStorage.setItem(STORAGE_KEY, 'ko'); } catch(e) {}
  }

  function parseHeading(text) {
    var ch = text.trim().match(/^Ch\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ch) return { kind: 'chapter', num: parseInt(ch[1], 10), title: ch[2].trim(), label: 'Ch.' + parseInt(ch[1], 10) };
    var ex = text.trim().match(/^E\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ex) return { kind: 'excerpt', num: parseInt(ex[1], 10), title: ex[2].trim(), label: 'E.' + parseInt(ex[1], 10) };
    return null;
  }

  function render() {
    applyChrome();
    contentEl.style.display = 'none';
    loadingEl.style.display = 'flex';

    requestAnimationFrame(function() {
      var src = document.getElementById('md-source-ko').value;
      src = src.replace(/\*\*([^*\n]+)\*\*(?=[가-힣])/g, '<strong>$1</strong>');
      var mathData = protectMath(src);
      var html = marked.parse(mathData.src);
      html = restoreAndRenderMath(html, mathData.placeholders);
      contentEl.innerHTML = html;

      if (window.mermaid) {
        var mermaidBlocks = contentEl.querySelectorAll('pre > code.language-mermaid');
        mermaidBlocks.forEach(function(code, i) {
          var pre = code.parentElement;
          var container = document.createElement('div');
          container.className = 'mermaid';
          container.id = 'mermaid-ko-' + i;
          container.textContent = code.textContent;
          pre.replaceWith(container);
        });
        try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}
      }

      tocContainer.innerHTML = '';
      buildOverview();
      buildTOC();
      contentEl.style.display = 'block';
      loadingEl.style.display = 'none';
      setupScrollTracking();

      if (window.location.hash) {
        var initId = window.location.hash.slice(1);
        var initTarget = document.getElementById(initId);
        if (initTarget) window.scrollTo(0, initTarget.getBoundingClientRect().top + window.scrollY - 60);
      }
    });
  }

  render();
  setupSearch();
  setupProgressBar();
  setupMobileMenu();
  setupKeyboard();
  setupTocDelegation();

  function setupTocDelegation() {
    tocContainer.addEventListener('click', function(e) {
      if (e.target.closest('.toc-item')) closeMobileSidebar();
    });
  }

  function buildOverview() {
    var h1s = contentEl.querySelectorAll('h1');
    var entries = {};

    h1s.forEach(function(h1) {
      var parsed = parseHeading(h1.textContent);
      if (!parsed) return;
      if (!h1.id) h1.id = parsed.kind + '-' + parsed.num;
      var sections = [];
      var node = h1.nextElementSibling;
      while (node && node.tagName !== 'H1') {
        if (node.tagName === 'H2') {
          if (!node.id) node.id = slugify(node.textContent);
          sections.push({ text: node.textContent.trim(), id: node.id });
        }
        node = node.nextElementSibling;
      }
      entries[parsed.kind + '-' + parsed.num] = {
        kind: parsed.kind,
        num: parsed.num,
        label: parsed.label,
        title: parsed.title,
        id: h1.id,
        sections: sections
      };
    });

    if (Object.keys(entries).length === 0) return;

    var overview = document.createElement('section');
    overview.className = 'guide-overview';
    var header = document.createElement('div');
    header.className = 'overview-header';
    var oTitle = document.createElement('h1');
    oTitle.className = 'overview-title';
    oTitle.textContent = OVERVIEW_TITLE;
    header.appendChild(oTitle);
    var oSub = document.createElement('p');
    oSub.className = 'overview-subtitle';
    oSub.textContent = OVERVIEW_SUBTITLE;
    header.appendChild(oSub);
    overview.appendChild(header);

    CHAPTER_GROUPS.forEach(function(group) {
      var valid = group.items.map(function(item) { return entries[item.kind + '-' + item.num]; }).filter(Boolean);
      if (!valid.length) return;
      var groupEl = document.createElement('div');
      groupEl.className = 'overview-group';
      var label = document.createElement('div');
      label.className = 'overview-group-label';
      label.textContent = group.label;
      groupEl.appendChild(label);

      valid.forEach(function(entry) {
        var wrap = document.createElement('div');
        wrap.className = 'overview-chapter';
        var link = document.createElement('a');
        link.className = 'overview-chapter-link';
        link.href = '#' + entry.id;
        var num = document.createElement('span');
        num.className = 'overview-chapter-num';
        num.textContent = entry.label;
        link.appendChild(num);
        link.appendChild(document.createTextNode(entry.title));
        wrap.appendChild(link);

        if (entry.sections.length) {
          var secs = document.createElement('div');
          secs.className = 'overview-sections';
          entry.sections.forEach(function(section, i) {
            if (i > 0) {
              var sep = document.createElement('span');
              sep.className = 'sep';
              sep.textContent = '·';
              secs.appendChild(sep);
            }
            var sLink = document.createElement('a');
            sLink.href = '#' + section.id;
            sLink.textContent = section.text;
            secs.appendChild(sLink);
          });
          wrap.appendChild(secs);
        }
        groupEl.appendChild(wrap);
      });
      overview.appendChild(groupEl);
    });

    contentEl.insertBefore(overview, contentEl.firstChild);
  }

  function buildTOC() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var fragment = document.createDocumentFragment();
    headings.forEach(function(heading) {
      if (!heading.id) heading.id = slugify(heading.textContent);
      if (heading.classList.contains('overview-title')) return;

      if (heading.tagName === 'H1') {
        var parsed = parseHeading(heading.textContent);
        if (parsed) {
          var key = parsed.kind + '-' + parsed.num;
          if (GROUP_FIRST[key]) {
            var label = document.createElement('div');
            label.className = 'toc-group-label';
            label.textContent = GROUP_FIRST[key];
            fragment.appendChild(label);
          }
        }
      }

      var link = document.createElement('a');
      link.className = 'toc-item toc-' + heading.tagName.toLowerCase();
      link.href = '#' + heading.id;
      link.textContent = heading.textContent;
      link.dataset.headingId = heading.id;
      fragment.appendChild(link);
    });
    tocContainer.appendChild(fragment);
  }

  function slugify(text) {
    return text.toLowerCase().trim()
      .replace(/<[^>]+>/g, '')
      .replace(/[^\w\s가-힣-]/g, '')
      .replace(/\s+/g, '-')
      .substring(0, 80) || 'section';
  }

  function setupScrollTracking() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var tocItems = tocContainer.querySelectorAll('.toc-item');
    if (headings.length === 0) return;
    if (state.observer) state.observer.disconnect();

    var tocMap = {};
    tocItems.forEach(function(item) { tocMap[item.dataset.headingId] = item; });
    var currentActive = null;
    var observer = new IntersectionObserver(function(entries) {
      var topHeading = null;
      var topOffset = Infinity;
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var rect = entry.target.getBoundingClientRect();
          if (rect.top < topOffset) { topOffset = rect.top; topHeading = entry.target; }
        }
      });
      if (topHeading) {
        if (currentActive) currentActive.classList.remove('active');
        var item = tocMap[topHeading.id];
        if (item) {
          item.classList.add('active');
          currentActive = item;
          var itemRect = item.getBoundingClientRect();
          var containerRect = tocContainer.getBoundingClientRect();
          if (itemRect.top < containerRect.top || itemRect.bottom > containerRect.bottom) item.scrollIntoView({ block: 'center', behavior: 'auto' });
        }
      }
    }, { rootMargin: '-60px 0px -70% 0px', threshold: 0 });
    headings.forEach(function(h) { observer.observe(h); });
    state.observer = observer;

    if (!state.scrollHandler) {
      var ticking = false;
      state.scrollHandler = function() {
        if (!ticking) {
          requestAnimationFrame(function() {
            var curHeadings = contentEl.querySelectorAll('h1, h2');
            var curTocItems = tocContainer.querySelectorAll('.toc-item');
            var curMap = {};
            curTocItems.forEach(function(item) { curMap[item.dataset.headingId] = item; });
            var found = null;
            var scrollTop = window.scrollY + 80;
            for (var i = curHeadings.length - 1; i >= 0; i--) {
              if (curHeadings[i].offsetTop <= scrollTop) { found = curHeadings[i]; break; }
            }
            if (found) {
              var active = tocContainer.querySelector('.toc-item.active');
              if (active) active.classList.remove('active');
              var item = curMap[found.id];
              if (item) item.classList.add('active');
            }
            ticking = false;
          });
          ticking = true;
        }
      };
      window.addEventListener('scroll', state.scrollHandler);
    }
  }

  function setupSearch() {
    var searchInput = document.getElementById('search-input');
    var noResults = document.getElementById('toc-no-results');
    searchInput.addEventListener('input', function() {
      var query = this.value.trim().toLowerCase();
      var tocItems = tocContainer.querySelectorAll('.toc-item');
      var groupLabels = tocContainer.querySelectorAll('.toc-group-label');
      if (!query) {
        tocItems.forEach(function(item) { item.classList.remove('toc-hidden'); });
        groupLabels.forEach(function(label) { label.classList.remove('toc-hidden'); });
        noResults.style.display = 'none';
        return;
      }
      var matchCount = 0;
      tocItems.forEach(function(item) {
        var text = item.textContent.toLowerCase();
        if (text.includes(query)) { item.classList.remove('toc-hidden'); matchCount++; }
        else item.classList.add('toc-hidden');
      });
      groupLabels.forEach(function(label) { label.classList.add('toc-hidden'); });
      noResults.style.display = matchCount === 0 ? 'block' : 'none';
    });
  }

  function setupProgressBar() {
    var progressBar = document.getElementById('progress-bar');
    var ticking = false;
    function updateProgress() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = Math.min(progress, 100) + '%';
    }
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() { updateProgress(); ticking = false; });
        ticking = true;
      }
    });
    updateProgress();
  }

  function setupMobileMenu() {
    var toggle = document.getElementById('menu-toggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.querySelector('#sidebar-overlay');
    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
    });
    overlay.addEventListener('click', closeMobileSidebar);
  }

  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.querySelector('#sidebar-overlay').classList.remove('visible');
  }

  function setupKeyboard() {
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        document.getElementById('search-input').focus();
      }
    });
  }
})();
</script>
