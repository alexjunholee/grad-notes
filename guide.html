<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg-alt: #f5f5f7;
  --bg-sidebar: #f5f5f7;
  --bg-code: #f5f5f7;
  --bg-surface: #f5f5f7;

  --text: #1d1d1f;
  --text-body: rgba(0, 0, 0, 0.8);
  --text-muted: rgba(0, 0, 0, 0.56);
  --text-tertiary: rgba(0, 0, 0, 0.48);
  --text-heading: #1d1d1f;

  --accent: #0071e3;
  --link: #0066cc;

  --border: rgba(0, 0, 0, 0.08);
  --border-strong: rgba(0, 0, 0, 0.16);

  --sidebar-width: 300px;
  --topbar-height: 52px;
  --progress-height: 3px;

  --shadow-elev: rgba(0, 0, 0, 0.22) 3px 5px 30px 0px;
}

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  font-size: 17px;
  line-height: 1.47;
  letter-spacing: -0.022em;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
  font-feature-settings: "kern", "liga", "calt";
  word-break: keep-all;
  overflow-wrap: break-word;
}

#progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: var(--progress-height);
  background: linear-gradient(90deg, #0071e3, #2997ff);
  z-index: 10000;
  transition: width 0.1s linear;
  width: 0%;
}

#topbar {
  position: fixed;
  top: var(--progress-height);
  left: 0;
  right: 0;
  height: var(--topbar-height);
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 1000;
}

#topbar .menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  margin-right: 12px;
  padding: 6px 10px;
  border-radius: 8px;
}

#topbar .menu-toggle:hover { background: rgba(0,0,0,0.04); }

#topbar .title {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text-heading);
  letter-spacing: -0.022em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#topbar .back-link {
  margin-left: 16px;
  color: var(--link);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  white-space: nowrap;
  padding: 7px 14px;
  border-radius: 980px;
  border: 1px solid var(--border);
  letter-spacing: -0.014em;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}

#topbar .back-link:hover {
  background: rgba(0, 113, 227, 0.06);
  border-color: var(--accent);
  color: var(--accent);
}

/* Language toggle — inline link style (no box) */
#topbar .lang-toggle {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  letter-spacing: -0.010em;
}
#topbar .lang-toggle a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 4px 2px;
  transition: color 0.15s;
  cursor: pointer;
}
#topbar .lang-toggle a:hover { color: var(--text); }
#topbar .lang-toggle a.active {
  color: var(--text-heading);
  font-weight: 600;
}
#topbar .lang-toggle .sep { color: var(--border-strong); }

#sidebar {
  position: fixed;
  top: calc(var(--progress-height) + var(--topbar-height));
  left: 0;
  width: var(--sidebar-width);
  height: calc(100vh - var(--topbar-height) - var(--progress-height));
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 999;
  display: flex;
  flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.16) transparent;
}

#sidebar::-webkit-scrollbar { width: 6px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.16); border-radius: 3px; }

#search-box {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);

#search-input {

#toc-container {

#toc-container::-webkit-scrollbar { width: 4px; }
#toc-container::-webkit-scrollbar-track { background: transparent; }
#toc-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

/* Chapter level (h1) */
.toc-item {
  display: block;
  padding: 8px 16px 8px 20px;

  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  letter-spacing: -0.014em;
  border-left: 3px solid transparent;

  cursor: pointer;
}

/* Section (h2) */
.toc-item.toc-h2 {
  padding: 5px 16px 5px 36px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: -0.012em;
}

.toc-item.toc-h2 + .toc-item:not(.toc-h2) { margin-top: 6px; }

.toc-item:hover {
  color: var(--text);
  background: rgba(0, 0, 0, 0.04);
}

.toc-item.toc-h2:hover { color: var(--text); }

.toc-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: rgba(0, 113, 227, 0.08);
  font-weight: 700;
}

.toc-item.toc-h2.active {
  font-weight: 500;
  color: var(--accent);
}

.toc-item.toc-hidden { display: none; }

.toc-group-label {

  padding: 22px 16px 6px 20px;
  font-size: 11px;

  color: rgba(0, 0, 0, 0.42);

  letter-spacing: 0.08em;

.toc-group-label.toc-hidden { display: none; }

.toc-no-results {
  padding: 20px 16px;
  color: var(--text-muted);
  font-size: 13.5px;
  text-align: center;
  display: none;
  letter-spacing: -0.014em;
}

#main-content {

#content {

#loading {

.spinner {

#content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {

#content h1:not(:first-of-type) {

}

#content h2 {

  font-weight: 600;

}

#content h3 {

}

#content h4 {

#content h5, #content h6 {

# 참고한 자료와 감사

이 자료는 아래 저자와 글에서 많은 것을 배웠다. 본문은 특정 글을 장별로
요약한 것이 아니라, 박사과정 5년을 운영하는 사람의 시간 순서에 맞게 다시
엮은 산문이다. 그래도 빚진 자료는 책 앞에 남겨 둔다. 원저자의 생각은
원래 이름과 함께 읽힐 때 가장 정확하다.

## 한국어 대학원 회고와 조언

- 엄태웅 작가, 최윤섭 박사, 권창현 교수의 [gradschoolstory](https://gradschoolstory.chkwon.net) 글들
- 김세정 교수, 윤은정 교수, 유두희 박사의 *대학원생 때 알았더라면 좋았을 것들 2*
- 김기섭 교수의 [gsk1m.github.io](https://gsk1m.github.io/)와 [gisbi-kim.github.io](https://gisbi-kim.github.io/) 글들
- 임형태 박사와 현동진 박사의 연구 운영·자율성에 관한 글과 강의

## 해외 박사과정과 학계 생존 기록

- Philip Guo, [*The PhD Grind*](https://pgbovine.net/PhD-memoir.htm)
- Matt Might, [*The Illustrated Guide to a PhD*](https://matt.might.net/articles/phd-school-in-pictures/)
- Richard M. Reis, *Tomorrow’s Professor*
- Peter J. Feibelman, *A PhD Is Not Enough!*

## 연구와 글쓰기에서 넘어온 배경

- George M. Whitesides, “Whitesides’ Group: Writing a Paper”
- Brett Mensh, Konrad Kording, “Ten Simple Rules for Structuring Papers”
- Donald E. Knuth, Tracy Larrabee, Paul M. Roberts, *Mathematical Writing*
- S. Keshav, “How to Read a Paper”
- 자매 프로젝트 [robotics-practice](../robotics-practice/)의 Spatial AI·SLAM·CV 연구 운영 메모

## 이 책의 흐름

이 책은 네 묶음으로 읽힌다. 먼저 박사를 학교 이름이 아니라 5년의 운영
방식으로 본다. 그 다음 관계와 시간을 구조로 다룬다. 세 번째 묶음은
자율성과 삶의 흔들림을 본다. 마지막에는 졸업을 안정의 도착점이 아니라
다음 역할로 넘어가는 첫 운영으로 다룬다. 박사과정은 조언 몇 개로
버티는 시간이 아니라, 자기 삶 전체를 연구의 시간표와 다시 맞추는
기간이다.

<h1 id="chapter-1">Ch.1 — 박사는 학교가 아니라 5년의 운영 방식을 고르는 일이다</h1>

박사를 결정할 때 가장 먼저 눈에 들어오는 것은 학교 이름, 지도교수의 명성, 장학금, 분야의 유행이다. 모두 중요하다. 하지만 그보다 먼저 봐야 할 것은 내가 5년 동안 어떤 방식으로 살게 되는가다. 박사는 합격 통지서가 아니라 운영 방식의 선택이다. 같은 학교, 같은 분야, 같은 재정 조건에서도 전혀 다른 5년이 생기는 이유가 여기에 있다.

박사과정은 공부의 연장이 아니다. 학부와 석사에서는 넓은 분야를 배운다. 박사에서는 그 넓은 분야의 끝 한 점을 몇 년 동안 민다. 그 한 점이 작아 보여도, 실제로는 생활 전체를 바꾼다. 읽는 논문, 만나는 사람, 하루의 리듬, 실패를 받아들이는 방식이 모두 그 점 주변으로 재배열된다. 그래서 진학 결정에서 중요한 질문은 “좋은 학교인가”가 아니라 “이 환경에서 내가 한 점을 오래 밀 수 있는가”다.

환경 선택에는 우선순위가 필요하다. 지도교수, 연구분야, 재정, 학교의 순서를 어떻게 둘 것인가. 사람마다 답은 다르지만, 답을 내지 않은 채 진학하면 바깥의 prestige가 자동으로 답을 대신한다. prestige는 나쁜 기준이 아니지만 충분한 기준도 아니다. 학교 이름은 5년 동안 매주 만나는 사람이 아니고, 장학금은 내 연구 질문을 대신 좁혀 주지 않는다.

비이공계나 분야 이동의 경우에는 운영 단위가 더 중요해진다. 논문 수, 공동연구 방식, 학회 리듬, 졸업 요건이 분야마다 다르다. 한 분야에서 당연한 속도가 다른 분야에서는 무리일 수 있다. 다른 사람의 timeline을 그대로 가져오면 불필요한 열등감이 생긴다. 먼저 확인할 것은 내 분야의 실제 졸업 단위다.

박사를 하지 않는 선택도 실패가 아니다. 박사과정은 좋은 사람에게 주어지는 상이 아니라 특정한 운영 방식을 감당하겠다는 결정이다. 그 방식이 지금의 나와 맞지 않으면 다른 길이 낫다. 반대로 두려움이 있다는 이유만으로 피할 필요도 없다. 두려움은 정보일 수 있지만 결론은 아니다.

10년 후의 나는 학교 이름보다 그때 익힌 운영 방식을 더 많이 들고 산다. 긴 문제를 견디는 방식, 모르는 상태를 관리하는 방식, 사람과 일하는 방식, 자기 질문을 좁히는 방식. 박사를 결정한다는 일은 그 방식들을 배우는 5년을 받아들일지 묻는 일이다.

<h1 id="chapter-2">Ch.2 — 지도교수 관계는 주어지는 환경이 아니라 함께 만드는 시스템이다</h1>

지도교수는 박사과정의 가장 큰 변수다. 하지만 좋은 지도교수를 “만나는” 일만 생각하면 학생은 수동적인 위치에 남는다. 관계는 주어지는 환경이 아니라 함께 만드는 시스템이다. 물론 학생이 모든 것을 통제할 수는 없다. 권력 차이도 있고, 성향 차이도 있고, 피해야 할 사람도 있다. 그럼에도 첫 학기부터 학생이 운영할 수 있는 단위가 있다.

관계의 시작은 막연한 인사가 아니라 작은 작업 단위다. 추천받은 논문 세 편, 첫 outline 한 장, 다음 미팅까지 확인할 질문 하나. 이 단위가 잡히면 지도는 감정의 문제가 아니라 문서와 질문의 반복이 된다. 좋은 관계는 자주 웃는 관계가 아니라, 모호한 기대가 작은 단위로 번역되는 관계다.

지도교수의 style은 좋고 나쁨보다 적합성의 문제다. micromanagement가 어떤 학생에게는 좌표를 주지만, 다른 학생에게는 숨 막히는 환경이 된다. 방임도 마찬가지다. 1년차에는 자유로워 보이지만 3년차에는 방향을 잃게 만들 수 있다. 그래서 선택 단계에서는 학생들과 이야기하고, lab meeting을 보고, 피드백이 어떤 톤으로 오가는지 확인해야 한다.

신호는 표면에 드러난다. 면담에서 누가 말을 오래 하는가. 학생 질문이 살아 있는가. 메일 응답은 어느 정도의 리듬인가. lab meeting의 비판은 문제를 향하는가, 사람을 향하는가. conflict가 생겼을 때 조용히 정비할 여지가 있는가. 한두 번의 관찰로 모든 것을 알 수는 없지만, 표면 신호를 무시하면 5년 뒤에야 같은 사실을 더 비싼 방식으로 알게 된다.

갈등은 큰 사건으로만 오지 않는다. 작은 신호, 누적 균열, 명시적 충돌, 결정의 단계로 온다. 초기에 해야 할 일은 반박이 아니라 기록이다. 무엇이 기대였고, 무엇이 어긋났고, 다음 미팅에서 어떤 하나의 질문으로 좁힐 수 있는지 적는다. 명시적 충돌 직후에는 바로 답하지 않는 편이 낫다. 방어 모드의 답장은 대개 상황을 더 흐린다.

좋은 관계는 좋은 사람 둘이 만나서 자동으로 생기지 않는다. 좋은 시스템이 필요하다. 한 장의 outline, 한 질문의 메일, 정해진 미팅 리듬, 갈등을 문서로 옮기는 습관. 10년 후에도 남는 것은 특정 지도교수의 성향보다, 관계를 운영 가능한 단위로 바꾸는 능력이다.

<h1 id="chapter-3">Ch.3 — 내 연구는 허락받는 것이 아니라 작은 결정이 누적되어 생긴다</h1>

박사 초반의 학생은 자주 묻는다. “이게 제 연구인가요?” 그 질문 안에는 허락을 기다리는 마음이 있다. 교수의 주제, 선배의 코드, 프로젝트의 요구, grant의 방향 속에서 어디까지가 내 것인지 헷갈린다. 하지만 내 연구는 어느 날 허락받아 생기지 않는다. 작은 결정이 누적되면서 생긴다.

처음에는 남의 문제를 받는다. 그것이 자연스럽다. 중요한 것은 받은 문제를 다시 쓰는 일이다. 내가 어떤 조건을 보겠다고 정했는가. 어떤 실패를 중요하게 보겠다고 했는가. 어떤 baseline을 공정한 비교로 받아들였는가. 어떤 질문에는 지금 답하지 않겠다고 했는가. 이런 결정들이 쌓이면 연구는 조금씩 내 손의 모양을 갖는다.

1년차의 가장 큰 일은 내 연구를 빨리 “찾는” 것이 아니라 연구의 운영 단위를 익히는 것이다. 논문을 읽고, 코드를 돌리고, 질문을 한 줄로 쓰고, 작은 실험을 설계하고, 결과를 다시 문장으로 옮긴다. 이 회로가 돌기 시작하면 주제의 소유권도 달라진다. 처음에는 남의 질문을 실행하는 학생이었지만, 어느 순간부터 질문 자체를 수정하는 사람이 된다.

도구는 이 회로 뒤에 와야 한다. 새 GPU, 새 sensor, 새 library, 새 agent가 들어오면 진척이 생긴 것처럼 느껴진다. 하지만 문제가 한 줄로 적히지 않은 상태에서 도구가 먼저 손에 들어오면 셋업 시간은 연구 시간으로 위장한다. 좋은 도구는 좋은 문제 뒤에서 빛난다. 나쁜 순서는 도구가 문제를 대신 정하게 만드는 것이다.

다층 역량도 이 자리에서 생긴다. 실험을 잘하는 능력, 글을 쓰는 능력, 협업하는 능력, 발표하는 능력, 코드와 데이터를 남기는 능력은 따로 보이지만 실제로는 한 연구를 굴리는 여러 면이다. 한 능력만으로 박사 5년이 버티지 않는다. 반대로 모든 능력을 한꺼번에 완성하려 들 필요도 없다. 지금 내 연구가 막힌 층이 어디인지 알아보는 것이 먼저다.

산업계 진로를 생각하는 학생에게도 같은 원리가 적용된다. 내 연구는 직함이 아니라 문제를 다루는 방식이다. 학계에 남든 산업계로 가든, 어떤 불확실한 문제를 좁히고 증거를 만들고 사람에게 설명하는 능력은 그대로 간다. 10년 후에 남는 것은 첫 주제의 이름이 아니라, 내 손으로 문제를 소유하게 되는 과정이다.

<h1 id="chapter-4">Ch.4 — 시간 관리는 바쁨을 줄이는 일이 아니라 미래의 나를 도와주는 구조다</h1>

박사의 조건과 관계가 정해지면, 그 다음에는 시간이 실제 운영 단위가
된다. 좋은 환경도 하루의 구조가 무너지면 금방 나쁜 환경처럼 느껴진다.
시간 관리는 성실함의 문제가 아니라 내일의 내가 다시 시작할 수 있게
오늘 흔적을 남기는 일이다.

박사과정에서 시간은 늘 부족하다. 하지만 실제로 먼저 닳는 것은 시간이 아니라 진입 가능성이다. 해야 할 일이 너무 많아서 못 하는 것이 아니라, 무엇부터 시작해야 할지 몰라서 하루가 흩어진다. 그래서 시간 관리는 바쁨을 줄이는 기술이 아니라, 미래의 내가 다시 들어올 수 있게 만드는 구조다.

아침에 필요한 질문은 단순하다. 오늘 끝나면 내 연구가 무엇만큼 앞으로 가 있는가. 이 질문에 답하지 못하면 하루는 메일, 회의, 셋업, 작은 부탁으로 채워진다. 모두 필요한 일일 수 있지만, 연구의 중심은 비어 있을 수 있다. 중요한 일과 긴급한 일을 구분하는 이유도 여기에 있다. 긴급한 일은 소리를 내고, 중요한 일은 조용히 밀린다.

멀티태스킹에는 상한이 있다. 프로젝트가 세 개를 넘으면 전환 비용이 연구 시간을 먹기 시작한다. 네 번째 프로젝트는 단순히 하나가 더 늘어난 것이 아니다. 기억해야 할 맥락, 기다려야 할 답장, 다시 들어가기 위한 준비 시간이 함께 늘어난다. 박사과정에서 거절해야 할 것은 게으름 때문이 아니라 깊이를 지키기 위해서다.

하루를 마칠 때 미래의 나에게 메시지를 남기는 습관은 작지만 강하다. 내일 열 파일, 다음 실험의 한 줄, 막힌 지점, 다시 시작할 첫 명령. 이 네 가지가 있으면 다음 날의 진입 비용이 낮아진다. 과거의 내가 미래의 나를 도와주는 구조가 생긴다. 연구의 지속성은 거창한 의지보다 이런 작은 다리에서 나온다.

메일과 협업도 시간 관리의 일부다. 한 메일에 한 질문만 넣으면 상대의 시간이 줄고, 내 다음 행동도 빨라진다. 협업에서 먼저 베푼다는 말도 막연한 친절이 아니다. 상대의 다음 행동 비용을 줄이는 자료, 정리된 issue, 재현 가능한 결과, 짧고 정확한 질문을 먼저 주는 일이다. 평판은 큰 성과보다 이런 작은 비용 절감에서 먼저 쌓인다.

시간 관리는 10년 후의 나와 연결된다. 지금의 내가 오늘을 무리하게 밀어붙이면 내일의 나는 더 높은 진입 비용을 낸다. 지금의 내가 작은 기록과 정리로 하루를 닫으면 내일의 나는 바로 이어서 시작한다. 박사 5년은 매일의 영웅적 몰입으로만 굴러가지 않는다. 어제의 내가 오늘의 나를 도와주는 구조가 있을 때 굴러간다.

<h1 id="chapter-5">Ch.5 — 좋은 협업은 착한 마음보다 작은 비용을 먼저 줄이는 데서 시작한다</h1>

협업을 잘한다는 말은 성격이 좋다는 뜻이 아니다. 좋은 협업자는 상대가 다음 행동을 쉽게 할 수 있게 만든다. 교수에게 보내는 메일, 동료에게 넘기는 코드, 후배에게 설명하는 실험, 공동저자에게 주는 draft 모두 같은 원리를 따른다. 받는 사람의 비용을 줄이면 관계는 조용히 단단해진다.

한 메일 한 질문은 가장 작은 단위다. 긴 배경, 여러 질문, 모호한 부탁을 한 번에 보내면 상대는 답장을 미룬다. 자기소개 한 문장, 현재 상태 한 문장, 필요한 결정 하나. 이 정도로 줄이면 상대가 바로 답할 수 있다. 정중함은 길이가 아니라 결정 비용을 줄이는 데서 나온다.

먼저 베푸는 협업도 같은 구조다. “도와드릴 게 있으면 말씀하세요”보다 좋은 것은 이미 정리된 작은 도움이다. 실험 log를 정리해 두기, 재현 명령을 남기기, 관련 논문 세 편의 차이를 표로 만들기, meeting 전에 agenda를 보내기. 이런 일은 작지만 상대의 시간을 바로 줄인다. 박사과정의 평판은 큰 발표보다 이런 작은 신뢰에서 먼저 생긴다.

갈등도 비용의 문제로 볼 수 있다. 상대가 내 의도를 추측해야 할수록 비용이 올라간다. 내가 무엇을 했고, 무엇이 막혔고, 어떤 결정을 요청하는지 분명하면 갈등의 상당 부분은 줄어든다. 물론 모든 갈등이 그렇게 풀리지는 않는다. 하지만 문서와 단위가 있으면 최소한 문제를 사람에게 붙이지 않고 작업에 붙일 수 있다.

협업에서 중요한 것은 내 결과를 더 크게 보이게 만드는 일이 아니다. 다음 사람이 내 결과를 이어받을 수 있게 만드는 일이다. 코드의 README, 실험 조건, dataset split, figure source, 실패한 시도 목록은 모두 협업의 언어다. 말로 친절한 사람보다 재현 가능한 자료를 남기는 사람이 더 오래 신뢰받는다.

10년 후에도 남는 협업 스타일은 대단한 charisma가 아니다. 상대의 시간을 아끼는 습관, 한 번에 하나씩 묻는 습관, 내가 만든 것을 다음 사람이 바로 사용할 수 있게 남기는 습관. 좋은 협업은 착한 마음에서 시작할 수 있지만, 오래 가는 협업은 작은 비용을 줄이는 구조에서 유지된다.

---

<h1 id="chapter-6">Ch.6 — 도구와 역량은 문제 뒤에 설 때만 힘이 된다</h1>

새 도구는 기분을 좋게 만든다. 새 장비, 새 모델, 새 library, 새 agent, 새 자동화가 들어오면 연구가 빨라질 것 같다. 실제로 빨라질 때도 있다. 하지만 도구가 문제보다 앞서면 진척은 쉽게 가짜가 된다. 셋업이 잘됐다는 사실과 연구가 앞으로 갔다는 사실은 다르다.

도구의 함정은 두 극단에서 온다. 모든 것을 직접 짜려는 학생은 문제에 도달하기 전에 1년을 infrastructure에 쓴다. 모든 것을 자동화 도구에 맡기는 학생은 방향이 틀린 채 빠르게 간다. 둘 다 문제보다 도구가 앞선 상태다. 좋은 순서는 문제, 최소 도구, 검증, 확장이다. 먼저 풀 문제를 한 줄로 쓰고, 그 문제를 확인할 가장 작은 도구를 고른다.

박사과정의 역량도 하나가 아니다. 실험을 잘하는 능력, 수식을 읽는 능력, 코드를 다루는 능력, 글을 쓰는 능력, 사람과 일하는 능력, 발표하는 능력이 서로 얽힌다. 어느 하나가 약하면 전체가 막힐 수 있지만, 모든 것을 동시에 최고 수준으로 만들 필요는 없다. 지금 내 연구가 막힌 층이 어디인지 알아보는 것이 먼저다.

학문적 리더와 기술적 리더의 차이도 여기서 나온다. 기술적 리더는 어려운 것을 되게 만든다. 학문적 리더는 어떤 어려운 것을 해야 하는지 정한다. 좋은 연구자는 둘 중 하나만으로 충분하지 않다. 다만 자기 5년의 중심이 어디에 있는지 알아야 한다. 도구를 갈고닦는 시간이 방향을 대신하고 있지 않은지 계속 확인해야 한다.

자동화가 붙을수록 이 구분은 더 중요해진다. 코드 작성 도구는 설계된 방향으로 빠르게 가 준다. 방향이 맞으면 큰 힘이 되지만, 방향이 틀리면 틀린 방향으로 더 멀리 간다. 수식과 알고리즘의 뼈대를 모르면 제안이 맞는지 판단할 수 없다. 도구가 연구자의 판단을 없애는 것이 아니라, 판단이 없는 연구자를 더 빨리 드러낸다.

10년 후에 남는 역량은 특정 도구 사용법이 아니다. 지금의 도구는 낡는다. 모델도, framework도, benchmark도 바뀐다. 남는 것은 문제를 먼저 세우고 도구를 그 뒤에 세우는 습관이다. 도구는 연구를 빠르게 할 수 있지만, 무엇이 연구인지 정하지는 못한다.

---

<h1 id="chapter-7">Ch.7 — 자율성은 자유가 아니라 채점자 없는 만족을 견디는 힘이다</h1>

시간, 협업, 도구의 구조가 잡혀도 박사과정은 쉽게 안정되지 않는다. 어느
순간부터는 누가 오늘의 정답을 알려 주지 않는다. 그때부터 자율성은 좋은
말이 아니라 매일 견뎌야 하는 조건이 된다.

박사과정의 어려움 중 하나는 누가 정답을 알려 주지 않는다는 점이다. 수업에는 과제가 있고, 시험에는 점수가 있고, 회사의 많은 일에는 manager가 있다. 연구에는 그런 채점자가 없다. 이 자유는 낭만적으로 보이지만 실제로는 무겁다. 자율성은 마음대로 하는 자유가 아니라, 채점자 없는 상태에서 자기 기준을 세우고 견디는 힘이다.

자율성은 horizon의 문제다. 짧은 horizon에서는 이번 주 결과를 빨리 내는 선택이 좋아 보인다. 밤을 새고, 코드를 대충 붙이고, figure를 억지로 만들면 당장은 진척처럼 보인다. 하지만 6개월, 5년 horizon으로 보면 같은 선택이 빚이 된다. 깨끗한 코드, 정확한 problem statement, 재현 가능한 실험은 당장 느리지만 긴 horizon에서는 빠르다.

비교는 이 horizon을 망가뜨린다. 옆 학생의 accept, 다른 lab의 demo, SNS의 성과를 보면 내 시간이 갑자기 느려 보인다. 비교 자체를 없앨 수는 없다. 대신 비교 대상을 옆 사람이 아니라 3개월 전의 나로 옮겨야 한다. 한 주의 변화는 잘 안 보이지만 12주의 변화는 보인다. 논문 한 편 읽는 속도, 실험 설계의 정확도, 메일의 명료함 같은 것들은 3개월 단위에서 드러난다.

멘붕도 자율성의 일부다. 큰 실패가 오면 감정은 먼저 무너진다. 이때 필요한 것은 강한 척이 아니라 단계 이름 붙이기다. 지금은 충격 단계인지, 반박 단계인지, 재정렬 단계인지 본다. 며칠 슬퍼할 수 있다. 다만 그 뒤에는 comment를 다시 읽고, 구체적인 것과 막연한 것을 나누고, 다음 행동 하나를 잡아야 한다. 멘붕을 없애는 것이 아니라 짧게 지나가게 만드는 것이다.

임포스터 감각도 비슷하다. “내가 여기 있을 자격이 있나”라는 질문은 많은 학생에게 온다. 그 질문을 인격의 결함으로 보면 더 깊어진다. 단계의 신호로 보면 다룰 수 있다. 작은 자격 자료를 모은다. 내가 해결한 문제, 받은 질문, 고친 문장, 도운 후배. 거창한 자기확신보다 이런 작은 증거가 오래 간다.

10년 후의 나는 외부 채점자 없이 사는 시간이 더 많아진다. 그래서 박사과정의 자율성은 학위 안의 문제가 아니다. 내 만족 기준을 어디에 둘지, 어느 horizon으로 결정할지, 실패를 어떤 길이로 지나가게 할지 배우는 시간이다.

---

<h1 id="chapter-8">Ch.8 — 연구가 삶이 되려면 분리보다 통합을 배워야 한다</h1>

박사과정에서 자주 듣는 말은 균형이다. 연구와 삶의 균형, 일과 쉼의 균형, 학문과 관계의 균형. 필요하다. 하지만 어느 순간 균형이라는 말은 모든 것을 따로 떼어 놓고 비율을 맞추라는 말처럼 들린다. 연구가 삶이 되는 조건은 비율 조절만으로 오지 않는다. 분리보다 통합을 배워야 한다.

통합은 하루 종일 연구만 하라는 뜻이 아니다. 오히려 반대다. 내가 왜 이 문제를 붙잡는지, 이 문제가 내 관계와 건강과 미래의 선택을 어떻게 바꾸는지, 지금의 실패가 내 삶 전체에서 어떤 크기인지 함께 보는 일이다. 연구와 행복은 완전히 다른 영역이 아니다. 연구에서 내가 드러나고, 삶의 조건이 연구의 지속성을 만든다.

좋아함과 잘함의 순서도 단순하지 않다. 처음부터 좋아해서 잘하게 되는 경우도 있지만, 오래 붙잡아 잘하게 된 뒤에 좋아지는 경우도 많다. 박사과정의 많은 일은 처음에는 좋아하기 어렵다. 논문 reject, code debugging, 모호한 문제, 긴 대기. 좋아함만 기준으로 삼으면 너무 빨리 떠나고, 잘함만 기준으로 삼으면 너무 쉽게 마른다. 둘이 서로 영향을 주는 구조를 만들어야 한다.

비판적 사고와 냉소도 구분해야 한다. 비판은 다음 행동을 만든다. 냉소는 행동을 멈춘다. 같은 문제를 보고도 “이건 안 된다”에서 끝나면 냉소이고, “어떤 조건에서 안 되며 무엇을 바꿔 볼 수 있는가”로 가면 비판이다. 박사과정의 지성은 똑똑한 부정이 아니라, 부정 뒤의 다음 단계를 찾는 힘이다.

방향, 엔진, 도구라는 세 층도 통합되어야 한다. 방향은 내가 가려는 질문이고, 엔진은 계속 움직이게 하는 이유와 리듬이며, 도구는 실제 실행 수단이다. 도구만 강하면 날카로운 칼과 빈 방향이 남는다. 방향만 있으면 움직이지 못한다. 엔진이 없으면 잠깐은 가도 지속되지 않는다.

10년 후의 나는 연구와 삶을 깔끔히 분리한 사람보다, 둘이 서로 망치지 않게 연결하는 사람이고 싶다. 박사 5년의 진짜 학습은 분야 지식만이 아니다. 내 질문, 내 시간, 내 관계, 내 몸, 내 다음 선택을 한 운영 안에서 함께 보는 법이다.

---

<h1 id="chapter-9">Ch.9 — 박사과정의 어려움은 사람마다 다르게 분배된다</h1>

대학원 조언은 종종 평균적인 학생을 상정한다. 하지만 실제 박사과정의 어려움은 사람마다 다르게 분배된다. 성별, 분야, 국적, 가족 상황, 건강, 경제 조건, 학과 문화, 비자와 임용 시장이 모두 다르다. 같은 “열심히 하면 된다”는 말이 어떤 사람에게는 도움이 되지만, 다른 사람에게는 구조적 차이를 지워 버리는 말이 된다.

여성 박사의 운영 층위는 별도로 보아야 한다. 출산과 육아, two-body problem, 학과의 성비, senior role model의 부재, 비공식 네트워크에서의 배제는 연구 능력과 별개로 시간을 바꾼다. 이것을 개인의 의지 문제로만 보면 현실을 놓친다. 필요한 것은 추상적 응원이 아니라 5-10년 앞선 사람의 구체적 경험, 제도와 자원 위치, 선택의 비용을 미리 보는 일이다.

정신건강도 임상 층위와 사건 층위를 나눠야 한다. reject를 받고 며칠 무너지는 것과, 일상 전체의 반응성이 떨어지는 것은 다르다. 전자는 사건 단위의 멘붕일 수 있고, 후자는 도움을 요청해야 할 신호일 수 있다. 이 책이 치료를 대신할 수는 없다. 다만 도움을 청하는 일이 운영의 일부라는 사실은 분명히 말해야 한다. 상담 센터, 병원, 학과 ombuds, 신뢰할 수 있는 선배의 위치를 미리 알아두는 것은 약함이 아니라 준비다.

임포스터 감각도 개인의 내면만으로 설명되지 않는다. 주변에 나와 비슷한 사람이 거의 없을 때, 언어와 문화가 다를 때, 첫 세대 대학원생일 때, 그 감각은 더 커진다. 이때 필요한 것은 단순한 자기암시가 아니다. 내가 실제로 해낸 작은 자료와, 같은 자리를 통과한 사람의 증언과, 제도적 도움의 위치가 함께 필요하다.

비이공계 박사나 산업계 전환도 마찬가지다. 분야마다 논문의 단위, 졸업의 모양, 진로의 표준이 다르다. 남의 분야 기준으로 내 속도를 재면 불필요한 열등감이 생긴다. 먼저 내 분야의 실제 운영 단위를 확인해야 한다.

10년 후에도 남는 조언은 모든 사람에게 같은 속도로 뛰라고 말하지 않는다. 각자의 제약을 숨기지 않고, 그 제약 안에서 어떤 운영이 가능한지 본다. 박사과정의 어려움은 공평하지 않다. 그래서 조언도 더 정확해야 한다.

---

<h1 id="chapter-10">Ch.10 — 졸업 전에는 후배와 교수의 시간을 보며 다음 역할을 배운다</h1>

자율성과 삶의 흔들림을 어느 정도 지나고 나면, 시선은 자연스럽게 다음
역할로 넘어간다. 졸업은 개인의 성취이지만, 졸업 직전의 시간은 혼자만의
시간이 아니다. 후배에게 무엇을 남기고, 교수와 어떤 책임을 나누며,
다음 자리에서 어떤 사람으로 보일지를 배우는 시기다.

박사 후반기에 들어서면 연구만 잘해서는 부족해진다. 자기 논문을 끝내는 일과 동시에, 다음 역할을 배우기 시작해야 한다. 그 첫 장면이 후배다. 후배를 가르치는 일은 착한 선배의 미덕만이 아니다. 내 연구의 연속성을 만들고, 내가 아는 것을 구조화하고, 미래의 리더십을 연습하는 일이다.

후배 지도에서 중요한 것은 자기 복제다. 나와 똑같은 사람을 만들라는 뜻이 아니다. 내가 시행착오로 배운 길을 다음 사람이 덜 헤매게 만드는 기록과 질문을 남긴다는 뜻이다. 코드의 README, 실험 재현 명령, 실패한 조건, 논문 읽는 순서, 첫 한 달의 작은 milestone. 이런 것들이 후배에게는 길이고, 나에게는 리더십 훈련이다.

저자권과 연속성도 이때 배운다. 누가 어떤 기여를 했는지 초기에 말하지 않으면 나중에 관계가 상한다. 좋은 선배는 후배의 성장을 도우면서도 project의 책임선을 흐리지 않는다. 후배에게 맡길 수 있는 단위와 내가 책임져야 하는 단위를 나누는 일은 나중에 PI가 되어 학생을 지도할 때 그대로 돌아온다.

교수의 일상을 아는 것도 중요하다. 교수직을 꿈꾸는 학생은 논문 쓰는 사람으로서의 교수만 상상하기 쉽다. 실제 교수의 일상은 연구, 강의, grant, 학생, service, 행정이 동시에 굴러간다. 임용 면접에서 묻는 것은 “이 학생이 좋은 결과를 냈는가”만이 아니라 “이 사람이 5-10년의 연구 프로그램을 운영할 수 있는가”다.

그래서 박사 후반기의 자기소개는 바뀌어야 한다. “저는 X를 연구한 학생입니다”에서 “저는 X 질문을 중심으로 다음 5년의 연구 프로그램을 만들고 있습니다”로 이동해야 한다. 같은 결과라도 어디에 위치시키는가에 따라 완전히 다르게 읽힌다.

10년 후의 나는 혼자 잘하는 사람만으로 남지 않는다. 누군가의 시간을 만들고, 질문을 이어 주고, 자원을 배치하고, 다음 사람이 내 일 위에 설 수 있게 해야 한다. 졸업 전 후배와 교수의 시간을 보는 이유가 여기에 있다. 다음 역할은 졸업 후 갑자기 시작되지 않는다. 박사 후반기에 이미 연습된다.

---

<h1 id="chapter-11">Ch.11 — 안정은 도착점이 아니라 계속 다시 정렬해야 하는 감각이다</h1>

박사를 시작할 때 많은 사람은 어딘가에 도착하면 안정될 것이라고 생각한다. 합격하면, 첫 논문이 나오면, 졸업하면, 임용되면, 좋은 회사에 가면. 하지만 실제로는 그 다음 불안이 온다. 안정은 어떤 지점에 도착하면 영구히 주어지는 상태가 아니다. 계속 다시 정렬해야 하는 감각에 가깝다.

졸업 후 학계로 가지 않는 일은 실패가 아니다. 많은 분야에서 산업계가 더 큰 기본값이 되었다. 학계와 산업계는 대칭적인 두 문이 아니라 이동 가능한 경로다. 학계에서 산업계로, 산업계에서 다시 학계로, 연구소에서 startup으로 이동하는 일이 더 흔해지고 있다. 그래서 진로 결정은 정체성 판결이 아니라 다음 5년의 학습 환경 선택에 가깝다.

해외 임용이나 유학도 디테일이 중요하다. 추천서, 국제 인지도, 교신저자 경험, conference network, chalk talk은 모두 박사 후반기에 갑자기 만들 수 없다. chalk talk은 특히 학생에게 낯설다. slide 없이 5-10년 연구 의제를 설명해야 하고, 학생과 grant와 collaboration의 계획까지 말해야 한다. 박사 결과가 아니라 향후 운영의 시뮬레이션을 보는 자리다.

산업계도 안정의 도착점이 아니다. 팀 재조직, project sunset, manager 교체, 인수합병, layoff는 예외가 아니라 운영 환경의 일부다. 학계의 긴 호흡과 다르게 산업계는 분기 단위의 변화가 들어온다. 박사가 가진 가치는 깊이 있는 문제 정의, 불확실한 실험 설계, 복잡한 결과 설명 능력이지만, 그 능력도 새로운 작업 단위에 맞춰 번역되어야 한다.

불안은 없어지지 않는다. 중요한 것은 불안을 없애는 것이 아니라, 불안 속에서도 다음 결정을 할 수 있는 구조를 갖는 것이다. 결정, 관계, 자율성, 감정의 누적이 진짜 좌표다. 직함과 소속은 바뀌어도 이 네 축이 남아 있으면 다음 자리로 옮겨 갈 수 있다.

10년 후에도 안정은 완성된 상태가 아닐 것이다. 다만 나는 어떤 불안이 정보이고 어떤 불안이 소음인지 더 잘 구분하게 되길 바란다. 안정적인 삶을 찾는 대신, 불안정 속에서 다시 정렬하는 능력을 기르는 것. 졸업 후의 진짜 좌표는 거기에 있다.

<h1 id="chapter-12">Ch.12 — 졸업은 안정의 도착점이 아니라 다음 5년의 첫 운영이다</h1>

졸업식은 끝처럼 보인다. 학위가 나오고, 지도교수와 사진을 찍고, 다음 소속이 생긴다. 하지만 실제 운영으로 보면 졸업은 끝이 아니라 다음 5년의 첫날이다. 박사과정에서 익힌 방식이 그대로 다음 자리로 넘어가기도 하고, 맞지 않는 방식은 첫 1년 안에 크게 부딪힌다.

첫 3개월은 새 작업 단위를 배우는 시간이다. 산업계로 가면 sprint와 stakeholder 보고가 들어오고, 교수직으로 가면 강의와 grant와 학생이 동시에 온다. postdoc은 더 독립적인 연구 의제를 요구하고, startup은 속도와 불확실성을 동시에 요구한다. 박사 5년의 호흡을 그대로 적용하면 새 자리의 평가 단위와 어긋날 수 있다.

정체성 전환도 필요하다. “나는 아직 학생”이라는 self-talk가 오래 가면 새 동료도 나를 학생처럼 대하기 쉽다. 반대로 준비 없이 너무 크게 말하면 신뢰를 잃는다. 필요한 것은 허세가 아니라 위치 전환이다. 내가 어떤 결과를 냈는가에서, 그 결과를 바탕으로 어떤 책임을 질 수 있는가로 옮겨 가야 한다.

박사 시절의 자산은 네 가지다. 논문, 코드, 관계, 평판. 논문은 후속 작업으로 이어져야 하고, 코드는 1년 뒤의 나와 후배가 다시 읽을 수 있어야 한다. 관계는 졸업 후 가장 빨리 식는다. 분기에 한 번의 짧은 연락만으로도 5년 뒤의 통로가 살아 있을 수 있다. 평판은 새로 만드는 동시에 이미 만들어진 것을 깎지 않는 일이기도 하다.

첫 1년의 함정은 박사 운영을 그대로 답습하는 것이다. 박사과정에서 통했던 깊이와 느린 호흡이 다음 자리에서는 장점이자 비용이 된다. 갈래를 옮겼으면 운영 관점도 옮겨야 한다. 다만 핵심은 같다. 문제를 좁히고, 사람과 비용을 줄이고, 다음 행동을 남기고, 긴 horizon에서 결정하는 것.

10년 후의 나는 박사학위를 자격증처럼 들고 있지 않을 것이다. 그 5년에서 배운 운영 방식을 여러 자리에서 다시 쓰고 있을 것이다. 졸업 후 첫 1년은 그 전환이 시작되는 시간이다. 졸업은 안정의 도착점이 아니라 다음 5년의 첫 운영이다.

<script>
(function() {
  'use strict';

  var DOC_TITLE = "대학원노트";
  var TOPBAR_TITLE = "대학원노트";
  var OVERVIEW_TITLE = "대학원노트";
  var OVERVIEW_SUBTITLE = "박사과정의 결정, 관계, 시간, 자율성, 감정, 그리고 졸업 이후를 하나의 5년 운영으로 묶었다.";
  var SEARCH_PLACEHOLDER = "챕터/섹션 검색... (Ctrl+K)";
  var STORAGE_KEY = "grad-notes-lang";
  var CHAPTER_GROUPS = [{"label":"Part 1 · 박사는 조건보다 5년의 운영 방식을 고르는 일이다","items":[{"kind":"chapter","num":1},{"kind":"chapter","num":2},{"kind":"chapter","num":3}]},{"label":"Part 2 · 시간과 관계는 마음이 아니라 구조로 관리된다","items":[{"kind":"chapter","num":4},{"kind":"chapter","num":5},{"kind":"chapter","num":6}]},{"label":"Part 3 · 자율성은 삶 전체가 흔들릴 때 비로소 배운다","items":[{"kind":"chapter","num":7},{"kind":"chapter","num":8},{"kind":"chapter","num":9}]},{"label":"Part 4 · 졸업은 안정이 아니라 다음 역할의 시작이다","items":[{"kind":"chapter","num":10},{"kind":"chapter","num":11},{"kind":"chapter","num":12}]}];
  var GROUP_FIRST = {};
  CHAPTER_GROUPS.forEach(function(group) {
    if (group.items.length) GROUP_FIRST[group.items[0].kind + '-' + group.items[0].num] = group.label;
  });

  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
      }
      try { return hljs.highlightAuto(code).value; } catch(e) {}
      return code;
    },
    breaks: false,
    gfm: true
  });
  marked.use({ renderer: { del: function(token) { return '~' + (token.text || token) + '~'; } } });

  if (window.mermaid) {
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
  }

  function protectMath(src) {
    var placeholders = [];
    var idx = 0;
    var codeBlocks = [];
    src = src.replace(new RegExp('\\x60\\x60\\x60[\\s\\S]*?\\x60\\x60\\x60', 'g'), function(m) {
      codeBlocks.push(m);
      return '%%CODEBLOCK' + (codeBlocks.length - 1) + '%%';
    });
    var inlineCodes = [];
    src = src.replace(new RegExp('\\x60[^\\x60\\n]+\\x60', 'g'), function(m) {
      inlineCodes.push(m);
      return '%%INLINECODE' + (inlineCodes.length - 1) + '%%';
    });
    src = src.replace(/\$\$([\s\S]*?)\$\$/g, function(m, math) {
      placeholders.push({ display: true, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/\$([^\s$](?:[^$]*[^\s$])?)\$/g, function(m, math) {
      placeholders.push({ display: false, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/%%CODEBLOCK(\d+)%%/g, function(m, i) { return codeBlocks[parseInt(i, 10)]; });
    src = src.replace(/%%INLINECODE(\d+)%%/g, function(m, i) { return inlineCodes[parseInt(i, 10)]; });
    return { src: src, placeholders: placeholders };
  }

  function restoreAndRenderMath(html, placeholders) {
    return html.replace(/%%MATH(\d+)%%/g, function(m, i) {
      var p = placeholders[parseInt(i, 10)];
      try {
        return katex.renderToString(p.math, { displayMode: p.display, throwOnError: false, trust: true });
      } catch(e) {
        return p.display ? '$$' + p.math + '$$' : '$' + p.math + '$';
      }
    });
  }

  var state = { observer: null, scrollHandler: null };
  var contentEl = document.getElementById('content');
  var loadingEl = document.getElementById('loading');
  var tocContainer = document.getElementById('toc-container');

  function applyChrome() {
    document.documentElement.lang = 'ko';
    document.title = DOC_TITLE;
    document.getElementById('topbar-title').textContent = TOPBAR_TITLE;
    document.getElementById('search-input').placeholder = SEARCH_PLACEHOLDER;
    document.getElementById('toc-no-results').textContent = '검색 결과 없음';
    document.getElementById('loading-text').textContent = '가이드 렌더링 중...';
    document.querySelectorAll('#lang-toggle a').forEach(function(a) { a.classList.add('active'); });
    try { localStorage.setItem(STORAGE_KEY, 'ko'); } catch(e) {}
  }

  function parseHeading(text) {
    var ch = text.trim().match(/^Ch\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ch) return { kind: 'chapter', num: parseInt(ch[1], 10), title: ch[2].trim(), label: 'Ch.' + parseInt(ch[1], 10) };
    var ex = text.trim().match(/^E\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ex) return { kind: 'excerpt', num: parseInt(ex[1], 10), title: ex[2].trim(), label: 'E.' + parseInt(ex[1], 10) };
    return null;
  }

  function render() {
    applyChrome();
    contentEl.style.display = 'none';
    loadingEl.style.display = 'flex';

    requestAnimationFrame(function() {
      var src = document.getElementById('md-source-ko').value;
      src = src.replace(/\*\*([^*\n]+)\*\*(?=[가-힣])/g, '<strong>$1</strong>');
      var mathData = protectMath(src);
      var html = marked.parse(mathData.src);
      html = restoreAndRenderMath(html, mathData.placeholders);
      contentEl.innerHTML = html;

      if (window.mermaid) {
        var mermaidBlocks = contentEl.querySelectorAll('pre > code.language-mermaid');
        mermaidBlocks.forEach(function(code, i) {
          var pre = code.parentElement;
          var container = document.createElement('div');
          container.className = 'mermaid';
          container.id = 'mermaid-ko-' + i;
          container.textContent = code.textContent;
          pre.replaceWith(container);
        });
        try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}
      }

      tocContainer.innerHTML = '';
      buildOverview();
      buildTOC();
      contentEl.style.display = 'block';
      loadingEl.style.display = 'none';
      setupScrollTracking();

      if (window.location.hash) {
        var initId = window.location.hash.slice(1);
        var initTarget = document.getElementById(initId);
        if (initTarget) window.scrollTo(0, initTarget.getBoundingClientRect().top + window.scrollY - 60);
      }
    });
  }

  render();
  setupSearch();
  setupProgressBar();
  setupMobileMenu();
  setupKeyboard();
  setupTocDelegation();

  function setupTocDelegation() {
    tocContainer.addEventListener('click', function(e) {
      if (e.target.closest('.toc-item')) closeMobileSidebar();
    });
  }

  function buildOverview() {
    var h1s = contentEl.querySelectorAll('h1');
    var entries = {};

    h1s.forEach(function(h1) {
      var parsed = parseHeading(h1.textContent);
      if (!parsed) return;
      if (!h1.id) h1.id = parsed.kind + '-' + parsed.num;
      var sections = [];
      var node = h1.nextElementSibling;
      while (node && node.tagName !== 'H1') {
        if (node.tagName === 'H2') {
          if (!node.id) node.id = slugify(node.textContent);
          sections.push({ text: node.textContent.trim(), id: node.id });
        }
        node = node.nextElementSibling;
      }
      entries[parsed.kind + '-' + parsed.num] = {
        kind: parsed.kind,
        num: parsed.num,
        label: parsed.label,
        title: parsed.title,
        id: h1.id,
        sections: sections
      };
    });

    if (Object.keys(entries).length === 0) return;

    var overview = document.createElement('section');
    overview.className = 'guide-overview';
    var header = document.createElement('div');
    header.className = 'overview-header';
    var oTitle = document.createElement('h1');
    oTitle.className = 'overview-title';
    oTitle.textContent = OVERVIEW_TITLE;
    header.appendChild(oTitle);
    var oSub = document.createElement('p');
    oSub.className = 'overview-subtitle';
    oSub.textContent = OVERVIEW_SUBTITLE;
    header.appendChild(oSub);
    overview.appendChild(header);

    CHAPTER_GROUPS.forEach(function(group) {
      var valid = group.items.map(function(item) { return entries[item.kind + '-' + item.num]; }).filter(Boolean);
      if (!valid.length) return;
      var groupEl = document.createElement('div');
      groupEl.className = 'overview-group';
      var label = document.createElement('div');
      label.className = 'overview-group-label';
      label.textContent = group.label;
      groupEl.appendChild(label);

      valid.forEach(function(entry) {
        var wrap = document.createElement('div');
        wrap.className = 'overview-chapter';
        var link = document.createElement('a');
        link.className = 'overview-chapter-link';
        link.href = '#' + entry.id;
        var num = document.createElement('span');
        num.className = 'overview-chapter-num';
        num.textContent = entry.label;
        link.appendChild(num);
        link.appendChild(document.createTextNode(entry.title));
        wrap.appendChild(link);

        if (entry.sections.length) {
          var secs = document.createElement('div');
          secs.className = 'overview-sections';
          entry.sections.forEach(function(section, i) {
            if (i > 0) {
              var sep = document.createElement('span');
              sep.className = 'sep';
              sep.textContent = '·';
              secs.appendChild(sep);
            }
            var sLink = document.createElement('a');
            sLink.href = '#' + section.id;
            sLink.textContent = section.text;
            secs.appendChild(sLink);
          });
          wrap.appendChild(secs);
        }
        groupEl.appendChild(wrap);
      });
      overview.appendChild(groupEl);
    });

    contentEl.insertBefore(overview, contentEl.firstChild);
  }

  function buildTOC() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var fragment = document.createDocumentFragment();
    headings.forEach(function(heading) {
      if (!heading.id) heading.id = slugify(heading.textContent);
      if (heading.classList.contains('overview-title')) return;

      if (heading.tagName === 'H1') {
        var parsed = parseHeading(heading.textContent);
        if (parsed) {
          var key = parsed.kind + '-' + parsed.num;
          if (GROUP_FIRST[key]) {
            var label = document.createElement('div');
            label.className = 'toc-group-label';
            label.textContent = GROUP_FIRST[key];
            fragment.appendChild(label);
          }
        }
      }

      var link = document.createElement('a');
      link.className = 'toc-item toc-' + heading.tagName.toLowerCase();
      link.href = '#' + heading.id;
      link.textContent = heading.textContent;
      link.dataset.headingId = heading.id;
      fragment.appendChild(link);
    });
    tocContainer.appendChild(fragment);
  }

  function slugify(text) {
    return text.toLowerCase().trim()
      .replace(/<[^>]+>/g, '')
      .replace(/[^\w\s가-힣-]/g, '')
      .replace(/\s+/g, '-')
      .substring(0, 80) || 'section';
  }

  function setupScrollTracking() {
    var headings = contentEl.querySelectorAll('h1, h2');
    var tocItems = tocContainer.querySelectorAll('.toc-item');
    if (headings.length === 0) return;
    if (state.observer) state.observer.disconnect();

    var tocMap = {};
    tocItems.forEach(function(item) { tocMap[item.dataset.headingId] = item; });
    var currentActive = null;
    var observer = new IntersectionObserver(function(entries) {
      var topHeading = null;
      var topOffset = Infinity;
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var rect = entry.target.getBoundingClientRect();
          if (rect.top < topOffset) { topOffset = rect.top; topHeading = entry.target; }
        }
      });
      if (topHeading) {
        if (currentActive) currentActive.classList.remove('active');
        var item = tocMap[topHeading.id];
        if (item) {
          item.classList.add('active');
          currentActive = item;
          var itemRect = item.getBoundingClientRect();
          var containerRect = tocContainer.getBoundingClientRect();
          if (itemRect.top < containerRect.top || itemRect.bottom > containerRect.bottom) item.scrollIntoView({ block: 'center', behavior: 'auto' });
        }
      }
    }, { rootMargin: '-60px 0px -70% 0px', threshold: 0 });
    headings.forEach(function(h) { observer.observe(h); });
    state.observer = observer;

    if (!state.scrollHandler) {
      var ticking = false;
      state.scrollHandler = function() {
        if (!ticking) {
          requestAnimationFrame(function() {
            var curHeadings = contentEl.querySelectorAll('h1, h2');
            var curTocItems = tocContainer.querySelectorAll('.toc-item');
            var curMap = {};
            curTocItems.forEach(function(item) { curMap[item.dataset.headingId] = item; });
            var found = null;
            var scrollTop = window.scrollY + 80;
            for (var i = curHeadings.length - 1; i >= 0; i--) {
              if (curHeadings[i].offsetTop <= scrollTop) { found = curHeadings[i]; break; }
            }
            if (found) {
              var active = tocContainer.querySelector('.toc-item.active');
              if (active) active.classList.remove('active');
              var item = curMap[found.id];
              if (item) item.classList.add('active');
            }
            ticking = false;
          });
          ticking = true;
        }
      };
      window.addEventListener('scroll', state.scrollHandler);
    }
  }

  function setupSearch() {
    var searchInput = document.getElementById('search-input');
    var noResults = document.getElementById('toc-no-results');
    searchInput.addEventListener('input', function() {
      var query = this.value.trim().toLowerCase();
      var tocItems = tocContainer.querySelectorAll('.toc-item');
      var groupLabels = tocContainer.querySelectorAll('.toc-group-label');
      if (!query) {
        tocItems.forEach(function(item) { item.classList.remove('toc-hidden'); });
        groupLabels.forEach(function(label) { label.classList.remove('toc-hidden'); });
        noResults.style.display = 'none';
        return;
      }
      var matchCount = 0;
      tocItems.forEach(function(item) {
        var text = item.textContent.toLowerCase();
        if (text.includes(query)) { item.classList.remove('toc-hidden'); matchCount++; }
        else item.classList.add('toc-hidden');
      });
      groupLabels.forEach(function(label) { label.classList.add('toc-hidden'); });
      noResults.style.display = matchCount === 0 ? 'block' : 'none';
    });
  }

  function setupProgressBar() {
    var progressBar = document.getElementById('progress-bar');
    var ticking = false;
    function updateProgress() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = Math.min(progress, 100) + '%';
    }
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() { updateProgress(); ticking = false; });
        ticking = true;
      }
    });
    updateProgress();
  }

  function setupMobileMenu() {
    var toggle = document.getElementById('menu-toggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.querySelector('#sidebar-overlay');
    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('visible');
    });
    overlay.addEventListener('click', closeMobileSidebar);
  }

  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.querySelector('#sidebar-overlay').classList.remove('visible');
  }

  function setupKeyboard() {
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        document.getElementById('search-input').focus();
      }
    });
  }
})();
</script>
