<h1 id="chapter-14">Ch.14 — 자율성의 무게 — 채점자 없는 만족</h1>

Part 3가 박사 일상의 *시간·관계·도구* 차원이었다면, Part 4는 그 일상 아래에 깔린 *감정과 페이스*의 차원을 본다. 같은 한 주를 보내도 어떤 학생은 5년을 견디고 어떤 학생은 2년차에 무너진다. 차이는 능력이나 분야가 아니라 *채점 시스템의 부재를 자기 운영으로 메우는 관점*에 있다. 이 장은 그 시스템의 빈자리를 직시하는 데서 시작한다.

학부까지의 학생은 시험·과제·학점이라는 외부 채점 안에서 살아왔다. 점수가 나오면 만족이 결정되고, 점수가 안 나오면 불만족이 결정된다. 만족 기준의 결정권이 *외부에 있는* 셈이다. 그러다 대학원에 들어오면 그 시스템이 사라진다. 무엇을 얼마나 했는지, 어디까지가 충분한지, 어디서 멈춰도 되는지 — 답해 줄 사람이 없다. 지도교수도 채점자가 아니라 *조언자*다.

[엄태웅 작가 「자기관리」](https://gradschoolstory.chkwon.net)가 이 자리를 한 줄로 박아 둔 표현이 이 장의 톤을 정한다.

> *"그 누구도 당신의 만족을 채점해 줄 수 없다."*

이 장은 만족 기준이 외부에서 주어지지 않는다는 사실을 직시하고, 그 빈자리를 자기 운영으로 메우는 관점을 다룬다. [「연구노트」 Part 2 A ch01(마음가짐)](../research-notes/guide.html#chapter-16)이 같은 마인드를 *논문 한 편 쓰기* 차원에 적용했다면, 이 장은 같은 관점을 *5년 운영* 차원에 옮긴다. 두 책에서 같은 닻이 다른 작업 깊이에 걸린다.

---

## 14.1 채점자 없는 시스템

학부의 만족은 외부 채점에 묶여 있었다. 학점·등수·합격이라는 숫자가 매 학기 한 번씩 자기 위치를 답해 주었고, 그 숫자가 좋으면 한 학기가 만족으로 닫히고 나쁘면 다음 학기에 회복할 자리가 있었다. 어느 쪽이든 *어디까지가 충분한가*에 답해 줄 사람이 외부에 있었다.

대학원에는 그 시스템이 없다. 학점은 졸업 요건의 한 줄로 축소되고, 등수는 사라지며, 합격·불합격이라는 이분법은 자격시험 한두 번에서 끝난다. 한 주의 노력이 충분했는지, 한 학기의 진척이 정상 곡선 위에 있는지, 같은 주제를 한 달 더 잡고 있어도 되는지 — 답해 줄 사람이 없다.

지도교수도 채점자가 아니다. 학기말에 점수를 매기는 자리가 아니라, 매주 의견을 듣고 자기 책임으로 결정하는 자리에 학생이 와 있다. 이 차이를 늦게 감지한 학생은 매주 미팅을 *채점받는 자리*로 만든다. 의견은 *판단*으로 환산되고, 판단은 자기 노력의 음수 신호로 읽힌다. 같은 미팅에서 같은 코멘트가 나와도, *조언*으로 받는 학생과 *판결*로 받는 학생이 5년 후 다른 자리에 가 있다.

> **만족 기준은 외부에서 주어지지 않는다.** 지도교수·동기·SNS는 채점자가 아니다 — 채점자를 외부에 두면 5년 내내 흔들린다.

채점자의 외주가 끊긴 자리에 *자기 채점*이 들어와야 한다. 자기 채점이 곧 자율성이고, 그 자율성을 운영하는 일이 박사 5년의 진짜 작업이다. 분야 지식의 깊이보다 먼저 자라야 하는 근육이 따로 있는데, 그것이 자기 채점 근육이다.

자기 채점 근육의 한 면을 엔지니어링 관점으로 보면 *optimization horizon*의 길이로 환산된다. 같은 관점을 한 줄로 박은 표현이 다음과 같다.

> *"이 세상 모든 것이 optimization이다."*
>
> — 현동진 박사, Head of Robotics LAB, Hyundai Motor Company

엔지니어가 다루는 문제에는 정답이 없고 *조건 하의 최선*만 있다. 자기 운영도 같은 구조다 — 만족 기준이 외부에서 주어지지 않으므로, 매주의 결정은 *불확실한 미래 state*에서 *기대 보상을 최대화하는 선택지*를 고르는 작업이다. 다만 이 작업이 흔들리는 자리가 *horizon 길이*다. 단기 horizon에서 greedy 최적화를 돌리면, 이번 주 실험 결과를 빨리 내려고 밤을 새는 쪽이 최적해로 잡힌다. 한편 6개월·5년까지 horizon을 늘리면, 같은 일주일을 코드 구조화에 쓰는 쪽이 압도적으로 낫다 — 깨끗한 코드가 이후 실험을 10배 빨리 반복하게 해주기 때문이다. 자율성 운영이 흔들리는 학생을 멀리서 보면, 능력이 부족한 게 아니라 *horizon이 짧은 채로* 결정을 내리고 있다. 미래의 자기 — 3년 뒤의 커리어, 건강, 관계 — 가 의사결정 모델의 state space에 빠져 있으면, 매주의 greedy 최적화가 5년 누적에서 자기 한 줄을 만들지 않는다.

horizon 확장이 곧 *애티튜드*다. 똑똑한 사람이 빠른 건 맞지만, 5년 누적에서 갈리는 자리는 능력이 아니라 horizon이다 — 틀린 걸 인정하는 자세, 모르는 걸 모른다고 하는 자세, 고집은 있되 고착되지 않는 자세. 3개월 차이는 능력으로 갈리지만, 3년 차이는 horizon으로 갈린다. 자기 채점 근육의 진짜 학습 대상은 *horizon을 늘리는 운영*이다.

자율성의 무게를 직접 짚은 한 일기가 미국 코호트에서 보고된다. Philip Guo는 박사 4년차에 Microsoft Research 인턴 자리로 옮겨 *완전한 지적 자유*를 가져 본 시점을, 회복이 아니라 *무게*로 적었다.

> **Philip Guo (Stanford CS PhD, 2012):** 완전한 지적 자유의 시간이 들어왔을 때 그 자유를 *저주*로 적었다 — 자유의 시간 그 자체가 아니라, *그 자유를 운영할 자기 채점 근육이 아직 자라 있지 않다*는 사실의 무게였다. 자율성은 외부 채점이 빠진 자리에 자동으로 도착하지 않고, 그 빈자리에 자기 ledger가 자라기를 기다린다. — *The PhD Grind* Year 4 (Reboot) · Year 5 (Production)

## 14.2 대학원의 가치 재정의

같은 시점에 대학원의 *가치*에 대한 관점도 다시 그려진다. 입학 직전까지의 관점은 흔히 *지식 습득* — 분야의 깊은 내용을 5년 안에 채워 넣고 졸업한다는 그림이다. 이 관점이 잘못된 것은 아니지만, 5년의 무게를 견디기에는 약하다.

분야 지식은 졸업 후 5–10년 안에 상당 부분 낡거나 갱신된다. 박사 1년차에 익힌 베이스라인이 5년차에는 SOTA가 아니고, 졸업 시점의 도구가 포닥 시점에는 deprecated가 되어 있다. 결국 *지식 자체*를 대학원의 가치로 잡으면, 그 가치는 졸업하자마자 감가상각이 시작된다.

엄태웅 작가가 같은 자리를 적은 표현이 다음과 같다.

> *"여러분의 지식은 나중에 없어질 수도 있겠지만 여러분이 그 때 가졌던 태도는 오래도록 남아있을 것이다."*
>
> — 엄태웅 작가, 「자기관리」

5년 뒤 남는 것은 사실이 아니라 태도다. 분야 사실 99%가 갱신되어도, 채점자 없이 5년을 운영해 본 *경험*은 갱신되지 않는다. 어떤 주에 무엇에 시간을 분배할지 매번 자기 손으로 결정해 본 누적이, 졸업 후 어떤 분야로 옮겨 가도 같은 관점으로 작동한다. 이 누적이 대학원의 진짜 가치로 남는다.

이 관점이 들어오면 *지식 습득량*에 대한 비교가 한 단계 잠잠해진다. 옆 학생이 더 많은 논문을 읽었거나 더 깊은 수식을 푼다는 사실이, 자기 *자율성 운영* 곡선과 직접 비교되는 신호가 아니라는 점을 매번 떠올릴 수 있다. 비교의 작동 방식 그 자체는 다음 챕터에서 따로 본다.

분야 쪽 논의에서 같은 관점이 *모르는 자리의 정상화*로 적용 사례된다.

> "3학년 학부생이 SLAM을 모르는 건 당연하다. 부끄러워하지 말고 물어봐야 한다."
>
> — robotics-practice ch21 § 생존 마인드셋

이 한 줄이 *지식 습득량* 관점의 학년별 적용이다. 1년차에 모르는 자리가 가장 많은 것이 결함이 아니라 *시기에 정상인 풍경*이라는 진단이다. 채점자가 외부에 없는 시스템에서 *모름의 노출*은 자기 채점의 한 행이고, 그 노출이 막히면 1년차의 학습 곡선이 가장 먼저 끊긴다.

---

## 14.3 주체성 — 도구가 되지 않는 일

자율성의 무게가 가시화되는 첫 자리가 *주체성*이다. 같은 5년이 어떤 학생에게는 자기 연구로 누적되고, 어떤 학생에게는 *지도교수의 손*으로 누적된다. 졸업 시점에 자기 연구의 한 줄이 없는 학생은 능력이 부족했던 학생이 아니라, 5년 내내 *도구*의 자리에 있었던 학생일 가능성이 높다.

도구로서의 대학원생은 받은 주제를 푸는 손이다. 시키는 코드를 돌리고, 받은 figure를 그리고, 정해진 baseline에 새 모듈을 붙이는 동안, 5년 동안 결과물의 양은 적지 않게 쌓인다. 그러나 *주제 설정*의 결정이 학생 손에 들어온 적이 없다. 그제서야 졸업 직전에 자기 연구를 한 줄로 답하라는 질문 앞에서 답이 막힌다.

주체로서의 대학원생은 *방향 결정*에 자기 몫으로 들어간다. 같은 도구를 같은 baseline 위에서 굴려도, 왜 이 모듈이 이 자리에 들어오는지·다음 단계로 무엇이 와야 하는지에 대한 가설이 학생 손에서 시작된다. 지도교수의 의견은 그 가설을 검증·수정하는 자리에 놓이고, 5년이 지나면 자기 연구의 한 줄이 자연스럽게 답해진다.

엄태웅 작가가 이 차이를 한 줄로 박아 둔 표현이 다음과 같다.

> *"물고기를 주지 말고 잡는 법을 가르쳐라."*
>
> — 엄태웅 작가, 「자기관리」

같은 권고의 *학생 측 적용*이 본 chapter의 관점이다. 주는 쪽 관점은 흔히 교수의 자세를 권하지만, 받는 쪽에서 같은 관점을 뒤집으면, 학생의 자세는 *답을 받지 말고 답을 내는 절차를 익힌다*가 된다. 미팅에서 정답을 받아 나오는 학생과, 의견을 듣고 자기 결정을 갱신하는 학생의 차이가 여기서 갈린다.

「대학원노트」 [Part 3 ch01(내 연구를 갖기)](#chapter-7)이 같은 주체성 곡선의 *작업 차원*을 다룬다면, 이 절은 그 곡선의 *마음 차원*을 본다. 두 차원이 분리되어 있어서, 한쪽이 늦게 자라면 다른 쪽이 따라잡기 어렵다. 작업 차원은 누적되어도 마음 차원이 도구의 자세에 머물면, 5년 후 *연구는 있는데 자기 연구가 없는* 자리에 도착한다.

## 14.4 시간 분배 — 자율성의 가시화

자율성은 추상적인 단어가 아니다. 한 주의 시간을 어디에 썼는가의 *ledger*로 매주 가시화된다. 결과의 양보다 분배의 모양이 자기 채점표가 된다.

학부의 시간은 외부 일정으로 채워져 있었다. 강의 시간·과제 마감·시험 기간이 한 주의 뼈대였고, 자유 시간은 그 뼈대 사이의 여백이었다. 그러던 것이 대학원에서는 그 뼈대가 거의 사라진다. 강의는 한두 과목으로 줄고, 마감은 본인이 만들거나 외부 학회 일정에 동기화하며, 한 주의 168시간 중 외부에서 정해 주는 시간이 한 자릿수 시간으로 줄어든다.

비어 있는 시간은 자유가 아니라 결재 항목이다. 연구·공부·개인 활동의 비율을 외부 표준에서 가져올 수 없으므로, 옆 학생의 비율, 랩 평균의 비율, 트위터의 "박사과정 시간 분배" 추천이 자기 분배의 답이 아니다. *자기가 정한다*. 정한 결과를 한 주 단위로 적어 두고, 한 달 단위로 패턴을 본다.

이 ledger가 자기 채점표다. 결과 항목 — 논문 한 편 어디까지 갔는가 — 은 한 분기 단위로만 답이 나온다. 한 주 단위에서 답이 나오는 항목은 *분배 항목* — 연구에 몇 시간, 공부에 몇 시간, 개인 활동에 몇 시간을 결재했는가 — 다. 분배가 결과를 낳지 결과가 분배를 낳지 않는다. 분배를 자기 손으로 적어 본 학생은, 결과가 한 분기 안 나오는 시즌에도 *자율성은 운영되고 있다*는 신호를 한 주 단위로 받을 수 있다.

> 시간 ledger를 한 주 단위로 적는다 — 결과가 아니라 *분배*가 자기 채점표.

분배 항목에서 흔히 빠지는 자리가 감정 영역이다. 연애·취미·관계·운동·휴식이 결재 항목에 빠진 학생은 5년 후 연구 외에 남는 것이 없다. 이 자리는 연구의 반대가 아니라 자율성의 한 축이다. *자율적으로* 결재한 휴식은 회복이고, 자율성 없이 흘려보낸 휴식은 죄책감으로 남는다. 같은 한 시간을 어떤 관점으로 결재했는가가 차이의 전부다.

> 감정 영역(연애·취미·관계)을 결재 항목에서 빼지 않는다 — 연구의 반대가 아니라 자율성의 한 축.

「대학원노트」 [Part 3 ch02(시간 쓰는 법)](#chapter-8)이 같은 ledger의 *작업 차원* 운영을 다룬다면, 이 절은 같은 ledger를 *자기 채점표*로 보는 마음 차원을 다룬다. 두 차원이 같은 노트의 양면에 적힌다.

---

## 14.5 지도교수의 위상 전환

자율성 관점이 가장 자주 시험받는 자리가 지도교수와의 관계다. 학부까지의 관점은 *지도자*였다. 정답을 가진 사람이 있고, 학생은 그 답을 받으러 가며, 답이 안 나오면 책임은 지도자 쪽에 있다. 이 관점이 대학원에 그대로 들어오면 5년이 길어진다.

대학원의 관점은 *조언자*다. 의견을 가진 사람이 있고, 학생은 의견을 듣고 자기 책임으로 결정한다 — 결정의 무게는 학생 쪽에 있다. 같은 미팅에서 같은 코멘트가 나와도, *지도자* 관점의 학생은 코멘트를 *명령*으로 변환하고, *조언자* 관점의 학생은 코멘트를 *입력*으로 변환한다. 결국 변환의 차이가 5년의 누적 차이를 만든다.

전환은 한 번에 일어나지 않는다. 1년차에는 *지도자* 관점이 자연스럽다. 모르는 자리가 많고, 받은 의견을 그대로 따르는 것이 합리적인 시즌이다. 2년차에 와서 같은 관점이 그대로 굳어 있으면 신호이고, 3년차에 *조언자* 관점이 정착되지 않은 학생은 5년차에 자기 연구의 한 줄이 답해지지 않는다.

> 지도교수의 위상을 1·2·3년차에 다시 묻는다 — *지도자* → *조언자*의 전환이 늦으면 5년차에 자기 연구가 없다.

전환의 표지는 미팅의 발화 분포에서 드러난다. 1년차의 미팅이 *교수 70 / 학생 30*이라면 정상이다. 3년차의 미팅이 같은 비율이면 위상 전환이 늦은 신호다. 3년차에는 *교수 30 / 학생 70*에 가까워야 한다 — 학생이 가설·계획·결정 후보를 들고 들어오고, 교수가 그 위에서 의견을 얹는다. 발화 분포가 뒤집히는 시점이 학생의 위상이 *조언받는 사람*에서 *조언을 운영하는 사람*으로 옮겨 가는 시점이다.

「대학원노트」 [Part 2 ch01(관계는 양방향)](#chapter-4) · [ch02(신호 읽기)](#chapter-5)가 같은 관계의 *기대 매칭과 신호* 차원을 다룬다면, 이 절은 그 관계를 *학생의 위상 전환*이라는 시간 곡선 위에서 본다.

---

## 14.6 자기 한 줄

자기 채점이 정착되어도 외부 신호의 압력은 없어지지 않는다. 동기의 논문 게재, 옆 랩의 best paper, SNS의 학회 사진은 매주 자기 자율성 운영을 흔드는 입력이고, 그 입력이 들어왔을 때 흔들리지 않을 *닻*이 따로 있어야 한다.

이 닻이 *자기 한 줄*이다. 외부 인정이 없을 때도 5년의 작업이 의미를 갖는 한 문장 — 분야의 어떤 질문에 답하려고 5년을 쓰고 있는가, 한 문장으로 답할 수 있어야 한다. 이 문장은 한 번에 만들어지지 않는다. 1년차의 한 줄은 입학 동기의 변형이고, 3년차의 한 줄은 첫 논문의 정리이며, 5년차의 한 줄은 졸업 논문의 압축이다. 매년 갱신되지만, *어떤 시점에도 한 줄로 답할 수 있다*는 사실이 자율성의 닻이 된다.

> **자기 한 줄을 갖는다.** 외부 인정이 없을 때도 흔들리지 않을 한 문장이 없으면 첫 멘붕에서 회복이 길다.

「대학원노트」 [Part 1 ch01(박사를 결정한다는 일)](#chapter-1)에서 *진학 자격의 한 문장*을 적었던 자리가 본 한 줄과 연속된다. 진학 시점의 한 문장이 1년차의 한 줄로, 3년차의 한 줄로 갱신되어 간다. 갱신의 흔적이 자기 운영의 곡선이고, 그 곡선이 5년의 자율성을 가시화한다.

다음 챕터는 이 자기 한 줄이 가장 자주 흔들리는 자리 — *비교* — 의 작동 방식을 본다. 채점자가 없는 시스템에서 비교가 왜 가장 큰 위협이 되는가, 그리고 *뒤쳐질 권리*가 왜 굿 라이프의 전제가 되는가를 다룬다.

<h1 id="chapter-15">Ch.15 — 비교의 함정 — 뒤쳐질 권리</h1>

[Ch.1 (자율성의 무게)](#chapter-14)이 채점자 없는 시스템의 빈자리를 *자기 채점*으로 메우는 관점이었다면, 이 장은 그 자기 채점이 가장 자주 흔들리는 자리 — *비교* — 의 작동 방식을 본다. 채점자가 외부에 없는 시스템에서 비교는 채점의 빈자리를 대체하려고 자동으로 들어온다. 동기의 논문, 옆 랩의 발표, SNS의 학회 사진이 매일 자기 진도를 음수 신호로 환산한다. 이 환산이 끊기지 않으면 1·2년차의 자기 한 줄이 3년차에 닳고, 4년차에 사라진다.

박사 5년의 가장 큰 위협은 연구의 어려움 그 자체가 아니다. *비교*다. 이 사실을 한 줄로 박아 둔 표현이 다음과 같다.

> *"결국 계속적으로 나를 괴롭히는 가장 큰 적은 나 자신 밖에 없었다."*
>
> — [엄태웅 작가 「뒤쳐질 행복」](https://gradschoolstory.chkwon.net)

이 장은 비교를 *해결*하려는 시도를 멈추고, 비교 그 자체의 작동 방식을 직시한 뒤, *뒤쳐질 권리*를 자기 운영의 전제 조건으로 삼는 관점을 다룬다. 인생은 일회성 단거리 경주가 아니라 장거리 누적이며, *방향*과 *속도*는 분리된 변수다. [「연구노트」 Part 2 A ch01](../research-notes/guide.html#chapter-16)의 *accept 천장이 없는 글*이라는 관점이 같은 메커니즘의 *논문 한 편* 차원이라면, 이 장은 같은 메커니즘이 *5년 페이스* 차원에 그대로 적용된다.

---

## 15.1 비교의 작동 방식

비교는 의지로 시작되는 입력이 아니라 *외부 기준의 자동 환산*이다. 동기의 논문 게재 트윗이 타임라인에 한 줄 떠 있으면, 그 한 줄이 자기 한 주의 진도를 *음수 신호*로 환산해 버린다. 옆 랩의 best paper 소식이 슬랙에 떨어지면, 같은 분야의 같은 시기에 자기 진도가 평균선 아래로 내려간 것처럼 읽힌다. 환산은 자동이고 의지보다 빠르다.

이 자동 환산이 박사 과정에 특히 강한 이유는 시스템의 빈자리 때문이다. 학부에서는 학점·등수가 매 학기 자기 위치를 답해 주었고, 그 답이 외부 기준을 *흡수*해 주었다. 옆 학생의 점수가 더 높아도, 자기 점수가 절대값으로 답해진 자리에서는 비교가 일시적이었다. 박사 과정에는 그 답이 없다. 매주 자기 위치를 답해 줄 외부 숫자가 없으니, 비교 대상이 그 빈자리를 *대체*한다 — 동기의 논문 한 편이 자기 위치를 답해 주는 임시 숫자가 된다.

대체된 숫자는 신뢰할 수 없는 숫자다. 같은 분야의 두 학생도 주제·지도교수·시작 시점·개인 사정이 모두 다르고, 두 사람의 진도를 같은 축에서 비교할 수 없다. 그런데도 자동 환산은 그 차이를 무시한다. 같은 *분야*라는 단 하나의 공통점이 두 진도를 같은 축에 올려 놓고, 차이를 한 변수 — *진척의 양* — 으로 환산해 버린다.

비교의 두 번째 특성은 *구조적으로 해결되지 않는다*는 점이다. 위에 올라가면 더 위가 있다. KAIST에 합격하면 MIT가 보이고, MIT에 합격하면 같은 lab의 두 명이 보이고, 그 둘 중 한 명이 되면 상위 콘퍼런스의 PI들이 보인다. 분야를 옮겨도 새 비교 대상이 자동으로 들어온다. 비교 대상을 바꾸거나 분야를 옮기는 것으로 비교는 풀리지 않으므로, *비교 그 자체를 끄는 일상 도구*가 따로 필요하다.

> **비교는 구조적으로 해결되지 않는다.** 비교 대상을 바꾸거나 분야를 옮기는 것으로는 풀리지 않는다 — 비교 그 자체를 끄는 일상 도구가 필요.

세 번째 특성이 가장 무겁다. 비교의 진짜 적은 비교 대상이 아니라 *자기 자신*이다. 동기의 논문은 트위터를 닫으면 시야에서 사라지지만, 한 번 환산된 *부족함*은 자기 안에서 운영된다. 외부 기준을 자기 안으로 들여놓는 한, 비교 대상이 사라져도 같은 환산이 계속된다. 1년 전의 자기와도 비교하고, 5년 전의 자기와도 비교하고, 미래의 가상 자기와도 비교한다. 결국 적은 외부에 있지 않다.

## 15.2 평균선 함정

비교의 자동 환산이 가장 자주 빠지는 함정이 *평균선의 오설정*이다. 최고 성능을 평균으로 잡는 일.

같은 분야의 인상적인 학생들의 *정점* — 한 해의 best paper, 한 학회의 oral, 한 분기의 폭발적인 진도 — 만 모아 보면, 그 정점이 자기 한 주의 *기대선*으로 자리 잡는다. 그렇게 매주 정점에 미달이고, 매일이 부족함으로 도배된다. 같은 학생이 그 정점을 만들 때까지 보낸 *나쁜 날*과 *평균인 날*은 외부에서 보이지 않는다. 보이는 것은 트윗 한 줄로 압축된 best paper뿐이다.

자기 평균선을 다시 그리는 작업이 이 함정의 처방이다. 한 분기 노트를 펼쳐 *나쁜 날·평균인 날·좋은 날*의 분포를 적어 본다. 5일 평균 / 7일 평균 / 14일 평균 어디에 자기 페이스의 평균선이 있는지를 본인 데이터로 답해 본다. 이 평균선은 정점이 아니라 평균에 있다. 평균선이 평균에 놓인 학생은, 정점이 안 나오는 한 주를 *부족함*으로 환산하지 않고, 평균선 위에 있는 한 주를 *정상*으로 결재한다.

> *자기 평균선*을 다시 그린다 — 최고 성능을 평균으로 잡지 않는다.

평균선 함정의 두 번째 변형이 *순간 최고를 지속 가능 페이스로 착각*하는 일이다. 한 주 동안 폭발적인 진도가 나왔으면, 그 페이스가 다음 주의 기준선으로 굳는다. 같은 페이스가 안 나오면 부족함으로 환산된다. 정점은 정의상 지속되지 않는 자리에서 일어나고, 정점을 평균으로 잡으면 평균선이 정점 쪽으로 끌려 올라간다 — 끌려 올라간 평균선은 매주의 자기 데이터를 부족함으로 도배해 버린다.

같은 함정의 세 번째 변형이 *상위 1% 분포의 평균화*다. 자기 분야 상위 1%의 학생들이 정점에서 가지는 능력의 *평균*을, 자기 한 주의 평균선으로 가져오는 패턴이다. 상위 1%의 평균이 자기 한 주의 기준이 될 이유가 없다. 분포의 어디에 있든 자기 평균선은 *자기 데이터*에 있다.

평균선 함정의 변종 중 가장 교묘한 자리가 *천재 관점을 통한 자기 정당화*다. 김세정 교수가 학부 시절 같은 학과에서 모든 과목을 A+ 받던 친구를 *천재*로 불렀던 자리에 대한 회고가 그 관점을 정확히 잡아낸다.

> "내가 그에게 '천재'라는 프레임을 씌움으로써 노력하지 않은 나 자신을 정당화해 왔던 것이다." (김세정 교수)

천재라는 라벨은 비교의 자동 환산을 멈추게 해주지만, 동시에 *내 평균선을 자기 데이터로 다시 그리는 작업*도 멈추게 한다. 상대가 *천재라서* 정점에 있는 거라면 내 평균선은 그 정점과 무관하게 그어져야 하는데, 천재 관점은 *내가 못해서가 아니라 그가 천재라서*에서 멈춰 자기 데이터의 분포를 들여다보지 않는다. 평균선의 오설정이 평균선의 *부재*로 굳는다.

같은 함정을 *입학 시점의 외부 좌표*가 가장 강하게 만든다. Philip Guo는 MIT 학부·NSF·NDSEG 펠로우십 두 개·Stanford CS 합격이라는 입학 시점 좌표를 본인이 어떻게 회상하는지를 한 줄로 적었다 — *서류상으로는 그렇게 좋아 보였는데, 그래도 박살났다*. 입학 시점의 평균선이 5년차의 평균선과 정합하지 않는다는 자료다. 같은 자리에 *과거 성과는 미래 성과의 지표가 아니다*는 투자 격언이 짝으로 박혀 있다.

> **Philip Guo (Stanford CS PhD, 2012):** 입학 시점에 *서류상으로는 좋아 보였던* 좌표 — MIT 학부·연방 펠로우십 두 개 — 가 박사 1·2년차의 좌절을 막아주지 않았다. 같은 일기에 *과거 성과는 미래 성과의 지표가 아니다*는 투자 격언이 짝으로 박혀 있다. 입학 시점의 외부 좌표를 5년차의 평균선으로 가져오는 운영이 평균선 함정의 가장 강한 입력 자리다. — *The PhD Grind* Epilogue

## 15.3 단거리 vs 장거리

평균선 함정의 뿌리에는 더 깊은 관점 하나가 깔려 있다. *인생을 일회성 단거리 경주로 보는 관점*. 박사 5년이 단거리라면 정점에서 정점으로 이어 달릴 수 있을 것 같지만, 5년은 단거리가 아니다.

엄태웅 작가가 같은 자리를 한 줄로 박아 둔 표현이 다음과 같다.

> *"빨리 달리는 사람이 멀리 가는 것이 아니라 오래 달리는 사람이 멀리 간다."*
>
> — 엄태웅 작가, 「뒤쳐질 행복」

이 한 줄은 단순한 격려가 아니라 *변수의 분리*다. 빨리 달리는 변수와 오래 달리는 변수가 다른 두 단계다. 빨리 달리는 사람은 한 분기의 정점은 만들지만, 5년의 누적에서 페이스가 무너진다. 오래 달리는 사람은 한 분기의 정점이 평범해도, 5년의 누적에서 평균선 위를 유지한다. 박사 5년·포닥 3년·교수 30년의 누적에서는 평균선의 높이보다 *평균선의 지속*이 결과를 만든다.

막판 스퍼트로 5년을 갚으려는 마인드가 단거리 관점의 가장 흔한 변형이다. 1·2·3년차에 평균선 아래의 페이스를 운영해 두고, 4·5년차에 정점을 모아 졸업까지 갚는다는 그림 — 이 그림은 누적 피로의 작동 방식을 무시한다. 페이스 보존을 깬 학생은 4년차에 가장 피곤하고, 5년차에 가장 회복이 늦다. 막판 스퍼트가 일어나야 할 시점에 정작 페이스가 무너져 있다.

같은 관점이 학회 마감 단위에서도 작동한다. 마감 두 주 전에 페이스를 두 배로 끌어올려 한 편을 갚는 패턴은, 한두 번은 작동하지만 분기마다 반복되면 누적이 깨진다. 누적이 깨진 학생은 같은 두 배 페이스를 다음 마감에 끌어올리지 못하고, 같은 한 편의 결과 품질이 한 등급씩 내려간다. 결국 단거리의 누적은 장거리가 되지 않는다.

장거리 관점이 들어오면 *오늘 한 일의 양*에 대한 평가가 한 단계 잠잠해진다. 하루의 양은 365일의 한 점이고, 365일은 5년의 5분의 1이다. 한 점에 가중치를 과하게 주는 관점은 다음 한 점을 채울 페이스를 깎는다.

[김기섭 교수 「연구길의 초입에서」](https://gsk1m.github.io/productivity/2024/05/25/entering-research.html)가 같은 자리를 *꾸준함*의 관점으로 적은 표현이 이 절을 짧게 닫는다.

> *"한 달에 논문 10편을 읽고 번아웃되는 것보다, 매주 1편을 6개월 동안 꾸준히 읽는 쪽이 낫다. 선형 성장이 복리로 돌아온다."*
>
> — 김기섭 교수, 「연구길의 초입에서」

폭발적 성장과 꾸준함이 *동치가 아닌* 두 변수라는 점이 여기서 다시 정리된다. 폭발은 정점의 자리이고 꾸준함은 평균선의 자리이므로, 두 변수를 같은 칸에 적으면 평균선이 정점 쪽으로 끌려 올라가 § 2의 평균선 함정이 자동으로 작동한다. 꾸준함을 평균선의 자리에 두는 학생은, 정점의 폭발이 안 나오는 한 분기를 *부족함*으로 환산하지 않고 *평균선 위*로 결재한다. 같은 김기섭 교수의 권고가 *옆 사람 속도에 흔들리지 마라*로 이어지는 부분도 같은 관점 위에 있다 — 비교 대상은 어제의 자기여야 하고, 동기의 논문 수나 옆 랩의 장비는 자기 평균선의 입력이 아니다.

분야 쪽 논의에서 같은 관점이 *3개월 후의 나*라는 시간 단위로 잘려 들어온다.

> "선배가 논문을 술술 읽는 건 그만큼 시간을 투자했기 때문이다. 3개월 후의 나는 지금보다 훨씬 잘할 것이다."
>
> — robotics-practice ch21 § 생존 마인드셋

이 한 줄이 비교 대상을 *옆 학생*에서 *3개월 후의 자기*로 옮긴다. 옆 학생과의 비교는 § 1에서 본 *자동 환산*의 입력이지만, 미래의 자기와의 비교는 *평균선의 누적*이 그대로 입력이 된다. 3개월 단위는 우연히 잡힌 단위가 아니라 분야의 학습 곡선이 가시화되는 최소 단위에 가깝다 — 한 주의 노력은 잡히지 않아도, 12주의 누적은 *논문 한 편 읽는 속도*로 답해진다. 이 단위에서 비교 관점이 *외부 → 자기 시간축*으로 옮겨간다.

## 15.4 방향과 속도의 분리

장거리 관점의 작업 도구가 *방향과 속도의 분리*다. 두 변수를 합쳐 보면 매일이 부족함이 되지만, 분리해 보면 두 변수가 각각 다른 결재 항목으로 운영된다.

방향 — *무엇을 하는가* — 에는 진지함이 필요하다. 5년 후 자기 한 줄이 무엇으로 답해질지, 지금 잡고 있는 주제가 그 한 줄에 얼마나 가까운지, 옆에서 들어오는 새 주제가 그 한 줄을 흔드는지 — 이 항목들에는 채찍이 들어가도 된다. 잘못된 방향에서 빠른 속도로 5년을 달려 봐야 5년이 누적되지 않는다.

속도 — *얼마나 빨리 하는가* — 에는 채찍을 거둔다. 같은 방향 위에서 한 주의 페이스가 평균선 아래로 내려간 시점에 채찍을 더 들이대면, 다음 주의 페이스가 더 떨어진다. 인간은 경주마가 아니기 때문이다.

엄태웅 작가가 같은 관점을 *채찍 맞는 말* 비유로 적은 표현이 이 절의 관점이다.

> *"채찍이 속도를 만드는 시간은 짧고, 멈춰 서거나 무너지는 시간이 길다. 인간은 경주마가 아니다."*
>
> — 엄태웅 작가, 「뒤쳐질 행복」

채찍이 작동하는 자리는 분리되어 있다. 마감 직전의 한 주, 한 가설의 결정적 검증, 한 figure의 마지막 정리 — 단기간의 한정된 자리에서 채찍은 속도를 만든다. 한편 같은 채찍이 *5년 내내* 들이대지면, 정점이 아니라 평균선이 무너진다. 단기 도구를 장기 평균선에 적용하는 것이 *채찍 맞는 말*의 메커니즘이다.

> **방향과 속도를 분리한다.** "무엇"에는 진지함, "얼마나 빨리"에는 채찍 거두기. 두 변수를 합쳐 보면 매일이 부족함이 된다.

분리의 일상 적용은 결재 관점의 변경이다. 한 주를 결재할 때 *무엇을 했는가*와 *얼마나 했는가*를 같은 칸에 적지 않는다. 무엇 칸에는 방향에 정렬된 항목 — 본 주제의 한 가설, 한 실험, 한 글의 한 절 — 을 적는다. 얼마나 칸에는 속도가 아니라 *분배*를 적는다 — Ch.1의 시간 ledger와 같은 관점이다. 분배가 평균선 위에 있으면, 한 주의 결과 양이 평균보다 작아도 결재가 통과된다.

## 15.5 게으름의 자리 — 회복의 결재

방향과 속도의 분리 관점이 자리 잡으면, *게으름*에 대한 관점도 한 번 다시 그려진다. 게으름은 자율성의 반대가 아니라 페이스 보존의 한 행이다.

엄태웅 작가가 같은 자리를 한 줄로 박아 둔 표현이 다음과 같다.

> *"조금은 게으름을 허락하라."*
>
> — 엄태웅 작가, 「뒤쳐질 행복」

이 권고는 단순한 위로가 아니라 *결재 항목의 추가*다. 게으름·회복·휴식이 한 주의 결재 항목에 적혀 있는 학생과, 같은 항목이 *허용*의 범주에만 있는 학생은 5년의 페이스가 다르다. 결재 항목에 적혀 있는 게으름은 자율성의 한 행이고, 결재 없이 흘러가는 게으름은 죄책감으로 남는다. 같은 한 시간을 어떤 관점으로 쓰는가의 차이가 회복의 효율을 결정한다.

> 게으름·회복을 결재 항목에 명시한다 — 노는 것이 아니라 페이스 보존의 한 행.

회복의 결재가 가장 자주 빠지는 자리가 *느려도 되는 시기*다. 박사 5년의 모든 시기가 같은 페이스로 운영되지 않는다. 1년차의 기초 시즌, 3년차의 슬럼프, 졸업 직전의 회복 시즌 — 이 셋은 평균선 그 자체가 낮게 잡히는 시기다. 같은 평균선을 매주 적용하면, 이 세 시기에 부족함의 환산이 가장 강하게 들어온다. 미리 결재해 두는 학생은 그 환산을 한 단계 막아 둔다 — *이 분기는 느려도 되는 시기*라는 한 줄이 매주의 평균선을 그 시기에 맞추어 다시 그린다.

> *느려도 되는 시기*를 미리 명시한다 — 1년차·3년차 슬럼프·졸업 직전 회복.

같은 관점이 학회 마감 사이의 회복 자리에도 적용된다. 마감 직후의 한 주를 *회복 분기*로 결재해 두면, 같은 한 주에 일어나는 페이스 저하가 *부족함*으로 환산되지 않는다. 결재 없이 흘러가면 같은 한 주가 죄책감의 입력이 된다. 결재의 유무가 같은 한 주를 회복으로 만들기도 하고 죄책감으로 만들기도 한다.

## 15.6 뒤쳐질 권리

평균선의 재설정·방향과 속도의 분리·회복의 결재가 모두 같은 한 관점 위에 놓인다 — *뒤쳐질 권리*. 굿 라이프의 전제는 뒤쳐질 수 있는 자유다.

뒤쳐질 권리가 없는 학생은 매주 평균선 위에 있어야 하고, 매분기 정점을 만들어야 하고, 매년 동기 평균보다 앞에 있어야 한다. 이 세 조건은 동시에 만족되지 않으므로, 5년 내내 자기 학대로 돌아간다.

뒤쳐질 권리가 결재 항목에 적힌 학생은 *어느 분기*에 *어느 자리*에서 뒤쳐질 수 있는지를 미리 정해 둔다. 거기서 뒤쳐지는 것은 자율성 운영의 실패가 아니라 페이스 보존의 한 행이다. 같은 한 분기의 *부족함*이 결재된 뒤쳐짐과 결재 없는 뒤쳐짐 사이에서, 회복의 곡선이 갈라진다.

비교를 끄는 일상 도구가 본 관점의 작업 면이다. SNS의 알림 빈도를 분기 단위로 조정한다. 동기 단톡방의 발화량을 한 주 단위로 점검한다. 학회 라이브 트윗 시즌에는 자기 보호의 관점을 한 단계 강화한다. 같은 입력을 차단하지 않는 학생은, *비교는 구조적으로 해결되지 않는다*는 사실을 매분기 새로 확인하게 된다. 비교 대상은 채널을 바꿔 가며 들어오고, 한 채널을 닫으면 다른 채널이 자동으로 활성화된다.

「대학원노트」 [Part 4 ch01](#chapter-14)의 *자기 한 줄*이 이 장의 닻과 같은 자리에 놓인다. 자기 한 줄이 있는 학생은 비교의 자동 환산이 들어와도 한 줄을 다시 읽고 페이스로 돌아가지만, 자기 한 줄이 없는 학생은 같은 환산 앞에서 한 분기씩 무너진다. 닻과 권리는 한 쌍이다.

다음 챕터는 비교가 가장 자주 *계기*가 되는 자리 — 멘붕 — 의 사이클을 본다. 멘붕은 결함이 아니라 진행률 불확실성의 신호이고, 사이클을 이름 붙여 부르면 짧아진다. 4단계로 분해된 사이클의 *자기반성* 단계에서 이 장의 비교 관점이 다시 점검 항목으로 들어온다.

<h1 id="chapter-16">Ch.16 — 멘붕의 사이클 — 인식하면 짧아진다</h1>

박사 5년 안에 멘붕은 반드시 온다. 한 번이 아니라 정기적으로. 입시 탈락, 자격시험 낙방, 첫 논문 reject, 실험 실패, 인턴 면접 탈락 — 사건의 이름은 매번 바뀌지만 며칠을 통째로 무너뜨리는 *모양*은 같다. [Part 4 Ch.2 (비교의 함정)](#chapter-15)이 평소 시간을 갉아먹는 *지속 항목*이었다면, 멘붕은 *충격 항목*이다. 두 항목이 같은 5년 위에 겹쳐 누적된다.

이 장은 멘붕을 *없애려는* 시도를 멈추는 자리부터 시작한다. 시도해도 없어지지 않고, 없어지지 않는 것을 없애려고 쓴 시간이 다시 멘붕의 자료가 된다. 그래서 관점을 바꾼다 — 멘붕은 결함이 아니라 *진행률 불확실성*의 신호다. 신호로 다루면 사이클이 짧아진다. 결국 5년의 누적 페이스를 결정하는 것은 *시련의 양*이 아니라 *사이클 길이의 합*이다.

같은 관점을 [「연구노트」 Part 2 E ch17](../research-notes/guide.html#chapter-32)이 *문서 차원*에서 다룬다 — 거절 메일과 reviewer 코멘트를 어떤 모드로 읽고 어떻게 응답할 것인가. 이 장은 그 자리의 *마음 차원*에 들어간다. 두 책이 같은 사건(거절·반려)을 *문서로 어떻게 응답*할 것인가와 *마음으로 어떻게 통과*할 것인가 두 차원에 각각 두는 구조다.

## 16.1 멘붕은 신호다

박사 과정에서 좌절은 *반복적·정기적*으로 온다 — 5년 동안 한 번이 아니다. 입시·자격시험·논문·실험·취업·인간관계 — 어디에서든 연 1~2회 페이스로 들어온다. 한 번이라고 가정하고 운영하면 두 번째 멘붕에서 *왜 또 나에게*라는 질문이 따라붙고, 이 질문이 사이클을 길게 만든다.

그래서 관점을 바꾼다. 멘붕은 박사 과정의 *결함*이 아니라 *진행률 불확실성*의 신호다. 박사 5년은 진도가 보이는 구간과 안 보이는 구간이 번갈아 오므로, 안 보이는 구간에 들어왔다는 표지가 멘붕이고, 이 표지는 5년 사이에 여러 번 켜진다.

이 관점이 자리를 잡으면 멘붕에 *이름*이 붙는다. "또 그 사이클이다" — 같은 모양의 일을 두 번째 이상 겪고 있다는 self-talk. 처음 겪는 일의 무게는 정체불명에서 온다. 정체에 이름이 붙으면 그 무게의 절반이 빠지고, 사이클이 짧아지는 첫 번째 메커니즘이 *인식*이다.

> **멘붕은 결함이 아니다.** 결함으로 다루면 자기 학대로 흐른다. *진행률 불확실성의 신호*로 다룬다.

## 16.2 기대값의 재설정

연구 분야의 채택률이 20% 안팎이면 기대값 그 자체가 반려다. 다섯 번 던져 한 번 받는 것이 평균이다. 평균을 *예외*로 두면 매번 처음 겪는 일이 되고, 매번 처음 겪는 일이면 매번 며칠이 사라진다.

> *"기대값은 반려다."*
>
> — 권창현 교수, 「대학원에서 닥쳐오는 멘붕의 파도」

권창현 교수가 적은 이 한 줄이 관점을 정한다. 기대값이 반려이면 반려는 결과의 *예외*가 아니라 *평균*이고, 평균을 만났을 때 며칠이 사라지면 운영이 무너진다. 거절이 들어왔을 때 *예상 범위 안*이라는 self-talk이 가능해야 사이클이 짧아진다.

같은 관점의 운영 표현이 다음 한 줄이다.

> *"해보고, 안 되면 말고."*
>
> — 권창현 교수, 같은 글

회피의 표현으로 들리지만 회피가 아니라 *기대값 재설정*의 운영이다. 반려가 평균인 분야에서 한 번의 시도에 *전부*를 거는 운영은 합리적이지 않다. 시도의 빈도를 올리고 한 번의 실패에 걸리는 시간을 줄이는 쪽이 5년 누적에서 합리적이다. "안 되면 말고"는 시도를 가볍게 만드는 도구이지 시도의 진정성을 깎는 도구가 아니다.

> 채택률 20% 분야에서 *기대값을 반려에 둔다* — 거절을 정상으로 옮기는 일이 멘붕 사이클의 길이를 줄인다.

같은 관점을 김세정 교수는 한 줄로 비튼다 — 거절은 부족함의 신호가 아니라 *시도의 양을 보여주는 지표*다.

> "거절 또는 불합격 통보 이메일을 많이 받고 있다면 적어도 그만큼 노력하고 있다는 증거이다." (김세정 교수)
>
> "실험이 잘 안 된 날은 '실험에 실패한 날'이 아니라 '성공에 한 발짝 더 가까워진 날'이다." (김세정 교수)

같은 자리의 두 한 줄이다. 첫 줄은 *거절의 빈도*를 활동의 양에 매핑한다 — 아무것도 안 하면 거절도 없다. 둘째 줄은 *실패한 날*의 라벨을 *진척의 한 단위*로 바꾼다. 둘 다 멘붕 사이클의 도입 정서를 *부족함*에서 *진척의 흔적*으로 옮긴다. 김세정 교수의 두 줄과 권창현 교수의 *기대값은 반려*는 같은 명제를 다른 자리에서 박은 것이고, 두 출처가 같은 자리를 두 번 박는다는 것 그 자체가 그 자리가 분야와 관계없이 *작동한다*는 증거다.

기대값 재설정이 *왜 학생에게 유난히 어려운가*를 한 단면이 짚는다. Philip Guo는 박사 3년차에 같은 프로젝트로 돌아가 또 한 번 실패한 자리에서, *교수와 학생의 비대칭 시간 자원*을 한 줄로 적었다.

> **Philip Guo (Stanford CS PhD, 2012):** 종신 교수는 몇 년치 실패를 흡수해도 자리가 흔들리지 않지만, 박사 학생의 커리어는 같은 사슬의 실패에 무너질 수 있다. *기대값은 반려*라는 관점이 학생 쪽에서 더 무겁게 작동하는 이유가 거기에 있다 — 두 자리의 시간 자원이 비대칭이므로, 사이클을 짧게 끝내는 운영이 학생 쪽에서 더 절실하다. — *The PhD Grind* Year 3 (Relapse)

## 16.3 멘붕 극복 4단계

멘붕이 들어왔을 때 사이클을 짧게 끝내는 운영 도구로 4단계를 둔다. 단계의 이름이 중요한 것이 아니라 *지금이 몇 단계인가*를 명시할 수 있는가가 중요하다. 단계에 이름이 붙으면 *지금 무엇을 하고 있는가*가 보이고, 다음 단계가 보이고, 사이클의 끝이 보인다.

1. **충분히 슬퍼하기.** 며칠을 *결재된 시간*으로 둔다. 슬픔을 억누르는 시도는 사이클을 길게 만든다.
2. **자기반성.** 슬픔이 잦아든 뒤에야 가능. *반박 모드*가 아닌 *객관적 재독* 모드.
3. **긍정적 요소 발견.** 같은 자료에서 *다음 한 단계*가 보인다. 이 단계가 빠지면 자기반성이 자기 학대로 흐른다.
4. **정신승리.** 다시 올라가는 자기 모습이 보이는 시점. *재시도의 결재*가 끝난다.

1단계에서 권창현 교수가 적은 한 줄이 톤을 정한다.

> *"며칠 슬퍼하자. 단것도 좀 먹고 술도 좀 마시자."*
>
> — 권창현 교수, 같은 글

며칠은 *결재된 시간*이다. 그 며칠 동안 단것·술·잠 같은 회복 도구를 *의식적으로* 쓴다. 의식적이라는 말이 핵심이다 — 의식하지 않은 채로 흘러가는 며칠은 슬픔이 아니라 *방치*가 되고, 방치는 다음 단계로 넘어가지 않는다. *지금은 1단계*라는 명시가 며칠의 끝을 만든다.

2단계의 진입 시점이 가장 까다롭다. 슬픔이 잦아들기 전에 들어가면 자기반성이 *자기 공격*으로 변형되고, 너무 늦게 들어가면 1단계가 *체념*으로 굳는다. 신호는 단순하다 — 자료(거절 메일·실험 결과)를 *반박하지 않고 읽을 수 있을 때*가 2단계의 입구다.

3단계가 빠지는 사이클이 가장 위험하다. 자기반성에서 끝나면 사이클이 닫히지 않기 때문이다. 같은 자료에서 *다음 한 단계*가 한 줄이라도 보여야 한다. "이 reviewer 코멘트 중 한 가지만 답하면 다음 round가 가능하다" — 이런 한 줄. 한 줄이 안 잡히면 2단계로 잠시 돌아간다.

4단계는 도착이 보이는 단계다. 권창현 교수가 적은 표현이 가장 정확하게 짚는다.

> *"다시 올라올 때 나 자신이 잘 보인다."*
>
> — 권창현 교수, 같은 글

올라가는 자기 모습은 멘붕의 *바닥*에서는 보이지 않는다. 4단계에 도달해야만 보이는 풍경이다. 이 풍경이 한 번 보이고 나면 다음 사이클에서 같은 풍경이 *기억*으로 남아 있다. 두 번째 멘붕이 첫 번째보다 짧아지는 두 번째 메커니즘이 이 *기억*이다.

> 멘붕 4단계의 *현재 단계*에 이름을 붙인다. "지금은 (1) 충분히 슬퍼하기"라고 self-talk으로 명시. 단계가 명시되면 다음 단계가 따라온다.

---

## 16.4 거절 메일의 객관적 재독

거절 메일과 reviewer 코멘트는 받자마자 읽지 않는다. 받자마자 읽는 시점은 1단계의 한복판이고, 1단계의 한복판에서 읽은 코멘트는 *반박 모드*로 처리된다. 반박 모드는 코멘트의 진단 가치를 거의 모두 무효화한다.

> **거절 메일은 받자마자 읽지 않는다.** 며칠 결재해 두고 읽는다. 그날 안의 *반박 모드* 재독은 사이클을 길게 만든다.

며칠이 지나야 코멘트의 *triage*가 가능해진다. Mensh-Kording R10이 같은 일을 *문서 차원*에서 다룬다 — reviewer 코멘트를 *non-specific / unenthusiastic*과 *specific paragraph-level*로 분리한다. non-specific 코멘트("the paper is not well-motivated")는 big-picture 실패의 신호이고, specific 코멘트는 paragraph-내 논리의 신호다. 두 종류는 응답 전략이 다르다 — 전자는 *서론·구성*을 다시 짜야 하고, 후자는 해당 단락만 고친다.

이 선별이 받자마자는 안 되고 며칠이 지나야 된다 — *마음 차원*과 *문서 차원*이 같은 며칠의 결재를 공유한다. [「연구노트」 Part 2 E ch17](../research-notes/guide.html#chapter-32)이 *문서 차원*의 응답 절차를 다루고, 이 장은 *마음 차원*의 진입 시점을 다룬다. 둘은 분리되지 않는다 — 마음 차원의 회복 없이 문서 차원의 선별이 굴러가지 않기 때문이다.

권창현 교수의 한 줄이 이 자리를 정확히 가리킨다.

> *"다시 올라올 때 나 자신이 잘 보인다."*
>
> — 권창현 교수, 같은 글

객관적 재독은 회복 *후*에야 가능하다. 회복 전의 재독은 객관이 아니라 *반박*이다. 며칠의 결재는 객관성이 자라날 시간이다.

## 16.5 회복탄력성과 5년 누적

회복탄력성 연구가 짚은 자리가 박사 과정에 그대로 들어온다 — 시련 그 자체가 아니라 *시련 극복 능력*이 결과를 가른다. 시련이 적었던 사람과 많았던 사람의 5년 후 행복도가 거의 같고, 테뉴어 결과도 시련의 양과 무관하다. 결국 결정 변수는 *극복의 사이클 길이*다.

이 자리에서 박사 학위의 의미를 *특정 분야 전문가*에서 *문제해결능력*으로 확장하면 멘붕의 의미도 함께 바뀐다. 거절은 *정체성의 부정*이 아니라 *문제해결의 한 단계*로 자리 잡는다. 같은 사건에 다른 관점을 씌우는 일이 사이클을 짧게 만드는 세 번째 메커니즘이다.

권창현 교수 본인의 일화가 이 관점의 한 사례다. 학부 기계공학에서 박사 과정 산업공학으로 전공을 바꾸면서 확률통계가 부족했다. 쉬운 교재로 독학하고 학부 강의를 청강하며 메웠다. 분야 전환은 *시련*이 아니라 *시련 극복 능력의 적용*이었다 — 이미 한 번 익힌 능력을 다른 자리에 옮기는 일. 박사 5년의 시련도 같은 관점 위에 놓인다.

> 박사학위 의미를 *문제해결능력*으로 확장한다 — 거절이 정체성 부정으로 흐르지 않고 *문제의 한 단계*로 다시 자리 잡는다.

5년의 누적은 *시련의 양*이 아니라 *사이클 길이의 합*으로 결정된다. 짧게 끝내는 운영이 누적 페이스를 만든다. 시련의 횟수를 줄이려는 시도는 거의 통하지 않는다 — 시련은 외부 변수이고, 사이클 길이는 내부 변수이므로, 운영의 자리는 통하는 쪽에 있다.

<h1 id="chapter-17">Ch.17 — 연구가 삶이 되는 조건 — 분리하지 않는 통합</h1>

박사 5년의 마지막 관점은 *분리하지 않는 통합*이다. 자율성·비교·멘붕을 한 챕터씩 통과해 온 자리에서 마지막에 남는 질문은 단순하다 — 연구가 *내 삶의 한 부분*인가, *삶의 바깥에 있는 일*인가. 답이 분리이면 5년이 자기 분열의 시간이 되고, 통합이면 같은 5년이 자기 형성의 시간이 된다.

"일·삶 균형"이라는 표현이 흔히 쓰이지만, 이 표현 그 자체가 *연구 = 일*, *그 외 = 삶*이라는 분리 전제를 깔고 있다. 균형을 잘 맞춘다고 해서 분리가 풀리지 않는다 — 오히려 두 영역의 경계가 더 또렷해질 뿐이다. 관점은 균형이 아니라 *통합*이다.

같은 관점을 [「연구노트」 Part 2 A ch01](../research-notes/guide.html#chapter-16)이 *논문 한 편의 작업 마인드*에 적용하고, 이 장은 그 관점을 *5년의 삶 관점*에 적용한다. 만점이 없는 글에 만점을 노리지 않는 마인드와, 분리되지 않는 영역에 분리를 강제하지 않는 마인드는 같은 자리의 두 적용이다.

---

## 17.1 분리 관점의 한계

박사 과정에서 가장 자주 들리는 권고가 *일과 삶의 균형*이다. 이 권고가 좋은 의도임은 분명하지만, 권고의 관점 그 자체가 자기 분열의 자료가 되곤 한다. 균형은 *분리된 두 영역*을 전제하고 시작한다 — 연구는 일, 그 외는 삶, 두 영역의 시간 비율을 맞추는 것이 운영 목표가 된다.

이 관점에서 운영해 본 학생이 빠지는 패턴이 비슷하다. 연구하는 시간에 *놀고 있는 시간*을 그리고, 노는 시간에 *연구하지 않고 있는 자기*를 걱정한다. 그러면 두 시간이 모두 자기 시간이 아니게 된다. 진짜 시간 낭비는 노는 데 쓴 시간이 아니라 *분리 상태*의 시간이고, 균형을 맞추려는 시도가 분리 시간을 늘리고 분리 시간이 자기 시간을 줄인다.

이 진단을 운영 도구로 옮기면 다음과 같다. 한 주의 시간을 *통합 시간 / 분리 시간*으로 분류해 본다. 통합 시간은 *지금 하고 있는 일이 자기 영역 안에 있다*고 느끼는 시간으로, 연구든 휴식이든 무관하다. 분리 시간은 *지금 하고 있는 일이 다른 영역의 침범으로 느껴지는* 시간이고, 같은 연구도, 같은 휴식도, 분리 시간이 될 수 있다. 운영 표지는 단순하다 — *분리 시간이 줄어드는 방향*이 통합의 방향이다.

> **"일·삶 균형" 관점을 의심한다.** 분리 전제 그 자체가 자기 분열의 자료. *통합*을 작업 관점으로 둔다.

---

## 17.2 의미는 통합에서 발생한다

엄태웅 작가가 적은 한 줄이 통합의 관점을 정한다.

> *"자기가 하고 있는 일이 자기가 누구인지를 드러낼 때, 인간은 의미를 경험한다."*
>
> — 엄태웅 작가, 「굿 라이프의 길」

의미는 *균형*에서 오지 않는다. 두 영역의 비율이 잘 맞은 자리에서 의미가 생기는 것이 아니라, *지금 하는 일*과 *지금의 자기*가 분리되지 않은 자리에서 생긴다. 직업은 자기 정체의 *부분*이지 *대립*이 아니다. 연구가 자기를 드러내는 한, 연구는 이미 자기 영역에 들어와 있다.

이 관점이 자리를 잡으면 흔한 질문 한 가지가 다르게 들린다 — *"내가 좋아하는 일을 잘하고 있는가."* 행복한 사람은 이 질문을 거의 하지 않는다. 좋아함이 우선이고, 잘함은 따라오는 변수다. 잘함을 우선에 두면 좋아함이 따라오기 어렵다 — 잘함의 motivation은 외부에서 와서 외부에서 끊기지만, 좋아함의 motivation은 내부에서 자란다.

엄태웅 작가가 챕터 끝자리에 박은 한 줄이 같은 자리를 다시 정리한다.

> *"연구와 행복, 연구와 인생은 결코 동떨어진 것이 아니다."*
>
> — 엄태웅 작가, 같은 글

연구와 행복을 *동떨어진 두 변수*로 다루면 5년 내내 둘 사이의 trade-off를 계산하게 된다. 그 계산이 운영 비용으로 누적된다. 한편 *동떨어지지 않은 한 변수*로 다루면 같은 5년이 자기 형성으로 흐른다. 관점의 차이가 운영 비용의 차이를 만들고, 운영 비용의 차이가 5년 누적의 차이를 만든다.

방향이 자기 안에서 어떻게 자라는가의 작업 면이 *분야 밖의 독서*다. 다른 사람의 글을 읽는 일은 그 내용을 이해하는 것이기도 하지만, 글을 쓴 사람이 어떤 삶을 살았고 무슨 고민을 했는지를 들여다보는 일이기도 하다. 그 자리에서 자기 자신을 되돌아보는 회로가 작동한다 — *자기가 무엇을 느꼈는지를 인식하는 일*이 메타인지의 거의 전부다. 고전 문학에 공감이 가는 자리도 같은 회로다 — 인간의 고민은 수천 년 단위로 거의 변하지 않으므로, 옛날 사람이 겪은 *방향에 대한 불안·동기의 상실·비교에서 오는 좌절*이 지금 대학원생의 자리에 그대로 들어맞는다. 방향을 잡으려면 가끔은 논문이 아니라 책을 읽는 편이 낫다 — 거기서 자기가 무엇을 중요하게 여기는지, 어떤 키워드가 자기 삶에서 반복되는지의 힌트가 잡힌다.

---

## 17.3 좋아함과 잘함의 순서

좋아함과 잘함의 *순서*가 5년 누적의 모양을 정한다. 잘하는 일에서 시작해 좋아하는 일에 도달하는 경로는 가능은 하지만 길고 자주 막힌다. 외부 동기로 시작한 일은 외부 동기가 끊기는 자리에서 멈춘다. 박사 과정의 5년은 외부 동기가 자주 끊기는 시간이다 — 거절·실패·비교의 자리에서 외부 동기는 신뢰할 수 없다.

좋아하는 일에서 시작해 잘함이 따라오는 경로가 5년 누적이 가능한 경로다 — 좋아함의 motivation은 거절의 자리에서도 끊기지 않기 때문이다. 멘붕 사이클이 짧아지는 까닭도 결국 이 경로 위에 있다. *왜 이걸 하고 있는지*가 좋아함에서 와 있으면 사이클의 4단계가 자동으로 따라온다.

이 관점의 한 사례가 최인철 교수의 일화다. 공학과로 입학한 후 심리학으로 재입학했다 — 자기가 원하는 연구가 그쪽에 있었기 때문이다. 분야 전환은 *분리*가 아니라 *통합의 방향 조정*이다. *공학에서 도망친* 결정이 아니라 *심리학으로 들어간* 결정. 두 표현은 같은 사건을 가리키지만 관점이 다르고, 관점의 차이가 그다음 5년의 모양을 정한다.

박사 과정 중간에 진로 전환을 고민하는 학생이 자주 만나는 함정이 *분리 관점*에서 결정을 내리는 일이다. "이 분야는 나와 안 맞으니 다른 분야로 도망간다" — 이 관점은 다음 분야에서도 같은 모양의 함정을 만든다. 반면 *통합 관점*에서는 결정이 다르게 들린다. "내 좋아함이 다른 분야에 더 가까이 있다" — 같은 결정이 *방향 조정*이 된다.

> 좋아함의 우선순위 — 잘하는 일에서 시작하지 말고 좋아하는 일에서 시작한다. 잘함은 좋아함을 따라오는 변수다.

> 분야 전환은 분리의 신호가 아닐 수 있다 — *통합의 방향 조정*일 수도 있다는 관점을 열어 둔다.

---

## 17.4 비판적 사고 vs 냉소

박사 5년 안에 학생이 학습하는 가장 강력한 도구가 *비판적 사고*다. 가설을 의심하고, 데이터를 의심하고, 자기 결론을 의심한다. 이 도구가 통합의 자리에서는 *자기와 분야를 자라게 하는* 방향으로 작동하지만, 같은 도구가 관점을 잘못 잡으면 *냉소*로 흐른다. 두 태도는 외형이 비슷해 자주 혼동된다.

> *"비판적 사고는 중요하지만 냉소적 불신과는 철저히 구분되어야 한다."*
>
> — 엄태웅 작가, 같은 글

분리 표지가 단순하다 — *다음 단계가 따라오는가.* 비판은 다음 단계가 따라온다. "이 가설은 약하다, 그래서 다음 실험을 이렇게 설계한다." "이 논문은 motivation이 약하다, 그래서 우리 글에서는 이 자리를 이렇게 메운다." 다음 단계가 따라오면 비판이고, 따라오지 않으면 냉소다.

냉소는 분야·동료·자기를 *부수기만 하고 자라게 하지 않는다*. 박사 5년이 냉소로 굳으면 5년 후의 자기 모습이 박살난 잔해 위에 서게 되지만, 비판으로 운영하면 같은 5년이 자라난 자기 위에 선다. 도구는 같지만 관점이 다르고, 관점의 차이가 5년 후의 자리를 정한다.

운영 도구는 자기 발화를 *다음 단계 표지*로 점검하는 일이다. 자기 분야에 대해, 동료에 대해, 자기 연구에 대해 한 줄을 적은 후에 그 한 줄에서 *다음 단계*가 따라오는지 본다. 따라오지 않으면 그 한 줄은 비판이 아니라 냉소이고, 거기에 다음 단계 한 줄을 추가하지 못하면 그 발화는 통합 영역에 들어가지 않는다.

> **비판은 살리고 냉소는 끈다.** 두 태도를 같은 것으로 다루면 5년 누적이 부서진다. *다음 단계가 따라오는가*로 구분.

---

## 17.5 방향·엔진·도구 — 통합의 세 층위

분리하지 않는 통합을 운영 관점으로 잡으면, 그 운영의 층위가 자연스럽게 셋으로 갈라진다 — 방향, 엔진, 도구. 셋은 분리된 영역이 아니라 *같은 통합의 세 면*이고, 한 면이 빠지면 나머지 두 면이 같이 흔들린다.

> *"방향이 없으면 아무리 열심히 달려도 '열심히 달렸다'는 사실만 남는다."*

이 장에서 붙인 표현이지만 이 한 줄이 층위 1을 잡는다. *방향*은 *어디로 가는가*에 답하는 층위다. 비용 함수가 여기 들어간다 — 박사 5년에 무엇을 최대화할지, 어떤 항목에 가중치가 들어갈지가 정해진다. 이 답은 분야 안에서 나오지 않는다. 선형대수도, SLAM 논문 100편도, 분야 기술서도 *어디로 가는가*에는 답하지 않는다. 답은 분야 밖에서 — 인문학·문학·자기 회고에서 — 자란다 (§2 *의미는 통합에서 발생한다*에서 같은 자리를 다른 각도로 본다).

*엔진*은 *무엇이 연료인가*에 답하는 층위다. 같은 방향을 잡은 두 학생도 연료가 다르면 5년의 모양이 다르다. 한 학생의 엔진은 호기심으로 돌고, 다른 학생의 엔진은 동료와의 교류로 돌며, 또 다른 학생의 엔진은 *내가 만든 게 세상에서 작동하는 것을 보는 자리*로 돈다. 정답은 없지만, 자기 엔진의 연료를 *모르는 채로* 운영하면 연료가 떨어진 자리에서 시동을 다시 걸 수 없다. 이 층위는 §3 *좋아함과 잘함의 순서*와 같은 자리에 놓인다 — 좋아함이 엔진 연료의 안정한 공급원이다.

*도구*는 *무엇으로 가는가*에 답하는 층위다. 학위·프로그래밍 실력·수학·연구실 인프라·동료·가족의 지원이 모두 여기 들어간다. 분야 이 책의 본문이 다루는 부분이 거의 전부 도구 층위다. 도구는 중요하다 — 칼이 날카로워야 나무를 벨 수 있으니. 한편 방향과 엔진 없이 도구만 갈고닦으면, *어디로 가야 할지 모르는 채로 칼만 날카로운* 상태에 도착한다. 분야 안에서 똑똑한 학생이 5년 후에 자기 한 줄에 답하지 못하는 경우가 흔히 이 패턴이다.

세 층위의 통합은 *비율*의 문제가 아니다. 도구 층위에 90%, 방향·엔진 층위에 10%를 쓰는 식의 비율 분배가 답이 되지 않는다. 방향이 잡히지 않은 도구 작업은 *분리 시간* — §1의 진단 — 으로 환산되고, 엔진이 비어 있는 도구 작업은 페이스 보존 — [Ch.2](#chapter-15) — 의 자리에서 무너진다. 세 층위가 같은 한 작업 안에 동시에 들어와 있을 때 통합이 작동한다. 거기서 같은 한 시간이 자기 시간으로 누적된다.

> **방향·엔진·도구 세 층위를 동시에 점검한다.** 도구만 갈고닦으면 5년 후 *날카로운 칼 + 빈 방향*으로 도착한다.

## 17.6 5년의 마지막 관점

졸업은 분리의 종결이 아니라 통합의 시작이다. 박사 과정이 끝나면 진로의 자리에서 같은 관점이 다시 운영된다 — 직장과 삶, 연구와 가정, 분야와 자기. 통합 관점을 5년에 걸쳐 학습한 학생은 졸업 후의 진로에서 같은 도구를 다시 쓰는 한편, 분리 관점으로 5년을 보낸 학생은 졸업 후에도 같은 분리를 반복한다.

박사 5년의 진짜 학습 대상은 분야 지식이 아니라 *통합의 운영법*이다. [Part 4 Ch.1 (자율성의 무게)](#chapter-14)이 *자기 한 줄*이라는 닻을 다루고, [Part 4 Ch.2 (비교의 함정)](#chapter-15)이 *비교의 운영*을 다루고, [Part 4 Ch.3 (멘붕의 사이클)](#chapter-16)이 *시련 사이클의 운영*을 다룬다. 이 장은 그 셋이 모두 *통합의 한 측면*임을 모은다. 자율성·비교·멘붕은 분리된 세 문제가 아니라 *분리하지 않는 통합*의 세 운영 면이다.

5년 누적의 마지막 관점은 단순하다. 좋아하는 일에서 시작했고, 비판은 살리고 냉소는 껐고, 시련의 사이클을 짧게 끝냈고, 자기 한 줄이 굳었다. 여기서 졸업하면 다음 5년의 자리에서 같은 운영이 자동으로 굴러간다. 박사 5년은 그 자동 운영의 학습 시간이다.

연구는 일이 아니라 자기 영역의 한 부분이고, 행복은 다른 영역에서 오는 것이 아니라 통합 자리에서 자란다. 이 관점이 자리를 잡으면 박사 5년이 *견디는 시간*에서 *자기를 형성하는 시간*으로 바뀐다 — 같은 5년이지만 다른 5년이다.

<h1 id="chapter-18">Ch.18 — 여성 박사의 운영 층위</h1>

Part 4 ch01-ch04가 *5년 박사 안의 페이스*를 다뤘다면, 이 장은 그 5년이 *생애 주기와 겹치는 영역*에 들어간다. 자율성의 무게·비교의 함정·멘붕의 사이클·통합된 삶 — 네 챕터가 모두 *5년 단위의 페이스 운영*에 묶여 있었다. 그 운영이 5년 안에 닫히지 않고 결혼·출산·돌봄의 시간 위로 흘러나가는 영역이 따로 있다.

한국 박사 평균 입학 연령(25-28세)과 결혼·출산의 평균 연령(30-34세)이 박사 후반기와 겹친다. 여성 박사의 운영 층위가 *남성과 다른 영역*에 들어가는 한 이유다. 이 장이 다루는 범위는 관점과 자원 안내까지 — *처방*이나 *일반화*는 이 장의 영역이 아니다. 결혼·출산·진로의 결정은 각자의 몫이고, 이 장은 그 결정을 *위한* 관점을 정렬하는 데 머문다.

1차 출처는 김세정 교수의 해외 임용·가족 운영 사례와 윤은정 교수 글이다. 두 분 모두 *해외 학계 임용 + 가족 운영*의 동시 진행 사례를 본인 글에 적었다. 이 장은 그 사례를 여성 박사 과정의 운영 층위로 정리한다.

## 18.1 운영 층위의 비대칭

박사 5년 안에 들어올 가능성이 있는 사건 — 결혼·임신·출산·돌봄. 남성 박사에게도 들어오지만, *시간 분배의 비대칭*이 한국 사회의 기본에서 여성 쪽에 더 크게 누적되는 한편, 본인의 lab·가족·동거인 운영에 따라 비대칭의 크기가 달라진다. 비대칭이 *0인 경우는 드문* 편이다.

이 비대칭이 *연구 시간의 분배*에 직접 영향을 준다. *오전·오후·저녁*이 다르게 운영된다 — 임신 후반의 피로, 출산 후 6-12개월의 수면 분절, 돌봄 시간의 누적. 같은 5년이라도 사건의 양과 타이밍에 따라 운영이 갈라진다.

남성 박사 기본이 *5년 안에 사건이 들어오지 않는다*는 가정 위에서 굴러가는 일이 흔하다 보니, lab의 기본 운영도 그 가정 위에 누적된다. 매주 미팅의 시간대·학회 출장의 빈도·grant 마감의 누적이 *5년 내내 같은 빈도*로 굴러가는 가정. 이 가정이 본인에게 작동하지 않을 때, lab 기본 운영이 본인 운영과 어그러지는 양상이 기본이 된다.

> *모두에게 같은 운영*을 권고하는 글은 본 영역에서 잘 작동하지 않는다. 운영 층위가 다른 사람에게 같은 운영을 적용하면 무너지거나 자기 학대로 흐른다.

이 인식이 이 장의 출발점이다. *남성 기본 위에 추가 부담*이 아니라 *다른 운영*으로 관점을 옮긴다.

---

## 18.2 김세정 교수의 해외 임용·가족 운영 사례 — 해외 임용과 가족 운영

김세정 교수의 경로: 국내 박사 → 멜버른대 임용 → 임용 초기에 출산·육아. 김세정 교수 글 §7-§8이 그 시기의 운영을 적은 부분으로 알려져 있다. *해외 임용 + 가족 운영*이 같은 1-3년 안에 동시 진행된 사례다.

> 김세정 교수의 해외 임용·가족 운영 사례 — 해외 임용과 가족 운영의 동시 진행.

이 사례가 이 장에 들어오는 이유는 *두 자리의 동시 진행이 가능했다*는 사실 자체보다, 그 운영이 *어떤 도구로 가능했는가*다. 김세정 교수 §1 (실패와 열등감)은 [Part 4 ch03 (멘붕의 사이클)](#chapter-16)에 이미 흡수됐다 — 거절 메일을 *노력의 증거*로 보는 관점. 이 장의 §7-§8은 그 관점이 *생애 주기와 동시에 작동할 때*의 영역을 본다.

§7-§8의 잔여 관점이 *해외 임용 디테일*과 *여성 교수 층위*의 두 단면에 누적된다. 해외 임용 디테일은 [Part 5 ch04 (해외 임용)](#chapter-24)에 이미 흡수됐다 — 추천서·교신저자·국제 인지도의 박사 3-4년차 운영. 이 장에서는 그 관점 옆에 *여성 교수의 층위*가 한 단계 더 들어온다. 임용 1-3년차의 출산·육아 시점이 *grant 첫 사이클*과 *학생 첫 모집*의 시점과 겹치므로, *세 가지의 동시 누적*이 기본 운영이 된다. 이 관점이 senior 자리에서 가장 자주 회자되는 운영 자료의 하나다.

김세정 교수 글 §18에서 김세정 교수가 부부 임용 사례를 적은 한 줄이 §7-§8 영역의 운영을 한 단면 더 비춘다 — "내 동료였던 포닥도 최근에 캐나다의 작은 대학교에 아내와 함께 자리를 잡았다" (김세정 교수 글 §18). 같은 도시·같은 학교에서 두 사람이 동시에 자리를 잡는 일이 한국 기본보다 해외 기본에 더 가깝다는 관점의 한 자료다.

---

## 18.3 윤은정 교수 글 — 비이공계 + 미국 박사 + tenure track

윤은정 교수의 경로: 미국 마케팅 PhD → 메리워싱턴 조교수. 이공계 기본이 아닌 자리에서 비이공계 한국인 여성 박사의 미국 운영 사례다.

> 윤은정 교수 글의 사례 — 비이공계 박사 + 미국 임용 + 한국인 여성.

이 장에 윤은정 교수 사례가 들어오는 이유는 *세 가지 비대칭이 동시에 누적된다는 점*이다. (a) 비이공계 — 한국 박사 기본이 이공계인 만큼 *분야 자체*가 본인 외에 한국인 박사가 적은 영역, (b) 미국 임용 — 영어·문화·tenure track 평가 단위, (c) 여성. 세 층위가 동시에 들어오면 운영은 *한 층위만 들어오는 경우*와 갈라진다.

[Part 1 ch04 (비이공계 박사 운영 단위)](#chapter-3)에서 같은 사례의 *분야 쪽 논의*가 따로 다뤄진다. 이 장은 같은 사례의 *여성 층위*를 본다. 두 챕터가 같은 사례를 두 단면에서 잘라본다.

---

## 18.3b 비이공계 학과 분위기 — 윤은정 교수 층위

이공계 lab 기본과 다른 비이공계 학과 기본이 여성 박사의 일상에 한 층위를 더한다.

비이공계 학과의 여성 비율은 분야에 따라 갈라진다. 마케팅·교육학·심리학·인류학은 학생·교수 모두 여성 비율이 *40-60%* 자리에 있는 한편, 경영학·경제학·정치학·법학·일부 사회학은 *20-30%*에 가깝기도 하다. 두 영역의 일상이 다르다 — 여성 비율이 큰 분야에서는 *센스*에 가까운 운영이 기본이 되고, 여성 비율이 작은 분야에서는 본인의 *가시성 운영*이 학기 단위로 누적되어야 기본이 된다.

> 윤은정 교수 글의 사례 — 비이공계 미국 학계의 *학과 분위기*가 분야별로 다르다. tenure track 6-7년 안에 *학과 안의 위치*가 굳어지므로, 첫 1-2년의 학과 office 가시성이 운영 자료의 하나다.

윤은정 교수의 사례에서 한 단계가 더 추가된다 — *2-body problem*에 *남편·자녀의 미국 동반 임용*이라는 층위다. 한국 학부 → 미국 박사 → 미국 임용의 경로가 *본인 한 사람*의 경로가 아니라 *가족 단위의 경로*로 굴러간다. 비자·자녀 학교·배우자 직업·도시 결정이 한 자리에 동시에 누적되는 운영이고, *2-body problem* 위에 *국제 이주 층위*가 한 단계 더 얹힌다.

> 윤은정 교수 글의 *2-body problem + 자녀 동반 미국 임용* — 비자·자녀 학교·배우자 직업·도시 결정의 4 변수가 동시에 누적된다.

윤은정 교수 글 §17에서 윤은정 교수가 미국 임용 시기의 가족 분리를 한 줄로 적은 부분이 이 층위를 보여 준다 — "한 번씩 한국에 가서 가족들과 시간을 보내다 미국으로 돌아가야 할 날이 다가오면" (윤은정 교수 글 §17). 가족이 한국에 남아 있고 본인이 미국에 혼자 있는 시간이 누적되는 운영의 한 단면이다.

---

## 18.4 2-body problem

두 사람 모두 박사·전문직일 때, 두 사람의 자리가 *지리적으로 같은 도시*에 있어야 한다는 제약. 학계의 기본은 *한 사람의 임용 자리에 다른 사람이 옮겨오는* 관점이다. 두 사람의 자리가 동시에 같은 도시에 비는 일이 드문 만큼, 한 사람이 *옮겨오는 쪽*이 되어야 한다는 비대칭이 자주 여성 쪽에 누적된다.

> *공동 결정의 시점*을 박사 3-4년차로 당긴다. 박사 마지막 학기까지 미루면 결정의 자유도가 급감한다.

운영 도구는 *결정의 시점 명시*에 있다. 두 사람이 *언제까지 어떤 결정을 함께 하는가*를 박사 3-4년차에 한 번 적어 둔다. *어느 도시·어느 분야·어느 기관*의 우선순위가 두 사람 사이에서 다를 수 있고, 그 차이가 박사 마지막에 처음 발견되면 결정이 어그러진다. 미리 발견하면 *둘 다 만족하는 도시 목록*가 좁혀져 있어 자리가 비었을 때 빠르게 결정으로 옮겨간다.

이 관점은 *한 사람이 양보*가 아니라 *두 사람이 함께 좁힌다*. 양보 관점에서는 누적되는 비대칭이 5-10년 후의 부부 운영을 무너뜨리는 경우가 잦다.

윤은정 교수 사례의 *국제 이주 층위*가 한 단계를 더한다. 미국 임용에서는 *비자 종류 (H-1B·O-1·EAD)*·*자녀의 학교 위치*·*배우자의 미국 직업*이 도시 결정의 변수에 같이 들어간다. 한 변수만 어그러져도 *임용 후 1-2년에 본인 자리가 다시 옮겨지는* 일이 기본에 가깝게 굴러간다. 이 층위를 미리 짚어 두지 않으면, 국제 이주가 *공동 결정* 관점 안에서 한 사람의 양보로 누적되기 쉽다.

## 18.5 자원 안내

이 장의 자원은 *멀리 있지 않다*. 본인이 *몰라서 안 쓰는* 경우가 기본에 가깝다.

- **학교의 박사과정 부모 지원** — 학교마다 차이 큼. 출산 휴학·아동 돌봄·학자금·기숙사 등의 자원 목록이 학과 행정실 또는 graduate office에 있다. 본인 학교의 자료를 한 번 확인해 두는 일이 첫 운영
- **여성 박사 네트워크 (분야별)** — IEEE Women in Engineering, Women in Computing, Women in Statistics, Korea Robotics Society 여성 분과 등. 분야 senior 여성 박사와의 *비공식 멘토*가 세 저자가 강조한 도구. 본인의 분야에 어떤 네트워크가 있는지 확인해 두는 일이 두 번째 운영
- **분야 외부 자료** — 김세정·윤은정·유두희 교수/박사 글·*Lean In*·*Mama, PhD* 같은 단행본. 단 *답*이 아니라 *관점 비교*로 운영. 다른 사람의 관점을 *한 번 봐 두는* 일이 본인 관점을 정렬하는 도구
- **자녀 돌봄 자원** — 학교 부설 daycare, 도시별 영유아 돌봄 정책. 박사 후반의 운영에 직접 영향. 결정 *전*에 자료를 모아 두면 결정의 자유도가 늘어난다
- **국제 이주 자원 (해외 임용 시)** — 비자 종류 (H-1B·O-1·EAD)·자녀 학교 위치·배우자 직업 visa의 자료. 학교 international office + 분야 senior가 자료. 윤은정 교수 사례에서 한 층위

> 자원의 목록을 *결정 후*에 모으면 자원이 없어 결정을 후회하는 경우가 자주 등장한다. 결정 *전* 또는 *동시에* 자료를 모아 둔다.

---

## 18.6 *5-10년 앞선 한 사람*의 자리

이 장에서 가장 큰 운영 도구는 *본인보다 5-10년 앞선 여성 박사 한 사람*이다. 책의 관점이 한 자료, 분야 senior 여성 박사 한 사람의 *비공식 점검*이 또 한 자료. 두 자료가 함께 작동할 때 운영이 단단해진다.

박사 후반에 senior 여성 박사 한 명에게 한 시간을 받는 일은 두 권의 책보다 더 정확한 자료가 잡힌다 — 책에 들어가지 않는 *분야의 디테일·기관의 디테일·시점의 디테일*이 그 한 시간 안에 들어온다. 세 저자 모두 본인의 글에서 *위 층위의 senior에게 한 번 묻는 일*을 강조했다.

> **senior 여성 박사 한 사람과 박사 4-5년차에 한 시간을 만든다.** 그 한 시간이 본인의 5-10년 운영의 근거 자료다.

## 18.7 이 장의 결론

박사 5년의 운영이 *모두에게 같은 운영*이 아니라는 사실 그 자체가 이 장의 결론이다. 남성 기본 위에 *추가 부담*으로 보면 운영이 무거워지지만, *다른 운영*으로 보면 운영의 도구가 정렬된다. 두 관점이 결과를 갈라 놓는다.

자원이 *멀리 있지 않다*는 인식과 senior 한 사람의 자리. 이 장의 두 운영 도구다. 두 도구가 본인의 결정에 한 번이라도 들어오면, 결정의 무게가 *혼자만의 것*에서 *관점이 정렬된 것*으로 옮겨 앉는다.

이 장의 *여성 층위*가 [Part 1 ch04 (비이공계 박사 운영 단위)](#chapter-3)의 *분야 쪽 논의*와 한 자리에서 만난다. 윤은정 교수 사례가 두 챕터에 분할되어 있으므로, *비이공계 + 여성 + 미국 임용*의 세 층위가 동시에 누적된 자리에 본인이 들어가 있다면 두 챕터를 함께 읽는 일이 기본 운영이 된다. 같은 사례를 두 단면에서 잘라본 두 챕터가 *세 층위의 동시 운영*을 한 곳에 모은다.

다음 챕터는 같은 운영 층위의 *임상 영역* — 정신건강·번아웃 보강으로 넘어간다.

**주의.** 이 장은 *처방*을 두지 않는다. *결혼하라/하지 마라*, *출산을 박사 중에/후에 하라*, *남편이 양보하라/하지 말라* 같은 명제는 이 장에 들어가지 않는다. 이 장이 다루는 범위는 *관점과 자원 안내*까지 — 결정은 각자의 몫이다.

**출처.** 김세정 교수의 해외 임용·가족 운영 사례와 윤은정 교수 글이 1차. 여성 박사의 운영 층위, 자원 안내, 분야 일반 정리는 본문에서 정리.

<h1 id="chapter-19">Ch.19 — 정신건강·번아웃 — 임상 층위</h1>

[Ch.3 (멘붕의 사이클)](#chapter-16)이 *사건 단위 멘붕*의 4단계 운영을 다뤘다면, 이 장은 그 운영이 *작동하지 않는 영역* — 우울·번아웃·고립감의 *일상 단위 층위*에 들어간다. ch03은 사건이 계기, 며칠-몇 주의 운영, *진행률 불확실성의 신호*로 관점되는 자리였다. 한편 사건 없이 누적되는 무게는 같은 도구로 잡히지 않는다.

이 장은 *처방*을 두지 않는다. 약을 먹어라·먹지 마라, 상담을 가라·가지 마라 같은 명제는 들어가지 않는다. 이 장이 다루는 것은 *관점과 자원 안내*까지다. 어떤 자리에 어떤 자원이 있고, 그 자원이 본인의 결정에 어떻게 도움이 될 수 있을 것인가. 결정과 진단은 본인과 임상의의 몫이기에.

이 장은 정신건강을 연구 성과의 하위 항목으로 다루지 않는다. 김세정 교수 §1의 실패와 열등감 논점은 [Ch.3 (멘붕의 사이클)](#chapter-16)에서 다뤘고, 여기서는 사건·일상·전문가 자원을 분리해 본다.

## 19.1 사건 단위 멘붕과 일상 단위 우울의 차이

두 층위는 *같은 도구*로 운영되지 않는다.

| 자리 | 계기 | 시간 단위 | 사이클 4단계가 작동하는가 |
|---|---|---|---|
| **사건 단위 멘붕** | 거절 메일·실험 실패·자격시험 낙방 | 며칠-몇 주 | 작동 |
| **일상 단위 우울** | 계기 없이 누적 | 몇 달-몇 년 | 작동하지 않거나 자기 학대로 흐름 |

[Ch.3 (멘붕의 사이클)](#chapter-16)의 4단계 (충분히 슬퍼하기 → 자기반성 → 긍정적 요소 → 정신승리)는 *사건이 있을 때*의 운영이다. 사건 없이 누적되는 무게에는 *충분히 슬퍼할 사건*이 없고, *자기반성할 자료*가 없으며, *긍정적 요소*가 잡히지 않는다. 같은 도구를 일상 단위에 적용하면 자기 학대로 흐르거나 도구 그 자체가 멈춘다.

신호 분리는 단순하다. *어떤 사건이 있어서 며칠 무너졌는가* (사건 단위) vs *사건 없이 몇 주째 비슷한 무게가 누적되었는가* (일상 단위). 둘이 같은 영역이 아니라는 인식 그 자체가 이 장의 첫 운영 도구다.

> **사건 단위와 일상 단위는 다른 영역이다.** 사건 단위 도구를 일상 단위에 적용하면 자기 학대로 흐른다.

---

## 19.2 번아웃의 모양 — 의욕 저하가 아니라 *반응 저하*

박사 후반의 흔한 번아웃은 *연구 결과에 더 이상 반응하지 않는 상태*에 가깝다. 좋은 결과가 나와도 무덤덤, 거절이 와도 무덤덤. 운영 차원에서는 *안정적*으로 보이지만 *신호가 끊긴* 상태다.

이 상태가 까다로운 이유는 본인이 *문제를 인식하지 못하기* 때문이다. 의욕 저하는 본인이 인식하는 한편, 반응 저하는 본인이 인식하지 못하는 편에 가깝다 — 모든 결과가 같은 무게로 들어오니, *어떤 신호가 빠졌는가*를 본인이 짚기 어렵다.

번아웃의 운영 신호는 다음에 있다.

- 주말에도 연구만 한다 — *통합된 삶*의 관점이 무너진 자리. [Part 4 ch04 (통합된 삶)](#chapter-17)의 관점이 같은 영역의 운영 층위
- 결과의 *기쁨*이 사라진다 — paper accept가 와도 5분 후 다음 일로 넘어간다
- 분야 외 사람과의 대화가 어려워진다 — 본인의 일상이 *연구 외 영역*에 없다는 신호
- 신체 신호 — 수면 분절, 식욕 변화, 피로의 누적

이 자리는 *더 열심히 일하기*로 풀리지 않는다. *반응의 회복*이 먼저다. 회복 도구는 이 장의 §4-§5에 정리한다.

> *주말에도 연구만 하는* 패턴이 기본이 되면 그 자리는 번아웃의 입구일 수 있다. 통합된 삶의 관점을 한 번 더 점검할 자리.

---

## 19.3 고립감 — 박사 기본

박사의 기본에서 *나만 이 자리에 있다*는 인식이 자주 누적된다. 같은 lab의 동료라도 정확히 같은 운영을 하지 않으니, *내 일상의 무게*를 정확히 아는 사람이 본인 외에 없다.

여기에 *추가 층위*가 누적되는 경우가 있다 — 해외 박사·외국인 박사·여성 박사·비이공계 박사·소수 정체성 박사. 본인 lab 안에 *같은 층위의 사람*이 0이면 고립감이 기본 위에 한 층위 더 쌓인다. 연결: [Ch.5 (여성 박사)](#chapter-18)의 운영 층위.

운영 도구는 다음에 있다.

- **분야의 같은 자리** 사람과 한 번/주 연락 — 같은 lab이 아니라 *같은 분야의 같은 단계*. 학회·twitter·LinkedIn에서 만난 1-2명과 한 번/주 짧은 연락
- **lab 외부의 한 사람** — 박사 외부의 친구·가족 1명. 본인의 *연구 외 영역*이 0이 아니라는 신호
- **분야 senior 한 사람** — 본인보다 5-10년 앞선 사람. 비공식 멘토 자리

세 통로 중 하나만 작동해도 *본인이 lab에 묶이는 기본*가 깨진다. 한편 셋이 모두 비어 있으면 고립감이 *임상 영역*으로 옮겨갈 가능성이 커진다.

---

## 19.4 자원 안내 — *처방*이 아닌 *위치*

이 장의 자원은 *멀리 있지 않다*. 본인이 *몰라서 안 쓰는* 경우가 기본에 가깝다.

(a) **학교 학생 상담센터** (대학 기본) — 무료, 박사·석사 학생 대상. 8-12회 단기 상담이 기본. 본인 학교의 학생 상담센터 위치·연락처를 *지금* 한 번 확인해 두는 일이 첫 운영. 위급할 때 처음 검색하면 자료가 늦게 나온다.

(b) **EAP** (Employee Assistance Program) — 산업계 전환 후의 자원, 회사가 제공. 보통 6-12회 무료. [Ch.7 (산업계 진로)](#chapter-13)의 층위와 직접 연결.

(c) **분야 외부 임상심리사·정신과 의사** — 학교 자원이 부족할 때. 한국이라면 *정신건강의학과* 진료가 의료보험 적용. 첫 진료 비용 부담이 기본보다 훨씬 낮다. 진료 기록이 *학생 신분*에 영향을 주지 않는 편이다 (의료 정보의 보호).

(d) **약물 치료** — 항우울제·항불안제 처방이 *학생 운영의 종료 신호*가 아니다. 임상의가 결정하는 영역이고, 박사 운영을 *유지하면서* 함께 진행되는 경우가 흔하다. 약을 먹는다는 관점이 아니라 *임상의의 결정에 따른다*는 관점이 더 적합할 듯하다.

(e) **동료** — lab 외부의 같은 단계 박사 1-2명과 *비공식 점검*. 한 통로가 안 작동할 때 다른 통로가 작동한다. 한 사람의 *전부*가 되지 않는 구조에서 무게가 분산된다.

> 본인 학교 학생 상담센터 위치·연락처를 *오늘* 한 번 확인해 둔다. 위급할 때 검색을 시작하면 자료가 늦다.

---

## 19.5 *도움을 청하는* 일은 운영의 일부

박사 기본에서 *도움을 청하는 일*이 *운영의 실패*로 관점되는 경우가 잦다. 이 관점은 잘못되었다.

> *"실험은 '실패-실패의 원인 파악-다른 방법으로 접근'의 과정을 반복해야만 원하는 결과에 다다를 수 있다."*
>
> — 김세정 교수의 실패·열등감 논점 관점 ([Part 4 ch03](#chapter-16)에 흡수)

같은 관점이 정신건강에서도 작동한다. *도움을 청하는 일*이 한 도구이고, 한 도구가 작동하지 않을 때 *다른 도구*로 옮기는 운영이다. 본인이 *몇 도구를 시도했는가*가 운영의 단단함이고, *도움을 청하지 않은 상태*는 도구가 0개인 상태에 가깝다.

평생 운영의 어느 순간 *한 번이라도* 자원을 쓴 경험이 있는 사람이 다음번에 더 빠르다. 첫 시도는 기본과 달라 어색한 한편, 두 번째부터는 기본 도구의 하나로 자리잡는다. 박사 5년 안에 *한 번이라도* 자원을 쓰는 일이 평생 운영의 시작점이 될 수 있을 것이다.

> **도움을 청하는 일은 운영의 실패가 아니라 운영의 한 도구다.** 한 번 사용한 도구는 다음번에 더 빨리 작동한다.

---

## 19.6 *주변에 있는 사람*이 신호를 본다면

동료·후배·지도교수가 *신호*를 봤을 때. 이 장의 가장 마지막 층위다.

신호의 기본 모양:
- 며칠 lab에 안 나옴
- 식사 회피
- 결과 발표 회피
- 평소와 다른 무게 (말의 양·표정·반응 시간)
- 위험 신호 (자해·자살의 언급, 감정의 급격한 변화)

여기서의 운영은 *판단을 보내지 않고 한 번 묻는* 일에 가깝다. *요즘 어때?*가 아니라 *이번 주 한 번 같이 점심 가능?*. 추상적인 질문보다 *구체적인 약속*을 만드는 한 번의 제안이 더 작동하는 듯하다.

학교 상담센터를 *언급*하는 일은 처방이 아니다. 한 자료를 *한 번 짚어 두는 일* — *우리 학교 상담센터에 가본 적 있는데, 도움이 됐다* / *학생 상담센터가 무료라더라*. 자료의 위치를 짚어 두는 일은 *상대의 결정을 강요하지 않으면서* 자료의 위치를 알려 주는 도구다.

> *위험 신호*가 있는 자리는 이 장의 영역이 아니다 — *전문가에게 즉시 연결되어야 한다*. 한국 자살예방상담전화 **109**, 학교 학생 상담센터의 위급 라인, 정신건강의학과 응급 진료. 동료·멘토가 *전문가의 자리*에 들어가지 않는다.

이 일은 멘토·동료의 *책임*이 아니다. 본인이 *전문가에게 연결되는 일*이 목적이고, 멘토·동료는 *그 연결의 한 다리*에 놓인다.

---

## 19.7 이 장의 결론

박사 5년의 정신건강은 *없는 일*이 아니라 *운영의 한 층위*다. [Ch.3 (멘붕의 사이클)](#chapter-16)이 사건 단위라면 이 장은 일상 단위. 두 층위가 같은 사람의 운영에 동시에 들어오는 일이 흔하다. 두 영역에 *각자의 도구*를 갖춘 사람이 5년의 누적에서 단단해진다.

자원이 *멀리 있지 않다*는 인식과 *도움을 청하는 일이 운영의 한 도구다*라는 관점. 이 장의 두 운영 도구다. 두 도구가 본인의 일상에 한 번이라도 들어오면 평생 운영이 정렬된다.

다음 챕터에서는 같은 감정 층위 안에서 *임포스터 증후군*을 다룬다.

**주의.** 이 장은 *처방*을 두지 않는다. 약을 먹어라/먹지 마라, 상담을 가라/가지 마라 같은 명제는 들어가지 않는다. 이 장이 다루는 것은 *관점과 자원 안내*까지 — 결정과 진단은 본인과 임상의의 몫이다. 위험 신호 영역은 이 장의 영역이 아니라 *전문가의 영역*이다.

**출처.** 정신건강·번아웃 관점과 분야 일반 정리는 이 장에서 정리했다. 김세정 교수의 실패·열등감 논점의 일부 관점은 [Part 4 Ch.3](#chapter-16)에 흡수했다.

<h1 id="chapter-20">Ch.20 — 임포스터 증후군 — 내가 여기 있을 자격</h1>

[Ch.2 (비교의 함정)](#chapter-15)이 *외부 좌표*의 함정이라면, 이 장은 *내부 좌표*의 함정을 본다. 비교는 동기·옆 lab·SNS의 학회 사진 같은 외부 자료를 자기 진도의 음수 신호로 환산한다. 임포스터 증후군은 외부 자료가 없어도 자기 안에서 *내가 여기 있을 자격이 없다*는 환산이 자동으로 굴러간다.

두 함정이 겹쳐서 들어오는 일이 잦다. 동기 발표를 보고 *그는 잘하고 나는 부족하다*가 *나는 여기 있을 자격이 없다*로 옮겨가는 지점에서 두 관점이 동시에 작동한다. 다만 처방은 갈라진다. 외부 좌표는 *평균선 재설정*으로 풀리고, 내부 좌표는 *관점 재설정*으로 풀린다. 같은 처방을 두 함정에 겹쳐 적용하면 어느 쪽도 풀리지 않는다.

이 장의 결은 [Ch.6 (정신건강)](#chapter-19)과 같은 자리에 놓인다. *처방*이 아니라 *관점과 자원 안내*까지다. 임상 진단·약물 결정은 임상의의 몫. 이 장은 박사 5년의 운영 안에서 임포스터 관점이 어떻게 작동하고, 어떤 관점과 자원이 그 작동을 한 단계 멈추는가를 본다.

---

## 20.1 내부 좌표의 함정

비교의 함정([Ch.2](#chapter-15))은 외부 자료를 입력값으로 한다. 동기의 논문 게재 트윗, 옆 lab의 best paper 소식, 학회 단체 사진 — 이런 자료가 자기 진도와 비교되며 음수로 환산된다. 비교 대상이 시야에서 사라지면 환산도 한 단계 멈춘다.

이 장은 외부 신호가 없어도 굴러가는 함정을 본다. 발표를 잘 마쳤어도, 자격시험을 통과했어도, 논문이 accept되었어도 — 외부에서 들어온 긍정 신호조차 *심사위원들이 잘못 본 거 아닐까*로 번역되어 들어온다. 환산이 외부 자료에 묶이지 않으니, 비교 함정의 처방(*비교 대상 끄기*·*평균선 재설정*)이 그대로 들어가도 풀리지 않는다.

두 함정이 겹쳐 들어오는 자리도 잦다. 동기 발표를 보고 *그는 잘하고 나는 부족하다*(외부 좌표)가 *나는 여기 있을 자격이 없다*(내부 좌표)로 옮겨가는 순간이다. 본인이 두 관점을 *같은 함정*으로 처리하면 처방은 한쪽에만 머무르고 다른 쪽은 비어 있다. *그는 잘한다*는 평균선 재설정으로 한 단계 풀리지만, *나는 자격이 없다*는 같은 도구로 풀리지 않는다.

> 두 함정을 분리해서 본다 — 외부 좌표는 *평균선 재설정*, 내부 좌표는 *관점 재설정*. 같은 도구를 두 자리에 겹쳐 적용하면 어느 쪽도 풀리지 않는다.

---

## 20.2 박사 단계별 양상

임포스터 관점이 등장하는 자리는 박사 5년에 적어도 셋 있다. 단계별로 관점의 *형태*가 다르므로, 같은 도구가 작동하지 않는 단계도 있다.

**1년차 — 셋업 못 따라감.** 분야 기초 지식의 기본 누락. 랩미팅에서 선배들의 한 줄 대화가 알아듣기 어렵다. *나만 모른다*가 매주 한 단계씩 굳어간다. 1년차의 임포스터는 *지식의 부족*에 묶여 있어, 외부 시각으로는 풀어 보일 수도 있다. 본인 안에서는 *왜 나는 1년 전에 이걸 미리 공부해 두지 않았는가*로 번역되곤 한다.

**3년차 — 제안서·자격시험 통과 후.** 외부의 긍정 신호가 들어왔다. 1년차의 관점이 한 번 풀렸을 자리에서 다시 등장한다. *통과시켰지만 나는 통과할 자격이 없다*는 형태다. 통과 그 자체가 계기가 되는 양상은 임포스터 관점의 *내부 좌표* 성격을 가장 정확히 보여 준다 — 외부의 긍정조차 자격 없음으로 환산된다.

**졸업 직전 — job market.** 동료들의 자리·연봉·기관이 외부 좌표(Ch.2)와 합쳐진다. 박사 5년의 누적이 *충분한가*를 묻는다. *충분*의 기준이 본인 안이 아니라 *분야 평균*에 놓이고, 분야 평균이 본인보다 위에 있다는 인식이 기본으로 들어선다. 평균이 평균이라는 사실보다 평균이 *위*로 인식되는 양상이 임포스터 관점의 마지막 변형으로 보인다.

세 단계가 같은 관점의 변종이지만 형태가 다르므로 처방도 단계별로 달라진다. 1년차의 *지식 부족*은 1년 단위의 누적으로 풀리고, 3년차의 *통과 후 환산*은 관점 명시로 한 단계 풀리며, 졸업 직전의 *분야 평균 위로 인식*은 평균선 재설정과 관점 명시가 같이 들어가야 풀리는 듯하다.

## 20.3 왜 박사 과정에 흔한가

박사는 매년 새로운 영역으로 진입한다. 작년에 알던 자리에서 모르는 자리로 매년 옮겨가는 것이 박사의 일이다. *모르는 게 기본*이고, 그 기본에 매년 다시 들어가는 작업이 박사의 한 단위다.

한편 학과 분위기·논문 reading group·랩미팅은 *이미 알아야 한다*는 가정 위에서 굴러간다. 선배들이 한 줄 대화로 분야 용어를 주고받고, 교수가 한 paragraph에 reference 목록을 던지고, reading group 도입에 *기본은 알 거니까*가 깔린다. 이 가정은 *분야 senior에게는 기본*이라는 사실에 묶인 것이지, *모든 자리에서 본인이 이미 알고 있다*는 가정이 아니다. 다만 1-3년차 학생 입장에서 이 가정은 자주 *내가 이미 알고 있어야 한다*로 옮겨 읽힌다.

두 가정의 간극이 *나만 모른다*를 자동으로 만들어낸다. 모르는 게 기본라는 사실과 이미 알아야 한다는 가정이 본인 안에서 충돌하고, 본인은 *나만 충돌하고 있다*고 믿는다 — 다른 학생들도 같은 충돌 안에 있다는 사실이 외부에서 보이지 않기 때문이다.

이 관점이 박사 과정에 *흔한* 이유가 여기 있다. 분야 그 자체가 *모르는 자리에 들어가는 일*이고, 학과 분위기는 *이미 알아야 한다*는 가정으로 운영된다. 두 자리의 간극이 박사 5년 내내 본인 안에 있으니, 임포스터 관점은 박사 과정의 *예외*가 아니라 *기본 중 하나*에 가깝다. *왜 나만 그런가*가 가장 먼저 풀려야 할 관점이다.

---

## 20.4 관점 명시 — *모두가 1년 전엔 몰랐다*

임포스터 관점을 한 단계 멈추는 첫 도구는 *관점을 명시*하는 일이다.

> *내가 모르는 자리는 모두가 1년 전엔 몰랐다.*

이 한 줄을 self-talk으로 명시한다. 분야의 senior 학생도 1년차의 본인이었다. 같은 자리를 1년 전에 모르고 들어왔고, 1년 동안 한 단계씩 알아 갔다. 시간 축에서 본인도 1년 후 senior 자리에 있을 것이고, 같은 관점이 1년 후의 후배에게 본인 자리에서 작동할 것이다.

관점이 명시되면 자동 환산이 한 박자 늦어진다. *나만 모른다*가 *모두가 같은 자리를 통과한다*로 옮겨지는 지점에서, 본인 안의 환산 회로가 한 박자 늦어진다. 그제서야 *모르는 게 기본*가 자기 자신에게 적용된다. 박사가 매년 새로운 영역에 들어가는 일이라는 관점이 본인의 작업에도 적용된다는 사실이 보이고, *나는 자격이 없다*가 *나는 박사의 일을 하고 있다*로 옮겨진다.

[Ch.3 (멘붕 사이클)](#chapter-16) §1의 *멘붕에 이름 붙이기*가 같은 회로 위에 놓인다. 사이클에 이름이 붙으면 사이클이 짧아진다는 관점이, 본 자리에서는 *임포스터 관점에 이름이 붙으면 관점이 짧아진다*로 옮겨진다. 같은 도구의 다른 적용이다.

> *내가 모르는 자리는 모두가 1년 전엔 몰랐다.* self-talk으로 명시한다. 명시되면 자동 환산이 한 박자 늦어진다.

권창현 교수의 *기대값은 반려*([Ch.3](#chapter-16) §2)와 김세정 교수의 *거절 = 노력의 증거*가 이 장에서는 다른 형태로 옮겨온다. 박사 자리에서 *모르는 자리에 들어간다*가 결함이 아니라 *박사의 일*이라면, 모름이 본인의 자격을 깎지 않는다. 거절이 노력의 증거이듯, 모름은 박사의 일을 하고 있다는 증거에 가깝다.

---

## 20.5 작은 기여의 인지

관점 명시가 *환산 회로의 인지 차원*이라면, 작은 기여의 인지는 *자료 차원*에 해당한다. 자기 안에 *자격*의 자료가 없으면 관점 명시만으로 풀리지 않는 자리가 있다.

작은 기여의 단위는 거창하지 않다. pull request 1개, 후배에게 한 마디 도움, 랩미팅 발표 1회, 논문 reviewer 코멘트 한 줄, 학회에서의 짧은 질문. 한 주 한 단위의 작은 기여가 누적되면 그것이 *자격*의 자료가 된다. 한 번에 큰 기여를 노리는 관점은 임포스터 관점과 같은 회로 위에 놓인다 — *큰 기여 한 번이 자격을 만든다*는 가정이 *작은 기여 매주가 자격을 만든다*는 자료를 가린다.

[Part 3 Ch.3 (give-first)](#chapter-9) §2의 관점이 여기서 다시 작동한다. *베풂의 단위도 거창하지 않다*는 명제가 *기여의 단위도 거창하지 않다*로 옮겨진다. 같은 회로 — 작은 단위가 자주 일어나는 패턴이 5년 누적의 입력값이다.

작은 기여를 *기록*하는 일이 도구가 된다. 본인이 자기 평가의 자료를 갖지 않으면 임포스터 관점이 자동으로 굴러간다. 한 주에 한 줄, 한 분기에 한 paragraph로 본인의 기여를 글로 적어 두는 단위. *내가 한 일*의 목록이 본인 안에 있으면, 임포스터 관점의 환산이 자료에 의해 한 단계 멈춘다. 자료가 비어 있으면 환산은 무한히 굴러간다.

> 작은 기여를 *기록*하는 단위를 운영. 본인이 자기 평가의 자료를 갖지 않으면 임포스터 관점이 자동으로 굴러간다.

이 기록은 [Ch.2 (비교의 함정)](#chapter-15) §2의 *자기 평균선*과는 다른 자리에 놓인다. 평균선이 *페이스의 자료*라면, 작은 기여 기록은 *자격의 자료*다. 두 단위가 분리되지 않으면 어느 쪽도 자료가 들어가지 않으니, 본인 안에서 두 단위를 분리하는 일이 운영의 시작이다.

---

## 20.6 외부 자원

관점 명시·작은 기여 인지가 본인 안의 도구라면, 외부 자원은 그 도구가 *작동하지 않는 자리*에 놓인다.

(a) **학과 학생 상담 / 임상 자리** — [Ch.6 (정신건강)](#chapter-19) §4의 자원 목록과 같은 자리. 임포스터 증후군은 임상 진단의 영역이기도 해서, 본인 관점이 *일상 단위*로 굳어 있고 관점 명시가 한 단계 풀지 않으면 임상의의 자리에 위임한다.

(b) **동기 그룹** — *나만 모른다*가 아닌 사실의 자료. lab 외부의 같은 단계 박사 1-2명과 *모르는 것*을 공유하는 자리. [Ch.6 (정신건강)](#chapter-19) §3의 고립감 운영과 같은 회로다. 본인의 *나만 모른다* 관점이 동기의 같은 관점과 만나면, 두 관점이 자료를 통해 같이 한 단계 풀린다.

(c) **분야 senior와의 비공식 멘토** — *5-10년 앞선 사람이 같은 자리를 어떻게 통과했는가*의 자료. 분야의 senior가 *나도 그때 그랬다*는 한 줄을 흘려 주는 자리에서, 본인의 임포스터 관점이 *시간 축의 기본*에 묶인다. 시간 축의 기본에 묶인 관점은 본인의 *결함*이 아니라 *단계의 신호*로 옮겨진다.

(d) **외부 reading** — 임포스터 증후군에 관한 일반 단행본·논문. 분야와 무관한 자료가 분야 안의 관점을 한 단계 풀어주는 자리다.

> lab 외부 동기 1-2명과 *모르는 것*을 공유한다. *나만 모른다*가 아닌 사실의 자료가 들어오는 통로는 분야 안의 동기 그룹.

## 20.7 분야 적용 사례 — *논문 100편 본 사람 vs 본인*

SLAM·CV에서 임포스터 관점이 자주 등장하는 한 적용 사례는 *논문 100편 본 사람 vs 본인*이다. 분야 senior가 100편을 보고 한 줄로 답하는 자리에 1년차가 5편을 보고 들어선다. 두 자리에서 같은 질문에 다른 깊이의 답이 나오는 일이 기본이다.

이 자리에서 1년차의 관점이 *나는 5편밖에 안 봤다*로 굳으면 임포스터 관점의 한 변형이 시작된다. 100편의 누적이 senior의 *기본*이고 5편이 1년차의 *기본*라는 사실이 본인 안에 있어야 한다. 두 기본값을 같은 축에 환산하면 임포스터 관점이 자라므로, 두 기본값을 *시간 축의 다른 자리*로 분리하는 일이 본 자리의 관점 명시에 해당한다.

[Ch.3 (멘붕의 사이클)](#chapter-16)의 4단계 관점이 임포스터 자리에 그대로 옮겨진다. *충분히 슬퍼하기 → 자기반성 → 작은 기여 인지 → 다음 한 단계*의 단위가 멘붕 사이클의 운영 도구이듯, 임포스터 관점도 같은 4단계로 운영할 수 있을 것이다. *지금이 몇 단계인가*의 명시가 같은 자리에서 작동한다.

엄태웅 작가의 *뒤쳐질 행복을 허락하라*([Ch.2](#chapter-15))의 관점이 본 자리에서는 *모르는 자리에 들어가는 행복을 허락하라*로 옮겨진다. 뒤쳐짐이 *권리*인 자리에서 모름도 *권리*에 가깝다 — 박사가 매년 모르는 자리에 들어가는 일을 기본으로 두는 시스템이기에.

김세정 교수의 §1 *실패한 날 = 성공에 한 발짝 더 가까워진 날*([Ch.3](#chapter-16))도 같은 자리에서 *모르는 날 = 박사의 일을 한 날*로 옮겨진다. 모름이 *결함의 신호*가 아니라 *진척의 신호*에 가까운 것 — 그것이 박사 시스템 안의 일이다.

---

임포스터 관점은 박사 과정의 예외가 아니라 기본 중 하나다. *내가 모르는 자리는 모두가 1년 전엔 몰랐다*의 관점 명시와 *작은 기여의 기록*이 본인 안의 두 도구이고, [Ch.6 (정신건강)](#chapter-19)의 자원 목록이 그 도구가 작동하지 않는 자리의 외부 자료다. 이 장은 *관점 운영*까지를 본다. 임상적 증상의 진단·약물 결정은 임상의에게 위임된다.

---

**출처.** 1차 이 장에서는 내부 좌표 vs 외부 좌표 분리 관점, 박사 단계별 양상 3종, *기본 무지* vs *이미 알아야 한다* 관점, 작은 기여의 자료 관점, 분야 적용 사례. 2차 [권창현 교수 G2 「대학원에서 닥쳐오는 멘붕의 파도」](https://gradschoolstory.chkwon.net) 연결 — 4단계 관점이 이 장에 적용 ([Ch.3](#chapter-16)). [엄태웅 작가 「뒤쳐질 행복」](https://gradschoolstory.chkwon.net) 연결 — *뒤쳐질 권리*가 이 장에서 *모르는 권리*로 옮겨짐 ([Ch.2](#chapter-15)). 김세정 교수 (2022) §1 연결 — *실패한 날 = 진척의 한 단위*가 *모르는 날 = 박사의 일*로 옮겨짐 ([Ch.3](#chapter-16)). give-first 작은 단위 관점은 [Part 3 Ch.3](#chapter-9) §2에서. 외부 자원 목록은 [Ch.6 (정신건강)](#chapter-19) §3-§4의 운영 관점을 참조.

<h1 id="chapter-21">Ch.21 — 후배를 키운다 — 졸업 1-2년 전부터의 일</h1>

박사 5년차에 *졸업이 가까웠다*는 신호는 논문 목록이 한 줄 늘어나는 데서 오지 않는다. 후배 한 명이 본인의 연구를 *이어서* 굴릴 수 있는 상태에 도달했는가에서 온다. 이 자리가 비어 있으면 학생의 5년치 연구는 본인이 떠난 시점에 그대로 멈춘다. 다음 사람이 처음부터 다시 쌓는다. 후배 지도는 졸업 1-2년 전부터 *내 연구의 연속성*을 위한 일이고, 동시에 *미래의 본인*을 위한 리더십 훈련이기도 하다.

[Part 4 Ch.4 (연구가 삶이 되는 조건)](#chapter-17)에서 박사 후반기의 운영이 *분리하지 않는 삶*의 관점으로 굳었다면, Part 5는 그 운영 위에서 *다음 단계로* 무엇이 등장하는가를 본다. 이 장은 그 첫 자리 — 후배 — 다. 1차 출처는 최윤섭 박사 「후배의 성장을 도와줘라」이며, Knuth §15-§17의 *referee-as-teacher* 원칙을 멘토링 관점으로 연결 한다.

---

## 21.1 자기 복제가 졸업의 한 축이다

> "박사 후반기에 본인의 연구를 후배에게 *이어서 굴릴 수 있는* 상태로 넘기는 능력이 졸업의 필수 조건이다."
>
> — 최윤섭 박사, 「후배의 성장을 도와줘라」 (요지 정리)

**자기 복제 능력**이란 본인의 연구가 본인 머릿속에서만 굴러가지 않고 다른 사람의 손으로도 한 단계 진행되는 상태를 가리킨다. 이 상태에 도달하지 못한 채 졸업한 학생의 연구는 *졸업과 함께 정지*한다. 같은 lab에 남는 후배가 그 연구를 이어 받을 때 처음 6개월은 *본인의 코드를 본인이 다시 읽는* 시간으로 흘러간다.

자기 복제는 두 측면을 갖는다. 하나는 *기록의 복제*다 — 코드, 실험 setting, 실패한 baseline의 회상까지 후배가 처음부터 재현할 수 있는 형태로 남기는 일. 다른 하나는 *질문의 복제*다 — 본인이 풀려고 했던 문제, 풀다 만 문제, 풀고 나서 새로 떠오른 문제가 후배의 머릿속에서 *본인의 질문*으로 굳도록 옮기는 일. 기록만으로는 복제가 절반에 그친다.

이 관점이 졸업 1-2년 전이라는 시점에 의미를 둔다. 졸업 직전에 후배가 막 들어오면 시간이 부족해 복제는 일어나지 않으니, 1-2년의 누적이 필요하다.

## 21.2 선배의 힘과 책임

> "선배 한 마디가 후배의 1년을 바꾼다."
>
> — 최윤섭 박사, 「후배의 성장을 도와줘라」 (요지 정리)

선배가 후배에게 미치는 영향은 교수가 미치는 영향보다 자주, 가까이, 사소한 데서 일어난다. 후배가 처음 lab에 들어와 *어떤 자세로 무엇을 보는가*는 옆자리 선배의 일과를 1-2주 관찰한 결과로 굳는다. 교수가 1주에 한 번 보는 곳에서 만들 수 없는 누적이 선배의 옆자리에서 매일 만들어진다.

이 영향은 양방향이다. 선배가 흘려 한 *이건 별 의미 없어*가 후배의 1년을 정지시키기도 하고, 선배가 우연히 던진 한 줄의 reading 추천이 후배의 박사 주제를 결정하기도 한다. 선배 본인이 그 영향을 인지하지 않은 채 흘러가는 일이 잦고, 거기서 책임이 생긴다 — *내가 후배에게 미치는 영향이 내가 의도한 만큼만 일어난다*고 가정하는 순간 책임은 누락된다.

> 후배가 들어온 *첫 1-2주* 옆자리 선배의 일과가 후배의 박사 기본값을 결정한다. 본인이 그 옆자리에 있다면, 본인의 일과가 *교재*다.

## 21.3 멘토링 황금률

> "내가 후배였을 때 받고 싶었던 것을 후배에게 주면 된다."
>
> — 최윤섭 박사, 「후배의 성장을 도와줘라」

이 장의 한 문장이다. 최윤섭 박사가 멘토링의 *황금률*로 박은 한 줄이다. 이 줄을 두 토막으로 본다. *내가 후배였을 때 받고 싶었던 것*이 앞 토막, *주면 된다*가 뒤 토막이다.

앞 토막은 멘토링의 출발점에 관한 명제다. 후배에게 무엇을 줄지 고민할 때 가장 정확한 자료는 본인이 후배였던 시점의 결핍이다. 그때 *이 한 마디만 누가 해 줬으면*이라고 생각했던 순간, *이 자료만 누가 가르쳐 줬으면*이라고 생각했던 순간 — 그 결핍 목록이 멘토링의 1차 design document다.

뒤 토막에 caveat이 붙는다. 후배는 *본인과 다른 사람*이다. 본인이 받고 싶었던 것을 후배의 형태에 맞게 옮기는 일이 따로 있어서, *원칙*은 복제하되 *형태*는 복제하지 않는다. 본인이 *글로 자세히 적힌 피드백*에서 도움을 받았다고 해서 모든 후배에게 같은 형태가 맞지는 않다. 어떤 후배는 30분 대화에서 같은 양의 피드백을 받는다.

> **멘토링의 황금률.** 내가 후배였을 때 받고 싶었던 것을 후배에게 주면 된다. 단, 원칙은 복제하되 *형태*는 후배에 맞춰 옮긴다.

여기에 실패담의 몫이 있다. 본인이 박사 1-2년차에 겪은 실패 — 잘못 잡은 baseline, 6개월 멈춰 있던 디버깅, 잘못 쓴 첫 논문의 reject letter — 가 멘토링에서 가장 가치 있는 자료다. 성공담은 후배에게 *나는 저기까지 못 간다*는 거리감만 만들고, 실패담은 *나도 거기 가도 된다*는 허락을 준다. 결국 본인의 실패를 후배에게 가르치는 일이 멘토링의 가장 큰 비대칭 베풂이다.

## 21.4 리더십 훈련 — 후배 지도는 미래의 본인을 위한 일이다

> "후배 지도는 미래의 자기 자신을 위한 리더십 훈련이다."
>
> — 최윤섭 박사, 「후배의 성장을 도와줘라」

후배 지도를 *순수한 베풂*으로 관점 잡으면 운영이 어그러진다. 베풂의 자세가 강조되는 만큼 본인의 시간이 *대가 없는 시간*으로 굳고, 1년 안에 원망이 쌓인다. 최윤섭 박사는 이 관점을 다르게 잡았다 — 후배 지도는 *미래의 본인*을 위한 일이다. 졸업 후 박사후·교수·산업 어디로 가든 *나보다 경험 적은 사람을 가르치며 일을 굴리는* 자리는 반복되고, 거기서 처음 부딪히면 학습 비용이 매우 비싸다. 박사 후반기의 후배 지도는 그 비용의 *선납*에 가깝다.

이 관점이 Knuth §15-§17의 *referee-as-teacher* 원칙과 같은 회로 위에 놓인다. Knuth는 심사자(referee)에게 *"오늘 당신이 비판한 저자는 내일 또 논문을 쓴다"*고 적었다. 심사는 게이트키핑이 아니라 *동기 충만한 독자*가 저자에게 베푸는 가르침이다. 한 익명의 저자가 Knuth의 *혹독한 referee report*가 *그의 인생을 바꿨다*고 적은 일화가 §15에 박혀 있다. 멘토링도 같은 구조다 — 오늘 본인이 키운 후배는 내일 본인의 협업자·심사자·동료 교수가 된다. 비대칭 시점에 본인이 베푼 것이 미래에 *대칭으로* 돌아온다. 멘토링은 본인 평판이 5년 뒤 굳어지는 작업이고, *미래의 본인을 위한 리더십*이 동시에 거기서 훈련된다.

> 후배 지도를 *순수한 베풂*으로 관점 하지 않는다. *미래의 본인을 위한 리더십 훈련*이다. 두 관점이 한 작업 위에서 같이 굴러간다.

## 21.5 저자권·연속성 운영

후배와 같이 굴리는 연구의 운영 단위에서 가장 자주 어그러지는 곳은 *저자권 합의*다. 합의가 졸업 시점에 처음 시작되면 1-2년 누적된 기억이 양쪽에서 다르게 정리되어 있고, 그 시점의 합의는 *합의*가 아니라 *충돌의 정리*다.

| 항목 | 시점 | 사소한 표준 |
|---|---|---|
| **저자권 사전 명시** | 협업 시작 시점 | 1저자·교신·기여 분량을 *글로* 시작 시점에 명시. 사후 협상이 아니다. |
| **기여 record 누적** | 매주·매달 | 후배가 한 일과 본인이 한 일을 분리해 기록. 1년 후 합의의 자료. |
| **중간 review** | 6개월 단위 | 합의가 현실과 어긋나는 지점을 *조기에* 본다. |
| **인수인계 글로 남기기** | 졸업 6개월 전 | 코드·data·실패 목록·열린 질문을 *후배가 1주에 읽을 수 있는* 형태로 정리. |

저자권 사전 명시는 협업의 입구에서 가장 사소해 보이고 사후에 가장 큰 비용으로 돌아온다. *1저자가 누구인가, 교신 저자는 누구로 하는가, 후배가 어느 분량까지 기여하면 공저자에 들어가는가* — 이 세 줄을 시작 시점에 *글로* 적어 둔다. 구두 합의는 6개월 후 양쪽이 다른 기억을 갖는다.

> **저자권은 시작 시점에 명시한다.** 졸업 시점의 협상이 아니다. 시작 시점의 *글로 적힌 한 줄*이 1년 후 양쪽 기억의 차이를 막는다.

기여 record 누적은 사전 명시와 짝을 이룬다. 사전 명시가 *어떤 분량까지 기여하면 어디에 들어가는가*의 규칙이라면, 기여 record는 *실제로 누가 무엇을 했는가*의 자료다. 둘이 합쳐져야 1년 후 합의가 자료에 근거해 굴러간다.

인수인계 글로 남기기는 자기 복제(§1)의 운영 단위다. 졸업 6개월 전에 후배가 *1주 안에 읽을 수 있는* 형태의 인수인계 문서를 만들어 둔다. 코드 한 줄 한 줄의 주석이 아니라, *어디서 시작해서 어디까지 갔고, 다음 단계는 어디인가*의 지도다. 이 지도가 비어 있으면 후배는 본인의 질문을 본인의 머릿속에서 새로 만들어야 하고, 그 6개월의 차이가 본인 연구의 연속성을 결정한다.

---

졸업 1-2년 전의 후배 지도는 *남는 시간의 활용*이 아니라 *졸업의 한 축*이다. 자기 복제 능력이 졸업의 필수 조건이고, 멘토링 황금률(받고 싶었던 것을 준다)이 운영 원칙이며, 리더십 훈련 관점이 그 운영을 *미래의 본인을 위한 일*로 굳힌다. 이 장은 그 세 관점을 한자리에 묶었다.

「연구노트」의 [Part 1 ch05 — Reviewer로 읽기](../research-notes/guide.html#chapter-10)가 같은 회로의 다른 측면을 다룬다. 동료의 글을 *referee-as-teacher* 자세로 읽는 일과 후배를 *미래의 본인을 위한 리더십*으로 가르치는 일은 같은 관점의 두 적용이다.

다음 챕터는 후배에서 한 단계 더 나아가, *졸업 후의 본인*이 자주 마주하는 한 자리 — 교수의 일상 — 을 다룬다.

**출처.** [최윤섭 박사 「후배의 성장을 도와줘라」](https://gradschoolstory.chkwon.net)가 1차. 자기 복제 관점, 멘토링 황금률, 리더십 훈련 관점은 모두 이 자리에서 가져왔다. Knuth §15-§17의 *referee-as-teacher* 관점은 「연구노트」 [Part 1 ch05 — Reviewer로 읽기](../research-notes/guide.html#chapter-10)와 연결된다. 자기 복제의 두 측면(기록·질문) 분리, 실패담의 비대칭 베풂 관점, 저자권 운영 4 목록, 인수인계 *지도*의 형태는 이 장에서 정리했다.

<h1 id="chapter-22">Ch.22 — 교수의 일상을 알기 — 임용 면접의 본질</h1>

박사 졸업이 가까워질수록 자주 등장하는 한 질문이 있다 — *어떻게 면접을 잘 볼 것인가.* 학회 자리에서 이 질문을 들고 다니는 학생이 많고, 비공식 모임의 절반은 이 질문을 둘러싸고 굴러간다. 권창현 교수는 관점을 바꾼다 — *어떻게 면접 잘 볼까?*는 잘못된 질문이고, *교수들은 어떤 일을 하고 어떤 고민을 하는가?*가 옳은 질문이다. 면접은 *이미 교수처럼 살고 있는 사람*이 가는 곳이고, 그 자리에서 새로 만들어지지 않는다.

[Ch.1 (후배를 키운다)](#chapter-21)에서 졸업 1-2년 전의 한 단계가 *내 연구의 연속성*과 *미래의 본인*을 위한 리더십 훈련으로 굳었다면, 이 장은 그 *미래의 본인*이 가는 곳 중 가장 자주 회자되는 한 자리 — 교수직 — 의 일상을 다룬다. 1차 출처는 권창현 교수 「교수처럼 말하고 행동하라」다.

---

## 22.1 잘못된 질문과 옳은 질문

> "*어떻게 면접 잘 볼까?*는 잘못된 질문이다. *교수들은 어떤 일을 하고 어떤 고민을 하는가?*가 옳은 질문이다."
>
> — 권창현 교수, 「교수처럼 말하고 행동하라」 (요지 정리)

이 장의 thesis 한 줄이다. 두 질문의 차이를 본다.

*어떻게 면접 잘 볼까?*는 면접을 *짧은 시간의 자기 표현*으로 관점으로 본다. 슬라이드 디자인, 질의응답 대비, 질문 목록 30개에 답을 만드는 일 — 이 관점 위에서 학생은 면접 1-2개월 전부터 자료를 만들기 시작한다. 그렇게 자료는 채워지지만, 채워진 자료가 *교수의 일상에 관해 본인이 모른다는 사실*은 그대로 남는다. 면접관이 던지는 질문의 절반은 *교수의 일상에 들어왔을 때 이 사람이 어떻게 굴러갈 것인가*인데, 그에 대한 답은 자료 안에 없다.

*교수들은 어떤 일을 하고 어떤 고민을 하는가?*는 관점을 다른 곳에 둔다. 면접은 *이미 그 일상을 살고 있는 사람*이 들어가는 자리이고, 살고 있지 않은 사람이 면접에서 살고 있는 것처럼 표현해 통과하는 일은 드물다. 면접관석에 5-15년 그 일상을 살아 온 사람이 앉아 있어서, 그가 *살고 있지 않은 사람*을 못 알아볼 가능성이 낮다.

> **면접 준비의 1순위는 자료 제작이 아니라 일상의 시뮬레이션이다.** 교수가 매일 어떤 일에 시간을 쓰고 어떤 고민에 잠을 못 자는가를 *현재 시점에서* 알아 두는 일이 자료 30장보다 우선이다.

## 22.2 세 항목에서 본 차이 — 자기 소개·5년 plan·일과

이미 교수처럼 살고 있는 학생과 면접을 위해 교수를 흉내 내는 학생의 차이가 가장 자주 드러나는 세 항목이 있다.

| 항목 | 면접 위해 흉내 내는 학생 | 이미 교수처럼 사는 학생 |
|---|---|---|
| **자기 소개** | "저는 X를 연구한 학생입니다." 본인의 박사 결과를 *학생의 결과*로 정리. | "저는 X 분야의 *연구 프로그램*을 운영합니다." 박사 결과가 *5-10년 연구 의제*의 첫 단계로 정리. |
| **5년 plan** | "졸업 후 5년 안에 좋은 논문 N편을 쓰겠습니다." 결과 단위의 plan. | "5년 안에 *어떤 질문*을 답하고 싶습니다. 그 답을 위해 어떤 학생을 어떤 grant로 키우고 싶습니다." 질문·사람·자원 단위의 plan. |
| **일과 시뮬레이션** | "저는 연구·논문·세미나에 시간을 씁니다." 학생 일과의 연장선. | "오전은 grant 작성과 학생 미팅, 오후는 강의 준비와 위원회, 저녁이 본인 연구의 시간입니다." 시간 분배가 *교수의 시간*에 가깝다. |

자기 소개부터 본다. *학생의 결과*와 *연구 프로그램*의 차이는 결과의 *내용*에 있지 않다. 같은 결과가 두 관점으로 정리될 수 있고, 차이는 *결과를 어디에 위치시키는가*에 있다. 박사 학위 논문 결과를 *결과 자체*로 소개하는 학생과 *향후 10년 의제의 첫 단계*로 소개하는 학생을 면접관이 다르게 본다. 후자는 *이미 교수의 시야*를 갖고 있다는 신호다.

5년 plan의 차이는 *결과 단위*와 *질문·사람·자원 단위*의 차이다. 좋은 논문 N편이라는 plan은 학생 단계의 시야로 정리한 plan이다. 한편 교수 단계의 plan은 *어떤 질문을 답하고 싶은가, 그 답을 위해 어떤 학생이 필요하고 어떤 grant를 따야 하는가, 그 학생을 어디서 모집하고 어떻게 가르칠 것인가*의 단위다. 5년 plan을 후자의 단위로 정리해 본 학생은 면접에서 같은 단위의 답이 자연스럽게 나온다.

일과 시뮬레이션이 가장 비대칭이다. 학생 일과가 *연구가 중심에 있는* 일과라면, 교수 일과는 *연구가 저녁으로 밀려난* 일과다. 오전의 grant 작성, 오후의 위원회, 저녁의 본인 연구라는 시간 분배가 교수직의 기본이다. 이 기본값을 모르고 면접에 들어가면 *어떻게 시간 관리를 하시겠습니까?*라는 평범한 질문에 학생 일과의 답이 나가고, 면접관석에서 그 답이 어떻게 들리는가는 따로 적지 않아도 될 듯하다.

> 자기 소개·5년 plan·일과 시뮬레이션 — 이 셋을 *현재 시점에서* 미리 적어 두고 매년 갱신한다. 면접 1개월 전에 처음 적기 시작하면 늦다.

---

## 22.3 일상의 시뮬레이션 — 지도교수에게 묻기

교수의 일상을 *현재 시점에서* 알기 위한 가장 직접적인 통로는 지도교수 본인이다. 박사 후반기의 학생이 지도교수에게 묻기 가장 좋은 질문은 *연구 어떻게 하셨어요?*가 아니라 *교수 일상의 무엇이 가장 비싸고 무엇이 가장 보람 있나요?*에 가깝다. 같은 옆자리에서 5-10년을 같이 본 사람의 답이 어떤 책의 답보다 정확하기 때문이다.

이 질문에서 학생이 흔히 막히는 곳이 두 군데 있다. 하나는 *지도교수의 시간을 그렇게 쓰는 것이 죄송하다*는 정서고, 다른 하나는 *내가 교수가 될 것 같지도 않은데 지금 묻기는 이르다*는 자기 검열이다. 두 관점 모두 어그러져 있다. 지도교수에게 본인 일상을 묻는 일은 *학생의 미래 진로 결정*에 직접 도움이 되고, 그 결정이 어그러지면 지도교수의 5년치 투자도 어그러진다. 결국 묻는 일이 양쪽에 이익이다. 그리고 교수직을 *지원할 것인가*의 결정은 그 일상을 *알고 난 뒤*에 일어나야 정확하다. 알기 전에 결정하면 결정의 근거가 가짜다.

> 지도교수에게 *교수 일상의 가장 비싼 부분과 가장 보람 있는 부분*을 묻는 시간을 박사 4-5년차에 한 번 만든다. 한 시간이면 충분하다. 그 한 시간이 5년 진로 결정의 근거 자료다.

질문 목록 일부를 둔다. *grant 작성에 1년 중 몇 시간을 쓰는가, 학생 모집의 가장 큰 어려움은 무엇인가, 강의 준비에서 가장 비싼 비용은 무엇인가, 위원회의 일상이 본인 연구 시간에 어느 정도 영향을 주는가, 가장 보람 있던 한 순간은 어떤 순간이었는가, 다시 박사 졸업 시점으로 돌아간다면 어떤 결정을 다르게 하겠는가.* 이 목록이 완전하지는 않다. 본인이 아는 항목부터 채워 가면 된다.

---

## 22.4 보조 자료 — 두 권의 책

교수직의 일상을 다루는 영문 자료 중 박사 후반기 학생이 자주 추천받는 두 권이 있다.

*Tomorrow's Professor* (Richard Reis, IEEE Press / Stanford 운영 mailing 목록 동명)는 박사후·신임 교수의 일상 운영을 짧은 토막으로 모은 자료다. 학생 모집, grant, 강의 준비, tenure track의 1-3년차 운영이 주된 내용이다. 박사 졸업이 가까운 학생의 1차 reference로는 두꺼운 편이지만, 목차의 항목 목록만 훑어도 *교수 일상이 어디까지 다양한가*를 가늠할 수 있다.

*A PhD Is Not Enough!* (Peter J. Feibelman)는 박사 졸업 이후의 진로 결정과 초기 운영을 다룬다. 박사후·산업·교수 세 진로의 비교, 교수직 면접의 구조, 초기 연구실 운영의 흔한 함정이 주된 내용이다. 다만 *박사 학위만으로 충분하지 않다*는 thesis가 학생에 따라 관점을 흔들어서, 1차로 읽기보다 본인의 진로 관점이 어느 정도 굳은 다음에 검증용으로 읽는 편이 운영에 더 잘 맞는다.

두 권 모두 *현재 본인의 일상*과 비교해 가며 읽을 때 의미가 있다. 책을 읽고 나서 본인의 일상에 무엇이 등장하지 않았는지 — 매일 등장하는데 본인이 *학생 일상*으로 읽고 있던 부분이 무엇인지 — 를 적어 두는 일이 가장 큰 학습이 된다.

> 두 권을 *답*이 아니라 *내 일상의 빠진 항목 점검표*로 쓴다. 책의 목차 항목을 본인 일상과 짝지어 보고, 짝이 비어 있는 항목이 본인의 *교수 일상 시뮬레이션*이 약한 곳이다.

---

## 22.5 면접은 *이미 그렇게 살고 있는가*의 검증이다

위 네 절의 운영을 합치면, 임용 면접의 본질은 *짧은 시간의 자기 표현*이 아니라 *이미 그렇게 살고 있는가의 검증*이라는 관점이 된다. 자기 소개·5년 plan·일과 — 셋이 *흉내가 아닌 기본*로 정리되어 있는 학생이 면접에서 흉내 낼 일이 없다. 면접 1-2주의 자료 제작은 그 기본 위에서의 *마지막 정리*일 뿐, 기본 그 자체를 만들지 않는다.

이 관점이 *준비 시점*을 바꾼다. 면접 1-2개월 전이 자료 제작의 시점이라면, 박사 4-5년차가 *일상의 시뮬레이션*을 시작할 시점이다. 졸업 1-2년 전부터 본인의 자기 소개를 *연구 프로그램* 단위로 갱신하고, 5년 plan을 *질문·사람·자원* 단위로 적어 두고, 본인의 일과를 *교수의 일과*에 가까운 형태로 시뮬레이션해 본다. 그제서야 누적된 시뮬레이션이 기본값을 옮겨 앉힌다.

> **면접은 *이미 그렇게 살고 있는가*의 검증이다.** 박사 4-5년차의 일상 시뮬레이션이 기본값을 결정하고, 면접 자료 제작은 그 기본의 *정리*다.

면접에 들어가지 않더라도 — 산업 진로, 박사후 진로, 그 외 — 같은 시뮬레이션이 *진로 결정의 근거 자료*로 굴러간다. 교수 일상을 알고 나서 *교수직을 지원하지 않는다*는 결정이 나오는 일도 흔하고, 그 결정의 근거가 분명한 학생이 다음 단계에서도 정확한 결정을 한다. 결국 면접 통과가 목적이 아니라 *진로 결정*이 목적이라는 관점이 이 장의 운영을 마무리한다.

---

교수의 일상을 *알기*가 임용 면접의 1순위 준비다. 자기 소개·5년 plan·일과 — 이 셋이 *흉내가 아닌 기본*로 굳어 있는 학생이 면접에서 흉내 낼 일이 없다. 이 장은 그 기본값을 옮겨 앉히는 도구들 — 지도교수에게 묻기, 두 권의 책을 점검표로 쓰기 — 을 짧게 모았다.

이 장의 모든 운영이 가리키는 한 곳은 *결정의 자료*다. 면접 통과가 목적이 아니라 *진로 결정의 정확도*가 목적이라면, 일상의 시뮬레이션이 자료의 가장 큰 몫을 가진다. 박사 4-5년차의 시뮬레이션 누적이 졸업 시점의 결정을 결정한다.

다음 챕터는 진로 결정에서 학생이 자주 빠지는 한 환상 — *어느 좌표에 가면 안정이 보장된다*는 환상 — 을 다룬다. 교수직도 산업도 박사후도, 어느 좌표도 안정을 발급하지 않는다.

**출처.** [권창현 교수 「교수처럼 말하고 행동하라」](https://gradschoolstory.chkwon.net)가 1차. *잘못된 질문 vs 옳은 질문*의 thesis, 자기 소개·5년 plan·일과의 세 항목 구조, *이미 교수처럼 살고 있는가의 검증*이라는 면접 관점은 모두 여기서 가져왔다. *Tomorrow's Professor* (Richard Reis)와 *A PhD Is Not Enough!* (Peter J. Feibelman)는 제목·저자·소개만 명시했다(본문 fetch 없음). 지도교수 질문 목록, *책을 점검표로 쓰는* 활용법, 진로 결정 그 자체를 이 장의 목적으로 두는 관점은 이 장에서 정리했다.

<h1 id="chapter-23">Ch.23 — 안정은 환상이다 — 졸업 후의 진짜 좌표</h1>

졸업이 가까운 학생의 책상 위에 *진로 좌표 비교표*가 놓여 있다. 교수·산업·박사후·창업의 네 칸에 *연봉·안정성·자율성·향후 5년 전망*의 행이 그어져 있고, 학생은 *어느 칸이 가장 안정적인가*를 매주 다시 채운다. 표를 채우는 시간이 누적될수록 *어느 좌표로 가야 안정이 보장되는가*의 답이 손에 잡히는 듯하다 — 그러나 안 잡힌다. 어느 칸도 *영구적 안정*을 발급하지 않는다는 사실이 표 자체에 적혀 있지 않을 뿐이다.

[Ch.2 (교수의 일상을 알기)](#chapter-22)에서 *어디로 가는가*의 결정이 *그곳의 일상을 알기*에서 시작한다는 관점이 굳었다면, 이 장은 그 결정에 깔린 더 깊은 환상 — *어느 좌표에 가면 안정이 보장된다* — 을 해체한다. 1차 출처는 엄태웅 작가 「에필로그 — 안정적인 삶, 그런 거 없다」와 권창현 교수 「에필로그 — 뭘 해도 불안하다」 두 편이다. 책의 마지막 챕터다.

---

## 23.1 안정이라는 환상

> "안정적인 삶, 그런 거 없다."
>
> — 엄태웅 작가, 「에필로그」 (제목)

엄태웅 작가의 에필로그 제목 한 줄이다. *그런 거 없다*가 정확히 무엇을 가리키는가를 본다. *안정*이라는 단어에 두 층이 있다 — 하나는 *예외적 사건이 적은 일상*의 안정, 다른 하나는 *불안의 영구적 부재*의 안정이다. 첫 번째 안정은 좌표에 따라 더 얻을 수도 있고 덜 얻을 수도 있다. 그러나 졸업 직전 학생이 표를 채우며 찾는 것은 두 번째 안정이다 — *여기 가면 더 이상 불안하지 않을 것이다*. 이런 곳은 어느 좌표에도 없다는 점이 문제다.

이 두 층의 혼동이 진로 결정의 정확도를 낮춘다. 학생은 *예외적 사건이 적은 일상*에 *불안의 영구적 부재*가 따라온다고 가정하고, 그 가정 위에서 *교수가 더 안정적이다*나 *대기업이 더 안정적이다*의 비교가 이뤄진다. 그런데 비교의 두 항이 같은 좌표 위에 있지 않다. *일상의 안정*은 비교 가능하지만, *불안의 부재*는 어디에도 없으므로 비교가 성립하지 않는다.

> **안정의 두 층을 분리한다.** *예외적 사건이 적은 일상*의 안정은 좌표마다 다르게 발급되지만, *불안의 영구적 부재*의 안정은 어디에도 발급되지 않는다. 진로 결정의 비교는 첫 번째 층에서만 의미를 갖는다.

---

## 23.2 불안정은 기본 mode다

> "불안정이 인생의 본성(nature)이고 기본 모드(기본 mode)다."
>
> — 엄태웅 작가, 「에필로그」

엄태웅 작가가 박은 한 줄이다. 같은 글 안에 *불행과 함께 공존할 줄 아는 삶*이 짝으로 적혀 있다.

> "불행과 함께 공존할 줄 아는 삶."
>
> — 엄태웅 작가, 「에필로그」

이 두 줄이 이 장의 운영 관점이다. 불안정이 *예외 상태*가 아니라 *기본 mode*라면, 운영의 정확한 자세는 *불안정의 박멸*이 아니라 *불안정과의 공존*이다. 박멸을 시도하는 운영이 가장 비싼 비용을 만든다.

박멸 시도의 흔한 형태가 셋 있다. 하나는 *더 안정적인 좌표를 찾아 옮기는 일*이다 — 박사후 1년차에 *더 안정적인* 곳으로 옮기고, 2년차에 다시 옮기고, 옮기는 곳마다 *여기는 어딘가 더 불안하다*는 결론이 따라온다. 다른 하나는 *결정 그 자체를 미루는 일*이다 — 졸업을 1년 미루고, 박사후를 1년 더 끌고, 결정에 도달하지 않으면 불안이 발생하지 않는다고 가정하는 운영. 마지막은 *비교표를 더 정밀하게 만드는 일*이다 — 표의 행을 더 늘리고 셀을 더 채우면 *옳은 답*이 등장할 것이라고 가정하는 운영. 세 운영 모두 *불안의 박멸*을 목적으로 두고, 셋 모두 비용만 만든다.

공존의 운영은 다르다. *불안이 기본*라는 가정 위에서, 불안의 *내용*을 점검하고 *그 내용이 정확한 신호인지*를 분리하는 일이 운영이다. 어떤 불안은 *진짜 신호*다 — 본인 연구의 방향이 어그러진 신호, 협업의 합의가 깨진 신호. 어떤 불안은 *생애 단계의 기본*다 — 20대 후반에 친구들이 흩어지고, 30대 초반에 가까운 사람들이 다른 곳으로 이동하는 흐름. 두 불안의 처방이 다른 만큼, 신호를 처방하지 않으면 비용이 크고, 기본값을 처방하려고 시도하면 비용이 끝없이 든다.

졸업 후의 *좌표 이동 자체*가 기본 mode라는 사실의 한 자료가 미국 코호트에 있다. Philip Guo는 *The PhD Grind* 출간 이후 3-4년 사이에 Google 소프트웨어 엔지니어 → edX 방문 연구원 → MIT 박사후 → University of Rochester 조교수까지 네 곳을 옮겨 다녔다. 한 좌표가 *영구적 안정*을 발급해서가 아니라, 어느 좌표도 그 발급을 하지 않는다는 사실 위에서 운영이 굴러갔기 때문이다.

> **Philip Guo (Stanford CS PhD, 2012):** 졸업 후 4년 사이에 Google·edX·MIT 박사후·Rochester 조교수까지 네 곳을 옮겨 다녔다. 한 좌표가 *영구적 안정*을 발급하지 않는다는 사실이 그 이동의 관점이었다 — 옮김의 누적은 *더 안정적인 좌표를 찾는* 박멸 운영이 아니라, 어느 좌표도 그 박멸을 발급하지 않는다는 기본 mode 위에서의 *공존 운영*에 가깝다. — *The PhD Grind* Epilogue (post-2012 margin notes)

> **불안의 박멸이 아니라 공존이 운영의 관점이다.** 박멸 시도가 가장 비싼 비용이고, 공존이 *기본 mode* 위의 정확한 자세다.

## 23.3 입시 환상의 *재발*

> "뭘 해도 불안하다."
>
> — 권창현 교수, 「에필로그」

권창현 교수의 한 줄이다. 같은 글에 *알아도 걱정, 몰라도 걱정이다*가 짝으로 적혀 있다.

> "알아도 걱정, 몰라도 걱정이다."
>
> — 권창현 교수, 「에필로그」

이 두 줄이 한 패턴을 가리킨다 — 학생이 한 단계에 도착하면 그 단계의 걱정이 사라지지 않고 *라벨만 교체되어* 다음 단계의 걱정으로 옮겨 간다. 학부 시절의 *좋은 대학원만 가면 끝*이 박사 1년차의 *좋은 논문 1편만 쓰면 끝*이 되고, 5년차의 *좋은 좌표만 가면 끝*이 된다. 같은 환상이 라벨만 바꿔 가며 박사 졸업 직전에 *다시* 등장한다 — 입시 환상의 *재발*이다.

이 패턴이 위험한 이유는 *환상의 재발*이라는 인지 그 자체가 늦게 도착하기 때문이다. 학생은 박사 1년차에 *학부 시절의 환상*은 인지하지만 박사 1년차의 환상은 인지하지 않는다. 5년차에 *1년차의 환상*은 인지하지만 5년차의 환상은 인지하지 않는다. *지금 이 단계의 환상*은 본인 시점에서 가장 보이지 않는다. 환상이 보이는 시점에는 이미 다음 단계에 도착한 후이고, 거기의 새 환상이 또 보이지 않는다.

같은 패턴을 다른 데서 본다. 신데렐라 동화는 *결혼 장면*에서 끝난다. 결혼 장면 *이후*가 그려지지 않는 서사가 동화의 기본이다. SNS의 *성공한 동료* 사진이 같은 구조를 갖는다 — 사진은 한 시점의 단면이고, *그 다음 1년의 일상*은 사진에 들어가지 않는다. 그 사진을 *영구적 도달*로 읽는 학생이 본인의 *도달*도 같은 형태일 것이라고 가정한다. 그제서야 가정이 어그러진다.

> *지금 이 단계의 환상*은 본인 시점에서 보이지 않는다. 환상의 *재발*이 1년 단위로 일어난다는 사실을 관점으로 둔다. 환상의 내용을 1년 후의 자기에게 적어 보내 두는 운영을 만든다.

## 23.4 박사과정 불안과 생애 단계 불안의 분리

> "연구의 어려움은 실존적 의문 앞에서는 사소한 문제다."
>
> — 권창현 교수, 「에필로그」

권창현 교수가 박은 한 줄이 이 절의 관점이다. 박사 후반기의 학생이 겪는 불안의 *내용*을 두 층으로 분리한다 — 하나는 *연구의 어려움*에서 오는 불안, 다른 하나는 *생애 단계*에서 오는 실존적 불안. 두 불안이 같은 시점에 같이 등장하니 학생은 자주 둘을 *연구의 불안*으로 합쳐 읽는다.

20대 후반에서 30대 초반의 시기에 *생애 단계의 불안*이 가장 자주 등장한다. 학부 동기들이 결혼·이직·해외 이주로 흩어진다. 대학 시절의 가까운 친구 모임이 1년에 한 번도 모이지 못하게 되고, 가족 구성이 바뀌고, 부모의 건강이 처음으로 *변수*로 등장한다. 거주지·직업·관계 셋 모두가 동시에 *재구성*에 든다. 이 재구성이 박사 후반기와 같은 시점에 일어나는 것은 우연이 아니라 생애 단계의 기본이다.

이 시점에 학생이 *연구가 안 풀린다*고 적은 일기의 절반은 사실 *생애 단계의 재구성*에 관한 일기다. 둘을 분리하지 않으면 처방이 어그러진다. 연구의 어려움은 연구 안에서 처방하면 1-2개월에 한 단계 풀리는 한편, 생애 단계의 불안은 *처방*되지 않고 *공존*된다. 둘을 합쳐 두면 *연구를 더 열심히 해서 생애 단계의 불안을 처방하려는* 운영이 등장하고, 그 운영은 작동하지 않는다.

> 박사 후반기의 불안을 *연구의 불안*과 *생애 단계의 불안*으로 분리한다. 같은 시점에 같이 등장하지만 처방이 다르다. 분리하지 않으면 둘 모두 어그러진다.

이 분리 그 자체가 좌표 결정의 *정확도*를 높인다. 진로 결정에서 *어느 좌표가 더 안정적인가*의 질문이 자주 등장하는 이유의 절반은 *생애 단계의 불안*을 *연구·진로의 불안*으로 합쳐 읽었기 때문이다. 분리하면 진로 결정에서 *연구·진로의 불안*만 처방하면 되고, 그 처방의 정확도가 합쳐 읽었을 때보다 훨씬 높다.

## 23.5 졸업 후의 진짜 좌표 — 결정·관계·자율성·감정의 누적

졸업 후의 진짜 좌표는 *연봉·안정성·자율성·향후 전망*의 4행 표에 있지 않다. 진짜 좌표는 *지난 5년간 본인이 누적한 결정·관계·자율성·감정의 합*이다. 이 누적이 졸업 시점의 *어디로 갈 것인가*를 좌우하고, 도착한 곳의 *어떻게 운영할 것인가*도 좌우한다.

결정의 누적은 박사 1-5년의 매주 반복된 *작은 결정*들이다 — 어느 논문을 읽을지, 어느 협업에 들어갈지, 어느 reading group에 갈지, 어느 학회에 발표할지. 같은 곳에 도착한 두 학생이 5년간 같은 결정을 한 적이 거의 없고, 결정의 누적이 두 학생의 *졸업 시점*을 다르게 만든다.

관계의 누적은 [Part 3 Ch.3 (먼저 베푸는 협업)](#chapter-9)이 가리켰다. 박사 5년의 평판이 학생 사이에서 먼저 쌓이고, 그 평판이 졸업 시점의 *초대 명단*을 결정한다. 본인이 보지 못한 곳에 본인의 평판이 먼저 도착해 있다.

자율성의 누적은 [Ch.1 (후배를 키운다)](#chapter-21)에서 자기 복제와 리더십 훈련으로 본 관점이다. *나보다 경험 적은 사람과 일을 굴리는* 능력이 박사 후반기에 어디까지 굳었는가가 졸업 후 어디로 가도 *처음 1년*의 비용을 결정한다.

감정의 누적은 이 장의 두 인용이 가리켰다. *불안과의 공존* 능력이 5년간 어디까지 훈련되었는가가 졸업 후의 *불안의 기본 mode* 위에서 본인이 어떤 자세로 굴러갈지를 결정한다.

이 네 누적이 *진로 좌표 비교표*에 적히지 않는다. 표는 *외부 좌표의 비교*고, 누적은 *내부 좌표의 합*이다. 표를 채우는 시간이 누적의 시간을 대체할 수 없다. 표를 한 번 그어 두고 매주 다시 채우는 운영은 누적의 시간을 가장 많이 소모한다.

> **졸업 후의 진짜 좌표는 외부 좌표 표가 아니라 5년간 누적한 결정·관계·자율성·감정의 합이다.** 표를 채우는 시간이 누적의 시간을 대체하지 않는다. 표는 한 번 그어 두고, 운영은 누적에 시간을 쓴다.

「연구노트」의 [Part 0 ch04 — 이게 연구인가: Hazelrigg 4-type](../research-notes/guide.html#chapter-4)이 같은 회로의 다른 측면을 가리킨다. *task / objective / goal*의 시간 층위 분리와 *4-type*의 내용 층위 분리가 *연구* 안에서 작동한다면, 이 장의 *박사과정 불안과 생애 단계 불안의 분리*는 같은 관점의 *삶* 쪽 적용이다. 두 곳에서 같이 — *분리하지 않으면 처방이 어그러진다*는 관점이다.

---

「대학원노트」 다섯 part가 한자리에 가리킨 thesis가 있다 — *외부의 답이 학생에게 발급되지 않는다.* [Part 1](#chapter-1)의 *박사 진학의 결정*이 외부 환경의 평가가 아니라 본인의 결정으로 굳었고, [Part 2](#chapter-4)의 *지도교수 관계*가 일방의 답이 아니라 양방향 운영으로 굳었고, [Part 3](#chapter-7)의 *내 연구*가 주어진 주제가 아니라 본인의 좌표로 굳었고, [Part 4](#chapter-17)의 *감정의 사이클*이 박멸 대상이 아니라 운영의 단위로 굳었다. 이 장 — Part 5의 마지막 — 가 그 thesis의 종착지다. *불안정이 인생의 본성(nature)이고 기본 모드(기본 mode)다*는 엄태웅 작가의 한 줄이 그 종착지의 관점이다. *뭘 해도 불안하다*와 *알아도 걱정, 몰라도 걱정이다*가 그 관점의 두 측면이다. *연구의 어려움은 실존적 의문 앞에서는 사소한 문제다*가 두 층의 분리를 짚는다. 그리고 *불행과 함께 공존할 줄 아는 삶*이 그 분리 위에서 본인이 굴러갈 자세를 가리킨다. 학생이 졸업 후 도착하는 곳은 어느 좌표가 아니라 — 다섯 part가 같이 가리킨 — *외부 답이 발급되지 않는 자리에서 본인의 결정·관계·자율성·감정을 누적해 가는 운영*이다. 그 운영은 졸업으로 끝나지 않는다. 졸업은 한 단계의 마무리이고, 같은 운영이 다음 단계에서 같은 관점으로 이어진다. 이 책이 다룬 범위가 거기까지다.

---

**「대학원노트」 끝.**

**출처.** [엄태웅 작가 「에필로그 — 안정적인 삶, 그런 거 없다」](https://gradschoolstory.chkwon.net)와 [권창현 교수 「에필로그 — 뭘 해도 불안하다」](https://gradschoolstory.chkwon.net)가 1차. *불안정이 기본 mode*, *불행과 공존*, *뭘 해도 불안하다*, *연구의 어려움은 실존적 의문 앞에서 사소하다*, *알아도 걱정 몰라도 걱정이다*는 모두 두 에필로그에서 가져왔다. [Philip Guo (2012) *The PhD Grind* Epilogue](https://pgbovine.net/PhD-memoir.htm) — 졸업 후 4 좌표 이동 참조 (§ 2). 안정의 두 층 분리(*예외적 사건의 안정* vs *불안의 부재*), 입시 환상의 *재발* 관점, 신데렐라 동화·SNS의 단면 비유, 박사과정 불안과 생애 단계 불안의 분리, *진짜 좌표 = 결정·관계·자율성·감정의 누적* 관점은 이 장에서 정리했다.

<h1 id="chapter-24">Ch.24 — 해외 임용·유학 디테일 — 추천서·교신저자·국제 인지도</h1>

기존 [Ch.2 (교수의 일상을 알기)](#chapter-22)가 *교수직 일반*의 일상 시뮬레이션을 다뤘다면, 이 장은 그 관점의 *해외 임용 층위*에 해당한다. 국내 임용과 해외 임용은 같은 일이 아니다 — 평가 단위·시점·관행이 분야와 기관에 따라 갈리고, 박사 후반의 운영도 그 차이에 맞춰 정렬되는 편이 단단하다.

1차 출처는 김세정 교수의 해외 임용 사례다. §6의 일부 (*MIT나 하버드대학교일지라도 아무 소용이 없다*)는 [Part 2 ch01 (관계는 양방향)](#chapter-4)에 흡수됐다. 이 장은 §6-§8의 *해외 임용 본격 관점* — 교신저자·Photonics West·CLEO·SPIE·IEEE·OSA 펠로십·국제 인지도 — 을 다룬다. *Reis 1997*·*Feibelman 1993* 같은 외부 읽기 목록과도 이어진다.

---

## 24.1 해외 임용의 단위가 다르다

해외 임용 평가의 기본 단위가 국내와 다르다. 평가 자료의 *비중*이 다르게 누적된다.

- **단위 1: 추천서 3-5장** — 국내보다 비중이 큼. 추천인 목록이 *박사 3-4년차*에 결정. 외부 추천인 (*지도교수가 아닌 분야 senior*) 1-2명이 추천서의 핵심
- **단위 2: job talk + chalk talk** — 1시간 슬라이드 강연 + 보드 1시간. chalk talk은 *연구 의제 5-10년 plan*을 슬라이드 없이 발표하는 자리
- **단위 3: 교신저자 경험** — 박사 말년 또는 포닥 시기에 교신저자 1-2편이 있는가가 분기점. 학생 1저자만의 결과로는 *지도 능력의 증거*가 비어 있다
- **단위 4: 국제 인지도** — 분야 top 학회의 초청 강연·펠로십·senior와의 collab. 학계의 *얼굴*이 만들어지는 곳

위 4 단위가 박사 *마지막 학기*가 아니라 박사 *3-4년차*부터 누적된다. 임용 시점에 비어 있으면 거기서 더 채울 여지가 남지 않는다.

> **해외 임용 준비는 박사 마지막 학기에 시작되지 않는다.** 추천서·교신저자·국제 인지도 세 단위의 누적 시점이 박사 3-4년차에 시작된다.

---

## 24.2 추천서 — 박사 3-4년차의 작업

추천인 목록의 기본 구성: 지도교수 1 + 외부 collaborator 1-2 + 분야 senior 1-2. 외부 collaborator·분야 senior는 학회에서 *만들어지는* 편에 가깝다. 박사 3-4년차의 학회 출입이 추천인 목록의 자료다.

학회에서 *기억되는* 것이 핵심이다. 발표 한 번으로 기억되는 일은 드물고, 발표 후 30분 안에 한 번 더 대화한 사람·follow-up 메일을 한 번 더 받은 사람이 기억된다. 이 운영이 [Part 3 ch04 (한 줄 질문 메일)](#chapter-10)의 follow-up 메일 운영과 직접 이어진다 — 학회 후 한 통의 짧은 메일이 1-2년 뒤의 추천서를 만든다.

> *"포닥 또는 박사 말년 차 학생에게 교신저자 기회를 줄 수 있는가가 해외 임용 준비에서 큰 변수다."*
>
> — 김세정 교수의 해외 임용 사례 관점 (요지 정리)

이 관점이 추천인에도 그대로 적용된다. 외부 senior 추천인이 본인의 collab paper에 *공저자*로 들어가 있다면 추천서의 무게가 달라진다 — 추천인이 본인의 일을 *직접 봤다*는 신호이기 때문이다. 단순히 학회에서 1-2번 본 사이의 추천서와는 다른 무게로 읽힌다.

> 박사 3-4년차에 *추천인 목록 5명*을 미리 적어 둔다. 목록이 비어 있는 곳이 본인이 박사 후반에 채울 항목.

---

## 24.3 국제 인지도 — Photonics West·CLEO·SPIE·IEEE·OSA

김세정 교수가 §6에서 짚은 indicator는 본인의 분야(반도체·나노광학) 학회들이지만, 관점은 분야 일반화 가능하다. 어느 분야에서든 다음 셋이 *국제 인지도*의 기본 indicator로 작동한다.

(a) **분야 top 학회의 초청 강연** 1-2회
(b) **분야 학회의 펠로십** (SPIE·IEEE·OSA·ACM·AAAS 등 — 분야 따라 다름)
(c) **분야 senior와의 collab** 1-2 paper

> *"Photonics West·CLEO 같은 학회의 초청 강연 한 번이 국제 인지도의 indicator로 작동한다. 그 한 번이 본인 이름을 분야 senior 사이에 등록한다."*
>
> — 김세정 교수의 해외 임용 사례 관점 (요지 정리)

학생 시기에 (a)와 (b)는 박사 직후로 미뤄지지만, (c)는 박사 3-4년차에 *만들 수 있다*. 분야 top 학회 발표 1편 + senior와의 *short collab* 1건이 박사 후반에 만들 수 있는 기본이다. 5년 안에 한 건 만들기를 목표로 두면 임용 시점의 자료가 비지 않는다.

---

## 24.4 교신저자 경험

박사 학생 기본: 1저자 N편 + 공저자 M편. 교신저자 경험은 거기서 비어 있는 칸이다.

> *"교신저자 경험이 해외 임용에서 본인의 카드가 된다."*
>
> — 김세정 교수의 해외 임용 사례 관점 (요지 정리)

해외 임용 평가에서 *지도 능력의 증거*가 필요하다. 본인이 학생을 1-2명 mentor 해 그 결과로 paper를 낸 적이 있는가. 박사 학생 기본 운영에서는 이 칸이 비어 있는 편이다. 채우려면 운영을 한 번 비틀어야 한다.

박사 말년에 후배 1-2명을 *공식적으로 mentor*하고, 그 결과 paper에서 *교신저자 자리*에 들어가는 운영이다. [Part 5 ch01 (멘토)](#chapter-21)의 *후배 키우기*가 본인의 임용 자료와 직접 이어지는 두 번째 층위다. 박사 말년의 후배 mentoring이 *베푸는 일*이 아니라 *본인의 자료를 만드는 일*이라는 관점이 이 절의 운영을 정렬한다.

지도교수 측에서도 이를 *허락*해야 작동한다. 박사 말년의 학생이 후배의 paper에 교신저자로 들어가는 일이 lab의 기본 운영이 아닌 만큼, 박사 4년차에 지도교수와 한 번 *상의하는 자리*가 따로 필요하다. 지도교수가 *본인 임용 plan을 알고 있는가*가 변수가 된다.

> **박사 4년차에 지도교수에게 *해외 임용 plan*을 한 번 명시한다.** 그 명시가 박사 말년의 교신저자·추천서·collab을 *공동 운영*으로 옮긴다.

---

## 24.5 인터뷰 — chalk talk이 가장 비싸다

해외 임용 인터뷰는 보통 *2-3일*에 걸쳐 굴러간다. 교수·학생 30-50명과의 미팅, job talk 1시간, chalk talk 1시간이 기본 구성이다.

job talk은 학회 발표의 연장이다. 박사 결과 + 5년 plan을 슬라이드 60-80장으로 1시간 발표하는 형식이라, 박사 후반의 학회 발표가 누적된 학생에게 가장 친숙하다.

chalk talk이 학생에게 가장 새롭다. 보드만으로 *5-10년 의제*를 설명하는 자리이고, 슬라이드가 없는 만큼 *본인의 의제 관점이 본인 머릿속에 정리되어 있는가*가 직접 드러난다. 즉석 질문 1시간이 따라오고, 그 질문 안에서 *5-10년 안에 어떤 학생을 어떤 grant로 키울 것인가*까지 답해야 한다.

> chalk talk 준비는 박사 4-5년차에 *슬라이드 없이* 본인 의제를 발표할 수 있을 때까지 누적. 면접 1-2개월 전에 시작하면 *슬라이드의 도움 없이는 발표가 안 되는* 상태가 기본이 된다.

평가 항목: *이 사람이 5-10년 grant·논문·학생을 끌고 갈 수 있는가.* 박사 결과가 아니라 *향후 운영의 시뮬레이션*이 평가의 축이다. [Ch.2 (교수의 일상을 알기)](#chapter-22) §2의 *5년 plan*과 직접 이어진다 — 학생 단계의 plan이 아니라 *질문·사람·자원* 단위의 plan이 chalk talk에서 작동한다.

## 24.6 외부 reading 목록

해외 임용을 두고 박사 후반에 한 번 훑어 두면 관점이 정렬되는 reading 두 권.

**Tomorrow's Professor** (Reis 1997) — 신임 교수 1-3년차 운영. 학생 모집·grant·강의 준비·tenure track 첫 1-3년의 운영을 짧은 토막으로 다룬다. 임용 *후* 자료지만 임용 *전*에 한 번 훑어 두면 chalk talk의 단어가 달라진다. 본인이 *5년 후의 본인 일상*을 한 번이라도 본 적이 있는가가 chalk talk에서 신호로 읽힌다.

**A PhD Is Not Enough!** (Feibelman 1993) — 박사후·산업·교수 세 진로 비교 + 임용 면접의 구조. 임용 면접의 *기본 양식*을 본인 분야 외부에서 한 번 봐 두는 자료다. 다만 thesis가 학생에 따라 관점을 흔들 수 있어서, 본인의 진로 관점이 어느 정도 굳은 다음에 검증용으로 읽는 편이 안전하다.

두 권 모두 [Ch.2 (교수의 일상을 알기)](#chapter-22) §4에서 안내한 자료다. 이 장의 추가 층위는 다음 한 항목:

> 본인 분야의 senior가 *추천하는 책 1-2권*을 박사 4-5년차에 받아 둔다. 두 권의 책이 분야 일반의 자료라면, senior의 한 권은 분야 디테일의 자료다.

senior 한 명에게 한 번 묻는 데서 *분야의 디테일·기관의 디테일·시점의 디테일*이 같이 들어온다. 책 자료가 *2-30년 전 자료*인 경우가 많아, senior의 *최근 5년 자료*가 그 위에 추가 층위로 깔린다.

## 24.7 이 장의 결론

해외 임용 준비는 박사 *마지막 학기*에 시작되지 않는다. 추천인·교신저자·국제 인지도 세 단위가 박사 3-4년차의 운영에 들어가야 임용 시점의 자료가 채워진다. chalk talk은 박사 4-5년차의 *일상 시뮬레이션*이 누적된 학생에게 기본이 된다.

이 관점이 박사 후반의 *결정 시점*을 앞당긴다. 본인이 *해외 임용을 지원할 것인가*의 결정이 박사 4년차에 *지원하지 않는다*로 굳더라도, 근거가 분명한 학생이 다음 단계에서도 정확한 결정을 한다.

다음 챕터는 학계 밖 자리로 넘어가 *산업계 박사의 적응·일상*을 다룬다. 임용 *이후*의 운영도, 산업계 *이후*의 운영도 모두 *안정*이 아닌 만큼.

**출처.** 김세정 교수의 해외 임용 사례가 1차. Richard Reis, Peter J. Feibelman의 저작이 보조 출처다. 추천서·교신저자·국제 인지도·chalk talk 운영 관점은 본문에서 정리했다.

<h1 id="chapter-25">Ch.25 — 산업계 박사의 적응·일상 층위</h1>

Part 5 ch01-ch04가 *학계 진로*의 층위를 다뤘다. ch01 (후배를 키우는 일)·ch02 (교수의 일상을 알기)·ch03 (안정은 환상이다)·ch04 (해외 임용 디테일) — 네 챕터 모두 *학계 안의 운영*에 묶여 있었다. 이 장은 그 대칭 자리에 들어선다 — *산업계 박사*의 졸업 직후 1-2년 일상이다.

[Part 3 ch07 (산업계 진로)](#chapter-13)이 *진로 결정의 층위*였다면, 이 장은 그 결정 *이후*의 *적응·일상 층위*다. 같은 산업계를 두 단면에서 잘라본 셈이다. 결정 층위가 *어느 갈래로 갈 것인가*에 가깝다면, 적응 층위는 *그 갈래에 들어가서 어떻게 굴러갈 것인가*에 더 가깝다.

1차 출처는 유두희 박사 글이다. UC버클리 보건역학 PhD → UN/WHO → 실리콘밸리 데이터 사이언티스트의 경로가 *연구라는 작업이 산업계에서 어떻게 변하는가*를 보여 주는 사례다. 이 장은 그 사례와 산업계 기본 운영 자료를 한자리에 합쳐 정리해 둔다.

---

## 25.1 작업 단위가 다르다

학계 기본 작업 단위와 산업계 기본 작업 단위가 다른 축 위에 놓인다.

| 항목 | 학계 기본 | 산업계 기본 |
|---|---|---|
| 결과 단위 | 논문 1편 = 1-2년 | sprint = 2주 |
| 목표 단위 | 학생 1명 = 5년 | OKR (objectives & key results) = 분기 |
| 회의 단위 | weekly meeting | 1on1 = 주 / stand-up = 매일 |
| 자원 단위 | grant = 3-5년 | 분기별 헤드카운트 + budget |

산업계 기본이 학계보다 *짧고 빠르다*. 박사 운영의 *느린 사이클*에 익숙한 학생이 첫 1-2년에 부딪히는 지점이 바로 이 시간 단위의 차이다. 8주 안에 한 단위를 닫아야 하는 sprint 기본에 박사 기본 *6개월-1년 한 단위*를 그대로 옮겨 넣으면 어그러진다.

> 유두희 박사 글 사례 — 학계 → UN/WHO → 산업계로 옮겨갈 때마다 *시간 단위*가 한 단계씩 짧아진다. UN/WHO가 *연 단위 정책 사이클*이라면 실리콘밸리는 *분기 단위 OKR*이다.

유두희 박사는 글 §10 ("대학원 신규 졸업자에게 무엇을 기대할까")에서 산업계 작업 단위의 기본값을 한 줄로 적었다 — "정해진 시간보다 짧은 시간에 원하는 목표치보다 높은 퀄리티를 확장성 높게 완성하는 것" (유두희 박사 글 §10). 학계 기본 *분량 + 깊이*가 산업계 기본 *짧은 시간 + 확장성*으로 옮겨 앉는 자료 문장이고, 이 장 §1 표의 *결과 단위 8주 sprint*와 직접 매핑된다.

이 차이가 첫 1-2년의 *학습 과제*를 만든다. 박사 5년 동안 굳어진 시간 감각을 *몇 분기에 걸쳐* 산업계 기본으로 옮겨 앉히는 운영. 그렇게 옮겨 앉는 사이에 본인 결과의 *속도와 형식*이 산업계에 맞춰 정렬된다.

---

## 25.2 *연구*가 산업계에서 어떻게 변하는가

박사의 *연구 단위*가 산업계에서 다른 모양으로 옮겨 앉는다. 한 질문을 1-2년 follow해 paper로 닫는 운영이 학계 기본라면, 산업계 기본은 한 질문을 *8주 sprint*로 follow해 *코드 + memo*로 닫는다. 결과의 *reader*도 달라진다 — 분야 senior 50-100명에서 *팀 5-10명 + stakeholder 2-3명*으로 옮겨 앉는다.

결과의 형식이 그 reader에 따라 다른 모양으로 굳는다. 15페이지 paper가 *1페이지 memo + 슬라이드 5장 + 코드 PR*로 분할된다. 학계 기본 글의 분량을 그대로 가져가면 *읽히지 않는 글*이 된다. 1페이지 memo로 *3분 안에 결정자에게 결정을 받는* 운영이 산업계 기본라, paper 단위의 글은 그 단위가 아니다.

> 유두희 박사 글 사례 — 결과의 reader가 누구인지가 결과 형식을 결정한다. *paper의 reader*와 *memo의 reader*가 같은 사람이 아니다.

박사의 글쓰기 능력 (introduction·method·results·discussion 4 단을 짜는 능력)은 *그대로 자산*이고, 그 글의 *길이와 위치*만 옮겨 앉는다. paper의 introduction이 memo의 *첫 두 문장*에 압축되고, results가 *슬라이드 한 장*에 압축된다. 학계 기본 *길게 풀어 쓰는 글*에서 *짧게 닫는 글*로 옮겨 앉는 학습이 첫 1-2년의 한 과제로 들어간다.

---

## 25.3 8주 sprint·코드 maintenance·stakeholder 보고 — 세 축

산업계 첫 1-2년의 운영이 적어도 세 축에서 학계와 다르게 놓인다.

(a) **8주 sprint** — 분기 OKR 안의 한 단위. 박사 기본 *6개월-1년 한 단위*에서 *8주 한 단위*로 옮겨 앉는 운영이다. 8주 안에 *질문 정의 → 데이터 → 분석 → memo*까지 닫는 사이클이라, 박사의 *완벽한 분석*을 *8주 안에 닫히는 분석*으로 관점을 옮겨야 한다. 닫히지 않은 분석이 *다음 sprint로 carry-over*되는 일은 기본 운영이지만, *carry-over*가 누적되면 분기 OKR이 어그러진다.

(b) **코드 maintenance** — 학계 기본 *paper accept 후 코드 archive*가 산업계에선 적용되지 않는다. 본인이 짠 코드가 *팀의 production code*에 들어가면, 5-10년 동안 유지보수 명단에 본인 이름이 남는다. 코드 quality·테스트·문서화의 단위가 학계와 다르다. 박사 기본 *논문 결과 재현용 코드*보다 산업계 기본 *팀의 5명이 동시에 수정하는 코드*가 훨씬 더 단단해야 한다.

(c) **stakeholder 보고** — 학계 기본 *지도교수 1인 + 공저자 1-2명*과 다른 구조다. 산업계의 stakeholder는 *제품 매니저·디자이너·다른 팀 엔지니어·고객*까지 포함한다. 같은 결과를 *4-5명의 다른 단위*에 *4-5번 다른 형식*으로 보고하는 운영이다. 제품 매니저에게는 *고객 영향*, 디자이너에게는 *UX 변화*, 엔지니어에게는 *기술 디테일*, 고객에게는 *결과 한 줄* — 같은 결과의 4 단면을 본인이 4번 정렬해 발표한다.

> **산업계 첫 1-2년에 *학계 기본 한 형식*만으로 결과를 보고하면 어그러진다.** 같은 결과의 *4-5 단면*을 stakeholder 별로 분할해 정렬하는 운영이 기본이다.

---

## 25.4 산업계 박사의 가치 — 네 축

박사의 *분야 라벨*이 산업계와 매핑되지 않는 일이 자주 있지만, 박사의 *능력 set*은 그대로 산업계 자산으로 옮겨 앉는다. 유두희 박사 글의 관점 — *분야 라벨이 아니라 능력의 set*이 산업계와 매핑된다 — 이 [Part 3 ch07 § 2](#chapter-13)에서 이미 흡수됐다. 이 장에서 그 능력 set을 네 축으로 분할한다.

(a) **domain expertise** — 박사의 분야 지식. 분야 직접 매핑 (CV → autonomous driving, biostat → 제약·헬스케어)에서는 *그대로 자산*이다. 첫 1-2년에 도메인 senior 역할에 본인이 들어가는 일도 흔하다. 분야 간접 매핑 (보건역학 → 일반 데이터 사이언스)에서는 도메인이 *세부 디테일*로 약화되지만, *문제 정의의 감각*은 그대로 자산이다.

(b) **통계** — 데이터 운영의 단단함. 박사 5년 동안 *통계의 함정*을 한 번 이상 디뎌 본 사람 — multiple comparison·confounding·selection bias·p-hacking — 이 데이터 사이언스에서 *시니어 신호*로 읽힌다. junior 데이터 사이언티스트가 통계의 함정에 자주 부딪히는 한편, 박사의 *미리 짚는* 운영이 자산이 된다.

(c) **코드** — 박사 기본 *연구용 코드*가 산업계 기본 *production 코드*로 옮겨 앉는 학습이 첫 1-2년의 한 과제다. 박사 코드 quality (한 사람이 한 번 돌리고 archive)가 산업계 코드 quality (5명이 동시에 수정하고 5년 동안 유지)에 그대로 옮겨가지 않는다. 옮겨 앉는 학습이 첫 1-2년의 몫이고, 옮겨 앉으면 박사의 *알고리즘 감각*이 그대로 자산이 된다.

(d) **communication** — 학계 기본 *논문 + 학회 발표*가 산업계 기본 *memo + 회의 발표*로 옮겨 앉는 층위. 학계 발표의 *5분 elevator pitch*가 산업계 회의의 *3분 보고*와 직접 매핑된다. 학회의 *질의응답 1시간*이 산업계 회의의 *질의응답 5분*으로 압축되지만, 운영의 골격은 같다.

> 산업계 첫 1-2년에 본인의 *네 축 자산*을 한 번씩 점검한다. 어느 축이 *바로 자산*이고 어느 축이 *옮겨 앉는 학습*인지 정렬해 두면 학습에 본인 시간이 우선 배분된다.

---

## 25.5 권창현 교수 「교수처럼 행동」의 산업계 거울

[Part 5 ch02](#chapter-22)에서 권창현 교수의 관점이 흡수됐다 — *어떻게 면접 잘 볼까?*가 잘못된 질문이고, *교수들은 어떤 일을 하고 어떤 고민을 하는가?*가 옳은 질문. 면접은 *이미 그렇게 살고 있는 사람*이 들어가는 자리이고, 살고 있지 않은 사람이 면접에서 살고 있는 것처럼 표현해 통과하는 일은 드물다.

산업계에도 같은 관점이 그대로 옮겨 앉는다. 산업계 면접·on-boarding·첫 1-2년이 모두 *이미 산업계 기본 운영을 살고 있는가*의 검증이다. *어떻게 인터뷰 잘 볼까?*가 잘못된 질문이고, *산업계 데이터 사이언티스트는 매일 어떤 일에 시간을 쓰는가?*가 옳은 질문이다. 산업계 기본 *분기 OKR*·*sprint*·*1on1*을 박사 3-4년차의 인턴십·기업 collab에서 시뮬레이션해 둔 학생이 첫 1-2년에 어그러지지 않는다.

> 박사 3-4년차의 *인턴십·기업 collab*에서 산업계 일상의 시뮬레이션을 누적해 둔다. [Part 3 ch07 § 4](#chapter-13)의 관점이 이 장의 첫 1-2년 운영의 자료다.

면접 통과가 목적이 아니라 *진로 결정의 정확도*가 목적이라는 권창현 교수의 관점이 산업계에서도 같은 자리에 놓인다. 인턴십 후 *산업계로 가지 않는다*는 결정이 나오는 일도 흔하고, 그 결정의 근거가 분명한 학생이 다음 단계에서도 정확한 결정을 한다.

---

## 25.6 엄태웅 작가 「에필로그 — 안정적인 삶」 거울

[Part 5 ch03](#chapter-23)에서 엄태웅 작가의 관점이 흡수됐다 — 산업계도 학계도 *안정의 자리*가 아니다. 이 장에서 그 관점이 *산업계 첫 1-2년의 기본 변화*로 옮겨 앉는다.

산업계 박사의 첫 1-2년 기본 변화: 회사 인수합병·팀 재조직·팀장 교체·project sunset·layoff 사이클. 이런 변화가 *분기 단위*로 들어오는 일이 산업계 기본이다. 학계의 *5-10년 단위 변화*와 다른 사이클이고, 박사 기본 *5년의 안정된 lab*과 통째로 다른 위치다. 첫 1-2년에 본인의 자리가 *3-4번 옮겨지는* 일이 *예외*가 아니라 *기본*에 가깝다.

> **산업계 첫 1-2년의 변화가 *예외*가 아니라 *기본*이라는 관점을 기본으로 받아들인다.** 회사 인수합병·팀 재조직·project sunset이 본인 능력 평가의 신호가 아니라 *분기 단위 사이클의 한 부분*에서 일어나는 일이다.

이 관점이 첫 1-2년의 멘붕을 줄인다. 박사 기본 *5년의 한 lab*에서 굳어진 *안정의 기대*가 분기 단위 변화에 부서질 때, 그 부서짐이 본인 능력의 신호가 아니라 *산업계 기본의 한 부분*이라는 인식이 운영의 도구가 된다. 안정이 없다는 사실 그 자체를 기본으로 받아들이는 운영이다.

## 25.7 김기섭 교수 「학계에서 고-투 브랜드」의 산업계 등가

김기섭 교수의 관점 — *학계에서 본인의 분야 senior가 떠올릴 한 사람이 본인이 되도록* — 이 산업계에서 한 층위 변주된다. *분야 senior + 회사 senior가 떠올릴 한 사람이 본인이 되도록*이 산업계 등가다. 회사 안의 brand가 *분기 OKR 결과*만으로는 만들어지지 않는다.

산업계의 brand는 적어도 네 축에 분산된다.

- **(a) 팀 안에서의 신뢰** — 본인이 *맡은 일을 닫는 사람*이라는 평가. 분기 OKR에서 직접 누적
- **(b) 외부 collab** — 다른 팀·다른 회사·외부 연구자와의 collab. 학계 기본 *논문 공저자*와 다른 모양이지만 *외부에서의 본인 가시성*은 같은 층위
- **(c) blog·LinkedIn 운영** — 박사 기본 *Google Scholar*가 산업계 기본 *LinkedIn·GitHub·blog*로 옮겨 앉는다. 본인 결과의 *외부 reader*가 LinkedIn에서 누적
- **(d) 발표·panel·meetup** — 분야 학회가 산업계의 conference·meetup·tech talk으로 옮겨 앉음. 외부 발표 1-2회가 brand의 한 자료

> 산업계 첫 1-2년의 brand: 네 축 중 *2-3*에서 누적하는 운영이 기본. 네 축 모두에서 누적하려고 하면 본인 시간이 분산되어 어디서도 단단해지지 않는다.

## 25.8 이 장의 결론

산업계 박사의 적응 층위는 *작업 단위·결과 형식·시간 사이클*이 학계와 다르다는 사실 위에서 굴러간다. 박사 운영을 *그대로* 옮겨가면 첫 1-2년에 어그러지고, *관점을 옮겨 앉히면* 박사의 자산이 그대로 산업계 자산이 된다. 이 장의 두 운영 도구는 박사 3-4년차의 *인턴십·기업 collab*에서 누적한 일상 시뮬레이션, 그리고 졸업 후 첫 1-2년의 *작업 단위 변경*을 기본으로 받아들이는 관점이다.

이 장은 「대학원노트」의 마지막 단계 직전에 놓인다. 학계 진로와 산업계 진로의 층위가 여기서 나란히 놓인다. 학계든 산업계든 *5년이 5년에 끝나지 않는다*는 인식이 마지막 챕터로 넘어가는 다리다 — 박사 후 다음 5년이 또 있고, 본 책의 관점이 그 다음 5년에도 작동한다. *방향·엔진·도구* ([Part 4 ch04](#chapter-17))의 관점에서 *방향*은 같고 *엔진과 도구*가 단계에 따라 다르다는 사실이 본 책 전체의 한 결론에 가깝다.

**주의.** 이 장은 *처방*이 아니다. *산업계로 가라/가지 마라*, *어느 회사가 좋다/나쁘다*, *몇 년차에 옮겨라* 같은 명제는 이 장에 들어가지 않는다. 이 장이 다루는 범위는 *작업 단위가 다르다는 사실*과 *적응 층위의 운영 도구*까지 — 결정과 디테일은 각자의 몫에 있다.

**출처.** 유두희 박사 글이 1차. 권창현 교수 「교수처럼 행동」, 엄태웅 작가 「에필로그 — 안정적인 삶」, 김기섭 교수 관점이 보조 연결. 산업계 작업 단위와 적응 층위는 본문에서 정리.

<h1 id="chapter-26">Ch.26 — 졸업 후 첫 1년 — 다음 5년의 좌표가 결정되는 자리</h1>

졸업식 다음 날 책상의 모양이 박사 5년차의 책상과 같지 않다. 책상 위에 놓인 자료의 종류가 바뀌고, 컴퓨터에 열린 폴더의 이름이 바뀌고, 메일함의 이름 옆 affiliation이 바뀐다. 이 작은 표면의 변화가 다음 5년의 좌표가 *결정되는 시간*의 첫 신호다.

[Ch.1 (mentor_juniors)](#chapter-21)부터 [Ch.4 (overseas_appointment)](#chapter-24)까지 Part 5의 앞 챕터들이 *졸업 전·졸업 단계*의 운영(멘토·교수·안정·해외)이었다면, 이 장은 *졸업 직후 1년 일반 운영*이다. 진로 갈래 4(포닥·산업계·교수·창업) 각각의 첫 1년 단위는 다르지만, *박사 시절 자산의 운영*(논문·코드·관계·평판)은 네 갈래에 공통이다. 그 공통의 층위에 이 장의 관점이 들어간다.

[Ch.3 (no_stability)](#chapter-23)의 *불안정이 기본 mode* 관점이 여기서 다시 작동한다. *졸업하면 안정*은 환상이고, 졸업식이 한 사건이며, 그 사건 *이후*의 1년이 본인의 운영이다. 신데렐라 동화가 결혼 장면에서 끝나는 구조([Ch.3](#chapter-23) §3)와 같은 관점 — 동화가 끝나는 그 지점에서 본인의 운영이 시작된다.

---

## 26.1 졸업의 의미 — 끝이 아닌 다음 단계 시작

박사 5년의 운영이 졸업으로 *닫히는* 운영이 아니라 *다음 5년으로 이어지는* 운영이다. 졸업식이라는 한 사건이 본인의 운영을 *닫는* 게 아니라, 본인의 운영이 *학교 안*에서 *학교 밖*으로 옮겨가는 전환에 가깝다.

졸업 직후 1년이 박사 5년의 *결과 출력*이자 다음 5년의 *입력*이다. 박사 5년의 누적이 졸업 직후 1년 안에 어떻게 운영되는가가 다음 5년의 좌표를 결정한다. 1년의 운영이 5년의 결과로 굴러간다. *5년의 결과가 1년 안에 출력된다*가 아니라, *1년의 운영이 5년의 입력이 된다*가 여기의 관점이다.

엄태웅 작가의 「에필로그 — 안정적인 삶, 그런 거 없다」([Ch.3](#chapter-23))의 관점이 여기서 다시 작동한다. 졸업이 *안정의 도착*이 아닌 만큼, 졸업 후 1년차의 학생이 *이제 안정에 도달했다*는 관점으로 들어가면 1년차의 운영이 기본 위에서 작동하지 않는다. 권창현 교수의 *알아도 걱정, 몰라도 걱정*([Ch.3](#chapter-23))도 같이 작동한다 — 졸업 후 1년차에 *어디로 가도 걱정*이 기본이다.

> **졸업은 끝이 아니라 시작이다.** 졸업식이 한 사건이고, 그 사건 *이후*의 1년이 본인의 운영이다.
