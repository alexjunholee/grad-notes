# Ch.13 — 학계 밖 진로 — 박사 과정의 능력을 산업계에서 쓰는 법

박사 졸업 뒤에는 교수직뿐 아니라 산업계의 데이터 과학 분야로도 갈 수 있다. 유두희 박사는 UC버클리 보건역학 박사 → UN·WHO → 실리콘밸리 데이터 과학자의 경로를 밟았다. 학계 밖으로 나가더라도 박사 과정에서 익힌 능력을 다른 곳에 쓸 수 있다. 그만큼 선택할 수 있는 진로도 넓다.

---

## 13.1 박사 졸업이 곧 교수직은 아니다

박사 졸업 뒤의 진로는 교수직으로 한정되지 않는다. 미국 국립과학재단 산하 NCSES의 2024년 조사에서는 미국 내 비(非)포닥 취업이 확정된 신규 연구박사 가운데 학계와 산업·기업이 각각 40%였다. 이 수치는 미국 대학의 해당 연도·해당 응답 집단을 가리키며, 국가와 전공 전체에 그대로 적용할 비율은 아니다. 다만 산업계가 일부 전공의 예외적인 진로가 아니라는 점은 보여 준다. 연구실 안에서 주로 만나는 지도교수의 경로와 실제 졸업생의 진로 분포는 다를 수 있다.

> **분야에 따라서는 학계 밖 진로가 드물지 않다.** 자신의 분야와 기관의 최근 졸업생들이 어디로 갔는지 직접 확인한다.

자신의 분야에 관한 자료는 학과의 최근 졸업생 현황과 동문 명부, 국가 단위 박사 추적 조사에서 찾을 수 있다. 자료를 볼 때는 포닥과 정규 고용을 나누고, 취업이 확정되지 않은 응답자가 분모에서 빠졌는지도 확인해야 한다. 진로 준비 시간은 전국 평균 비율에 맞출 일이 아니라, 자신이 지원할 자리와 필요한 준비를 보고 정한다.

---

## 13.2 전공보다 익힌 능력을 본다

유두희 박사는 UC버클리 보건역학 박사 과정을 마치고 UN·WHO에서 정책·데이터 관련 일을 한 뒤 실리콘밸리의 데이터 과학자로 옮겼다. 박사 과정에서 익힌 통계·인과추론·데이터 처리 능력을 전공명과 직접 맞지 않는 산업계 자리에서도 활용한 사례다.

> 박사 과정에서 익힌 능력은 전공명과 다른 산업계 자리에서도 쓸 수 있다.

유두희 박사는 글의 프롤로그에서 "온 신경과 정열을 다해 사랑한 나의 연구 주제를 접기로 했다"고 적었다. 박사 과정의 전공 연구를 접고 학계 밖으로 옮기기로 했다면 전공명을 앞세우기보다 자신이 익힌 능력을 다시 정리해야 한다.

박사 학위를 특정 분야에서만 쓰는 학위로 이해하면 학계 밖 진로는 전공 이탈로 보인다. 여러 능력을 익힌 증거로 이해하면 같은 학위로도 여러 진로에 들어설 수 있다. 학위를 무엇으로 이해하느냐에 따라 졸업할 때 내리는 결정도 달라진다.

---

## 13.3 산업계에서 박사 전공을 쓰는 세 방식

산업계에서 박사 전공을 쓰는 방식은 적어도 세 가지이며, 자리마다 하는 일이 다르다.

(a) **전공을 그대로 쓰는 자리** — 박사 전공을 산업계에서도 그대로 살린다. 컴퓨터 비전(CV) → 자율주행·로보틱스 회사, 생물통계 → 제약·헬스케어 회사, 자연어 처리(NLP) → 대규모 언어 모델(LLM) 회사가 여기에 해당한다. 박사 과정의 연구 결과·논문·협업 관계가 그대로 자산이 된다. 일하는 방식도 학계 연구실과 가장 가깝다.

(b) **분석 능력을 옮겨 쓰는 자리** — 분석 능력을 살려 다른 분야로 옮긴다. 보건역학 → 일반 데이터 과학(유두희 박사 글), 물리 → 퀀트, 화학 → 제약 영업·기획이 그 예다. 박사 과정에서 쓴 연구 논문보다 데이터를 다루고 통계와 문제 정의를 적용한 경험을 주로 활용한다.

(c) **전공과 다른 자리** — 박사 과정에서 익힌 학습·분석 능력을 전공 밖에서 쓴다. 컨설팅, 벤처캐피털, 정책처럼 학위 전공과 일의 주제가 직접 맞닿지 않은 자리에서도 복잡한 문제를 정의하고 자료를 검토한 경험이 자산이 될 수 있다.

세 방식은 전공과 가까운 정도뿐 아니라 채용 기준과 일과, 보상 구조가 다르다. 어느 방식의 보수나 자율성이 더 높다고 일반화할 수는 없다. 자신의 경험 가운데 어떤 부분을 증거로 내놓을지, 지원할 자리의 공고와 현직자 인터뷰를 보고 정리해야 한다.

---

## 13.4 채용 일정에서 거꾸로 준비한다

업계 면접과 인턴십, 경력 기록을 언제 준비할지는 학위 일정과 채용 주기, 체류 자격에 따라 달라진다. 적어도 지원 마감이 닥친 뒤에야 산업계의 일을 처음 알아보는 상황은 피하는 편이 좋다.

교수의 일상을 미리 알아보듯 산업계의 데이터 과학자·엔지니어·컨설턴트가 어떻게 일하는지도 학위 과정 중에 살핀다.

준비 방법은 네 가지다.

- **인턴십** — 학과 규정과 지도교수의 동의, 재원 조건을 확인한다. 해외 체류 중이라면 학교 국제처와 정부 공식 안내에서 취업 허가 범위도 확인한 뒤, 전공을 그대로 쓰거나 분석 능력을 옮겨 쓰는 업무를 경험한다. 기간과 모집 시점은 회사마다 다르다.
- **기업 협업** — 지도교수의 산업계 협업에 참여해 박사 과정의 연구 결과가 산업 현장에서 어떻게 쓰이는지 살펴본다.
- **해커톤·데이터 챌린지** — 전공과 직접 관련 없는 과제를 제한된 시간에 다뤄 보며, 학술 연구와 다른 평가 기준을 경험한다.
- **경력 기록** — 링크드인(LinkedIn) 같은 직업 네트워크나 개인 이력서에 연구 결과와 협업·발표 경력을 꾸준히 기록한다. 채용 분야에 따라 포트폴리오나 코드 저장소가 더 중요할 수도 있다.

> 목표 직무의 채용 시기와 준비 항목을 학위 과정 중에 확인한다. 졸업 예정일에서 거꾸로 계산하되, 특정 학년을 모든 전공의 표준 시점으로 삼지는 않는다.

---

## 13.5 박사 학위가 강점이 되지 않는 자리

박사 학위가 모든 산업계 자리에서 같은 강점이 되는 것은 아니다. 신입 소프트웨어 엔지니어(SWE), 전공과 무관한 영업, 주니어 분석가처럼 학위가 필수 조건이 아닌 자리에서는 연구 경험보다 직무에 직접 필요한 증거가 더 중요할 수 있다. 채용 담당자가 학위를 어떻게 해석할지는 회사와 역할에 따라 다르므로, 학위 자체를 내세우기보다 그 자리에서 쓸 수 있는 능력을 설명해야 한다.

박사 과정의 일하는 방식을 산업계에 그대로 가져가면 의사결정 속도와 회의 방식, 결과를 보는 기준과 문서의 독자가 어긋날 수 있다. 논문에 필요했던 깊이와 재현성을 버리는 것이 아니라, 제품·정책·사업의 결정에 필요한 형식으로 바꾸는 일이다.

[Part 4 ch04 (통합된 삶)](./chapter_17_integrated_life.md)의 세 질문을 빌리면, 학계에서 산업계로 옮겨도 어디로 갈지와 왜 계속할지에 대한 답은 남을 수 있지만 무엇으로 일할지는 달라진다. 적응 기간을 미리 정할 수는 없으므로, 첫 업무에서 요구하는 산출물과 피드백 주기를 구체적으로 확인한다.

---

## 13.6 첫 이동 뒤에도 다른 영역으로 옮길 수 있다

유두희 박사의 박사 과정 → UN·WHO → 실리콘밸리 경로는 첫 자리 뒤에도 다른 영역으로 옮긴 한 사례다. 이 사례만으로 학계와 산업계 사이의 양방향 이동을 입증할 수는 없다. 이후 이동 가능성은 채용 시장과 연구 실적, 경력 단계, 분야 관행에 달려 있으므로 누구에게나 열린 경로로 일반화하지 않는다.

이런 사례는 첫 직장이 평생의 단 하나뿐인 선택은 아니라는 점을 보여 준다. 그렇다고 다음 이동이 보장되는 것은 아니다. 지금의 환경이 자신에게 맞는지 살피고, 다음 선택에 필요한 경력을 함께 쌓는다.

> **첫 직장은 다음 경력의 조건을 만드는 선택으로 본다.** 평생을 한 번에 결정하려 하지 말되, 이후의 이동이 저절로 열린다고 가정하지도 않는다.

산업계와 학계 가운데 어디를 택하든 지금의 환경이 자신에게 맞는지 살핀다. 다음 선택의 시점은 미리 고정하지 않고, 역할·성과·생활 조건을 정기적으로 점검한다.

**출처.** 유두희 박사의 글이 실린 [『대학원생 때 알았더라면 좋았을 것들 2』](https://ebook-product.kyobobook.co.kr/dig/epd/ebook/4801191334679)를 1차 사례로 삼았다. 미국 신규 연구박사의 진로 수치는 [미국 NCSES 「Doctorate Recipients from U.S. Universities: 2024」](https://ncses.nsf.gov/pubs/nsf26315/report/postgraduation-trends)에서 확인했다. 이 조사는 미국 대학의 2024년 학위 수여자 가운데 미국 내 비포닥 취업이 확정된 응답자의 고용 부문을 집계하므로, 다른 국가·연도·전공의 비율로 옮겨 쓰지 않았다. 산업계 진로를 나눈 세 방식과 준비 방법은 이 장의 정리이며, 보수·기간·이동 가능성을 보편 규칙으로 제시하지 않는다.

# Ch.14 — 자율성의 무게 — 스스로 기준을 세우는 일

학부에서는 시험·과제·학점처럼 정해진 평가 기준을 자주 만난다. 대학원에도 학점·자격시험·연차 심사·논문 심사·연구윤리 규정 같은 외부 기준은 남아 있고 지도교수도 실제 평가 권한을 지닐 수 있다. 다만 무엇을 충분한 연구와 삶으로 받아들일지는 이런 기준만으로 정해지지 않는다.

[엄태웅 대표 「자기관리」](https://gradschoolstory.chkwon.net/terry/%ec%9e%90%ea%b8%b0%ea%b4%80%eb%a6%ac/)는 이 빈자리를 한 문장으로 짚는다.

> "그 누구도 당신의 만족을 채점해 줄 수 없다."

[「연구노트」 Part 2 A ch01(마음가짐)](../research-notes/chapter_16_mindset.md)은 논문 한 편에도 만점을 정해 줄 사람이 없다는 문제를 다룬다. 공식 요건을 충족하는 일과 별개로, 어디까지 하면 충분한지를 스스로 정하는 일이 남는다.

---

## 14.1 채점표만으로 충분하지 않을 때

학부에서는 학점·등수·합격이라는 숫자가 매 학기 자기 위치를 알려 주었다. 숫자가 좋으면 그 학기를 만족스럽게 마쳤고, 나쁘면 다음 학기에 만회할 목표가 생겼다. 어느 쪽이든 어디까지가 충분한지를 외부에서 정해 주었다.

대학원에서도 과정마다 학점·자격시험·연차 심사·연구계획서·논문 심사가 이어진다. 다만 이런 평가는 한 주의 노력이 충분했는지, 같은 주제를 더 붙들지, 일과 삶에 시간을 어떻게 나눌지까지 모두 정해 주지는 않는다.

지도교수의 말에는 조언과 평가가 함께 들어갈 수 있다. 연구 방향·학위 요건·안전·연구윤리처럼 지도교수가 결정하거나 평가할 영역이 있는가 하면, 학생이 근거를 갖춰 제안하고 선택할 영역도 있다. 어떤 말이 공식 요구이고 어떤 말이 선택 가능한 조언인지 확인하면 미팅의 피드백을 더 정확히 활용할 수 있다.

> **공식 평가와 자신의 만족 기준을 나눈다.** 학위 요건과 지도교수의 평가를 무시하지 않되, 동기나 SNS의 성과를 자신의 삶 전체를 채점하는 기준으로 삼지는 않는다.

외부에 맡겼던 평가를 자기 손으로 가져와야 한다. 무엇이면 충분한지 기준을 세우고 그 기준에 따라 한 일을 돌아보는 능력이 자율성이다. 분야 지식을 쌓는 동안 스스로 판단하는 힘도 함께 길러야 한다.

이 장은 결정을 내다보는 기간을 최적화의 시간 지평(optimization horizon)에 빗대어 설명한다.

> "이 세상 모든 것이 optimization이다."
>
> — 현동진 박사

여러 설계 문제에는 하나의 정답보다 조건에 따른 선택지가 있다. 결정을 당장의 마감까지만 내다볼지, 그 뒤의 연구와 진로까지 함께 볼지에 따라 선택도 달라진다. 당장 실험 결과만 보면 밤을 새우는 편이 유리해 보일 수 있지만, 반복되는 실험을 생각하면 같은 시간을 코드 정리와 재현성 확보에 쓰는 편이 나을 수도 있다. 장기적인 진로와 건강, 관계를 판단에서 빼면 눈앞의 결과만 좇기 쉽고, 그런 선택이 쌓여도 자신만의 연구 방향을 만들기 어려울 수 있다.

결정을 내릴 때에는 당장의 마감뿐 아니라 그 뒤의 영향도 살핀다. 틀렸을 때 인정하고 모르는 것을 묻는 태도, 자신의 생각을 고집으로 굳히지 않는 태도는 짧은 결과와 긴 경로를 함께 볼 때 중요해진다. 능력과 시간 지평의 효과를 특정 기간으로 나누어 단정할 수는 없다.

Philip Guo는 박사 4년 차에 Microsoft Research에서 인턴으로 일하며 큰 지적 자유를 얻었지만, 그 자유를 부담으로 기록했다.

> **Philip Guo (Stanford CS PhD, 2012):** 박사 4년 차에 얻은 지적 자유를 처음에는 저주처럼 느꼈다고 썼다. 무엇을 할지 스스로 정하고 평가하는 법을 아직 익히지 못했기 때문이다. — The PhD Grind Year 4 (Reboot) · Year 5 (Production)

---

## 14.2 대학원에서 오래 남는 것

입학 전에는 대학원을 깊은 지식을 배우는 곳으로 생각하기 쉽다. 5년 동안 분야 지식을 채운 뒤 졸업한다는 그림이다. 대학원에서 얻는 것은 지식만으로 모두 설명하기 어렵다.

분야 지식과 도구는 졸업 뒤에도 계속 갱신된다. 박사 초기에 익힌 기준선이 졸업할 무렵에는 최신 기술 수준이 아니거나, 졸업 시점의 도구가 다음 자리에서는 덜 쓰이기도 한다. 지식의 목록만 대학원의 가치로 잡으면 분야가 바뀔 때 배운 것의 의미도 함께 흔들린다.

엄태웅 대표는 오래 남는 것을 태도라고 적었다.

> "여러분의 지식은 나중에 없어질 수도 있겠지만 여러분이 그 때 가졌던 태도는 오래도록 남아있을 것이다."
>
> — 엄태웅 대표, 「자기관리」

5년 뒤 오래 남는 것은 태도다. 분야 지식이 많이 갱신되어도, 채점자 없이 5년을 보낸 경험은 사라지지 않는다. 매주 무엇에 시간을 쓸지 스스로 결정해 본 사람은 졸업 후 다른 분야로 옮겨 가도 같은 방식으로 판단할 수 있다.

옆 학생이 더 많은 논문을 읽거나 더 깊은 수식을 푼다고 해서 자신의 기준을 세우는 일이 달라지지는 않는다.

새 분야를 처음 익힐 때 모르는 것이 많은 것은 자연스럽다. 가령 학부 3학년이 처음 접한 SLAM을 모른다는 사실은 부끄러워할 일이 아니다. 모른다고 밝히고 묻는 일도 자기 상태를 정확히 판단하는 과정이다. 질문할 수 있는 안전한 환경과 스스로 찾아볼 범위를 함께 살핀다.

---

## 14.3 주체성 — 지시만 따르지 않는 일

자율성은 연구 방향을 누가, 어떤 근거로 정하는지에서 드러난다. 학생이 지도교수가 제안한 프로젝트를 수행하더라도 문제 설정과 방법, 해석에 실질적으로 참여할 수 있다. 졸업할 때 자신의 연구와 기여를 설명하기 어렵다면 어떤 결정에 참여했고 무엇을 배웠는지 돌아본다.

주어진 작업의 목적을 모른 채 지시만 따르면 결과물을 만들면서도 문제 설정과 다음 결정을 익히지 못할 수 있다. 코드를 돌리고 그림을 그리며 기준선에 모듈을 붙이는 일도 연구에 필요한 기여지만, 왜 이 작업이 필요한지와 결과가 다음 판단을 어떻게 바꾸는지까지 이해해야 자신의 기여를 설명할 수 있다.

주체적으로 일하는 학생은 주어진 프로젝트 안에서도 연구 방향을 정할 때 자기 의견을 보탠다. 같은 도구와 기준선을 쓰더라도 이 모듈이 왜 필요한지, 다음에는 무엇을 해야 하는지 가설을 세운다. 지도교수와 그 가설을 검토하고 고치면서 자신의 연구와 기여를 설명하는 힘을 기른다.

> "물고기를 주지 말고 잡는 법을 가르쳐라."
>
> — 엄태웅 대표, 「자기관리」

교수에게는 물고기 잡는 법을 가르치라는 권고이고, 학생에게는 답을 찾는 절차를 익히라는 권고다. 미팅에서 정답을 받아 적기보다 의견을 들은 뒤 자기 결정을 고쳐야 한다.

「대학원노트」 [Part 3 ch01(내 연구를 갖기)](./chapter_07_my_research.md)은 과정이 이어지는 동안 결정권이 달라지는 모습을 구체적으로 다룬다. 주어진 작업만 수행하면 결과는 쌓여도 자기 연구는 남지 않을 수 있다.

---

## 14.4 시간을 어디에 쓰는가

한 주의 시간을 어디에 썼는지 기록하면 자신이 무엇을 우선했는지 알 수 있다. 결과의 양뿐 아니라 연구·공부·개인 활동에 시간을 어떻게 나눴는지도 판단의 기준이 된다.

학부의 시간은 외부 일정으로 채워져 있었다. 강의 시간·과제 마감·시험 기간이 한 주의 뼈대였고, 자유 시간은 그 뼈대 사이의 여백이었다. 대학원에서는 수업·조교·실험·회의의 비중이 과정마다 다르지만, 장기 연구의 일정을 스스로 정해야 하는 시간이 늘어난다.

비어 있는 시간도 의식적으로 배분할 항목이다. 연구·공부·개인 활동의 비율을 옆 학생이나 SNS의 추천에서 그대로 가져올 수는 없다. 계약상 업무, 학위 요건, 건강과 돌봄을 함께 놓고 자신에게 가능한 분배를 정한다. 필요하다면 자신에게 맞는 주기로 적어 두고 일정 기간의 패턴을 본다.

이 기록표가 자신을 평가하는 근거가 된다. 논문 한 편이 얼마나 나아갔는지는 시간이 지난 뒤에야 보일 수 있지만, 연구·공부·개인 활동에 몇 시간씩 배분했는지는 기록을 펼치면 확인할 수 있다. 시간을 어떻게 나눴는지가 나중의 결과를 만든다. 직접 적어 두면 한동안 뚜렷한 결과가 나오지 않아도 자신이 세운 기준대로 시간을 썼는지 확인할 수 있다.

> 시간 기록표를 한 주 단위로 적는다. 분배가 자기 채점표가 된다.

시간 기록에서 연애·취미·관계·운동·휴식이 빠지기 쉽다. 이를 계획에서 계속 빼면 연구 밖의 삶이 좁아질 수 있다. 휴식을 계획에 포함하면 시간을 지키는 데 도움이 되지만, 계획하지 않은 휴식도 필요할 수 있다. 그것을 곧바로 낭비나 죄책감의 원인으로 볼 필요는 없다.

> 감정 영역(연애·취미·관계)을 시간 계획에서 빼지 않는다. 자율성의 한 축이다.

「대학원노트」 [Part 3 ch02(시간 쓰는 법)](./chapter_08_time_use.md)은 시간 기록표를 만드는 방법을 다룬다. 시간을 어떻게 나눴는지 적는 일은 한 주를 스스로 평가하는 일이기도 하다.

---

## 14.5 지도교수의 평가와 조언을 구분한다

학부까지는 교수를 정답을 가진 지도자로 보기 쉽다. 학생은 답을 받으러 가고, 답이 나오지 않으면 지도자의 책임이라고 여긴다. 대학원에서도 같은 태도를 고수하면 스스로 결정하기 어렵다.

대학원에서 지도교수는 조언자이면서 평가자·연구책임자일 수 있다. 학생은 공식 요건과 안전·윤리 규정을 지키고 평가 권한을 이해하되, 선택 가능한 영역에서는 의견을 자료로 삼아 근거 있는 제안을 내놓는다. 같은 말도 공식 요구인지 선택 가능한 조언인지 확인해야 한다.

이 변화는 한 번에 일어나지 않는다. 초반에는 모르는 것이 많아 지도교수의 의견을 그대로 따르는 편이 합리적인 때도 있다. 그러나 경험이 쌓인 뒤에도 모든 결정을 맡기고 있다면 변화가 늦다는 신호다. 학년을 보편적인 마감으로 삼기보다, 자신이 제안하고 결정하는 범위가 실제로 넓어지는지 살핀다.

> 지도교수의 의견을 지시로만 받는지, 자기 판단을 고치는 조언으로 쓰는지 정기적으로 묻는다.

전환의 표지는 미팅에서 누가 가설·계획·결정 후보를 먼저 내놓는지에 드러난다. 말한 시간의 비율에는 정답이 없다. 다만 경험이 쌓일수록 학생이 자료와 제안을 들고 들어오고, 교수는 그 위에 의견을 얹는 장면이 늘어나야 한다. 학생도 조언을 받기만 하는 자리에서 벗어나, 조언을 자기 결정에 반영하는 사람으로 옮겨 간다.

「대학원노트」 [Part 2 ch01(관계는 양방향)](./chapter_04_two_way_relationship.md) · [ch02(신호 읽기)](./chapter_05_signal_reading.md)는 지도교수와 학생이 서로의 기대를 맞추고 행동의 신호를 읽는 법을 다룬다. 그 과정에서 학생은 지도교수의 말을 명령이 아니라 조언으로 활용하게 된다.

---

## 14.6 흔들릴 때 돌아갈 한 문장

스스로 기준을 세워도 외부의 압력은 사라지지 않는다. 동기의 논문 게재, 이웃 연구실의 최우수 논문, SNS의 학회 사진을 보면 자기 진도가 부족하게 느껴질 수 있다. 그때 돌아갈 기준이 필요하다.

그때는 자기 연구를 한 문장으로 설명해 본다. 외부의 인정과 별개로 어떤 질문에 답하려 하는지 말해 보는 일이다. 답은 한 번에 만들어지지 않으며 입학 동기, 진행 중인 연구, 논문과 진로를 돌아보며 고쳐 쓸 수 있다. 한 문장으로 아직 압축되지 않는 탐색 단계라면 임시 설명과 남은 질문을 함께 적는다.

> **자기 연구를 설명하는 문장을 갱신한다.** 한 문장으로 정리되지 않는다면 임시 설명과 아직 풀리지 않은 질문을 적는다.

「대학원노트」 [Part 1 ch01(박사를 결정한다는 일)](./chapter_01_phd_decision.md)에서 적은 진학 이유의 문장은 과정이 진행되며 달라질 수 있다. 여러 시점에 적어 둔 문장을 나란히 보면 스스로 맡은 결정이 어떻게 변했는지 알 수 있다.

# Ch.15 — 비교의 함정 — 뒤처질 권리

대학원에도 지도교수·위원회·심사자의 평가는 남아 있지만, 한 주의 충분함을 알려 주는 단일 점수는 없다. 그 빈자리에 동기의 논문, 옆 연구실의 발표, SNS의 학회 사진을 놓고 자신을 평가하기 쉽다. 비교가 반복되면 자신이 고른 질문보다 남이 먼저 낸 결과를 따라가게 될 수 있다.

엄태웅 대표는 비교가 자기 안에서 계속된다고 적었다.

> "결국 계속적으로 나를 괴롭히는 가장 큰 적은 나 자신 밖에 없었다."
>
> — [엄태웅 대표 「뒤쳐질 행복」](https://gradschoolstory.chkwon.net/terry/leavemebehind/)

비교 대상을 바꾼다고 비교가 끝나지는 않는다. 삶은 길고, 어디로 가는지와 얼마나 빨리 가는지는 서로 다르다. [「연구노트」 Part 2 A ch01](../research-notes/chapter_16_mindset.md)에서 말한 ‘게재 승인(accept)에는 천장이 없다’는 태도는 논문 한 편을 쓸 때 필요하고, 뒤처질 권리는 5년 동안 자기 속도를 지킬 때 필요하다.

---

## 15.1 비교가 들어오는 방식

동기가 논문 게재 소식을 올리면 자기 한 주가 비어 보인다. 옆 연구실의 최우수 논문 소식이 슬랙에 올라오면 같은 분야에서 혼자 뒤처진 듯하다. 생각해서 비교하기 전에 부족하다는 감정이 먼저 든다.

박사 과정에도 학점·시험·논문 수 같은 숫자가 있지만, 서로 다른 주제와 조건을 한 줄로 비교해 주지는 못한다. 그래서 동기의 논문 한 편이나 학회 소식을 자기 위치를 재는 임시 기준으로 삼기 쉽다. 학부에서도 비교가 오래갈 수 있으므로, 숫자의 유무만으로 비교 심리를 설명하지 않는다.

그러나 그 기준은 믿기 어렵다. 같은 분야의 두 학생도 주제·지도교수·시작 시점·개인 사정이 모두 달라 진도를 나란히 놓을 수 없다. 비교할 때는 이런 차이가 사라지고, 같은 분야라는 공통점 하나만 남아 누가 더 많이 나아갔는지를 따지게 된다.

더 높은 곳에 가도 비교할 사람은 계속 생긴다. KAIST에 합격하면 MIT가 보이고, MIT에 합격하면 같은 연구실의 두 명이 보이며, 그 둘 중 한 명이 되면 상위 콘퍼런스의 책임연구자들이 보인다. 분야를 옮기면 새 분야에서 다시 비교가 시작된다. 대상을 바꾸는 대신 일상에서 비교를 멈출 방법을 마련해야 한다.

> **비교할 사람은 끝없이 생긴다.** 일상에서 비교를 줄일 방법을 따로 마련해야 한다.

트위터를 닫으면 동기의 논문은 보이지 않지만 부족하다는 감정은 남는다. 비교할 사람이 사라진 뒤에도 1년 전의 자기, 5년 전의 자기, 머릿속으로 그린 미래의 자기와 계속 비교한다.

## 15.2 남의 정점을 내 평균으로 삼기

비교하다 보면 남이 가장 잘한 순간을 자기 일상의 기준으로 삼게 된다.

같은 분야의 인상적인 학생들이 보인 순간만 모으면 한 해의 최우수 논문, 한 학회의 구두 발표, 한 분기의 빠른 진도만 남는다. 그것을 자기 한 주의 기준으로 삼으면 매주 기준에 미달하고 매일 부족하다고 느낀다. 그 학생이 성과를 내기까지 보낸 나쁜 날과 평범한 날은 보이지 않고, 트윗 한 줄로 압축된 최우수 논문만 보이기 때문이다.

이 함정에서 벗어나려면 자기 기록으로 평소 속도를 다시 확인해야 한다. 일정 기간의 노트를 펼쳐 나쁜 날·평범한 날·좋은 날이 어떻게 섞였는지 본다. 하루의 최고 기록이 아니라 반복해서 유지할 수 있었던 작업량과 회복 시간을 함께 살핀다.

> 자기 기록으로 평소 속도를 확인한다. 가장 잘한 날을 일상의 기준으로 삼지 않는다.

자신이 잠깐 냈던 최고 속도를 계속 유지할 수 있다고 믿을 때도 같은 일이 생긴다. 한 주 동안 빠르게 진척되면 다음 주에도 같은 양을 기대한다. 그러나 최고 속도는 오래 지속되지 않는다. 그 속도를 평소의 기준으로 삼으면 평범하게 일한 주까지 부족하게 보인다.

다른 학생이 가장 잘했을 때의 성과를 자기 한 주의 기준으로 가져와도 문제가 생긴다. 드물게 나온 남의 정점은 자기 일상의 평균이 아니다. 자신의 기준은 지난 기록에서 찾아야 한다.

김세정 교수는 학부 시절 같은 학과에서 모든 과목을 A+ 받던 친구를 천재로 불렀던 일을 돌아본다.

> "내가 그에게 '천재'라는 프레임을 씌움으로써 노력하지 않은 나 자신을 정당화해 왔던 것이다." (김세정 교수)

상대를 천재라고 부르면 직접 비교하지 않아도 되지만, 자기 기록을 들여다보는 일도 멈추기 쉽다. ‘그가 천재라서’라는 설명에서 멈추면 자신이 평소에 얼마나 읽고 쓰는지 확인하지 않는다. 남의 정점도, 자기 기록도 아닌 막연한 기준만 남는다.

입학 당시의 이력을 이후 5년의 기준으로 삼아도 같은 함정에 빠진다. MIT 학부를 졸업하고 NSF·NDSEG 펠로십 두 개를 받은 뒤 Stanford CS에 합격한 Philip Guo는 자신의 이력이 서류상으로는 좋아 보였지만 박사 과정에서는 처절하게 실패했다고 회상했다. 그는 이 대목에 ‘과거 성과는 미래 성과의 지표가 아니다’라는 투자 격언을 함께 적었다.

> **Philip Guo (Stanford CS PhD, 2012):** 입학 당시 MIT 학부와 두 연방 펠로십이라는 강한 이력을 갖고 있었지만, 그것이 박사 1·2년 차의 좌절을 막아 주지는 못했다. 그는 이 대목에 ‘과거 성과는 미래 성과의 지표가 아니다’라는 투자 격언을 함께 적었다. 입학 당시의 이력을 박사 과정 내내 자신의 기준으로 삼아서는 안 된다. — The PhD Grind Epilogue

## 15.3 단거리와 장거리

남의 정점을 자기 평균으로 삼는 데에는 박사 과정을 한 번의 단거리 경주처럼 보는 생각이 깔려 있다. 5년 내내 최고 속도로 달릴 수는 없다.

엄태웅 대표는 속도보다 지속을 강조한다.

> "빨리 달리는 사람이 멀리 가는 것이 아니라 오래 달리는 사람이 멀리 간다."
>
> — 엄태웅 대표, 「뒤쳐질 행복」

엄태웅 대표의 달리기 비유는 짧은 기간의 최고 속도와 오래 유지할 수 있는 속도를 구분한다. 어느 쪽이 반드시 더 큰 성과를 낸다는 법칙은 아니지만, 짧은 질주를 일상의 기준으로 삼으면 회복과 다음 작업을 계획하기 어렵다.

막판에 앞선 시간을 한꺼번에 만회하려는 계획은 그동안 쌓인 피로와 연구의 불확실성을 무시한다. 어떤 실험이 언제 끝날지, 심사와 수정이 얼마나 걸릴지 알 수 없으므로 졸업 직전의 집중만을 전제로 일정을 짜기 어렵다.

학회 마감 직전에 작업량을 늘려야 할 때도 있다. 그러나 이런 집중을 반복 가능한 평소 일정으로 가정해서는 안 된다. 마감 뒤의 회복과 미뤄 둔 다른 일을 함께 계획하지 않으면 다음 작업의 시작점이 흔들린다.

긴 시간을 기준으로 보면 하루의 성과만으로 전체 진도를 판단하지 않게 된다. 오늘의 결과가 예상보다 적었다면 한 주와 한 달의 기록 속에서 원인을 살피고 다음 작업을 조정한다.

[김기섭 교수 「연구길의 초입에서」](https://gsk1m.github.io/productivity/2024/05/25/entering-research.html)는 꾸준함을 강조한다.

> "한 달에 논문 10편을 읽고 번아웃되는 것보다, 매주 1편을 6개월 동안 꾸준히 읽는 쪽이 낫다. 선형 성장이 복리로 돌아온다."
>
> — 김기섭 교수, 「연구길의 초입에서」

최고 속도는 드물게 나오고, 꾸준함은 평소의 속도로 나타난다. 둘을 같은 기준으로 평가하면 평소에도 가장 빠른 날만큼 일해야 한다고 느끼게 된다. 꾸준히 일했더라도 큰 성과가 나오지 않는 기간이 있을 수 있다. 그 기간의 기록에서 무엇을 배웠고 무엇이 막혔는지 살핀다. 비교할 때에는 동기의 결과보다 자신의 이전 기록과 현재 조건을 함께 본다.

선배가 논문을 빠르게 읽는 데에는 그동안 쌓은 시간과 지식이 있다. 옆 학생과 비교하면 지금 부족한 점만 보이기 쉽지만, 이전의 자기 기록과 비교하면 그동안 나아진 점과 여전히 막히는 지점을 함께 볼 수 있다. 변화의 속도와 모습은 사람마다 다르므로 석 달 같은 특정 기간 뒤의 향상을 약속할 수는 없다.

---

## 15.4 어디로 가는지와 얼마나 빨리 가는지

방향과 속도를 한꺼번에 평가하면 매일 부족하다는 결론이 나기 쉽다. 무엇을 하는지와 얼마나 빨리 하는지를 나눠 적는다.

무엇을 할지는 엄격하게 따져야 한다. 5년 뒤 자기 연구를 어떤 문장으로 설명할지, 지금 주제가 그 문장에 가까운지, 새 주제가 방향을 흐리는지 묻는다. 잘못된 방향으로 빠르게 달리면 5년을 써도 자기 연구가 남지 않는다.

얼마나 빨리 할지에는 무조건 압박부터 더하지 않는다. 한 주의 속도가 평소보다 느린 이유를 살핀다. 피로와 건강, 돌봄, 자원 부족이 원인이라면 압박을 더하는 일이 도움이 되지 않을 수 있다.

엄태웅 대표는 속도의 압박을 채찍 맞는 말에 빗댄다.

> "채찍이 속도를 만드는 시간은 짧고, 멈춰 서거나 무너지는 시간이 길다. 인간은 경주마가 아니다."
>
> — 엄태웅 대표, 「뒤쳐질 행복」

채찍은 마감 직전의 한 주, 한 가설의 결정적 검증, 한 그림의 마지막 정리처럼 짧은 기간에만 쓸 수 있다. 같은 압박을 5년 내내 이어 가면 평소의 속도까지 무너진다. 짧은 기간에 쓸 방법을 일상으로 만들 때 생기는 일이다.

> **방향과 속도를 분리한다.** "무엇"에는 진지하고, "얼마나 빨리"에는 채찍을 거둔다. 두 변수를 합쳐 보면 매일이 부족함이 된다.

한 주를 돌아볼 때 무엇을 했는지와 얼마나 했는지를 나눠 적는다. 첫 칸에는 본 주제의 가설 하나, 실험 하나, 글의 한 절처럼 방향에 맞는 일을 적는다. 둘째 칸에는 그 일에 쓴 시간을 적는다. 평소만큼 시간을 썼다면 결과의 양이 평균보다 적어도 그 주를 부족하다고 판단하지 않는다.

---

## 15.5 휴식도 계획에 넣는다

일부러 쉬는 시간도 오래 일하기 위한 계획에 들어갈 수 있다.

엄태웅 대표는 조금은 게으름을 허락하라고 적었다.

> "조금은 게으름을 허락하라."
>
> — 엄태웅 대표, 「뒤쳐질 행복」

이 권고는 회복과 휴식도 한 주의 계획에 넣으라는 뜻으로 읽을 수 있다. 쉬는 시간을 미리 확보하면 마감과 회복을 같은 일정 안에서 볼 수 있다. 계획하지 못한 휴식까지 실패로 취급하지는 말되, 피로가 반복되면 작업량과 생활 조건을 함께 조정한다.

> 휴식과 회복을 계획에 넣어 오래 이어 갈 속도를 지킨다.

기초를 새로 익히거나 연구 방향을 바꿀 때, 건강과 돌봄 문제가 생겼을 때에는 평소와 같은 속도가 나오지 않을 수 있다. 이때에도 이전의 평균을 그대로 적용하면 매주 부족하다고 느끼게 된다. 일정 기간의 목표와 작업량을 다시 정하면 달라진 조건에 맞는 기준으로 돌아볼 수 있다.

> 속도가 달라질 조건을 적고, 그 조건이 생기면 목표와 작업량을 다시 정한다.

학회 마감 뒤의 한 주도 미리 회복 기간으로 잡아 둘 수 있다. 그러면 그 주에 속도가 떨어져도 부족하다고 판단하지 않는다. 쉬기로 정하지 않은 채 시간이 지나가면 같은 한 주가 죄책감으로 남는다.

---

## 15.6 뒤처질 권리

자기 평균을 다시 정하고, 방향과 속도를 나누고, 회복을 계획하려면 남보다 뒤처질 수 있어야 한다. 뒤처질 수 있는 자유가 필요하다.

뒤처질 수 없다고 생각하면 매주 평균보다 잘해야 하고, 매분기 큰 성과를 내야 하며, 매년 동기보다 앞서야 한다. 세 조건을 한꺼번에 만족할 수 없으므로 5년 내내 자신을 몰아붙이게 된다.

뒤처질 수 있음을 받아들인 학생은 어느 분기에 무엇을 늦춰도 되는지 미리 정한다. 한 일을 늦추는 동안에도 나머지 일은 꾸준히 이어 간다. 미리 정한 쉼과 지연은 죄책감보다 회복으로 남기 쉽다.

비교를 줄이려면 SNS 알림을 조정하고, 동기 단톡방을 얼마나 자주 보는지 살피며, 학회 현장 중계가 이어지는 때에는 노출을 줄인다. 비교는 다른 경로로 다시 들어오므로 한 곳을 닫았다고 끝나는 것은 아니다.

「대학원노트」 [Part 4 ch01](./chapter_14_autonomy_weight.md)의 자기 한 줄은 비교로 흔들릴 때 돌아갈 기준이다. 자기 연구를 설명하는 문장을 다시 읽으면 남의 성과가 아니라 자신의 일로 돌아갈 수 있다.

# Ch.16 — 멘붕의 사이클 — 무너진 뒤에 할 일

박사 과정에서는 입시 탈락, 자격시험 낙방, 첫 논문 거절, 실험 실패, 인턴 면접 탈락처럼 마음을 크게 흔드는 일을 겪을 수 있다. 사건의 이름은 달라도 한동안 아무 일도 손에 잡히지 않는 경험으로 이어지기도 한다.

이 장에서는 이렇게 마음이 무너지고 일이 손에 잡히지 않는 상태를 일상어인 ‘멘붕’이라고 부른다. 멘붕 자체가 연구 진척의 신호이거나 누구에게나 같은 순서로 지나가는 현상은 아니다. 다만 지금의 반응을 알아차리고, 결정과 대응을 잠시 나누어 처리하면 다음에 할 일을 고르기 쉬워질 수 있다.

[「연구노트」 Part 2 E ch17](../research-notes/chapter_32_revision_rebuttal.md)은 거절 메일과 심사 의견에 문서로 응답하는 절차를 다룬다. 그 절차에 들어가기 전에는 마음이 반박 모드에서 빠져나올 시간이 필요하다.

---

## 16.1 반응에 이름 붙이기

입시·자격시험·논문·실험·취업·인간관계에는 저마다 다른 실패 가능성이 있다. 한 번의 좌절을 예외적인 개인 결함으로만 여기면 비슷한 사건이 생겼을 때 ‘왜 또 나에게?’라는 자책으로 이어지기 쉽다.

박사 과정에서는 진도가 보이는 때와 보이지 않는 때가 번갈아 온다. 그렇다고 마음이 무너진 상태를 보이지 않는 진전의 증거로 해석할 수는 없다. 먼저 확인할 수 있는 것은 사건과 자신의 반응이다. 논문이 반려되었는지, 실험이 멈췄는지, 잠과 식사가 흐트러졌는지를 서로 구분해 본다.

“또 비슷한 반응이 나타났다”라고 이름을 붙이면 이전 경험과 지금의 차이를 비교할 수 있다. 처음 겪는 일이라면 아직 이름 붙이기 어려울 수도 있다. 이때 이름은 진단명이 아니라, 지금 겪는 일을 사건·감정·일상 기능으로 나누어 적기 위한 임시 표지다.

> **사건과 반응에 각각 이름을 붙인다.** 둘을 모두 자신의 결함으로 묶으면 대응할 문제까지 자책으로 흐르기 쉽다.

---

## 16.2 거절을 예상 범위에 두기

어떤 연구 분야의 실제 채택률이 20%라고 가정하면, 비슷한 시도를 다섯 번 했을 때 채택 수의 기대값은 한 번이다. 다섯 번마다 반드시 한 번 채택된다는 뜻은 아니지만, 한 번의 반려를 예외로 볼 수 없다는 점은 분명하다. 흔한 결과를 예외로 두면 매번 처음 겪는 일이 되고, 그만큼 다시 시작하기도 어려워진다.

> "기대값은 반려다."
>
> — 권창현 교수, 「대학원에서 닥쳐오는 멘붕의 파도」

기대값을 반려에 두면 거절은 예상 범위 안의 결과다. 이는 거절이 아프지 않다거나 곧 회복해야 한다는 뜻이 아니다. 확률로 생각해 보면 한 번의 결과를 자신의 연구 능력 전체에 대한 판정으로 확대하지 않을 수 있다.

권창현 교수는 시도를 가볍게 만드는 말도 덧붙였다.

> "해보고, 안 되면 말고."
>
> — 권창현 교수, 같은 글

회피의 표현으로 들리지만, 한 번의 실패에 전부를 걸지 않게 하는 말이다. 반려가 평균인 분야에서는 자주 시도하고 실패 뒤에 멈춰 있는 시간을 줄이는 편이 낫다. "안 되면 말고"는 다음 시도로 옮겨 가게 한다.

> 채택률이 낮은 분야에서는 반려를 가능한 결과로 예상한다. 실제 채택률은 학회·트랙·연도마다 다르므로 해당 모집 공고나 공식 통계를 확인한다.

김세정 교수는 거절을 시도의 양을 보여 주는 지표로 바꿔 읽는다.

> "거절 또는 불합격 통보 이메일을 많이 받고 있다면 적어도 그만큼 노력하고 있다는 증거이다." (김세정 교수)
>
> "실험이 잘 안 된 날은 '실험에 실패한 날'이 아니라 '성공에 한 발짝 더 가까워진 날'이다." (김세정 교수)

첫 문장은 거절을 받은 횟수만큼 시도했다는 뜻이고, 둘째 문장은 실패한 날에도 배운 것이 있다고 말한다. 두 문장 모두 실패를 부족함의 증거로만 읽지 않게 한다.

Philip Guo의 사례는 학생이 실패를 예상하기가 왜 유난히 어려운지 보여 준다. 그는 박사 3년 차에 같은 프로젝트로 돌아가 다시 실패했을 때, 교수와 학생에게 주어진 시간이 다르다고 적었다.

> **Philip Guo (Stanford CS PhD, 2012):** 종신 교수는 몇 년의 실패를 견딜 수 있지만, 박사 과정생에게 같은 시간은 학위와 진로를 흔들 수 있다. 학생에게 거절 뒤의 회복이 더 절실한 이유다. — The PhD Grind Year 3 (Relapse)

---

## 16.3 네 단계가 아니라 네 가지 점검 질문

권창현 교수의 글에서 가져온 표현을 이 장에서는 네 가지 점검 질문으로 정리한다. 회복이 반드시 이 순서로 진행되거나 각 단계에 정해진 기간이 있다는 뜻은 아니다. 한 질문을 건너뛰거나 앞 질문으로 돌아갈 수도 있다.

1. **지금은 감정을 추스를 시간이 필요한가.** 당장 내릴 결정과 미뤄도 되는 대응을 나눈다.
2. **사건에서 확인할 수 있는 사실은 무엇인가.** 결과와 자기평가를 분리해 다시 읽는다.
3. **다음 행동으로 옮길 수 있는 정보가 있는가.** 자료에서 고칠 것, 물어볼 것, 다시 시도할 것을 하나 고른다.
4. **도움이나 휴식이 더 필요한가.** 혼자 정한 기한보다 일상 기능과 안전을 기준으로 판단한다.

권창현 교수는 감정을 추스를 시간을 다음처럼 적었다.

> "며칠 슬퍼하자. 단것도 좀 먹고 술도 좀 마시자."
>
> — 권창현 교수, 같은 글

이 인용의 요지는 실패 직후의 감정을 억지로 없애지 말자는 데 있다. 술은 회복을 위한 건강 지침이 아니며, 이 장도 음주를 권하지 않는다. 휴식의 길이를 일률적으로 정하기보다 수면·식사·수업·업무 같은 일상 기능이 회복되는지를 살핀다.

결과를 다시 볼 시점을 잡기는 어렵다. 먼저 결정의 종류와 답변 기한을 확인하되, 세부 의견에 대한 답은 반박하려는 마음이 조금 가라앉은 뒤에 작성할 수 있다. 공동 저자나 지도교수와 기한을 공유하면 혼자 감당해야 한다는 압박도 줄일 수 있다.

재독이 자기비난으로 흐른다면 같은 자료에서 다음에 할 일 하나만 한 줄로 적어 본다. “이 심사 의견이 요구하는 근거를 공동 저자와 확인한다”처럼 자신에 대한 평가가 아니라 행동으로 적는다. 혼자 분류하기 어렵다면 신뢰하는 동료와 함께 읽는다.

회복이 시작되면 이전과는 다른 방식으로 자기 상태를 볼 수 있다.

> "다시 올라올 때 나 자신이 잘 보인다."
>
> — 권창현 교수, 같은 글

힘든 순간에는 다시 일할 수 있는 자기 모습을 떠올리기 어렵다. 이전에 도움이 되었던 사람과 행동을 기록해 두면 다음번에 참고할 수 있다. 그러나 과거에 회복한 경험이 이번 회복의 속도를 보장하지는 않는다.

> 지금 필요한 것이 감정을 추스를 시간인지, 사실 확인인지, 다음 행동인지, 다른 사람의 도움인지 한 문장으로 적는다. 답이 하나일 필요는 없다.

---

## 16.4 결정 확인과 세부 대응을 나누기

거절 메일을 받으면 결정의 종류, 재제출 가능 여부, 답변 기한처럼 즉시 확인해야 할 사항부터 본다. 세부 심사 의견에 대한 판단과 답변 작성은 별개의 일이다. 감정이 큰 상태에서는 초안을 저장만 해 두고, 공동 저자와 다시 읽은 뒤 보내는 편이 안전하다.

> **결정과 기한은 확인하고, 세부 대응은 나누어 처리한다.** 답변을 미룰 때도 공식 기한과 공동 저자의 일정은 먼저 확인한다.

Mensh와 Kording의 Rule 10은 심사 의견의 구체성을 진단 자료로 삼는다. 막연하거나 미온적인 반응(non-specific/unenthusiastic)은 독자가 논문의 큰 이야기나 중요성을 충분히 이해하지 못했을 가능성을, 특정 단락을 짚은 의견(specific paragraph-level)은 그 자리의 논리가 충분히 전달되지 않았을 가능성을 보여 준다. 이는 자동 처방이 아니다. 전자라고 언제나 서론 전체를 다시 쓰고 후자라고 해당 단락만 고치면 된다는 뜻은 아니므로, 여러 의견과 원고를 함께 보며 수정 범위를 정한다.

이 선별이 혼자 어렵다면 공동 저자와 의견을 사실·해석·요청으로 나눈다. [「연구노트」 Part 2 E ch17](../research-notes/chapter_32_revision_rebuttal.md)은 그 결과를 문서로 옮기는 절차를 다룬다.

권창현 교수는 마음을 추스른 뒤에야 자기 상태를 볼 수 있다고 적었다.

> "다시 올라올 때 나 자신이 잘 보인다."
>
> — 권창현 교수, 같은 글

인용처럼 거리를 둔 뒤에야 보이는 자기 상태도 있다. 다만 객관성을 보장하는 고정된 대기 기간은 없다. 기한을 지키면서도 혼자 즉시 결론 내리지 않는 장치를 마련하는 것이 핵심이다.

---

## 16.5 회복을 성적표로 만들지 않기

시련을 몇 번 겪었는지만으로 이후의 행복이나 종신트랙 결과를 예측할 수 있다고 이 장에서 단정할 근거는 없다. 회복에 걸리는 시간도 사람과 사건에 따라 다르다. 빨리 회복하는 일을 또 하나의 성과 지표로 만들면, 힘든 상태를 숨기거나 필요한 도움을 늦게 구하게 될 수 있다.

박사 학위를 문제를 푸는 능력을 익히는 과정으로도 볼 수 있다. 그러면 거절 뒤에 처리할 사실과 선택도 하나씩 나누어 볼 수 있다. 그렇다고 상실감이나 불안을 단순한 기술 문제로 환원할 필요는 없다.

권창현 교수는 학부 기계공학에서 박사 과정 산업공학으로 전공을 바꾸면서 부족한 확률통계를 쉬운 교재와 학부 강의로 메웠다. 한 번 익힌 시련 극복 능력을 다른 상황에서도 발휘한 사례다.

> 거절이 자신의 정체성 전체에 대한 부정은 아니다. 결정, 심사 의견, 다음 선택을 서로 다른 문제로 나누어 본다.

회복 과정을 기록하는 목적은 시간을 단축하는 데만 있지 않다. 어떤 사건에서 잠과 식사가 무너졌는지, 누구와 이야기했을 때 판단이 선명해졌는지, 어떤 대응을 혼자 감당하기 어려웠는지를 알아두는 데 있다. 괴로움이 오래 지속되거나 일상 기능이 크게 떨어지거나 안전이 걱정된다면, 스스로 정한 단계에 맞추려 하지 말고 학교 상담기관·의료기관·지역의 위기 지원처럼 전문적인 도움을 이용한다. 구체적인 도움 경로는 [Ch.19 — 정신 건강](./chapter_19_mental_health.md)에서 다룬다.

# Ch.17 — 연구가 삶이 되는 조건

연구를 삶 밖에서 견뎌야 할 일로 떼어 놓으면 박사 과정의 5년 동안 자기 삶도 둘로 갈린다. 연구와 삶을 함께 받아들이면 그 시간은 자신을 알아 가는 과정이 된다.

이 장은 “일·삶 균형”을 시간 비율만 맞추는 문제로 좁혀 이해할 때 생기는 한계를 살핀다. 균형이라는 말 자체가 연구 밖의 시간만 삶이라고 뜻하는 것은 아니다. 일과 삶을 함께 생각하더라도 계약상 노동시간, 휴식, 사생활, 일을 끊을 권리는 사라지지 않는다.

[「연구노트」 Part 2 A ch01](../research-notes/chapter_16_mindset.md)은 만점이 없는 글에서 만점을 좇지 말아야 하는 이유를 논문 한 편에 적용한다. 박사 과정의 삶도 연구와 그 밖의 시간으로 억지로 갈라 볼 필요가 없다.

---

## 17.1 일과 삶을 갈라놓을 때

박사 과정에서 자주 듣는 조언 가운데 하나가 일과 삶의 균형이다. 좋은 뜻에서 나온 말이지만, 연구는 일이고 그 밖의 시간만 삶이라고 나누기 시작하면 두 영역의 시간 비율을 맞추는 데만 매달리기 쉽다.

연구하는 시간에 놀고 있는 시간을 떠올리고, 노는 시간에 연구하지 않는 자기를 걱정하면 두 시간이 모두 자기 시간이 아니게 된다. 분리된 채 보내는 시간이 자기 시간을 줄인다.

한 주를 돌아볼 때에는 연구와 휴식의 비율, 실제 업무량, 그 시간을 어떻게 받아들였는지를 함께 살펴볼 수 있다. 연구를 삶의 일부로 받아들인다는 말은 쉬는 동안에도 연구를 생각하라는 뜻이 아니다. 쉴 때 계속 죄책감을 느끼거나 연구가 휴식과 관계를 침범한다면, 업무량과 경계가 실제로 지켜지는지 점검한다.

> **균형을 시간 비율 하나로 줄이지 않는다.** 연구를 삶의 일부로 받아들이더라도 휴식·관계·건강과 일을 끊을 경계는 지킨다.

---

## 17.2 연구가 내 삶과 이어질 때

엄태웅 대표는 사람이 의미를 느끼는 순간을 적었다.

> "자기가 하고 있는 일이 자기가 누구인지를 드러낼 때, 인간은 의미를 경험한다."
>
> — 엄태웅 대표, 「굿 라이프의 길」

지금 하는 일이 자신이 어떤 사람인지를 보여 줄 때 그 일에서 의미를 느낀다. 직업은 정체성을 이루는 일부다. 연구가 자신을 드러내는 일이라면 이미 삶 안에 들어와 있다.

“내가 좋아하는 일을 잘하고 있는가”라고 물을 때에는 좋아함과 잘함을 함께 살핀다. 좋아하는 마음이 연습을 이어 갈 동력이 될 수 있지만, 능숙함에서 흥미가 생기기도 하고 생계·책임·환경도 선택에 영향을 준다.

엄태웅 대표는 연구와 행복의 관계도 분리하지 않는다.

> "연구와 행복, 연구와 인생은 결코 동떨어진 것이 아니다."
>
> — 엄태웅 대표, 같은 글

연구와 행복을 서로 맞바꿔야 하는 것으로 보면 5년 내내 어느 쪽을 희생할지 계산하게 된다. 둘을 한 삶 안에서 생각하면 연구하는 시간도 자신을 만들어 가는 시간이 된다.

분야 밖의 책을 읽는 동안 자신이 어디로 가고 싶은지도 돌아볼 수 있다. 다른 사람의 글을 읽으면 내용뿐 아니라 글쓴이가 어떤 삶을 살았고 무엇을 고민했는지도 보인다. 그러다 보면 자신에게 되풀이되는 감정과 질문을 발견할 수 있고, 자신이 무엇을 느꼈는지를 인식하는 일은 메타인지와도 이어진다. 옛사람이 겪은 방향에 대한 불안과 동기의 상실, 비교에서 오는 좌절이 오늘의 대학원생에게도 낯설지 않기에 고전 문학에도 공감할 수 있다. 길을 잃었다고 느낄 때에는 가끔 논문 대신 책을 읽어도 좋다. 무엇을 중요하게 여기고 어떤 말이 자신의 삶에서 되풀이되는지 발견할 수 있다.

---

## 17.3 좋아하는 일과 잘하는 일

잘하는 일에서 시작해 나중에 좋아하게 될 수도 있다. 다만 남의 인정만을 동력으로 삼으면 거절과 실패, 비교를 겪을 때 일을 계속할 이유도 함께 사라지기 쉽다. 박사 과정의 5년에는 그런 순간이 거듭 찾아온다.

좋아하는 일을 오래 이어 가는 동안 실력이 자랄 수 있다. 다만 좋아함만으로 성장이나 회복이 보장되지는 않는다. 왜 이 일을 하는지와 함께 필요한 지도·자원·생활 조건이 있는지도 살핀다.

최인철 교수는 공학과에 입학한 뒤 자신이 원하는 연구가 있는 심리학과에 다시 입학했다. 이 일을 공학에서 도망친 선택이 아니라 심리학으로 향한 선택으로 보면, 분야를 바꾼 까닭도 분명해진다.

진로를 바꾸는 데에는 관심의 이동뿐 아니라 건강·안전·차별·재정·가족·채용 조건처럼 여러 이유가 있을 수 있다. 현재 환경을 떠나는 선택을 도피라고 낮춰 부를 필요는 없다. 새 분야에서 원하는 일과 감수할 비용, 현재 문제 가운데 환경을 바꾸면 달라질 부분을 구체적으로 적는다.

> 좋아함과 잘함, 생활 조건을 함께 살핀다. 어느 하나가 나머지를 자동으로 따라오게 하지는 않는다.

> 분야를 바꾸는 일이 도피가 아니라 좋아하는 일로 가까이 가는 선택일 수도 있다.

---

## 17.4 비판적 사고와 냉소

박사 과정에서 학생은 가설과 데이터, 자신의 결론을 끊임없이 의심하는 법을 배운다. 그 의심이 다음 연구를 낫게 하면 비판이지만, 의심하는 데서 멈추면 냉소가 된다. 겉으로는 비슷해 보여 둘을 혼동하기 쉽다.

> "비판적 사고는 중요하지만 냉소적 불신과는 철저히 구분되어야 한다."
>
> — 엄태웅 대표, 같은 글

다음 행동이 따라오는지는 비판과 냉소를 돌아보는 한 가지 질문이다. “이 가설은 약하다. 그래서 다음 실험을 이렇게 설계한다”처럼 비판을 작업으로 옮길 수 있다. 그러나 당장 행동할 권한이나 자원이 없더라도 근거 있는 비판일 수 있으므로, 행동의 유무만으로 두 태도를 확정하지 않는다.

냉소적인 일반화는 분야와 동료, 자신을 깎아내리는 데서 멈추기 쉽다. 구체적인 대상과 근거, 자신이 바꿀 수 있는 범위를 나누면 비판을 더 정확히 말할 수 있다.

자기 분야나 동료, 연구에 관해 비판하는 문장을 적었다면 근거와 가능한 행동도 이어서 적어 본다. 행동할 권한이 없다면 누구에게 문제를 알릴지, 무엇을 기록할지, 어디까지가 자신의 책임인지 구분한다.

> **비판의 근거와 가능한 행동을 나눈다.** 당장 행동할 수 없다는 이유만으로 정당한 비판을 냉소라고 부르지 않는다.

---

## 17.5 어디로 갈지, 왜 계속할지, 무엇으로 할지

연구와 삶을 함께 이어 가려면 세 가지를 물어야 한다. 어디로 가고 싶은지, 무엇 때문에 계속하는지, 무엇을 쓸 수 있는지다. 어느 하나도 빠뜨리기 어렵다.

어디로 가고 싶은지 먼저 묻는다. 박사 과정의 5년 동안 무엇을 가장 중요하게 여길지도 이 질문에서 정해진다. 선형대수도, SLAM 논문 100편도, 분야 기술서도 그 답을 대신해 주지는 않는다. 인문학과 문학을 읽고 자신의 경험을 돌아보는 동안 답이 자랄 수 있다.

이 일을 무엇 때문에 계속하는지도 묻는다. 호기심 때문에 연구하는 사람도 있고, 동료와 생각을 나누는 일이 좋아서 연구하는 사람도 있다. 자신이 만든 것이 세상에서 쓰이는 모습을 보고 싶어서 계속하는 사람도 있다. 이 이유를 알아야 지쳤을 때 다시 시작할 수 있다. 좋아하는 마음은 오래 기대어 갈 수 있는 이유가 된다.

무엇을 쓸 수 있는지도 살핀다. 학위와 프로그래밍 실력, 수학, 연구실 인프라, 동료와 가족의 지원이 모두 여기에 들어간다. 어느 쪽으로 갈지와 왜 계속하는지가 분명하지 않다면 이런 자원이 있어도 제대로 쓰기 어렵다.

세 질문에 쓰는 시간을 90%와 10%로 나누는 식으로는 답을 찾기 어렵다. 어디로 갈지 모른 채 기술만 익히면 그 시간은 앞서 살핀 분리 시간(§1)이 되기 쉽다. 계속할 이유가 없다면 [Ch.15 — 비교의 함정](./chapter_15_comparison_trap.md)에서 다룬 속도도 지키기 어렵다. 한 가지 일을 하면서도 세 질문에 모두 답할 수 있을 때 그 시간을 온전히 자기 것으로 받아들일 수 있다.

> **세 질문을 함께 점검한다.** 어디로 가는지, 왜 계속하는지, 무엇을 쓸 수 있는지 가운데 빠진 답이 없는지 살핀다.

---

## 17.6 5년 뒤에도 이어지는 일

박사 과정이 끝난 뒤에도 직장과 삶, 연구와 가정, 분야와 자신을 함께 돌봐야 한다. 연구와 삶을 갈라놓지 않는 연습은 졸업 뒤의 진로에서도 이어진다.

박사 과정의 5년 동안 자신을 설명하는 한 줄을 세우고, 남과 비교하는 마음을 다루며, 시련을 겪은 뒤 다시 일어나는 법을 익힌다. 좋아하는 일에서 시작하고 비판한 뒤 무엇을 고칠지 정하는 습관은 졸업 뒤에도 남는다. 연구를 삶의 일부로 받아들이는 동안 자신을 설명하는 말도 선명해진다.

# Ch.18 — 여성 박사의 시간과 선택

박사 과정의 시기는 결혼·임신·출산·돌봄과 겹칠 수 있다. 성별, 가족 구성, 건강과 돌봄 분담에 따라 연구에 쓸 수 있는 시간과 선택지가 달라질 수 있다. 입학 연령과 가족 계획은 사람·국가·전공마다 다르므로 하나의 평균 연령으로 설명할 수 없다. 결혼·출산·진로를 어떻게 결정하라고 처방하거나 여성 박사의 경험을 하나로 일반화할 수도 없다. 다만 결정 전에 참고할 내용과 이용할 수 있는 자원은 미리 알아둘 수 있다.

김세정 교수와 윤은정 교수는 해외 학계에 자리 잡는 과정과 가족을 돌보는 일이 겹쳤던 경험을 글로 남겼다. 두 사례는 박사 과정이 결혼·출산·돌봄의 시간과 겹칠 때 무엇을 미리 살펴야 하는지 보여 준다.

---

## 18.1 겹치는 시간과 비대칭

학위 과정 중에 결혼·임신·출산·돌봄이 겹칠 수 있다. 남성 박사에게도 일어나지만, 2024년 생활시간조사처럼 한국의 가사노동이 성별에 따라 고르게 나뉘지 않았다는 자료도 있다. 이 전국 통계를 한 개인이나 연구실의 사정으로 곧바로 옮길 수는 없으며, 실제 부담은 연구실과 가족, 동거인이 일을 나누는 방식에 따라 달라진다.

이 비대칭은 연구 시간의 분배에 직접 영향을 준다. 임신 중 몸의 변화와 출산 뒤 수면 변화, 날마다 쌓이는 돌봄 시간에 따라 오전·오후·저녁의 쓰임이 달라진다. 같은 5년이라도 어떤 일이 언제 겹치느냐에 따라 연구에 쓸 수 있는 시간은 달라진다.

연구실 일정은 박사 5년 동안 이런 일이 생기지 않는다는 가정 아래 짜이기도 한다. 매주 회의의 시간대와 학회 출장의 빈도, 연구비 마감에 대응하는 방식이 5년 내내 같을 것이라는 가정이다. 이 가정이 자신의 삶과 맞지 않으면 연구실 일정과 개인 생활이 어긋난다.

> 모두에게 같은 방식을 권할 수는 없다. 처지가 다른 사람에게 하나의 방식을 적용하면 일상이 무너지거나 자기 학대로 흐를 수 있다.

이 차이에 맞게 시간과 도움을 달리 배분해야 한다.

---

## 18.2 해외 임용과 가족 돌봄이 겹칠 때

김세정 교수는 국내 박사 뒤 멜버른대에 임용되었고, 초기 경력과 출산·육아가 맞물린 시기의 일상을 글 §7~§8에 기록했다. 이 사례의 정확한 연도 간격을 다른 사람에게 적용할 보편적인 일정으로 삼지는 않는다.

[Part 4 ch03 (멘붕의 사이클)](./chapter_16_breakdown_cycle.md)은 김세정 교수 §1의 실패와 열등감을 다룬다. §7~§8에서는 그 태도를 임용 초기의 출산과 육아 속에서 어떻게 지켰는지 볼 수 있다.

[Part 5 ch04 (해외 임용)](./chapter_24_overseas_appointment.md)은 추천서와 연구 발표, 연구계획을 준비하는 과정을 다룬다. 임용 초기의 출산·육아가 연구비 신청과 학생 모집에 겹칠 수 있지만, 평가 일정과 지원 제도는 기관마다 다르다.

김세정 교수는 글 §18에서 "내 동료였던 포닥도 최근에 캐나다의 작은 대학교에 아내와 함께 자리를 잡았다"고 적었다. 같은 도시·같은 학교에서 두 사람이 동시에 자리를 잡은 사례다.

---

## 18.3 비이공계 미국 박사가 겪는 조건

윤은정 교수는 미국에서 마케팅 박사 과정을 마치고 메리워싱턴대학교 조교수가 되었다. 이공계 연구실 밖에서 한국인 여성 박사가 미국 학계에 자리 잡은 사례다.

> 윤은정 교수의 사례에는 비이공계 박사 과정, 미국 임용, 한국인 여성이라는 조건이 겹쳐 있다.

비이공계 학과의 관행, 영어와 미국 문화, 여성 연구자라는 조건이 한 시기에 겹쳐 일상의 여러 결정에 함께 영향을 준다.

[Part 1 ch04 (비이공계 박사 과정)](./chapter_03_nonengineering_phd_path.md)은 같은 사례를 분야 차원에서 다룬다.

---

## 18.4 학과 분위기와 국제 이주

비이공계 학과의 관행은 이공계 연구실과 다르며, 그 차이가 여성 박사의 일상에 또 하나의 조건으로 더해진다.

비이공계 학과의 여성 비율과 직급별 분포는 분야와 기관에 따라 크게 갈린다. 학생 구성과 교수 구성이 서로 다른 곳도 있으므로, 지원하려는 학과의 공개 통계와 최근 구성원을 직접 확인해야 한다. 여성 비율이 낮은 분야에서는 학과 안에서 자신의 연구와 역할이 어떻게 보이는지도 살펴볼 필요가 있다.

> 비이공계 미국 학계의 분위기와 종신심사 일정은 분야·기관마다 다르다. 임용 초기에는 소속 기관의 평가 일정과 학과 안에서 자신의 역할이 어떻게 보이는지 함께 살펴야 한다.

윤은정 교수의 사례에는 남편·자녀와 함께 미국으로 이주하는 문제도 더해진다. 한국 학부에서 미국 박사 과정과 임용으로 이어지는 일이 가족 전체의 경로가 되었다. 두 사람의 자리를 한 지역에서 찾아야 하고 비자·자녀 학교·배우자의 직업·거주 도시도 함께 결정해야 한다.

> 자녀를 동반해 미국으로 임용될 때에는 두 사람의 자리뿐 아니라 비자·자녀 학교·배우자 직업·거주 도시를 함께 결정해야 한다.

윤은정 교수는 글 §17에서 미국 임용 시기의 가족 분리를 이렇게 적었다. “한 번씩 한국에 가서 가족들과 시간을 보내다 미국으로 돌아가야 할 날이 다가오면.” 가족은 한국에 남고 자신은 미국에서 혼자 지내야 했던 시간을 보여 주는 대목이다.

---

## 18.5 두 사람이 같은 도시에서 일하려면

두 사람 모두 박사나 전문직이라면 같은 도시에서 두 자리를 찾아야 한다는 제약을 받을 수 있다. 두 사람에게 맞는 자리가 한 도시에 동시에 나지 않으면 한 사람이 상대의 임용지를 따라 옮기거나 가족이 한동안 떨어져 지내기도 한다. 앞서 인용한 생활시간조사는 한국의 무급 가사노동 분담이 성별에 따라 달랐음을 보여 주지만, 학술 부부의 이주에서 누가 더 자주 양보하는지는 입증하지 않는다.

> 두 사람의 진로가 서로 영향을 준다면 지원을 시작하기 전에 도시·분야·기관의 우선순위를 함께 적는다.

두 사람이 언제까지 어떤 결정을 함께 할지 지원 일정에 맞추어 적어 둔다. 도시·분야·기관의 우선순위가 다를 수 있고, 그 차이를 지원 직전에 처음 발견하면 선택지가 줄어들 수 있다. 미리 이야기하면 합의한 조건에 맞는 자리가 나왔을 때 판단하기 쉬워진다.

가능한 도시와 우선순위는 두 사람이 함께 좁혀야 한다. 한 사람의 양보만 전제로 삼으면 부담이 한쪽에 계속 쌓이고 관계에도 영향을 줄 수 있다.

윤은정 교수의 사례에서는 국제 이주가 조건을 하나 더 보탠다. 미국 임용에서는 H-1B·O-1 같은 체류 자격, 동반 가족의 자격과 취업 허가 여부, 자녀의 학교 위치, 배우자의 미국 내 직업도 거주 도시를 정하는 변수다. EAD는 비자 종류가 아니라 취업 허가를 증명하는 문서다. 자격과 허가 조건은 사람마다 다르므로 학교 국제처와 [미국 이민국(USCIS)](https://www.uscis.gov/working-in-the-united-states) 자료에서 당사자의 조건을 확인해야 한다. 이를 미리 살피지 않으면 국제 이주에 필요한 양보가 한 사람에게 쏠리기 쉽다.

---

## 18.6 도움을 받을 수 있는 곳

학교와 분야별 네트워크에서 도움을 찾을 수 있다.

- **학교의 박사 과정 부모 지원** — 출산 휴학·아동 돌봄·학자금·기숙사 지원은 학교마다 다르다. 학과나 대학원 행정실에서 자신이 다니는 학교의 자료를 확인한다.
- **여성 박사 네트워크(분야별)** — IEEE Women in Engineering처럼 학회와 전문 단체가 운영하는 네트워크가 있다. 명칭과 활동 여부는 바뀔 수 있으므로 자신의 분야 학회에서 현재 운영하는 모임과 선배 연구자를 확인한다.
- **분야 외부 자료** — 김세정·윤은정·유두희 교수/박사 글과 Lean In·Mama, PhD 같은 단행본을 읽으며 서로 다른 경험과 생각을 비교한다.
- **자녀 돌봄 지원** — 학교 부설 보육시설과 도시별 영유아 돌봄 정책은 박사 후반의 생활에 직접 영향을 준다. 결정 전에 자료를 모으면 선택의 폭을 더 정확히 알 수 있다.
- **국제 이주 지원(해외 임용 시)** — 본인과 동반 가족의 체류 자격, 취업 허가, 자녀 학교, 배우자의 취업 조건은 학교 국제처와 정부 공식 자료에서 확인한다. EAD는 비자가 아니라 취업 허가 문서다.

> 결정하기 전이나 결정과 동시에 자료를 모아 두면 선택할 수 있는 범위를 더 정확히 알 수 있다.

---

## 18.7 먼저 같은 길을 지난 한 사람에게 묻기

자신보다 먼저 같은 경로를 지난 여성 박사는 책에서 찾기 어려운 분야·기관·시점의 세부 사정을 알려 줄 수 있다.

학위 과정 중에 선배 여성 박사와 대화하면 두 권의 책에 없는 분야·기관·시점의 자료를 얻을 때도 있다. 특정 분야와 기관의 사정, 바로 그 시점의 변화는 대화로 들을 수 있기 때문이다. 한 사람의 경험을 표준 답으로 삼지 말고, 자신의 조건과 다른 점도 함께 묻는다.

> **같은 경로를 먼저 지난 사람에게 묻는다.** 시기와 대화 시간보다 자신의 분야·기관·생활 조건에 맞는 질문을 준비하는 일이 중요하다.

---

## 18.8 서로 다른 시간표

박사 과정의 5년은 모두에게 같은 모습으로 흘러가지 않는다. 서로 다른 조건을 인정하면 필요한 시간과 자원을 찾을 수 있다.

학교와 분야 네트워크의 자원을 확인하고 같은 경로를 먼저 지난 선배에게 물으면 결정을 혼자 감당해야 하는 부담을 덜 수 있다.

[Part 1 ch04 (비이공계 박사 과정)](./chapter_03_nonengineering_phd_path.md)은 윤은정 교수 사례의 분야 차원을 함께 보여 준다.

**주의.** 결혼 여부나 출산 시기, 부부 가운데 누가 양보해야 하는지를 여기서 정하지 않는다. 여러 사례와 이용할 수 있는 자원을 살핀 뒤 내리는 결정은 각자의 몫이다.

**출처.** 김세정 교수와 윤은정 교수의 글이 실린 [『대학원생 때 알았더라면 좋았을 것들 2』](https://ebook-product.kyobobook.co.kr/dig/epd/ebook/4801191334679)를 1차로 삼았다. 한국의 가사노동 분담에 관한 일반 설명은 [국가데이터처 「2024년 생활시간조사 결과」](https://mods.go.kr/board.es?act=view&bid=220&list_no=437764&mainXml=Y&mid=a10301010000)를 참고했다. 여성 박사의 시간과 선택, 도움을 받을 수 있는 곳은 이 장의 정리이며, 특정 결혼·출산·지원 시점이나 선배와의 나이 차를 보편 규칙으로 제시하지 않았다.

# Ch.19 — 정신건강·번아웃과 전문적 도움

거절·실패 뒤에 찾아온 일시적인 충격과, 원인이 분명하지 않더라도 오래 이어지거나 일상을 해치는 어려움에는 같은 방식으로 대응할 수 없다. 기간이나 계기만으로 우울증·번아웃을 가를 수는 없으며, 이 장의 구분도 진단 기준이 아니다.

이 글은 약을 먹어라·먹지 마라, 상담을 가라·가지 마라 같은 처방을 두지 않는다. 어떤 도움을 어디에서 받을 수 있는지 안내하는 데 그친다. 진단과 치료 결정은 당사자와 임상의의 몫이다.

정신건강은 연구 성과의 하위 항목이 아니다. 김세정 교수 §1의 실패와 열등감은 [Ch.16 — 멘붕의 사이클](./chapter_16_breakdown_cycle.md)에서 다루었다. 사건 뒤의 충격, 오래 이어지는 일상의 어려움, 전문가의 도움이 필요한 경우에는 서로 다른 대응이 필요하다.

---

## 19.1 한 번의 충격과 오래 이어지는 어려움

| 살펴볼 상황 | 계기 | 대응의 초점 |
|---|---|---|
| **특정 사건 뒤의 충격** | 거절 메일·실험 실패·자격시험 낙방처럼 계기가 비교적 분명하다. | 사건을 해석하고 다음 행동을 정하는 데 [Ch.16](./chapter_16_breakdown_cycle.md)의 점검 질문을 참고할 수 있다. |
| **지속되거나 악화되는 어려움** | 계기가 분명할 수도, 그렇지 않을 수도 있다. 수면·식사·학업·관계 등 일상에 미치는 영향이 이어진다. | 혼자 원인을 단정하거나 버티기보다 상담·진료 등 적절한 도움을 구한다. |

[Ch.16 — 멘붕의 사이클](./chapter_16_breakdown_cycle.md)의 네 가지 점검 질문은 분명한 사건을 돌아볼 때 참고할 수 있다. 그러나 모든 어려움을 사건에 대한 반응으로 해석해 자기반성부터 요구하면 오히려 자책을 키울 수 있다. 증상이 이어지거나 일상을 해치면 정해 둔 순서를 따르기보다 전문가와 상황을 함께 살핀다.

먼저 시작점과 변화, 일상에 미치는 영향을 살핀다. 특정 사건 뒤 무엇이 달라졌는지, 수면·식사·집중·관계에 어려움이 이어지는지 적어 두면 도움을 청할 때도 상황을 설명하기 쉽다. 이 기록만으로 스스로 진단하지는 않는다.

> **특정 사건 뒤의 충격과 오래 이어지는 어려움을 구분한다.** 앞의 경우에 맞춘 방법을 뒤의 경우에 적용하면 자책만 커질 수 있다.

---

## 19.2 번아웃을 알아차리기

세계보건기구(WHO)는 번아웃을 성공적으로 관리되지 못한 만성적인 직장 스트레스에서 비롯된 직업 관련 현상으로 설명한다. 질병으로 분류하지 않으며, 에너지 고갈·탈진, 일과의 심리적 거리 증가나 부정적·냉소적 감정, 직업 효능감 저하라는 세 차원으로 기술한다. 이 정의는 직업 맥락에 한정되며, 아래 항목도 자가진단표가 아니다.

박사 과정생에게도 탈진이나 연구와의 거리감, 효능감 저하가 나타날 수 있다. 다만 무덤덤함·수면 변화·집중 곤란 같은 경험은 여러 원인과 겹치므로, 한두 신호만으로 번아웃이라고 단정할 수 없다.

번아웃은 여러 신호로 드러날 수 있다.

- 이전보다 쉽게 탈진하고 회복이 잘되지 않는다.
- 연구와 심리적으로 멀어지거나 부정적·냉소적인 감정이 커진다.
- 자신이 일을 해낼 수 있다는 감각이 현저히 낮아진다.
- 수면·식사·집중·신체 상태의 변화가 이어진다.

이런 변화가 이어지거나 일상을 해치면 업무량과 환경을 살피고, 학교 상담센터나 임상 전문가에게 도움을 구할 수 있다. 우울증·불안장애 등 다른 상태가 함께 있는지는 임상의가 평가한다.

> 번아웃은 단순히 오래 일한 하루나 의욕이 없는 하루를 뜻하지 않는다. 탈진·일과의 거리감·효능감 저하가 이어지면 업무 환경과 일상의 변화를 함께 살피고 도움을 구한다.

---

## 19.3 박사 과정의 고립감

박사 과정에서는 나만 이 자리에 있다는 생각이 쌓이기 쉽다. 같은 연구실 동료라도 똑같은 하루를 보내지는 않으니, 내 일상의 무게를 정확히 아는 사람이 자신밖에 없다고 느낀다.

해외에서 공부하는 박사, 외국인·여성·비이공계·소수 정체성 박사에게는 고립을 키우는 조건이 더해질 수 있다. 연구실 안에 비슷한 경험을 나눌 사람이 한 명도 없다면 혼자라는 감각은 더 커진다. 여성 박사가 마주하는 조건은 [Ch.18 — 여성 박사의 시간과 선택](./chapter_18_women_phd.md)에서 살폈다.

고립을 줄이려면 다음 세 관계와 자원을 살펴볼 수 있다.

- **같은 분야·단계의 사람**과 연결을 이어 간다 — 같은 연구실이 아니어도 된다. 학회나 온라인 전문 네트워크에서 만난 동료와 각자 가능한 방식으로 연락한다.
- **연구실 외부의 한 사람**과 연결을 유지한다 — 박사 과정 밖의 친구·가족 한 명은 자신에게 연구 외 영역이 남아 있다는 신호다.
- **분야의 선배나 비공식 멘토**에게 묻는다 — 비슷한 시기를 먼저 지난 사람에게 지금의 어려움을 물을 수 있다.

이 가운데 하나라도 이어져 있으면 삶이 연구실에만 묶이지 않도록 버팀목이 될 수 있다. 셋 모두 비어 있다면 고립감이 더 심해질 가능성이 있다.

---

## 19.4 도움을 받을 수 있는 곳

학교와 지역 안에 도움을 받을 곳이 있어도 위치를 몰라 이용하지 못하는 경우가 있다.

(a) **학교 학생 상담센터** — 학생 상담을 제공하는 학교라면 이용 대상, 비용, 횟수, 예약 방식과 위기 대응 범위를 안내에서 확인한다.

(b) **근로자 지원 프로그램(EAP)** — 산업계로 옮긴 뒤 회사가 제공할 수 있는 자원이다. 제공 여부와 상담 횟수, 비밀보장 범위는 회사와 계약에 따라 다르므로 해당 프로그램의 안내를 확인한다.

(c) **분야 외부 임상심리사·정신건강의학과 의사** — 학교 자원이 부족할 때 이용할 수 있다. 건강보험 적용과 본인부담은 진료 내용과 보험 조건에 따라 달라질 수 있으므로 의료기관이나 보험자에게 확인한다.

(d) **약물 치료** — 약물 치료가 필요한지는 임상의가 평가하고 당사자와 상의해 결정한다. 처방약을 임의로 시작·중단하거나 용량을 바꾸지 말고 처방한 의료진과 상의한다.

(e) **동료** — 연구실 안팎의 믿을 만한 사람과 서로의 상태를 확인할 수 있다. 동료의 지지는 고립을 줄이는 데 도움이 되지만, 위기 대응이나 진료를 대신하지는 않는다.

> 학교 학생 상담센터의 위치와 연락처를 평소에 알아 두면 위기 때 바로 연락할 수 있다.

---

## 19.5 도움을 청하는 일도 대응이다

박사 과정에서 도움을 청하는 일을 혼자 해내지 못했다는 증거로 받아들이는 경우가 잦다. 그러나 도움을 청하는 것도 어려움에 대응하는 한 방법이다.

> "실험은 '실패-실패의 원인 파악-다른 방법으로 접근'의 과정을 반복해야만 원하는 결과에 다다를 수 있다."
>
> — 김세정 교수, 실패와 열등감에 관한 글. 관련 논의는 [Part 4 ch03](./chapter_16_breakdown_cycle.md)에 담았다.

한 곳에서 필요한 도움을 받지 못했다면 다른 곳을 찾을 수 있다. 도움을 청하지 않으면 이용할 수 있는 선택지도 그만큼 줄어든다.

도움을 받아 본 경험은 이용할 수 있는 자원과 연락 방법을 익히는 계기가 될 수 있다. 다만 다음 위기에서 반드시 더 일찍 회복한다는 보장은 없다. 필요할 때 다시 도움을 청해도 된다.

> **도움을 청하는 것도 어려움에 대응하는 방법이다.** 한 곳에서 맞는 도움을 받지 못했다면 다른 전문가나 기관을 찾을 수 있다.

---

## 19.6 주변에 있는 사람이 신호를 본다면

동료·후배·지도교수가 신호를 볼 때도 할 수 있는 일이 있다.

평소와 다른 변화가 신호가 될 수 있다.

- 며칠 동안 연구실에 나오지 않는다.
- 식사나 결과 발표를 피한다.
- 말의 양·표정·반응 시간이 평소와 달라진다.
- 자해·자살을 언급하거나 감정이 급격히 변한다.

상태를 단정하기보다 변화를 알아차렸다고 말하고 직접 묻는다. “요즘 어때?”라고 묻거나 함께 식사하자고 제안할 수 있다. 자해나 자살을 생각하는지 염려된다면 돌려 말하지 말고 직접 묻는다. WHO는 이렇게 직접 묻는 일이 자살 행동을 유발하지 않으며, 오히려 도움을 청할 기회를 줄 수 있다고 안내한다.

학교 상담센터의 위치를 알려 주는 것도 도움이 된다. 이용해 본 경험이 있다면 사실대로 말하고, 비용·예약 방식·위기 대응 범위는 학교의 공식 안내를 함께 확인한다. 결정을 강요하지 않으면서 도움을 받을 곳을 알려 주는 방식이다.

> 자해·자살 언급과 같은 위험 신호가 있으면 즉시 도움을 구한다. 한국의 [자살예방상담전화 **109**](https://www.129.go.kr/109)는 24시간 이용할 수 있다. 당장 생명이나 신체에 위험이 있으면 **112 또는 119**에 연락한다. 가능하다면 당사자를 혼자 두지 말고, 위험한 물건에서 거리를 둔 채 전문 인력이나 믿을 만한 보호자에게 연결한다. 동료나 멘토가 전문가를 대신해서는 안 된다.

멘토와 동료의 역할은 당사자가 전문가의 도움을 받도록 연결하는 데 있다.

---

## 19.7 상황에 맞는 도움

특정 사건 뒤의 멘붕과 오래 이어지는 우울·번아웃은 한 사람에게 동시에 나타날 수 있다. 두 경우에 맞는 도움도 다르다.

도움을 받을 곳과 위기 연락처를 미리 확인해 두면 필요할 때 찾는 부담을 줄일 수 있다.

**출처.** 정신건강과 분야 일반 설명은 원문에 없는 정리다. 번아웃의 정의와 세 차원은 [WHO, 「Burn-out an occupational phenomenon」](https://www.who.int/standards/classifications/frequently-asked-questions/burn-out-an-occupational-phenomenon)을 따랐다. 김세정 교수의 실패·열등감 논점 일부는 [Part 4 Ch.3](./chapter_16_breakdown_cycle.md)에서 다룬다. 직접 질문하기와 위기 대응은 [WHO의 자살 예방 안내](https://www.who.int/news-room/questions-and-answers/item/suicide)를 참고했고, 국내 연락처는 [보건복지상담센터의 자살예방상담전화 109 안내](https://www.129.go.kr/109)를 확인했다. 이 장은 진단이나 치료 지침을 대신하지 않는다.

# Ch.20 — 임포스터 증후군 — 내가 여기 있을 자격이 있는가

동기나 옆 연구실의 성과, SNS에 올라온 학회 사진을 보며 자신의 진도를 낮게 평가할 수 있다. 임포스터 증후군은 그런 외부 비교가 없어도 “내가 여기 있을 자격이 없다”는 의심을 만든다.

동기의 발표를 보며 “그는 잘하고 나는 부족하다”라고 생각하다가 “나는 여기 있을 자격이 없다”는 결론으로 넘어갈 때 두 문제가 겹친다. 남과 비교한 기준을 바로잡는 일과 자신을 해석하는 방식을 바꾸는 일은 서로 다른 대응이 필요하다.

임포스터 현상 자체는 임상 진단명이 아니다. 괴로움이나 일상 기능의 저하가 이어지거나 우울·불안 같은 증상이 함께 나타나면 임상의에게 평가와 도움을 받을 수 있다. 진단과 약물 결정은 임상의의 몫이다([Ch.19 — 정신건강](./chapter_19_mental_health.md)).

---

## 20.1 외부 비교와 내부 의심

비교의 함정([Ch.15](./chapter_15_comparison_trap.md))은 외부에서 본 자료로 시작된다. 동기의 논문 게재 소식, 옆 연구실의 최우수 논문, 학회 단체 사진을 자신의 진도와 견주며 스스로를 낮게 평가한다. 비교 대상이 시야에서 사라지면 이런 평가도 잠시 멈춘다.

임포스터 증후군에서 비롯된 의심은 외부 신호가 없어도 이어진다. 발표를 잘 마치고 자격시험을 통과하며 논문이 채택되어도 “심사위원들이 잘못 본 것 아닐까”라고 받아들인다. 비교 대상을 보지 않거나 평균선을 다시 그리는 것만으로는 풀리지 않는 이유다.

“그는 잘하고 나는 부족하다”는 비교에는 기준을 다시 세워 볼 수 있다. 그러나 이 생각이 “나는 여기 있을 자격이 없다”는 의심으로 넘어가면 비교를 줄이는 것만으로는 풀리지 않는다.

> 남과의 비교와 자신의 자격에 대한 의심을 나누어 본다. 비교의 기준을 바로잡는 일과 자신에 대한 해석을 바꾸는 일에는 서로 다른 방법이 필요하다.

---

## 20.2 서로 다른 상황에서 나타나는 의심

자격에 대한 의심은 연구 환경을 처음 익힐 때, 공식 평가를 통과한 뒤, 취업을 준비할 때처럼 서로 다른 상황에서 나타날 수 있다. 아래 세 장면은 모든 학생이 같은 순서로 겪는 발달 단계가 아니라 흔히 생각해 볼 수 있는 예다.

**연구 환경을 처음 익힐 때.** 분야의 기초 지식이 아직 충분하지 않아 연구실 회의에서 선배들의 짧은 대화조차 알아듣기 어려울 수 있다. 그러는 동안 “나만 모른다”는 생각이 굳어진다. 시간이 지나며 채울 수 있는 지식의 차이를 “왜 미리 공부하지 않았을까”라며 자격의 문제로 받아들이기 쉽다.

**제안서 심사·자격시험 통과 뒤.** 외부에서는 분명히 긍정적인 평가를 받았는데도 “심사위원들이 나를 통과시켰지만 나는 그럴 자격이 없다”고 느낄 수 있다. 통과 자체를 자격 없음의 증거로 뒤집고 있지 않은지 살핀다.

**취업을 준비할 때.** 동료가 얻은 자리와 연봉, 소속 기관을 보며 자신의 박사 과정이 충분했는지 묻는다. 분야의 평균을 기준으로 삼는다고 생각하면서도 눈에 잘 띄는 성과만 평균처럼 받아들일 수 있다.

익숙하지 않은 지식은 시간을 두고 채우고, 긍정적인 평가를 자격 없음의 증거로 뒤집는 생각은 알아차리며, 취업 준비에서는 비교의 기준과 자기 인식을 함께 점검한다. 상황이 겹칠 수도 있고, 어느 장면도 겪지 않을 수도 있다.

---

## 20.3 왜 박사 과정에 흔한가

박사 과정에서는 해마다 새로운 영역으로 들어간다. 작년에 익숙했던 자리에서 다시 모르는 자리로 옮겨 가는 일이 연구의 일부다.

그런데 학과의 대화와 논문 독서모임, 연구실 회의는 참여자가 기초를 이미 안다고 가정하기 쉽다. 선배들은 짧은 말로 분야 용어를 주고받고, 교수는 한 문단 안에서 여러 참고문헌을 언급하며, 독서모임에서는 “기본은 알 것”이라는 전제가 깔린다. 이는 오래 일한 연구자에게 익숙한 지식일 뿐 모든 학생이 처음부터 알아야 한다는 뜻은 아니다. 하지만 1~3년 차 학생은 이를 “나도 이미 알고 있어야 한다”는 요구로 받아들이기 쉽다.

새로운 분야에서는 모르는 것이 당연한데 주변의 대화는 모두가 이미 아는 것처럼 흘러간다. 이 간극에서 “나만 모른다”는 생각이 생긴다. 다른 학생도 같은 혼란을 겪는다는 사실은 겉으로 잘 드러나지 않는다.

박사 과정은 모르는 영역으로 계속 들어가지만, 학과의 대화는 이미 알아야 한다는 전제 아래 이루어지기 쉽다. 이 간극은 연구 주제가 바뀔 때마다 되풀이될 수 있으므로 먼저 “왜 나만 그런가”라는 생각이 사실인지 살펴본다.

---

## 20.4 모두가 한때는 몰랐다

자격에 대한 의심이 시작될 때 다음 문장을 떠올릴 수 있다.

> 지금 익숙하게 설명하는 사람에게도 처음 배우던 때가 있었다.

지금의 선배도 모든 내용을 처음부터 알았던 것은 아니다. 다만 사람마다 출발점과 배우는 속도는 다르므로, 남도 똑같은 시점에 몰랐다고 가정할 필요는 없다. 중요한 것은 현재의 모름을 영구적인 자격 부족으로 해석하지 않는 일이다.

“나만 모른다”는 생각이 들 때 “다른 사람도 이 과정을 통과했다”고 떠올리면 곧바로 자격이 없다는 결론을 내리지 않을 수 있다. 모르는 영역을 만났다는 사실만으로 박사 과정에 있을 자격이 사라지는 것은 아니다.

[Ch.16 — 멘붕의 사이클](./chapter_16_breakdown_cycle.md) §1에서 감정에 이름을 붙였듯, “지금 자격이 없다는 생각을 하고 있다”고 알아차리면 그 생각과 거리를 둘 수 있다.

권창현 교수는 논문을 내면 반려를 예상해야 한다고 말했고, 김세정 교수는 거절을 노력의 증거로 보았다([Ch.16](./chapter_16_breakdown_cycle.md) §2). 마찬가지로 모르는 영역에 들어가는 일이 연구의 일부라면, 모른다는 사실만으로 자격이 사라지지는 않는다. 무엇을 모르는지 확인한 뒤 배울 방법을 정할 수 있다.

---

## 20.5 작은 기여를 기록하기

이렇게 해석을 바꿔도 자신이 기여했다는 근거가 보이지 않으면 의심이 남는다. 이때에는 작은 기여를 기록한다.

코드 풀 리퀘스트 한 건, 후배를 한 번 도운 일, 연구실 회의 발표 한 번, 논문 심사 의견 한 줄, 학회에서 던진 짧은 질문도 기여다. 이런 작은 기여도 자신이 공동체에 참여했다는 근거가 된다. 큰 성과만 기여로 인정하면 일상에서 해낸 일을 모두 놓치게 된다.

[Part 3 Ch.3 — 먼저 베푸는 협업](./chapter_09_give_first.md) §2의 작은 도움처럼, 작은 기여도 이어질 때 연구자로서의 경험으로 쌓인다.

작은 기여는 기록해 둘 때 더 잘 보인다. 자신에게 맞는 주기로 한 일을 적어 두면 “아무것도 기여하지 못했다”는 생각이 들 때 실제로 해낸 일을 확인할 수 있다.

> 작은 기여를 기록한다. 자신이 해낸 일을 볼 자료가 없으면 “나는 아무것도 기여하지 못했다”는 생각이 쉽게 굳어진다.

이 기록은 [Ch.15 — 비교의 함정](./chapter_15_comparison_trap.md) §2에서 다룬 자기 평균선과 목적이 다르다. 자기 평균선은 자신의 속도를 확인하는 자료이고, 작은 기여 기록은 공동체에서 맡은 몫을 확인하는 자료다. 둘을 나누어야 비교와 자격에 대한 의심을 각각 살펴볼 수 있다.

---

## 20.6 혼자 풀리지 않을 때

스스로 생각을 달리해 보고 작은 기여를 기록해도 어려움이 이어지면 다른 사람이나 전문가에게 도움을 받을 수 있다.

(a) **학교 상담센터와 임상 전문가** — 자격에 대한 의심이 일상에 굳어 있고 스스로 풀기 어렵다면 [Ch.19 — 정신건강](./chapter_19_mental_health.md) §4의 자원이나 임상의에게 도움을 구한다.

(b) **동기 모임** — 연구실 밖에서 비슷한 단계에 있는 박사 과정생과 모르는 것을 공유한다. “나만 모른다”는 생각이 사실인지 확인할 수 있다.

(c) **분야 선배인 비공식 멘토** — 비슷한 시기를 먼저 지난 사람에게 어떻게 지냈는지 묻는다. “나도 그때 그랬다”는 경험담이 지금의 어려움을 한 과정으로 볼 수 있게 할 때도 있다.

(d) **외부 자료 읽기** — 임포스터 증후군에 관한 단행본이나 논문을 읽는다. 분야 밖의 자료가 연구실 안에서 굳은 생각을 돌아보게 할 수 있다.

> 연구실 밖의 동료와 모르는 것을 공유한다. 서로의 경험을 들으면 “나만 모른다”는 생각이 사실인지 확인할 수 있다.

---

## 20.7 논문 100편을 읽은 사람과 이제 시작한 사람

SLAM이나 컴퓨터 비전 분야에서 자격에 대한 의심은 읽은 논문의 수를 비교할 때 생기기도 한다. 가령 선배가 관련 논문을 백 편가량 읽었고 새로 온 학생은 몇 편만 읽었다면, 같은 질문에 답하는 깊이가 다른 것은 자연스럽다. 이 숫자는 경험 차이를 보여 주기 위한 가상의 예이지 권장 독서량이나 실제 조사 결과가 아니다.

새로 온 학생이 “나는 몇 편밖에 안 봤다”고만 생각하면 경험의 차이를 자격의 차이로 받아들이게 된다. 선배의 독서량은 먼저 보낸 시간 동안 쌓인 결과일 수 있다. 서로 다른 출발점과 시간을 같은 시점의 기준으로 비교해서는 안 된다.

[Ch.16 — 멘붕의 사이클](./chapter_16_breakdown_cycle.md)의 네 가지 점검 질문도 참고할 수 있다. 지금 느끼는 감정은 무엇인지, 사실로 확인된 내용과 자신의 해석은 무엇인지, 이미 해낸 일은 무엇인지, 다음에 할 수 있는 작은 행동은 무엇인지 묻는다. 정해진 회복 단계나 임상적 처치법을 뜻하지 않는다.

엄태웅 대표의 “뒤처질 행복을 허락하라”는 말([Ch.15](./chapter_15_comparison_trap.md))은 모르는 상태에 머물 시간을 자신에게 허락하라는 뜻으로도 읽을 수 있다. 박사 과정에서는 해마다 모르는 영역으로 들어가야 하므로, 모른다는 사실만으로 자격이 사라지지 않는다.

김세정 교수는 실패한 날을 성공에 한 걸음 더 가까워진 날이라고 썼다([Ch.16](./chapter_16_breakdown_cycle.md)). 같은 맥락에서 모르는 것을 발견한 날도 박사 과정의 일을 한 날로 볼 수 있다. 무엇을 모르는지 알아야 다음 질문으로 나아갈 수 있기 때문이다.

---

박사 과정에서 자격에 대한 의심을 경험할 수 있다. 익숙한 연구자에게도 처음 배우던 때가 있었음을 떠올리고, 일상에서 해낸 작은 기여를 기록하면 그 의심을 실제 경험과 견주어 볼 수 있다. 그래도 어려움이 이어질 때에는 [Ch.19 — 정신건강](./chapter_19_mental_health.md)의 도움을 받을 수 있으며, 임상적 증상의 진단과 약물 결정은 임상의가 맡는다.

---

**출처.** 임포스터 현상의 임상적 지위와 측정 연구의 한계는 [Brauer & Wolf (2019), 「Impostor Phenomenon Measurement Scales: A Systematic Review」](https://pubmed.ncbi.nlm.nih.gov/31024375/)를 참고했다. 외부 비교와 내부 의심의 구분, 세 가지 상황, 작은 기여 기록, 분야 적용 사례는 원문에 없는 정리다. [권창현 교수 「대학원에서 닥쳐오는 멘붕의 파도」](https://gradschoolstory.chkwon.net/changhyun/%EB%8C%80%ED%95%99%EC%9B%90%EC%97%90%EC%84%9C-%EB%8B%A5%EC%B3%90%EC%98%A4%EB%8A%94-%EB%A9%98%EB%B6%95%EC%9D%98-%ED%8C%8C%EB%8F%84/), [엄태웅 대표 「뒤쳐질 행복」](https://gradschoolstory.chkwon.net/terry/leavemebehind/), 김세정 교수 (2022) §1, [Part 3 Ch.3](./chapter_09_give_first.md) §2, [Ch.19 — 정신건강](./chapter_19_mental_health.md) §3~§4를 참조했다.

# Ch.21 — 후배를 키운다 — 연구를 넘겨주는 일

학위 과정을 마치기 전에는 다른 사람이 자신의 연구를 이해하고 이어 갈 수 있도록 준비해야 한다. 기록과 인수인계가 없으면 다음 사람은 이미 한 시행착오를 되풀이할 수 있다. 후배와 실제로 함께 일할 기회가 있다면 연구를 넘겨주는 동시에 가르치고 책임지는 법도 배울 수 있다. 후배가 없거나 연구를 직접 이어받지 않는 구조라면 재현 가능한 기록과 동료 검토가 그 역할을 대신한다.

최윤섭 박사 「후배의 성장을 도와줘라」와 Knuth §15~§17의 ‘심사자는 교사여야 한다(referee-as-teacher)’ 원칙은 후배 지도를 가르침과 리더십 훈련으로 본다.

---

## 21.1 연구를 후배에게 넘길 수 있는가

최윤섭 박사는 졸업이나 이직 뒤에도 이어질 질문이 남는다고 썼다. 연구를 맡아 발전시킬 후배가 있다면 선배의 작업은 끊기지 않고, 후배도 백지에서 다시 시작하는 수고를 덜 수 있다는 설명이다. 이는 졸업의 보편적인 필수 조건이 아니라 인수인계가 양쪽에 줄 수 있는 이점이다.

**자기 복제 능력**이란 자신의 연구가 다른 사람의 손에서도 한 단계 나아갈 수 있게 하는 능력이다. 이 상태에 도달하지 못한 채 졸업하면 연구가 멈추거나, 같은 연구실의 다음 사람이 코드를 다시 파악하느라 이미 한 일을 되풀이할 수 있다.

자기 복제에는 두 측면이 있다. 먼저 코드와 실험 설정, 실패한 기준 실험까지 후배가 처음부터 재현할 수 있도록 기록으로 남긴다. 이어 자신이 풀려던 문제와 풀다 만 문제, 해결 뒤에 새로 생긴 문제를 설명해 후배가 그 질문을 이해하고 이어 가게 한다. 기록만 넘겨서는 충분하지 않다.

함께 일할 시간이 짧을수록 기록과 질문을 직접 확인할 기회도 줄어든다. 졸업 시점에 맞춘 보편적인 기간을 정하기보다, 후배가 문서만 보고 실험을 재현해 보게 하고 막히는 지점을 고칠 시간을 남긴다.

---

## 21.2 선배의 힘과 책임

선배는 후배와 같은 공간에서 일하며 교수와 다른 종류의 영향을 줄 수 있다. 처음 연구실에 들어온 후배는 옆자리 선배가 질문하고 기록하며 실패를 다루는 모습을 가까이에서 본다. 짧은 관찰만으로 태도가 굳는다고 단정할 수는 없지만, 무심코 보인 일하는 방식도 학습 자료가 된다.

그 영향은 좋은 쪽과 나쁜 쪽으로 모두 향한다. 선배가 무심코 한 “이건 별 의미 없어”라는 말이 후배의 일을 멈추게 할 수 있고, 우연히 추천한 논문 한 편이 후배의 박사 주제를 정할 수도 있다. 선배가 의도하지 않은 말과 행동도 영향을 미치므로, 의도한 만큼만 책임지면 된다고 생각해서는 안 된다.

> 새로 들어온 후배는 설명뿐 아니라 선배가 실제로 일하는 방식도 본다. 자신이 옆자리에 있다면 기록과 질문, 오류를 다루는 모습도 교재가 된다.

---

## 21.3 내가 받고 싶었던 도움에서 시작하기

> "자신이 후배였을 때 선배로부터 받고 싶었던 것을 떠올려보자."
>
> — 최윤섭 박사, 「후배의 성장을 도와줘라」

후배에게 무엇을 줄지 고민할 때에는 자신이 후배였을 때 아쉬웠던 일을 떠올릴 수 있다. “그때 누가 이 한마디를 해 주었더라면”, “이 자료를 가르쳐 주었더라면” 하고 생각했던 목록에서 멘토링을 시작한다.

다만 후배는 자신과 다른 사람이다. 자신이 원했던 도움의 취지는 살리되 방식은 후배에게 맞춰야 한다. 자세한 글 피드백이 자신에게 유익했다고 해서 모든 후배에게 같은 방식이 맞는 것은 아니다. 어떤 후배는 30분 대화에서 더 잘 배울 수 있다.

> 내가 후배였을 때 받고 싶었던 것을 건네되, 방식은 후배에게 맞춘다.

과정 초반에 겪은 실패도 멘토링의 자료가 된다. 잘못 잡은 기준선, 오래 막혀 있던 디버깅, 처음 쓴 논문의 거절 통보가 그 예다. 성공과 실패를 함께 설명하되, 실패담이 언제나 안도감을 준다고 가정하지 않는다. 당시 무엇을 몰랐고 어떤 도움과 조건이 변화를 만들었는지까지 말한다.

---

## 21.4 후배를 가르치며 리더십 배우기

후배 지도를 일방적으로 시간을 빼앗기는 일로만 보면 관계가 오래가기 어렵다. 최윤섭 박사는 연구 책임자로 일하려면 연구를 이끌어 본 경험이 필요하며, 대학원에서 후배를 지도하는 동안 그 경험을 쌓을 수 있다고 설명한다. 졸업 뒤에도 경험이 적은 동료를 가르치거나 일을 나눌 수 있으므로, 후배 지도는 그때 필요한 설명과 피드백을 연습하는 일이 된다. 다만 후배의 성장을 자신의 훈련 수단으로만 대해서는 안 된다. 역할과 기대, 피드백 방식이 후배에게도 도움이 되는지 확인해야 한다.

Knuth는 심사자에게 “오늘 당신이 비판한 저자는 내일 또 논문을 쓴다”고 적었다. 심사 의견은 독자가 저자에게 건네는 가르침이기도 하다. 한 익명의 저자는 Knuth의 혹독한 심사 의견이 자신의 인생을 바꿨다고 적었다. 오늘 가르친 후배도 훗날 자신의 협업자·심사자·동료 교수가 될 수 있다. 멘토링은 평판과 리더십을 함께 쌓는 일이다.

---

## 21.5 저자권을 먼저 합의하고 기록을 남기기

후배와 함께 연구할 때에는 기여와 저자 자격을 미루지 말고 논의해야 한다. 연구 끝에 처음 이야기를 꺼내면 두 사람이 실제 기여를 다르게 기억할 수 있다. 반대로 시작할 때 저자 순서를 확정해 버리면 이후에 달라진 기여를 반영하지 못한다.

| 항목 | 시점 | 실행 기준 |
|---|---|---|
| **저자 원칙 확인** | 협업 시작 시점 | 분야·학회·학술지의 저자 기준과 순서 관행을 함께 확인한다. 예상 역할은 적되 순서를 확정 사실처럼 약속하지 않는다. |
| **기여 기록** | 역할이 생기거나 바뀔 때 | 두 사람이 한 일을 CRediT 같은 역할 어휘로 기록하고, 각자가 확인한다. |
| **중간 검토** | 연구의 주요 단계 | 처음의 예상 역할이 실제 기여와 어긋나는지 확인하고 합의를 갱신한다. |
| **인수인계 검증** | 졸업·이동 전 | 코드·데이터·실패 목록·열린 질문을 다른 사람이 실제로 읽고 재현해 보게 한다. |

저자권에 관한 대화는 협업을 시작할 때에는 사소해 보여도 미루면 갈등이 될 수 있다. 처음에는 예상 역할과 저자 기준을 적고, 연구 질문과 실제 기여가 달라질 때 다시 논의한다. 교신저자는 분야에 따라 행정 연락 담당자이거나 연구 책임을 나타낼 수 있어 의미가 같지 않다. 어느 정도 기여하면 저자가 되는지도 투고처와 분야 정책을 확인해야 한다.

> **저자 기준은 시작할 때 확인하고, 역할과 순서는 실제 기여에 맞추어 갱신한다.** 처음의 예상과 마지막의 기여를 모두 기록한다.

기여 기록은 초기 합의를 보완한다. 초기 합의가 예상 역할과 판단 기준을 정한다면, 기여 기록은 실제로 누가 무엇을 했는지 보여 준다. NISO CRediT은 기여를 14개 역할로 기술하지만 저자 자격을 결정하지는 않는다. 두 기록과 투고처 정책을 함께 보아야 한다.

인수인계 문서는 자기 복제(§1)를 위한 기록이다. 분량이나 작성 시점을 고정하기보다, 다른 사람이 문서와 저장소만 보고 핵심 실험을 재현할 수 있는지 확인한다. 연구를 어디에서 시작해 어디까지 진행했고 다음 단계가 무엇인지 적은 지도도 함께 남긴다.

---

후배와 함께 일할 기회가 있다면 연구를 이어 갈 사람을 돕는 동시에 자신의 설명과 피드백도 점검할 수 있다. 자신이 받고 싶었던 도움을 후배에게 맞는 방식으로 건네고, 기록과 질문을 넘기며, 저자 기준과 기여 역할을 처음부터 논의하고 계속 갱신한다.

「연구노트」의 [Part 1 ch05 — Reviewer로 읽기](../research-notes/chapter_10_reading_for_review.md)는 ‘심사자는 교사여야 한다’는 자세로 동료의 글을 읽는 법을 다룬다.

**출처.** [최윤섭 박사 「후배의 성장을 도와줘라」](https://gradschoolstory.chkwon.net/yoonsup/senior-junior/), Knuth §15~§17의 ‘심사자는 교사여야 한다(referee-as-teacher)’ 원칙, 「연구노트」 [Part 1 ch05 — 심사자로 읽기](../research-notes/chapter_10_reading_for_review.md)를 참조했다. 기여 기록은 [NISO CRediT](https://credit.niso.org/implementing-credit/)을 참고했다. CRediT은 저자 자격을 정하지 않으므로 분야·투고처 정책을 함께 확인하도록 바로잡았다. 자기 복제를 기록과 질문으로 나눈 방법, 실패담의 역할, 인수인계 검증은 이 장의 정리이며, 고정된 학년·개월·문서 분량을 보편 규칙으로 두지 않았다.

# Ch.22 — 교수의 일상을 알기 — 임용 면접 이전의 준비

박사 졸업이 가까워질수록 “면접을 어떻게 잘 볼 것인가”를 묻게 된다. 권창현 교수의 「교수처럼 말하고 행동하라」는 그보다 “교수들은 어떤 일을 하고 무엇을 고민하는가?”를 먼저 물으라고 권한다. 교수의 일상을 이해하는 일은 면접장에서 갑자기 시작되지 않는다.

---

## 22.1 면접 기술보다 교수의 일상

> "어떻게 면접 잘 볼까?는 잘못된 질문이다. 교수들은 어떤 일을 하고 어떤 고민을 하는가?가 옳은 질문이다."
>
> — 권창현 교수, 「교수처럼 말하고 행동하라」

“면접을 어떻게 잘 볼까?”라고 물으면 슬라이드를 다듬고 질의응답에 대비하며 예상 질문 목록을 만드는 데 집중하게 된다. 면접을 앞두고 이런 자료를 채울 수는 있지만, 교수의 일상을 모른다는 문제까지 해결되지는 않는다. 지원자가 교수가 된 뒤 어떻게 일할지를 묻는 질문은 예상 질문 목록만으로 답하기 어렵다.

“교수들은 어떤 일을 하고 무엇을 고민하는가?”라고 물으면 준비의 방향이 달라진다. 면접관은 교수의 일을 직접 해 온 사람들이어서, 답을 들으면 지원자가 그 일을 얼마나 알아보았는지 가늠할 수 있다.

> **면접을 준비하려면 교수의 일상을 먼저 그려 본다.** 교수가 매일 어디에 시간을 쓰고 어떤 부담을 안는지 이해하는 일이 발표 자료를 만드는 일보다 앞선다.

---

## 22.2 자기소개·중기 계획·일과에서 드러나는 차이

면접에서 장기적인 생각이 드러나는 답과 면접만을 위해 만든 답은 자기소개·연구계획·예상 일과에서 차이가 난다. 아래 5년은 공고에서 볼 수 있는 예시 기간일 뿐 모든 기관의 요구가 아니다.

| 항목 | 면접용으로 만든 답 | 장기 계획이 드러나는 답 |
|---|---|---|
| **자기소개** | “저는 X를 연구한 학생입니다.” 박사 과정의 결과만 소개한다. | “저는 X라는 질문을 이어서 연구하려 합니다.” 박사 과정의 결과를 앞으로의 연구 의제와 연결한다. |
| **5년 계획** | “졸업 후 5년 안에 좋은 논문을 여러 편 쓰겠습니다.” 결과만 나열한다. | “5년 안에 어떤 질문에 답하고 싶습니다. 그 답을 위해 어떤 학생을 어떤 연구비로 키울지 계획하고 있습니다.” 질문·사람·자원을 함께 다룬다. |
| **예상 일과** | “저는 연구·논문·세미나에 시간을 씁니다.” 학생 일과를 연장해 답한다. | “연구와 학생 지도, 강의, 연구비, 학과 업무를 어떤 원칙으로 배치할지 설명합니다.” 교수의 여러 역할을 함께 고려한다. |

같은 결과도 어떤 맥락에 놓느냐에 따라 학위 과정의 결과로만 보이거나 다음 연구로 이어질 수 있다. 학위논문이 무엇을 끝냈고 어떤 질문을 남겼는지 함께 설명하면 장기적인 연구 방향이 드러난다.

좋은 논문을 여러 편 쓰겠다는 5년 계획은 결과만 다룬다. 교수의 계획에는 어떤 질문에 답할지뿐 아니라 어떤 학생이 필요하고 어떤 연구비를 확보할지, 그 학생을 어디서 모집해 어떻게 가르칠지도 들어간다. 평소 연구 질문과 학생, 연구비를 함께 생각한 사람은 면접에서도 구체적으로 답할 수 있다.

교수의 일과에는 자신의 연구뿐 아니라 학생 지도와 강의, 연구비, 학과 업무가 함께 들어간다. 어느 일이 오전이나 저녁을 차지하는지는 기관과 학기, 개인에 따라 다르다. 면접에서는 고정된 시간표를 외우기보다 여러 책임이 겹칠 때 무엇을 우선하고 어떻게 조정할지를 설명해야 한다.

> 자기소개·중기 연구계획·예상 일과를 미리 적고 경험이 달라질 때 갱신한다. 준비를 시작할 하나의 표준 시점은 없다.

---

## 22.3 교수의 일상 — 지도교수에게 묻기

교수의 일상은 지도교수와 다른 기관의 교원, 신임 교수 등 여러 사람에게 물을 수 있다. “교수의 일에서 가장 많은 시간과 노력이 드는 부분은 무엇이고, 가장 보람 있는 순간은 언제인가요?”처럼 구체적으로 묻는다. 한 사람의 답은 그 기관과 경력 단계의 사례이므로, 책이나 다른 사람의 경험과 비교해 읽어야 한다.

학생은 지도교수의 시간을 쓰는 것이 미안하거나, 아직 교수 진로를 정하지 않았으니 묻기 이르다고 생각할 수 있다. 그러나 교수의 일상을 알아야 교수직에 지원할지 판단할 근거가 생긴다.

> 교수직을 진로로 검토할 때 현직자에게 시간 사용과 부담, 보람을 묻는다. 대화의 시기와 길이보다 서로 다른 기관·경력 단계의 사례를 비교하는 일이 중요하다.

연구비 신청서 작성에 1년 중 얼마나 많은 시간을 쓰는지, 학생 모집과 강의 준비에서 무엇이 가장 어려운지 물을 수 있다. 위원회 활동이 연구 시간에 얼마나 영향을 주는지, 가장 보람 있던 순간은 언제였는지, 박사 졸업 시점으로 돌아간다면 어떤 결정을 달리할지도 질문할 수 있다.

---

## 22.4 함께 읽을 두 권

교수직의 일상을 다루는 영문 자료로 다음 두 권을 함께 읽을 수 있다.

Tomorrow's Professor (Richard Reis, IEEE Press / Stanford의 동명 메일링 목록)는 대학원 교육과 초기 학계 경력, 교수의 여러 역할을 짧은 글로 다룬 자료다. 판본과 아카이브의 범위가 넓으므로 “종신트랙 1~3년 차”만을 주된 내용으로 한정하지 않는다. 처음부터 읽기에는 두껍지만 목차를 훑으면 교수의 일이 얼마나 다양한지 가늠할 수 있다.

A PhD Is Not Enough! (Peter J. Feibelman)는 박사 졸업 뒤의 진로 결정과 초기 적응을 다룬다. 포닥·산업계·교수의 비교, 교수직 면접의 구조, 처음 연구실을 꾸릴 때 생기는 흔한 문제를 소개한다. 책의 주장이 자신의 선택을 지나치게 흔들지 않도록, 진로가 어느 정도 정리된 뒤 선택을 점검하는 자료로 읽을 수 있다.

두 권을 자신의 일상과 비교해 읽으면 아직 경험하지 못한 일이 무엇인지, 이미 매일 겪으면서도 학생의 일로만 보았던 일이 무엇인지 적어 볼 수 있다.

> 두 권의 목차를 자신의 일상과 짝지어 본다. 아직 경험하지 못한 항목을 찾으면 교수의 일상을 더 알아볼 질문이 생긴다.

---

## 22.5 평소의 경험이 면접 답이 된다

자기소개·연구계획·일과를 평소에 정리해 온 학생은 임용 면접에서 교수의 역할을 처음부터 상상할 필요가 없다. 면접 자료를 만드는 일은 그동안 생각한 내용을 지원 기관의 요구에 맞게 정리하는 과정이 된다.

공고와 면접 일정은 기관마다 다르므로 자료 준비 기간을 고정할 수 없다. 교수직을 검토하기 시작했다면 자기소개를 장기 연구 의제와 연결하고, 연구계획을 질문·사람·자원으로 나누어 적으며, 교수의 여러 책임을 자신의 계획에 대입해 본다.

> **면접에서 보이는 답은 그 전에 쌓인 일상에서 나온다.** 자료 제작은 그동안의 생각과 경험을 정리하는 과정이다.

산업이나 포닥으로 가더라도 같은 시뮬레이션이 진로 결정의 근거가 된다. 교수의 일상을 알고 나서 교수직을 지원하지 않는다는 결정도 충분히 가능하다.

---

교수의 일상을 아는 것이 임용 면접의 첫 준비다. 서로 다른 현직자에게 묻고 두 권의 책을 점검표로 쓰며 자기소개·연구계획·일과를 갱신하면, 학위 과정의 경험이 진로를 결정할 근거가 된다.

**출처.** [권창현 교수 「교수처럼 말하고 행동하라」](https://gradschoolstory.chkwon.net/changhyun/%ea%b5%90%ec%88%98%ec%b2%98%eb%9f%bc-%eb%a7%90%ed%95%98%ea%b3%a0-%ed%96%89%eb%8f%99%ed%95%98%eb%8a%94-%ec%82%ac%eb%9e%8c%ec%9d%b4-%ea%b5%90%ec%88%98%ea%b0%80-%eb%90%9c%eb%8b%a4/), Richard Reis의 Tomorrow's Professor, Peter J. Feibelman의 A PhD Is Not Enough!를 참조했다. 지도교수 질문 목록과 책을 점검표로 쓰는 방법, 교수직을 선택할지 판단하는 기준은 이 장에서 덧붙인 정리다. 시간표와 준비 시점은 기관·분야·개인에 따라 달라지므로 표준 일정으로 제시하지 않았다.

# Ch.23 — 안정은 환상이다 — 졸업 뒤에도 불안은 남는다

졸업을 앞두고 교수·산업계·포닥·창업의 네 칸과 연봉·고용 조건·자율성·장기 전망의 행을 둔 진로 비교표를 만드는 학생이 있다. 표는 조건을 비교하는 데 도움이 되지만, 어느 칸도 불안이 영구히 사라지는 삶을 보장하지 않는다.

---

## 23.1 안정이라는 환상

> "안정적인 삶, 그런 거 없다."
>
> — 엄태웅 대표, 「에필로그」 (제목)

안정에는 두 가지 뜻이 있다. 하나는 예외적인 사건이 적고 일상을 예측할 수 있다는 뜻이고, 다른 하나는 불안이 영구히 사라진다는 뜻이다. 첫 번째 안정은 진로에 따라 정도가 달라진다. 그러나 표를 만들다 보면 두 번째 뜻까지 기대하기 쉽다. “여기 가면 더는 불안하지 않을 것이다”라고 말할 수 있는 곳은 없다.

두 뜻을 섞으면 진로를 정확히 비교하기 어렵다. 예외적인 사건이 적은 일상을 택하면 불안도 사라질 것이라고 가정한 채 “교수가 더 안정적이다” 또는 “대기업이 더 안정적이다”라고 비교하기 때문이다. 일상의 예측 가능성은 비교할 수 있지만, 불안이 전혀 없는 상태는 어느 진로에서도 약속할 수 없다.

> **안정의 두 뜻을 나눈다.** 일상의 예측 가능성은 진로마다 비교할 수 있지만, 불안이 영원히 사라지는 상태는 어느 진로도 보장하지 않는다.

---

## 23.2 불안정은 삶의 조건이다

> "불안정이 인생의 본성(nature)이고 기본 모드다."
>
> — 엄태웅 대표, 「에필로그」

같은 글에는 불행과 함께 공존할 줄 아는 삶이라는 표현도 나온다.

> "불행과 함께 공존할 줄 아는 삶."
>
> — 엄태웅 대표, 「에필로그」

불안정이 삶의 조건이라면 완전히 없애려 하기보다 함께 살아가는 법을 배워야 한다. 불안을 모두 없애려는 시도에는 큰 비용이 든다.

불안을 없애려고 더 안정적으로 보이는 자리를 거듭 찾거나, 졸업·이직 결정을 미루거나, 비교표의 행과 칸을 계속 늘릴 수 있다. 이동과 유예에는 각자의 타당한 이유가 있을 수 있지만, 어떤 선택도 불안을 완전히 없애 준다고 장담할 수는 없다. 결정의 목적이 실제 조건을 개선하는 일인지, 불안을 영구히 없애려는 일인지 나누어 본다.

불안과 함께 살아가려면 그 내용을 먼저 살펴야 한다. 연구 방향이 어긋났거나 협업의 합의가 깨졌다는 불안은 실제 문제를 알리는 신호일 수 있다. 반면 가까운 사람들이 결혼·이직·이주로 흩어지며 생기는 불안은 연구 밖의 생애 변화에서 오기도 한다. 앞의 신호에는 대응해야 하지만, 뒤의 불안은 없애기보다 받아들이며 지내야 할 수 있다. 둘을 구분하지 않으면 실제 문제를 놓치거나 사라지지 않을 불안을 없애느라 지치게 된다.

Philip Guo는 2012년 Stanford 박사를 마친 뒤 Google에서 일했고, 2013~2014년에는 edX 방문 연구원과 MIT 포닥을 거쳐 2014년 7월 University of Rochester 조교수가 되었다. 졸업부터 첫 교수 임용까지 약 2년 동안 서로 다른 조직과 역할을 경험한 사례다.

> **Philip Guo (Stanford CS PhD, 2012):** 졸업 뒤 약 2년 동안 Google·edX·MIT를 거쳐 Rochester 조교수가 되었다. 이는 한 사람의 경로이며, 모든 박사 졸업자가 같은 순서나 속도로 이동한다는 뜻은 아니다.

> **불안정을 없애기보다 그 안에서 살아가는 법을 찾는다.** 불안을 완전히 없애려는 시도에는 큰 비용이 든다.

---

## 23.3 한 단계만 넘으면 끝이라는 기대

> "뭘 해도 불안하다."
>
> — 권창현 교수, 「에필로그」

같은 글에는 "알아도 걱정, 몰라도 걱정이다"라는 문장도 나온다.

> "알아도 걱정, 몰라도 걱정이다."
>
> — 권창현 교수, 「에필로그」

한 단계에 도착해도 걱정은 다른 이름으로 나타날 수 있다. “좋은 대학원만 가면 끝”이라는 기대가 과정 초반에는 “좋은 논문 한 편만 쓰면 끝”, 졸업 무렵에는 “좋은 자리만 얻으면 끝”이라는 기대가 되기도 한다. 모두가 같은 순서로 생각한다는 뜻은 아니다.

이미 지나온 기대는 돌아보기 쉽지만 지금 품은 기대는 알아차리기 어렵다. 다음 단계에 도착하고 나서야 이전의 기대가 과했음을 깨닫고, 그 자리에서 또 다른 기대를 품을 수 있다. 그래서 현재의 기대가 어떤 조건과 감정을 한꺼번에 해결해 줄 것이라고 가정하는지 적어 볼 필요가 있다.

신데렐라 동화는 결혼 장면에서 끝나고 그 이후의 일상을 보여 주지 않는다. SNS의 성공한 동료 사진도 한 시점의 단면일 뿐, 그다음 1년은 담지 않는다. 그 사진을 영구적인 도달로 읽으면 자신의 도달도 같은 형태일 것이라고 오해하게 된다.

> 지금 품고 있는 기대는 스스로 알아보기 어렵다. 그 내용을 적어 두고 나중에 다시 읽으면 같은 기대가 되풀이되는지 확인할 수 있다.

---

## 23.4 연구의 불안과 삶의 불안을 나누기

> "연구의 어려움은 실존적 의문 앞에서는 사소한 문제다."
>
> — 권창현 교수, 「에필로그」

박사 후반기의 불안에는 연구의 어려움과 생애 단계의 변화가 함께 섞일 수 있으므로 두 요인을 구분해 볼 수 있다. 같은 시점에 나타나면 둘을 모두 연구 문제로 읽기 쉽다.

박사 후반기는 생애 단계의 여러 변화와 겹치기 쉽다. 학부 동기들은 결혼·이직·해외 이주로 흩어지고, 가까운 친구를 만나는 일도 어려워진다. 가족 구성이 바뀌며 부모의 건강도 중요한 변수가 된다. 거주지·직업·관계가 한꺼번에 바뀌기도 한다.

이 시기에 “연구가 안 풀린다”고 쓴 일기에도 생애 단계의 변화가 섞여 있을 수 있다. 두 불안을 나누지 않으면 대응도 어긋난다. 연구의 어려움에는 연구 방법을 바꾸어 대응할 수 있지만, 생애 단계의 불안은 해결하기보다 함께 지내야 할 때가 있다. 둘을 합치면 연구를 더 열심히 해서 삶의 불안을 없애려 하지만, 그렇게 풀리지는 않는다.

> 박사 후반기의 불안을 연구에서 오는 불안과 생애 단계에서 오는 불안으로 나눈다. 같은 시기에 나타나더라도 대응은 다르다.

둘을 나누어 보면 진로도 더 정확하게 비교할 수 있다. 생애 단계의 불안을 연구와 진로의 문제로 섞어 읽으면 “어느 자리가 더 안정적인가”라는 질문에만 매달리기 쉽다. 두 불안을 나누면 진로 자체에서 생기는 문제에 집중할 수 있고, 무엇을 해야 할지도 더 분명해진다.

---

## 23.5 졸업 뒤에도 남는 것

지난 5년 동안 내린 결정과 맺은 관계, 익힌 자율성, 감정을 다룬 방식은 졸업 뒤 어디로 가고 새 자리에서 어떻게 일할지에도 남는다.

박사 과정 동안 학생은 어느 논문을 읽고, 어느 협업이나 독서모임에 참여하며, 어느 학회에서 발표할지 끊임없이 결정한다. 같은 곳에서 졸업한 두 학생도 5년 동안 똑같은 선택을 하지는 않으며, 그 차이는 졸업할 때 각자가 할 수 있는 일에 남는다.

[Part 3 Ch.3 (먼저 베푸는 협업)](./chapter_09_give_first.md)에서 살핀 관계도 남는다. 박사 5년 동안 동료와 어떻게 일했는지는 평판이 되고, 그 평판은 졸업할 무렵 새로운 협업이나 발표의 기회로 이어질 수 있다. 자신이 없는 자리에서도 함께 일한 사람들은 자신에 관해 말한다.

[Ch.21 — 후배를 키운다](./chapter_21_mentor_juniors.md)에서 다룬 지도 경험도 졸업 뒤에 쓰인다. 자신보다 경험이 적은 사람과 함께 일해 본 사람은 새 자리에서 누군가를 가르치거나 일을 나눌 때 그 경험을 꺼내 쓸 수 있다.

불안과 실패를 다루어 온 방식도 남는다. 졸업 뒤에도 불안정한 조건은 이어지므로, 지난 5년 동안 익힌 태도가 새 자리에서 다시 필요해진다.

이런 경험은 진로 비교표에 잘 드러나지 않는다. 표는 연봉과 고용 조건, 지역처럼 바깥에서 보이는 조건을 비교할 뿐, 내가 지난 5년 동안 어떤 연구자가 되었는지는 보여 주지 않는다. 표를 거듭 고친다고 그 시간의 빈자리가 채워지는 것도 아니다.

> **진로 비교표에는 지난 5년 동안 어떤 연구자가 되었는지가 나오지 않는다.** 그 시간까지 함께 돌아보아야 다음 자리를 고를 수 있다.

「연구노트」의 [Part 0 ch04 — 이게 연구인가: Hazelrigg 4-type](../research-notes/chapter_04_hazelrigg_jungle.md)은 과제(task)·목적(objective)·목표(goal)의 시간 범위와 네 가지 연구 유형을 나눈다. 박사 과정의 불안과 생애 단계의 불안을 나누는 이유도 같다. 서로 다른 문제를 합치면 대응이 어그러진다.

---

외부에서 완성된 답을 건네주는 사람은 없다. 진학을 결정하고 지도교수와 관계를 맺으며 연구와 감정의 굴곡을 지나온 시간이 다음 선택의 바탕이 된다. 새 자리에서도 불안정은 사라지지 않는다. 무엇 때문에 불안한지 나누어 살피고, 사라지지 않는 불안과 함께 지내는 법을 익혀야 한다.

**출처.** [엄태웅 대표 「에필로그 — 안정적인 삶, 그런 거 없다」](https://gradschoolstory.chkwon.net/terry/epilog_terry_stablelife/), [권창현 교수 「에필로그 — 뭘 해도 불안하다」](https://gradschoolstory.chkwon.net/changhyun/%ec%97%90%ed%95%84%eb%a1%9c%ea%b7%b8-%eb%ad%98-%ed%95%b4%eb%8f%84-%eb%b6%88%ec%95%88%ed%95%98%eb%8b%a4/), [Philip Guo (2012) The PhD Grind Epilogue](https://pgbovine.net/PhD-memoir.htm)를 참조했다. Guo의 임용 시점은 [본인의 이력서](https://pg.ucsd.edu/philip-guo-cv-2025-06-24.pdf)와 [University of Rochester 소개](https://www.cs.rochester.edu/news-events/news/archive/2014/2014-07-01_NewFaculty.html)로 교차 확인했다. 안정의 두 층, 입시 환상의 재발, 신데렐라 동화·SNS 비유, 박사 과정 불안과 생애 단계 불안의 분리, 졸업 뒤에도 남는 네 가지 경험은 원문에 없는 정리다.

# Ch.24 — 해외 임용·유학 준비 — 추천서·발표·연구 독립성

국내 임용과 해외 임용은 평가 항목과 시기, 관행이 분야와 기관에 따라 다르다. 박사 후반의 준비도 그 차이에 맞춰야 한다.

김세정 교수의 해외 임용 사례 §6-§8에는 교신저자·Photonics West·CLEO·SPIE·IEEE·OSA 펠로십·국제 인지도에 관한 경험이 담겨 있다. Reis 1997·Feibelman 1993은 보조 자료로 참고할 수 있다.

---

## 24.1 무엇을 평가하는가

해외 임용에서는 국내 임용과 다른 항목을 보거나 같은 항목에도 다른 비중을 둘 수 있다. 필요한 서류와 면접 형식은 국가·분야·기관마다 다르므로 채용 공고와 초청 기관의 안내가 최종 기준이다.

- **추천서** — 요구 장수와 추천인의 범위는 공고마다 다르다. 지도교수 외에 자신의 작업을 직접 본 협업자가 있는지 박사 후반부터 점검한다.
- **연구 발표(job talk)와 연구계획 발표(chalk talk)** — 과거 연구를 설명하는 발표, 미래 연구를 토론하는 발표, 강의 시연 가운데 무엇을 요구하는지는 기관마다 다르다. 초청을 받으면 시간·청중·자료 사용 여부를 반드시 확인한다.
- **독립성과 지도 경험** — 이를 무엇으로 판단하는지는 분야마다 다르다. 교신저자 여부 하나만으로 지도 능력이나 연구 독립성을 판단한다고 일반화할 수 없다.
- **분야 안의 인지도** — 주요 학회 발표·초청 강연·학회 활동·협업처럼 분야에서 인정하는 경로가 서로 다르다.

이 네 항목에 필요한 경험은 임용을 결심한 뒤 한꺼번에 만들기 어렵다. 박사 후반부터 자신의 분야와 목표 기관이 실제로 무엇을 요구하는지 확인해야 한다.

> **지원 일정에서 거꾸로 준비한다.** 추천서·연구 발표·독립성과 지도 경험·분야 안의 활동 가운데 목표 공고가 실제로 요구하는 것을 확인한다.

---

## 24.2 추천서 — 직접 본 작업이 있는가

추천인의 수와 자격은 공고가 정한다. 지도교수뿐 아니라 자신의 작업을 직접 본 외부 협업자나 분야의 선배 연구자가 있는지 살펴보면, 어떤 관계와 경험이 아직 비어 있는지 알 수 있다.

학회에서는 발표 뒤 질문에 답하고, 관련 연구를 두고 다시 대화하거나 후속 이메일로 자료를 주고받을 수 있다. [Part 3 ch04 — 한 줄 질문 메일](./chapter_10_one_question_email.md)에서 다룬 방식과 같다. 그러나 짧은 만남이나 이메일 한 통만으로 추천을 부탁할 관계가 생기는 것은 아니다. 추천인이 지원자의 작업과 판단을 직접 볼 만한 협업·발표·학회 활동이 있어야 구체적인 근거가 생긴다.

김세정 교수의 사례에서는 포닥이나 박사 후반의 교신저자 경험을 해외 임용 준비의 한 요소로 다룬다. 그러나 교신저자의 의미와 학생이 맡을 수 있는 범위는 분야마다 다르므로, 그 경험 자체를 공통 요건으로 볼 수는 없다.

외부 추천인이 협업이나 학회 활동에서 지원자의 일을 직접 보았다면 구체적인 근거를 쓸 수 있다. 공저자라는 사실만으로 강한 추천서가 보장되지는 않으며, 이름만 함께 올린 논문보다 실제로 함께 판단하고 문제를 푼 경험이 중요하다.

> 박사 후반에 추천을 부탁할 수 있는 사람과 그 사람이 직접 본 작업을 적어 본다. 숫자를 채우기보다 관계의 실제 근거가 있는지 확인한다.

---

## 24.3 국제 인지도 — Photonics West·CLEO·SPIE·IEEE·Optica

김세정 교수가 §6에서 짚은 지표는 반도체·나노광학 학회에 해당한다. 다른 분야에서는 주요 학회 초청 강연, 펠로십, 선배 연구자와의 협업이 국제 인지도를 보여 주는 자료가 될 수 있다.

- (a) **분야 주요 학회의 발표와 초청 강연**
- (b) **분야 학회의 활동과 펠로십** (SPIE·IEEE·Optica·ACM·AAAS 등 — 분야에 따라 다름)
- (c) **분야 선배 연구자와의 실질적인 협업**

김세정 교수의 사례에서는 Photonics West·CLEO 같은 학회의 초청 강연을 국제 인지도를 보여 주는 경험으로 다룬다. 다만 한 번의 강연만으로 평판이나 임용 가능성이 정해지는 것은 아니다. 발표 뒤 이어지는 연구와 교류까지 함께 보아야 한다.

학생 때 초청 강연이나 펠로십을 얻기는 어려워도, 선배 연구자와의 협업이나 학회 활동은 박사 후반부터 이어 갈 수 있다. 단, 이름만 올린 협업보다 자신의 기여를 설명할 수 있는 작업이 중요하다. OSA는 2021년에 [Optica로 이름을 바꾸었다](https://www.optica.org/about/newsroom/news_releases/2021/osa_becomes_optica_the_osa_becomes_optica_the_soci/).

---

## 24.4 교신저자보다 실제 역할

교신저자의 의미는 분야와 학술지에 따라 다르다. 단순히 투고 연락을 맡는 역할일 수도 있고, 연구 책임이나 지도 역할을 나타내기도 한다. 따라서 교신저자 경험을 임용의 공통 요건처럼 다룰 수 없다.

해외 임용 평가에서는 연구 독립성이나 지도 경험을 묻기도 한다. 후배를 지도하고 공동 작업을 마친 경험은 그 근거가 될 수 있지만, 논문의 저자 역할을 정하는 관행은 분야마다 다르다.

실제로 후배를 지도할 기회가 있다면 맡은 역할과 결과를 기록한다. [Part 5 ch01 — 후배를 키운다](./chapter_21_mentor_juniors.md)의 지도 경험은 후배의 성장과 연구 기여가 먼저이며, 임용 자료는 그 경험을 정직하게 설명한 결과여야 한다.

저자 역할이 뒤따른다면 실제 기여와 분야·투고처의 관행에 맞아야 하며 공저자와 논의해야 한다. 박사 과정생이 교신저자를 맡는 일은 분야에 따라 드물거나 다른 뜻으로 읽히므로, 임용을 위한 형식으로 만들어서는 안 된다. 안전하고 신뢰할 수 있는 지도 관계라면 진로 계획을 공유해 추천서와 협업, 지도 경험의 기대를 맞출 수 있다.

> 목표 공고의 저자 관행을 추측하지 않는다. 분야·투고처의 정책과 실제 기여를 먼저 보고, 연구 독립성과 지도 경험은 그 내용을 구체적으로 설명한다.

---

## 24.5 면접과 연구계획 발표

해외 교수 채용의 캠퍼스 방문에는 연구 발표, 교수·학생과의 면담, 식사, 때로 연구계획 발표나 강의 시연이 포함된다. 그러나 표준 일정은 없다. UCSF도 학과마다 절차가 다르므로 초청 기관의 기대를 먼저 확인하라고 안내한다([UCSF 교수직 면접 안내](https://career.ucsf.edu/gsp/interviewing-faculty-position)).

연구 발표에서는 박사 과정의 성과와 앞으로의 방향을 해당 학과의 넓은 청중에게 설명한다. 시간과 슬라이드 수를 임의로 정하지 말고 초청받은 형식에 맞춘다. MIT의 안내도 발표 형식과 구조가 분야·기관·학과에 따라 달라진다고 명시한다([MIT Faculty Job Talk](https://mitcommlab.mit.edu/eecs/commkit/faculty-job-talk/)).

연구계획 발표에서는 미래 연구의 질문·독립성·실행 가능성을 토론한다. 보드만 쓰는 곳도, 슬라이드나 혼합 형식을 허용하는 곳도 있으며 발표 자체가 없는 분야도 있다. 어떤 학생과 자원이 필요한지까지 설명할 준비는 하되, 형식은 초청 기관에 확인한다.

> 박사 후반부터 자신의 연구 의제를 여러 형식으로 설명하는 연습을 한다. 면접을 앞두고 연구의 큰 방향부터 새로 세우기는 어렵다.

교수 채용 과정에서는 독립적인 연구 방향, 실행 가능성, 학생 지도와 자원 계획을 묻는 경우가 있다. 실제 평가 항목은 공고와 초청 기관의 안내를 따른다. [Ch.22 — 교수의 일상을 알기](./chapter_22_professor_daily.md) §2에서 연구 질문·학생·연구비를 함께 고려한 계획이 이 발표를 준비하는 자료가 된다.

---

## 24.6 함께 읽을 두 권

박사 후반에 해외 임용을 이해하는 데 도움이 되는 책이 두 권 있다.

**Tomorrow's Professor** (Reis 1997) — 대학원 교육과 초기 학계 경력, 학생 모집·연구비·강의 준비·교수 역할을 폭넓게 다룬다. 임용 뒤를 위한 자료이지만 미리 훑어보면 연구계획 발표에서 빠뜨린 책임을 찾을 수 있다.

**A PhD Is Not Enough!** (Feibelman 1993) — 포닥·산업계·교수의 세 진로와 임용 면접의 구조를 비교한다. 진로가 어느 정도 정리된 뒤에는 자신의 선택을 검토하는 자료로 활용할 수 있다.

두 권 모두 [Ch.22 — 교수의 일상을 알기](./chapter_22_professor_daily.md) §4에서도 소개했다. 여기에 자신의 분야를 잘 아는 선배의 추천을 보탤 수 있다.

> 자신의 분야를 잘 아는 현직자에게 최근 공고와 관행을 물어본다. 오래된 책의 일반 설명은 현재의 기관별 자료로 보완한다.

선배 한 명에게 물으면 특정 분야와 기관의 사정, 최근의 변화를 함께 들을 수 있다. 오래전에 나온 책은 기본 구조를 이해하는 데 쓰고, 달라진 관행은 최근 채용 공고와 현직자의 경험으로 보완한다.

---

## 24.7 언제 시작할까

시작 시점은 학위 연차가 아니라 목표 공고의 일정과 필요한 증거에서 거꾸로 계산한다. 추천인이 직접 본 작업, 연구 발표, 독립성과 지도 경험은 지원 직전에 새로 만들 수 없으므로 부족한 부분을 일찍 확인한다. 연구계획 발표도 교수의 일상을 구체적으로 그려 본 사람이 더 충실하게 준비할 수 있다.

해외 임용을 지원하지 않기로 결정하더라도 박사 후반에 근거를 갖고 내린 결정이면 다음 진로를 준비할 시간이 생긴다.

**출처.** 김세정 교수의 해외 임용 사례가 실린 [「대학원생 때 알았더라면 좋았을 것들 2」](https://ebook-product.kyobobook.co.kr/dig/epd/ebook/4801191334679), Richard Reis와 Peter J. Feibelman의 저작, [UCSF 교수직 면접 안내](https://career.ucsf.edu/gsp/interviewing-faculty-position), [MIT Faculty Job Talk 안내](https://mitcommlab.mit.edu/eecs/commkit/faculty-job-talk/), [Optica 명칭 변경 공지](https://www.optica.org/about/newsroom/news_releases/2021/osa_becomes_optica_the_osa_becomes_optica_the_soci/)를 참조했다. 김세정 교수의 경험은 해당 분야의 사례이며, 채용 공고와 초청 기관의 안내를 보편적인 형식보다 우선한다.

# Ch.25 — 산업계 박사의 적응과 일상

박사 과정에서 산업계로 옮기면 일을 나누는 크기와 결과의 형식, 시간의 주기가 달라진다. 진로를 정한 뒤에는 그곳의 일상에 적응해야 한다.

유두희 박사의 UC버클리 보건역학 박사 과정 → UN/WHO → 실리콘밸리 데이터 사이언티스트 경력은 산업계로 옮길 때 연구 방식이 어떻게 달라지는지를 보여 준다.

---

## 25.1 일을 나누는 방식이 다르다

아래 표는 일부 학계 연구와 산업 팀에서 자주 볼 수 있는 차이를 단순화한 것이다. 기관·직무·팀에 따라 두 열의 특징이 겹치거나 뒤바뀔 수 있다.

| 구분 | 학계 | 산업계 |
|---|---|---|
| 결과가 나오는 주기 | 긴 연구·출판 일정 | 짧은 프로젝트·제품 일정 |
| 목표를 세우는 주기 | 학위·연구 프로그램 단위 | 팀·제품의 계획 주기 |
| 회의 주기 | 지도 회의·연구실 회의 | 일대일 면담·팀 회의·스탠드업 등 |
| 예산과 인력 계획 | 연구비 기간과 학생 계획 | 조직의 사업·제품 계획 |

산업계의 일부 팀은 학술 출판 주기보다 짧게 일을 나눈다. 다만 스프린트·OKR·회의 주기는 회사와 팀마다 다르고, 짧은 주기를 쓰지 않는 조직도 있다. 새 팀이 요구하는 중간 결과와 의사결정 시점을 먼저 확인한다.

> 유두희 박사의 경로에서는 학계에서 UN·WHO를 거쳐 산업계로 옮길 때 작업 주기가 짧아졌다. 이는 한 사람의 경로에서 나타난 차이이며 모든 국제기구와 회사의 주기가 같다는 뜻은 아니다.

유두희 박사는 글 §10("대학원 신규 졸업자에게 무엇을 기대할까")에서 산업계의 기대를 "정해진 시간보다 짧은 시간에 원하는 목표치보다 높은 퀄리티를 확장성 높게 완성하는 것"이라고 적었다. 산업계에서는 결과의 깊이뿐 아니라 속도와 확장성도 함께 요구한다.

이 차이가 입사 초기의 학습 과제가 된다. 박사 과정에서 굳어진 시간 감각을 새 팀의 리듬에 맞추면서 결과를 내는 속도와 형식도 달라진다.

---

## 25.2 연구는 산업계에서 어떻게 변하는가

학술 연구에서는 한 질문을 오래 추적해 논문으로 마무리하기도 하고, 산업계에서는 짧은 프로젝트 주기 안에 코드·분석·메모 같은 중간 결과를 내놓기도 한다. 반대 사례도 있으므로, 새 팀의 실제 의사결정 주기와 산출물을 확인한다. 결과를 읽는 사람도 같은 분야의 연구자뿐 아니라 팀원과 제품·사업의 이해관계자로 넓어질 수 있다.

결과 형식도 독자에 따라 달라진다. 한 편의 논문에 모았던 내용이 짧은 의사결정 메모, 발표 자료, 코드 풀 리퀘스트(PR)로 나뉠 수 있다. 학계 글의 분량을 그대로 가져가기보다, 독자가 내려야 할 결정과 필요한 근거에 맞춰 형식을 바꾼다.

> 결과의 독자가 누구인지에 따라 형식이 달라진다. 논문과 메모의 독자는 같은 사람이 아니다.

박사 과정에서 익힌 글쓰기 능력, 곧 서론·방법·결과·논의를 짜는 능력은 그대로 자산이다. 다만 논문의 내용을 그대로 옮기지 않고, 메모와 발표가 요구하는 길이와 순서로 압축한다.

---

## 25.3 짧은 프로젝트 주기·코드 유지보수·이해관계자 보고

산업계에 들어가면 프로젝트 주기, 코드 유지보수, 이해관계자 보고가 학계와 어떻게 다른지 먼저 배워야 한다.

(a) **짧은 프로젝트 주기** — 팀이 스프린트나 분기 목표를 쓴다면 질문 정의부터 데이터 수집·분석·보고까지를 그 주기에 맞는 크기로 나눈다. 기간은 팀마다 다르다. 마치지 못한 분석을 계속 이월하면 목표가 어그러지므로, 중간에 어떤 결과를 닫을지 합의해야 한다.

(b) **코드 유지보수** — 제품이나 서비스에 들어간 코드는 여러 사람이 계속 수정할 수 있어 테스트·문서화·검토·운영 같은 추가 요구가 생긴다. 연구 코드도 재현과 공동 사용을 위해 같은 수준의 엄격함이 필요할 수 있다.

(c) **이해관계자 보고** — 산업계의 이해관계자는 제품 관리자·디자이너·다른 팀 엔지니어·고객까지 포함한다. 각 독자가 내려야 할 결정에 맞춰 영향·사용자 경험·기술 세부·제약을 설명한다. 고객에게도 한 줄만 건네는 것이 아니라 필요한 맥락과 위험을 빠뜨리지 않는다.

> **학계의 한 형식만으로 결과를 보고하지 않는다.** 같은 결과도 이해관계자에 맞춰 다른 단면을 보여 준다.

---

## 25.4 산업계에서도 이어지는 박사의 경험

박사의 세부 전공이 산업계의 업무와 바로 이어지지 않아도 박사 과정에서 익힌 능력은 새 자리에서 쓸 수 있다. 분야 전문성·통계·코드·의사소통의 네 가지로 나누어 살펴볼 수 있다.

(a) **분야 전문성** — 컴퓨터 비전(CV)에서 자율주행으로, 생물통계에서 제약·의료로 옮기는 것처럼 분야가 직접 이어지면 전문성을 그대로 활용할 수 있다. 보건역학에서 일반 데이터 과학으로 옮기는 경우에도 문제를 정의하는 감각은 남는다.

(b) **통계** — 박사 과정에서 다중비교·교란·선택편향·p-해킹 같은 통계의 함정을 겪은 경험은 데이터 과학에서도 자산이 된다. 경력이 짧은 데이터 과학자가 놓치기 쉬운 문제를 미리 발견할 수 있기 때문이다.

(c) **코드** — 연구용 코드를 제품이나 서비스에 쓰이는 코드로 바꾸는 법을 입사 초기에 배워야 한다. 한 사람이 실험을 위해 실행하는 코드와 여러 사람이 운영하며 고치는 코드는 품질의 기준이 다르다. 이 차이를 익힌 뒤에는 박사 과정에서 기른 알고리즘 감각을 더 안정적으로 활용할 수 있다.

(d) **의사소통** — 논문과 학회 발표가 메모와 회의 보고로 바뀐다. 발표와 질의응답의 시간은 조직마다 다르지만, 핵심 결정과 근거를 먼저 말해야 하는 경우가 많다.

> 산업계에 들어간 뒤 네 가지 능력을 점검한다. 곧바로 쓸 수 있는 능력과 새 환경에 맞게 바꿔야 할 능력을 구분하면 무엇부터 배울지 정하기 쉽다.

---

## 25.5 인턴십으로 미리 경험하기

[Part 5 ch02](./chapter_22_professor_daily.md)는 면접보다 교수의 일상을 먼저 이해하라고 권한다.

산업계에서도 “면접을 어떻게 잘 볼까?”보다 “이 직무는 매일 어떤 일에 시간을 쓰는가?”를 먼저 물어야 한다. 인턴십이나 기업 협업, 현직자 대화에서 팀의 목표·회의·피드백 방식을 미리 살필 수 있다. 모든 회사가 OKR이나 스프린트를 쓰는 것은 아니다.

> 목표 직무의 채용 일정과 학과 규정을 확인한 뒤 인턴십·기업 협업·현직자 대화 가운데 가능한 방법으로 일상을 알아본다. 자세한 내용은 [Part 3 ch07 §4](./chapter_13_industry_path.md)에서 다루었다.

권창현 교수는 진로를 정확히 결정하려면 그 일상을 먼저 알아야 한다고 말한다. 인턴십을 해 본 뒤 산업계에 가지 않기로 할 수도 있으며, 그 경험은 다른 진로를 고를 때에도 근거가 된다.

---

## 25.6 산업계에서 마주치는 변화

산업계도 학계도 안정이 보장되는 자리는 아니다.

산업계에서는 회사 인수합병·팀 재조직·팀장 교체·프로젝트 종료·감원으로 소속 팀이나 역할이 바뀔 수 있다. 변화의 빈도와 폭은 회사마다 다르지만, 한 연구실에서 오래 지낸 뒤라면 처음 겪는 조직 변화가 크게 느껴질 수 있다.

> **산업계에서는 조직과 역할이 바뀔 수 있음을 받아들인다.** 회사 인수합병·팀 재조직·프로젝트 종료가 자신의 통제 밖에서 일어날 수도 있다.

산업계에서는 이런 변화가 일어날 수 있음을 알면 입사 초기의 충격을 줄일 수 있다. 한 연구실에서 오래 지내며 생긴 안정에 대한 기대가 조직 변화와 부딪힐 때에도 개인의 실패로만 해석하지 않을 수 있다.

---

## 25.7 회사 안팎에서 쌓이는 평판

산업계의 평판은 팀 목표의 결과뿐 아니라 회사 안에서 맡은 일을 마치는 과정에서 쌓일 수 있다. 회사 밖 활동은 직무·회사 정책·개인의 선택에 따라 달라진다.

평판이 쌓이는 경로는 네 가지로 나눠 볼 수 있다.

- **(a) 팀 안에서의 신뢰** — 목표를 합의하고 진행 상황과 위험을 알리며 맡은 일을 마치는 과정에서 쌓인다. 모든 팀이 OKR을 쓰는 것은 아니다.
- **(b) 외부 협업** — 다른 팀·다른 회사·외부 연구자와 함께 일하며 회사 밖에도 자신의 일과 이름을 알린다.
- **(c) 공개 가능한 경력 기록** — 이력서·포트폴리오·LinkedIn·GitHub·블로그 가운데 직무와 회사 정책에 맞는 경로를 고른다. 비공개 데이터·코드·고객 정보·지식재산은 공개하지 않는다.
- **(d) 발표·패널·모임** — 회사 승인을 받고 학회·산업계 콘퍼런스·기술 모임에서 공개 가능한 성과를 설명할 수 있다. 발표 횟수보다 실제 기여와 공개 범위가 중요하다.

> 네 항목을 한꺼번에 목표로 삼지 말고, 현재 역할에 필요한 것부터 고른다. 우선순위와 가능한 시간은 사람과 조직마다 다르다.

---

## 25.8 새로운 일의 리듬에 적응하기

산업계에서는 일을 나누는 방식과 결과의 형식, 시간 주기가 학계와 다를 수 있다. 진로를 결정하기 전에는 가능한 경로로 그 일상을 확인하고, 입사 뒤에는 자신의 팀이 실제로 쓰는 방식에 맞추어 조정한다. 적응 기간을 미리 고정할 수는 없다.

학계든 산업계든 박사 과정 뒤에도 일은 이어진다. [Part 4 ch04](./chapter_17_integrated_life.md)에서 세운 삶의 방향은 유지하더라도 일하는 방식은 환경에 맞게 바꿔야 한다.

**주의.** 일하는 방식의 차이만으로 산업계 진출 여부나 특정 회사의 좋고 나쁨, 이직 시기를 정할 수는 없다. 적응 방법을 검토한 뒤의 결정은 각자의 몫이다.

**출처.** 유두희 박사의 글이 실린 [『대학원생 때 알았더라면 좋았을 것들 2』](https://ebook-product.kyobobook.co.kr/dig/epd/ebook/4801191334679), 권창현 교수 「교수처럼 행동」, 엄태웅 대표 「에필로그 — 안정적인 삶」, 김기섭 교수 글을 참조했다. 산업계에서 일을 나누는 방식과 적응 과정은 원문에 없는 정리다. 스프린트·OKR·회의·유지보수 기간은 조직마다 다르므로 보편적인 숫자로 제시하지 않았다.

# Ch.26 — 졸업 후 첫 1년 — 새 역할을 배우는 시간

졸업식 다음 날의 책상은 박사 5년 차 때와 다르다. 책상 위의 자료가 달라지고, 컴퓨터에 열린 폴더의 이름과 이메일 서명에 적힌 소속도 바뀐다. 이런 작은 변화와 함께 새 역할을 배우는 첫해가 시작된다.

포닥·산업계·교수·창업의 첫해는 저마다 다르다. 그래도 박사 과정에서 쌓은 논문·코드·관계·평판을 새 환경에서 이어 가야 한다는 점은 같다. 졸업식과 함께 학교 밖의 새로운 일상이 시작된다.

---

## 26.1 졸업의 의미 — 다음 단계의 시작

박사 과정의 5년은 졸업 뒤의 5년으로 이어진다. 졸업식을 지나면 일하고 판단해야 할 자리가 학교 안에서 밖으로 옮겨 간다.

졸업 직후의 1년에는 지난 5년 동안 쌓은 일이 드러나는 동시에 앞으로 이어 갈 일이 시작된다. 학교 안에서 내린 결정과 맺은 관계, 기른 자율성과 감정을 새 환경에서 어떻게 쓰느냐에 따라 다음 선택도 달라진다.

엄태웅 대표의 「에필로그 — 안정적인 삶, 그런 거 없다」와 권창현 교수의 「에필로그 — 뭘 해도 불안하다」는 졸업 뒤에도 유효하다. 박사 학위가 안정을 보증하지 않으며, 진로를 정해도 걱정은 남는다. 졸업 직후부터 이 불안을 예외가 아닌 조건으로 받아들여야 새 일상을 차분히 시작할 수 있다.

---

## 26.2 네 진로의 첫 1년

진로에 따라 일의 호흡과 평가 기준, 결과가 나오는 시점이 다르므로 포닥·산업계·교수·창업은 저마다 다른 방식으로 준비해야 한다.

**포닥.** 새 연구실의 작업 방식에 적응하면서 박사 과정의 후속 연구와 새 과제 사이의 우선순위를 정한다. 새 책임연구자(PI)와의 관계도 [Ch.4 — 양방향 관계](./chapter_04_two_way_relationship.md)에서 다룬 것처럼 서로의 기대를 맞추는 일에서 출발한다. 포닥에게 기대하는 독립성은 계약과 분야에 따라 다르므로, 첫 회의에서 연구 주제와 의사결정 범위, 개요의 형식과 공유 빈도를 확인한다.

포닥 기간과 다음 진로를 결정할 시점은 계약·분야·개인 사정마다 다르다. 다만 당장의 연구뿐 아니라 교수직 채용 시장에 나갈지 산업계로 옮길지 판단할 자료도 일찍부터 쌓아야 한다.

**산업계.** 입사 적응 과정에서는 새 팀이 일을 나누는 주기와 결과를 보고하는 방식을 익힌다. 스프린트의 길이와 운영 방식은 팀마다 다르다. 하나의 문제를 오래 파고드는 박사 과정의 리듬을 그대로 적용하기보다, 새 조직이 중간 결과와 결정을 요구하는 시점을 알아야 한다.

가능하다면 기획부터 구현·검증·배포 이후의 운영까지 결과가 이어지는 과정을 살펴본다. 모든 직무가 제품 출시 전체에 참여하는 것은 아니므로, 자신이 맡은 구간의 앞뒤에서 누가 어떤 결정을 내리는지 확인한다. 산업계의 구체적인 일상은 [Ch.25 — 산업계 박사의 적응과 일상](./chapter_25_industry_daily.md)에서 다루었다.

**교수.** 임용 초기에는 강의·학생 지도·연구비·학내 업무 가운데 자신에게 실제로 주어진 역할이 한꺼번에 시작될 수 있다. [Ch.22 — 교수의 일상을 알기](./chapter_22_professor_daily.md)에서 본 여러 역할의 비중은 기관마다 다르다. 학생에서 지도교수로 옮겨 가는 전환이 큰 만큼, 새 학생 앞에서도 계속 학생처럼 행동하면 서로의 역할이 흐려진다.

연구비 신청은 거절될 수 있다. 김세정 교수가 말한 것처럼 거절을 시도한 흔적으로 읽을 수는 있지만, 거절 자체가 성취나 통과 의례인 것은 아니다. 심사 의견과 기관의 지원 절차를 다음 신청에 쓸 자료로 남긴다.

**창업.** 공동창업자·초기 자본·최소 기능 제품(MVP)을 마련하는 순서와 시점은 사업마다 다르다. 연구 성과보다 현금흐름과 고객 반응이 훨씬 짧은 주기로 드러날 수 있다는 차이를 받아들이지 못하면 박사 과정에서 일하던 방식이 창업의 속도를 늦춘다.

미리 정한 검토 시점마다 계속할지, 방향을 바꿀지, 멈출지를 판단할 자료를 남겨야 한다. 자금 조달이나 종료 시점을 모든 창업에 같은 기한으로 적용할 수는 없다.

---

## 26.3 학생에서 새 역할로

학위를 받은 뒤 호칭과 소개 방식이 달라질 수 있지만, `Dr.`를 쓰는 관행은 국가·기관·상황마다 다르다. 한국에서 ‘박사님’이라는 호칭을 처음 듣거나 새 직함으로 자신을 소개하는 일이 어색할 수도 있다. 중요한 변화는 호칭 자체보다 새 역할에서 맡는 판단과 책임이다.

이메일 서명과 발표 자료의 소속도 달라진다. 대학원생이던 사람은 박사·연구자·엔지니어·조교수·최고경영자(CEO) 가운데 하나로 자신을 소개한다. 겉으로는 바로 바뀌는 정보가 자기 인식에 스며드는 데에는 시간이 걸릴 수 있다.

더 큰 변화는 자신을 동료·공동 연구책임자·제품 책임자·교수로 보는 데서 일어난다. 박사 과정에서 굳어진 학생의 사고방식은 한 번에 사라지지 않는다. 새 역할을 맡는 동안 그 습관에서 벗어나면서 동료와 대등하게 일하는 법을 익힌다.

학생일 때의 기준만으로 새 일을 해석하면 새 역할에서 맡아야 할 판단과 책임을 미룰 수 있다. 이때 [Ch.20 — 임포스터 증후군](./chapter_20_imposter_syndrome.md)에서 다룬 “내가 박사라고 불릴 자격이 있는가”라는 의심이 강해질 수 있다. 이미 해낸 작은 일을 기록해 두면 새 역할에서 실제로 맡은 몫을 확인하는 데 도움이 된다.

---

## 26.4 박사 시절에 쌓은 것을 이어 가기

박사 과정에서 쌓은 논문·코드·관계·평판은 졸업과 함께 사라지지 않는다. 첫해에 이를 어떻게 이어 가느냐가 다음 5년의 선택지에 영향을 준다.

**논문.** 박사 과정의 1저자 논문 목록은 다음 단계의 출발점이다. 졸업 뒤에도 박사 과정의 후속 논문이 이어질 수 있다. 언제까지 마무리할지는 분야·공저자·새 직장의 조건에 따라 다르지만, 역할과 기한을 졸업 전에 합의하면 연구가 방치되는 일을 줄일 수 있다. 학위논문의 한 장을 학회나 저널 논문으로 옮기는 일도 여기에 포함된다.

**코드.** 졸업할 때 자신이 정리할 권한이 있는 저장소를 후배나 협업자가 설치하고 핵심 흐름을 찾을 수 있는지 점검한다. 공개 여부는 데이터 이용 조건, 참여자 동의, 지식재산, 기관 정책, 라이선스를 따른다. 졸업 뒤에도 기준 구현이나 재현을 위해 예전 코드를 다시 열 수 있으므로 미래의 자신이 읽을 문서도 남긴다.

공개하거나 넘길 권한이 있는 코드의 라이선스·README·설치 안내를 졸업 전에 정리해 두면 후속 협업과 재현에 도움이 된다. 접근 권한과 보존 위치도 확인해, 졸업 뒤 합법적으로 사용할 수 없는 자료가 섞이지 않게 한다.

**관계.** 졸업 뒤에는 소속과 생활 리듬이 달라져 박사 과정의 동료·지도교수·심사위원과 자연스럽게 만날 기회가 줄 수 있다. 모든 관계를 계속 유지할 필요는 없지만, 이어 가고 싶은 관계라면 상대에게 맞는 방식으로 먼저 연락할 수 있다.

[Ch.9 — 먼저 베푸는 협업](./chapter_09_give_first.md)에서 말했듯, 연락도 거창할 필요가 없다. 짧은 이메일 한 통, 안부 한 줄, 학회에서 건네는 한마디면 된다. 서로에게 맞는 간격으로 연락을 이어 가면 다시 대화할 여지를 남길 수 있다.

**평판.** 박사 과정에서 함께 일한 경험은 다음 직장의 추천이나 후속 논문·협업에서 참고될 수 있다. 새 자리에서도 답변과 마감, 기여 합의를 다루는 방식이 이어지므로, 지키기 어려운 약속은 일찍 조정하고 맡은 일을 기록한다.

---

## 26.5 첫해에 피할 일

**박사 과정의 일하는 방식을 그대로 되풀이하기.** 새 조직에서는 의사결정 주기와 산출물의 독자가 달라질 수 있다. 박사 과정의 깊이와 재현성을 버리는 것이 아니라, 새 환경에서 일을 나누고 중간 결과를 공유하는 방식을 먼저 배운다.

교수가 된 뒤에도 같은 함정이 있다. 박사 과정에서는 연구 한 축에 집중할 수 있었지만, 교수 첫해에는 연구·강의·연구비·학내 업무에 시간을 나눠야 한다. 연구에만 박사 시절의 방식을 적용하면 나머지 세 축이 밀린다.

> **진로를 바꾸었다면 새 조직의 의사결정 주기와 산출물 형식을 먼저 확인한다.** 박사 과정에서 익힌 방법은 필요한 부분을 남기고 새 역할에 맞게 조정한다.

**새 역할을 받아들이지 않기.** ‘나는 아직 학생이다’라는 생각을 붙들고 있으면 새 역할에서 맡아야 할 판단과 책임도 미뤄진다. 학위를 받은 뒤에는 새 역할에 맞는 결정을 시작할 수 있다.

**관계를 끊어 놓기.** 졸업 뒤에는 모두가 새 자리에서 바쁘다. 서로 먼저 연락하지 않으면 시간이 흐를수록 다시 연락하기 어려워진다. 짧은 연락을 먼저 보내면 다시 대화할 여지를 남길 수 있다.

---

## 26.6 첫해에 해볼 일

**적응 초기.** 새 환경에서 일을 어떻게 나누고 평가하는지 익힌다. 박사 과정의 방식을 비교 자료로 삼되, 새 방식을 하나씩 시험해 본다. 하루를 마칠 때 “오늘 한 일은 이곳의 일하는 방식에 맞았는가”라고 물으면 차이를 빨리 발견할 수 있다.

**관계 보호.** 관계를 이어 가고 싶은 박사 과정의 동료·지도교수·심사위원에게 가끔 짧게 연락한다. 최근 논문을 읽었다는 말이나 학회에서 잘 지냈는지 묻는 한 줄이면 충분하다. 긴 편지를 쓰려다 미루는 것보다 짧은 연락을 먼저 보내는 편이 낫다.

**다음 단계의 방향.** 새 역할을 어느 정도 경험한 뒤 다음 선택에 필요한 조건을 그려 본다. 박사 과정에서는 학교 안의 선택이 중심이었다면, 그 뒤에는 분야·기관·지역도 함께 고려해야 한다. 지난 학위 과정의 결정·관계·자율성·감정을 돌아보고, 무엇을 더 쌓고 무엇을 줄일지 정한다.

[Ch.23 — 안정은 환상이다](./chapter_23_no_stability.md)의 진로 비교표는 외부 조건을 비교한다. 자신의 결정·관계·자율성·감정도 함께 돌아봐야 표의 조건 가운데 무엇을 우선할지 정할 수 있다.

---

졸업식 뒤의 1년에는 새 환경에서 일을 나누는 방식과 맡은 역할에 맞는 판단을 익힌다. 짧은 연락으로 오래된 관계를 지키며 다음 5년의 방향도 그려 볼 수 있다.

진학을 결정할 때부터 졸업한 뒤까지 외부에서 완성된 답이 주어지는 순간은 없었다. 졸업 다음 날에도 해야 할 일은 구체적이다. 새 책상에서 일하는 방식을 다시 배우고, 사람들에게 먼저 연락하며, 다음 선택에 필요한 자료를 쌓는 일이다.

---

**출처.** 졸업을 다음 단계의 시작으로 보는 설명, 네 진로의 첫해에 달라지는 일의 방식, 호칭·소속·자기 인식으로 나눈 역할의 변화, 논문·코드·관계·평판으로 나눈 박사 시절의 경험, 첫해에 피하거나 해볼 일은 원문에 없는 정리다. [엄태웅 대표 「에필로그 — 안정적인 삶」](https://gradschoolstory.chkwon.net/terry/epilog_terry_stablelife/)과 [권창현 교수 「에필로그 — 뭘 해도 불안하다」](https://gradschoolstory.chkwon.net/changhyun/%ec%97%90%ed%95%84%eb%a1%9c%ea%b7%b8-%eb%ad%98-%ed%95%b4%eb%8f%84-%eb%b6%88%ec%95%88%ed%95%98%eb%8b%a4/)에서 불안정이 졸업 뒤에도 이어진다는 생각을 가져왔다. 교수 첫해의 태도는 [권창현 교수 「교수처럼 행동」](https://gradschoolstory.chkwon.net/changhyun/%ea%b5%90%ec%88%98%ec%b2%98%eb%9f%bc-%eb%a7%90%ed%95%98%ea%b3%a0-%ed%96%89%eb%8f%99%ed%95%98%eb%8a%94-%ec%82%ac%eb%9e%8c%ec%9d%b4-%ea%b5%90%ec%88%98%ea%b0%80-%eb%90%9c%eb%8b%a4/)를 참조했다. 먼저 연락하는 방식은 [Ch.9 — 먼저 베푸는 협업](./chapter_09_give_first.md), 후배에게 코드를 넘기는 방식은 [Ch.21 — 후배를 키운다](./chapter_21_mentor_juniors.md), 역할이 바뀔 때 생기는 의심은 [Ch.20 — 임포스터 증후군](./chapter_20_imposter_syndrome.md)과 연결된다. 진로별 기한과 횟수는 직장·분야·사업에 따라 달라지므로 보편적인 일정으로 제시하지 않았다.

  function protectMath(src) {
    var placeholders = [];
    var idx = 0;
    var codeBlocks = [];
    src = src.replace(new RegExp('\\x60\\x60\\x60[\\s\\S]*?\\x60\\x60\\x60', 'g'), function(m) {
      codeBlocks.push(m);
      return '%%CODEBLOCK' + (codeBlocks.length - 1) + '%%';
    });
    var inlineCodes = [];
    src = src.replace(new RegExp('\\x60[^\\x60\\n]+\\x60', 'g'), function(m) {
      inlineCodes.push(m);
      return '%%INLINECODE' + (inlineCodes.length - 1) + '%%';
    });
    src = src.replace(/\$\$([\s\S]*?)\$\$/g, function(m, math) {
      placeholders.push({ display: true, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/\$([^\s$](?:[^$]*[^\s$])?)\$/g, function(m, math) {
      placeholders.push({ display: false, math: math });
      return '%%MATH' + (idx++) + '%%';
    });
    src = src.replace(/%%CODEBLOCK(\d+)%%/g, function(m, i) { return codeBlocks[parseInt(i, 10)]; });
    src = src.replace(/%%INLINECODE(\d+)%%/g, function(m, i) { return inlineCodes[parseInt(i, 10)]; });
    return { src: src, placeholders: placeholders };
  }

  function restoreAndRenderMath(html, placeholders) {
    return html.replace(/%%MATH(\d+)%%/g, function(m, i) {
      var p = placeholders[parseInt(i, 10)];

        return katex.renderToString(p.math, { displayMode: p.display, throwOnError: false, trust: true });

        return p.display ? '$$' + p.math + '$$' : '$' + p.math + '$';
      }
    });
  }

  function parseHeading(text) {
    var ch = text.trim().match(/^Ch\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ch) return { kind: 'chapter', num: parseInt(ch[1], 10), title: ch[2].trim(), label: 'Ch.' + parseInt(ch[1], 10) };
    var ex = text.trim().match(/^E\.?\s*(\d+)\s*[\u2014\u2013-]\s*(.+)$/);
    if (ex) return { kind: 'excerpt', num: parseInt(ex[1], 10), title: ex[2].trim(), label: 'E.' + parseInt(ex[1], 10) };
    return null;
  }

  function parseGroupLabel(label) {
    var parts = label.split('·');
    if (parts.length < 2) return { kicker: '', title: label.trim() };
    return { kicker: parts[0].trim(), title: parts.slice(1).join('·').trim() };
  }

  function findEntryHeading(item) {
    var h1s = contentEl.querySelectorAll('h1');
    for (var i = 0; i < h1s.length; i++) {
      var parsed = parseHeading(h1s[i].textContent);
      if (parsed && parsed.kind === item.kind && parsed.num === item.num) return h1s[i];
    }
    return null;
  }

  function annotateEntryHeadings() {
    contentEl.querySelectorAll('h1').forEach(function(h1) {
      var parsed = parseHeading(h1.textContent);
      if (!parsed) return;
      if (!h1.id) h1.id = parsed.kind + '-' + parsed.num;
      h1.classList.add(parsed.kind === 'excerpt' ? 'excerpt-heading' : 'chapter-heading');
    });
  }

  function buildPartIntros() {
    annotateEntryHeadings();
    CHAPTER_GROUPS.forEach(function(group, index) {
      var first = null;
      for (var i = 0; i < group.items.length; i++) {
        first = findEntryHeading(group.items[i]);
        if (first) break;
      }
      if (!first) return;

      var meta = parseGroupLabel(group.label);
      var partId = 'part-' + index + '-' + slugify(meta.title);

      var section = document.createElement('section');
      section.className = 'part-intro';

      var kicker = document.createElement('div');
      kicker.className = 'part-kicker';
      kicker.textContent = meta.kicker || 'Part';
      section.appendChild(kicker);

      var title = document.createElement('h1');
      title.className = 'part-title';
      title.id = partId;
      title.textContent = meta.title;
      section.appendChild(title);

      if (group.intro) {
        var intro = document.createElement('p');
        intro.textContent = group.intro;
        section.appendChild(intro);
      }

      first.parentNode.insertBefore(section, first);
    });
